<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CMMC Level 2 AO Study Companion</title>
<style>
:root {
  --bg: #0b1020;
  --panel: #141b33;
  --card: #1c2544;
  --text: #f4f7fb;
  --muted: #aeb8d0;
  --accent: #8bd3ff;
  --line: #2d395f;
  --good: #b5f3c6;
  --warn: #ffd38b;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.42; }
header { position: sticky; top: 0; background: rgba(11,16,32,.96); backdrop-filter: blur(10px); z-index: 5; border-bottom: 1px solid var(--line); padding: 14px; }
h1 { font-size: 1.2rem; margin: 0 0 6px; }
.meta { font-size: .88rem; color: var(--muted); }
.toolbar { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-top: 10px; }
input, button { border: 1px solid var(--line); border-radius: 10px; background: #10172d; color: var(--text); padding: 10px; font-size: 16px; }
button { background: #183250; cursor: pointer; white-space: nowrap; }
main { padding: 14px; max-width: 1050px; margin: auto; }
.summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 12px 0; }
.stat { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 12px; text-align: center; }
.stat b { display: block; font-size: 1.25rem; color: var(--accent); }
.note { border-left: 4px solid var(--accent); background: var(--panel); padding: 12px; border-radius: 12px; margin: 12px 0; color: var(--muted); }
details.control { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; margin: 10px 0; overflow: hidden; }
summary { cursor: pointer; padding: 14px; font-weight: 800; }
.req { color: var(--muted); padding: 0 14px 14px; }
.ao { background: var(--card); margin: 10px 12px 14px; border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
.ao h3 { margin: 0 0 8px; font-size: 1rem; color: var(--accent); }
.label { font-weight: 900; color: var(--good); }
h4 { margin: 12px 0 6px; color: var(--good); }
ul { margin: 6px 0 0 20px; padding: 0; }
li { margin: 6px 0; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.chip { display: inline-block; font-size: .75rem; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px; margin-left: 6px; font-weight: 600; }
.statement { color: var(--text); font-weight: 700; }
.pill { color: var(--warn); font-weight: 700; }
.empty { color: var(--muted); padding: 20px; text-align: center; }
@media(max-width: 700px) {
  .toolbar { grid-template-columns: 1fr; }
  .summary { grid-template-columns: repeat(3, 1fr); }
  .stat { padding: 8px; font-size: .82rem; }
  main { padding: 10px; }
  .ao { margin: 8px 8px 12px; }
}
</style>
</head>
<body>
<header>
  <h1>CMMC Level 2 AO Study Companion</h1>
  <div class="meta">110 controls / 320 AO cards. Built for quick mobile review.</div>
  <div class="toolbar">
    <input id="q" placeholder="Search control, title, domain, requirement, or AO text...">
    <button id="random">Random AO</button>
    <button id="expand">Expand visible</button>
  </div>
</header>
<main>
  <div class="note"><b>Use:</b> Pick an AO, read what it means, then ask yourself: can I show live proof stronger than SSP text alone? Evidence lists are ordered strongest to weakest.</div>
  <div class="summary">
    <div class="stat"><b id="controlCount">110</b>Controls</div>
    <div class="stat"><b id="aoCount">320</b>AOs</div>
    <div class="stat"><b id="visibleCount">110</b>Visible</div>
  </div>
  <div id="app"></div>
</main>

const app = document.getElementById('app');
const q = document.getElementById('q');
const visible = document.getElementById('visibleCount');
let expanded = false;
function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function card(c, o) {
  return `<section class="ao" id="${c.control}-${o.label}">
    <h3><span class="label">AO [${o.label}]</span> <span class="statement">${esc(o.statement)}</span></h3>
    <h4>Plain language</h4>
    <p>${esc(o.plain)}</p>
    <h4>Assessor questions</h4>
    <ul>${o.questions.map(x => `<li>${esc(x)}</li>`).join('')}</ul>
    <h4>Evidence checklist, best first</h4>
    <ul>${o.evidence.map(x => `<li>${esc(x)}</li>`).join('')}</ul>
  </section>`;
}
function matches(c, f) {
  const hay = (c.control + ' ' + c.title + ' ' + c.domain + ' ' + c.requirement + ' ' + c.objectives.map(o => o.statement + ' ' + o.plain).join(' ')).toLowerCase();
  return !f || hay.includes(f);
}
function render(filter='') {
  const f = filter.toLowerCase().trim();
  app.innerHTML = '';
  let vc = 0;
  DATA.forEach(c => {
    if (!matches(c, f)) return;
    vc++;
    const d = document.createElement('details');
    d.className = 'control';
    d.open = expanded || f.length > 0;
    d.innerHTML = `<summary>${esc(c.control)} - ${esc(c.title)} <span class="chip">${esc(c.domain)}</span><span class="chip">${c.objectives.length} AOs</span></summary><div class="req">${esc(c.requirement)}</div>` + c.objectives.map(o => card(c, o)).join('');
    app.appendChild(d);
  });
  visible.textContent = vc;
  if (!vc) app.innerHTML = '<div class="empty">No matching controls.</div>';
}
q.addEventListener('input', e => render(e.target.value));
document.getElementById('expand').addEventListener('click', () => {
  expanded = !expanded;
  document.getElementById('expand').textContent = expanded ? 'Collapse visible' : 'Expand visible';
  render(q.value);
});
document.getElementById('random').addEventListener('click', () => {
  const c = DATA[Math.floor(Math.random() * DATA.length)];
  const o = c.objectives[Math.floor(Math.random() * c.objectives.length)];
  q.value = c.control;
  expanded = false;
  document.getElementById('expand').textContent = 'Expand visible';
  render(q.value);
  setTimeout(() => {
    const detail = document.querySelector('details.control');
    if (detail) detail.open = true;
    const target = document.getElementById(`${c.control}-${o.label}`);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
});
render();
</script>
</body>
</html>
