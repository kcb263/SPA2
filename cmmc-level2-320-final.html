<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CMMC L2">
<title>CMMC Level 2 — Assessment Objectives</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--sf:#161b22;--sf2:#1c2128;--bd:#30363d;--ac:#58a6ff;--gr:#3fb950;--rd:#f78166;--mu:#8b949e;--tx:#e6edf3;--tx2:#c9d1d9;--mo:'IBM Plex Mono',monospace;--sa:'IBM Plex Sans',sans-serif;--r:8px;--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sa);background:var(--bg);color:var(--tx);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top,12px))}
.ht{font-family:var(--mo);font-size:13px;font-weight:600;color:var(--ac);letter-spacing:.05em;text-transform:uppercase}
.hs{font-size:11px;color:var(--mu);margin-top:1px;font-family:var(--mo)}
.rbtn{background:var(--ac);color:#0d1117;border:none;border-radius:var(--r);padding:8px 14px;font-family:var(--mo);font-size:12px;font-weight:600;cursor:pointer}
.rbtn:active{opacity:.75}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:12px;font-family:var(--mo);color:var(--mu);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.fbar{padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:center}
.si{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 12px;color:var(--tx);font-size:14px;outline:none}
.si:focus{border-color:var(--ac)}
.si::placeholder{color:var(--mu)}
.cnt{font-family:var(--mo);font-size:11px;color:var(--mu);white-space:nowrap}
.lv{flex:1;overflow-y:auto;padding:12px;padding-bottom:calc(12px + var(--sb))}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer}
.cc:active{background:var(--sf2);border-color:var(--ac)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.ci{font-family:var(--mo);font-size:12px;font-weight:600}
.db{font-family:var(--mo);font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid;flex-shrink:0}
.ctit{font-size:14px;font-weight:500;margin-bottom:6px}
.pbar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pbg{flex:1;background:var(--bd);border-radius:4px;height:4px}
.pf{height:100%;border-radius:4px;transition:width .3s}
.aoc{font-size:10px;font-family:var(--mo);color:var(--mu)}
.cfp{font-size:10px;font-family:var(--mo)}
.dv{flex:1;overflow-y:auto;display:none;flex-direction:column}
.dv.on{display:flex}
.dhdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:14px 16px;flex-shrink:0}
.bk{display:flex;align-items:center;gap:6px;color:var(--ac);font-family:var(--mo);font-size:12px;cursor:pointer;margin-bottom:10px;background:none;border:none;padding:0}
.bk:active{opacity:.7}
.did{font-family:var(--mo);font-size:12px;font-weight:600;color:var(--ac);margin-bottom:3px}
.dtit{font-size:17px;font-weight:600;margin-bottom:6px;line-height:1.3}
.dstmt{font-size:12px;color:var(--mu);font-style:italic;line-height:1.5;margin-bottom:6px}
.dcont{padding:14px;overflow-y:auto;flex:1;padding-bottom:calc(80px + var(--sb))}
.slbl{font-family:var(--mo);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--bd)}
.aocard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer}
.aocard:active{background:var(--sf2);border-color:var(--ac)}
.aot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.aolbl{font-family:var(--mo);font-size:11px;font-weight:600;flex-shrink:0}
.aost{font-size:13px;color:var(--tx2);line-height:1.45}
.aostat{font-size:10px;font-family:var(--mo)}
.plain-box{background:var(--sf2);border:1px solid var(--bd);border-left:3px solid var(--ac);border-radius:var(--r);padding:14px;font-size:14px;line-height:1.65;color:var(--tx2);margin-bottom:16px}
.list-box{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:0;overflow:hidden;margin-bottom:16px}
ul.ql,ul.el{list-style:none;padding:0}
ul.ql li,ul.el li{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:13px;color:var(--tx2);line-height:1.55;display:flex;gap:10px;align-items:flex-start}
ul.ql li:last-child,ul.el li:last-child{border-bottom:none}
ul.el li::before{content:'▸';color:var(--gr);flex-shrink:0;margin-top:1px}
ul.ql li::before{content:'Q';font-family:var(--mo);font-size:10px;font-weight:600;color:var(--rd);background:rgba(247,129,102,.15);border-radius:3px;padding:1px 5px;flex-shrink:0;margin-top:2px}
.cbar{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);padding:12px 16px;padding-bottom:calc(12px + var(--sb));display:none;gap:10px}
.cbar.on{display:flex}
.cb{flex:1;padding:10px;border-radius:var(--r);border:1px solid;font-family:var(--mo);font-size:12px;font-weight:600;cursor:pointer;background:transparent}
.cb.needs{color:var(--rd);border-color:var(--rd)}
.cb.needs.sel{background:rgba(247,129,102,.2)}
.cb.good{color:var(--gr);border-color:var(--gr)}
.cb.good.sel{background:rgba(63,185,80,.2)}
@keyframes si{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.dv.on{animation:si .2s ease-out}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="ht">CMMC Level 2</div><div class="hs" id="prog">Loading...</div></div>
  <button class="rbtn" onclick="rnd()">⚡ Random AO</button>
</div>
<div class="tabs" id="tabs"><div class="tab on" onclick="setD('ALL',this)">All</div></div>
<div class="main" id="listMain">
  <div class="fbar">
    <input class="si" type="search" placeholder="Search controls or AOs..." id="srch" oninput="fil()">
    <span class="cnt" id="cntBadge"></span>
  </div>
  <div class="lv" id="lv"></div>
</div>
<div class="dv" id="cv">
  <div class="dhdr">
    <button class="bk" onclick="goList()">← All Controls</button>
    <div class="did" id="cvid"></div>
    <div class="dtit" id="cvtit"></div>
    <div class="dstmt" id="cvstmt"></div>
    <div id="cvbdg"></div>
  </div>
  <div class="dcont" id="cvcont"></div>
</div>
<div class="dv" id="av">
  <div class="dhdr">
    <button class="bk" onclick="goCtrl()">← Control AOs</button>
    <div class="did" id="avid"></div>
    <div class="dtit" id="avstmt" style="font-size:15px"></div>
    <div id="avbdg" style="margin-top:6px"></div>
  </div>
  <div class="dcont" id="avcont"></div>
</div>
<div class="cbar" id="cbar">
  <button class="cb needs" id="btnN" onclick="setC('needs')">Needs Review</button>
  <button class="cb good" id="btnG" onclick="setC('good')">Confident ✓</button>
</div>
<script>
const C=[{"id": "AC.L2-3.1.1", "domain": "AC", "domainFull": "Access Control", "title": "Authorized Access Control", "statement": "Limit system access to authorized users, processes acting on behalf of authorized users, and devices (including other systems).", "aos": [{"id": "a", "stmt": "Authorized users are identified", "plain": "Every person, service account, and device accessing your CUI systems must have a documented identity. 'Authorized user' means there is a recorded decision by an approving authority that this individual should have access. Anonymous or unidentifiable access is never acceptable.", "questions": ["Show me your complete user account inventory for systems that process CUI.", "Show me how a new employee's account is created and what authorization is required before that account is enabled.", "Show me how you distinguish a human user account from a service or system account in your directory.", "Show me how a terminated user's account appears differently from an active authorized user."], "evidence": ["Active Directory or IdP user account export showing all accounts with unique identifiers, account type, and status.", "Access request and approval records showing authorization decision prior to account creation.", "User account inventory or CMDB report listing all authorized users with role, authorization date, and approver.", "Screenshot of an individual user account properties page showing unique identifier and last logon."]}, {"id": "b", "stmt": "Processes acting on behalf of authorized users are identified", "plain": "Automated processes \u2014 scheduled tasks, service accounts, API integrations, batch jobs \u2014 must be individually identified just like human users. A service account named 'svc_backup' must be traceable to a specific system function and an authorized owner who approved its creation.", "questions": ["Show me the complete inventory of all service accounts and system accounts that access CUI systems.", "Show me how each service account is mapped to a specific application or system function.", "Show me who owns and is accountable for each service account in your environment.", "Show me how you ensure service accounts cannot be used for interactive human logon."], "evidence": ["Service account inventory listing all non-human accounts, their function, owner, and last password change.", "Active Directory OU or group structure showing service accounts segregated from human accounts.", "Configuration showing service accounts have 'interactive logon denied' policy applied.", "Service account creation approval records documenting the business justification and authorizing manager."]}, {"id": "c", "stmt": "Devices (and other systems) authorized to connect to the system are identified", "plain": "Devices connecting to your CUI environment \u2014 workstations, servers, mobile devices, and other systems \u2014 must be individually identified and documented. An unknown device connecting to your network should be detectable and blockable.", "questions": ["Show me your device inventory for all assets authorized to connect to CUI systems.", "Show me what happens when an unknown or unauthorized device attempts to connect to your CUI network.", "Show me how inter-system connections to CUI systems are documented and authorized.", "Show me how your MDM or NAC solution enforces device identity before granting network access."], "evidence": ["Device inventory (CMDB or MDM report) listing all authorized endpoints with device ID, owner, and compliance status.", "NAC or 802.1X configuration showing device certificate or identity requirements before network access.", "Interconnection Security Agreements or authorized system connection registry.", "Network access control logs showing authorized device connections and blocked unauthorized attempts."]}, {"id": "d", "stmt": "System access is limited to authorized users", "plain": "Technical controls must enforce that only authorized users can reach CUI systems \u2014 not just policy. If someone is removed from the authorized list, they must immediately lose access. Authorization must be technically implemented, not just documented on paper.", "questions": ["Show me that a user account not in the authorized group cannot access a CUI system.", "Show me how access is revoked within 24 hours when a user is terminated.", "Show me the technical enforcement mechanism \u2014 group membership, ACL, or role assignment \u2014 that restricts access to authorized users only.", "Show me your most recent access review and how many accounts were identified and removed."], "evidence": ["Screenshot demonstrating an unauthorized account receives 'access denied' when attempting CUI system access.", "Terminated user account showing disabled status within 24 hours of termination date.", "Access control group membership export showing current authorized users mapped to CUI systems.", "Most recent access review records showing accounts reviewed and unauthorized access removed."]}, {"id": "e", "stmt": "System access is limited to processes acting on behalf of authorized users", "plain": "Automated processes and service accounts must also be technically restricted \u2014 not just human users. A decommissioned application's service account should not continue to have access simply because nobody thought to disable it.", "questions": ["Show me that service accounts are assigned only the permissions required for their specific function.", "Show me how you detect and disable service accounts for applications that have been decommissioned.", "Show me the last service account review and what accounts were found to have more access than needed.", "Show me how service account access is verified as still necessary during periodic reviews."], "evidence": ["Service account access review records with documented approval of continued access.", "Example of a service account disabled when its associated application was decommissioned.", "Least-privilege configuration for a sample service account showing scoped permissions.", "Automated or manual process for discovering over-privileged service accounts."]}, {"id": "f", "stmt": "System access is limited to authorized devices (including other systems)", "plain": "Devices must not just be identified \u2014 they must be technically prevented from accessing CUI systems if they are not on the authorized list. 802.1X, NAC, and MDM compliance enforcement are the mechanisms that make this real rather than just policy.", "questions": ["Show me the technical mechanism that prevents an unauthorized device from connecting to CUI networks.", "Show me how a device that falls out of MDM compliance is blocked from accessing CUI resources.", "Show me how personal or BYOD devices are handled \u2014 are they blocked, placed in a separate segment, or permitted under specific conditions?", "Show me how inter-system connections are restricted to only explicitly authorized systems."], "evidence": ["NAC configuration showing device authentication or compliance check required before network access.", "MDM compliance policy showing non-compliant devices are quarantined or denied CUI access.", "Network segmentation documentation showing untrusted/guest devices cannot reach CUI systems.", "802.1X or certificate-based device authentication configuration for CUI network access."]}]}, {"id": "AC.L2-3.1.10", "domain": "AC", "domainFull": "Access Control", "title": "Session Lock", "statement": "Use session lock with pattern-hiding displays after a period of inactivity.", "aos": [{"id": "a", "stmt": "The period of inactivity after which the system initiates a session lock is defined", "plain": "After a defined period of user inactivity, the workstation or terminal must automatically lock without requiring user action. This prevents unauthorized access when someone walks away without manually locking their session. The timeout must be enforced centrally \u2014 not left to user discretion.", "questions": ["Show me the session lock configuration for your CUI workstations and terminals.", "Show me the inactivity timeout value and where it is technically enforced.", "Demonstrate that the session lock activates after the configured idle period.", "Show me that users cannot disable or extend the session lock timeout beyond the defined value."], "evidence": ["Group Policy or MDM configuration screenshot showing session lock timeout enforcement.", "Screen lock timeout setting from a representative CUI workstation showing the configured value.", "Evidence that the timeout setting is not user-modifiable \u2014 enforced centrally via GPO or MDM.", "Test record demonstrating session lock activation at the defined timeout period."]}, {"id": "b", "stmt": "Access to the system and viewing of data is prevented by initiating a session lock after the defined period of inactivity", "plain": "When the session lock activates, it must hide what was on the screen. A transparent screensaver showing the active window does not satisfy this requirement. The lock must obscure or replace screen contents so that someone walking by cannot see CUI that was being worked on.", "questions": ["Show me what the screen looks like after a session lock activates \u2014 does it hide the previous content?", "Show me that the lock screen does not display any portion of the previously active session or window.", "Show me whether your lock screen displays potentially sensitive information such as the username or last accessed application.", "Show me the session lock configuration confirming content hiding is enforced."], "evidence": ["Screenshot of the session lock screen showing content is fully obscured \u2014 black screen, corporate logo, or opaque screensaver.", "Configuration showing transparent screensaver is disabled in favor of a lock screen that hides content.", "Group Policy or MDM setting confirming password-protected screen lock is enforced over any transparent option.", "Evidence that lock screen does not display application windows, file names, or content previews."]}, {"id": "c", "stmt": "Previously visible information is concealed via a pattern-hiding display after the defined period of inactivity", "plain": "Once a session lock activates, it must remain locked until the legitimate user re-authenticates with their credentials. Simply pressing a key, moving a mouse, or touching a touchpad must not unlock the session. Full credential entry is required.", "questions": ["Show me that unlocking a locked session requires credential entry, not just a key press or mouse movement.", "Demonstrate that pressing a key or moving the mouse does not unlock the session.", "Show me whether MFA is required to unlock a locked privileged session.", "Show me whether re-authentication on unlock generates an audit log entry."], "evidence": ["Screenshot showing credential prompt required to unlock a locked workstation.", "Group Policy setting showing 'Require password when waking from screensaver' is enforced.", "Configuration confirming unlock requires password entry, not a simple key press or mouse click.", "Audit log showing re-authentication events when sessions were unlocked after the lock activated."]}]}, {"id": "AC.L2-3.1.11", "domain": "AC", "domainFull": "Access Control", "title": "Session Termination", "statement": "Terminate (automatically) a user session after a defined condition.", "aos": [{"id": "a", "stmt": "Conditions requiring a user session to terminate are defined", "plain": "Your organization must define the specific conditions that trigger automatic session termination \u2014 maximum session duration, excessive idle time beyond the lock period, or detection of network location changes. These conditions must be documented in policy and configured in systems.", "questions": ["Show me your documented conditions that trigger automatic session termination.", "Show me how session termination conditions differ from session lock conditions.", "Show me the maximum session duration defined for CUI system sessions.", "Show me where these termination conditions are technically configured for each system type."], "evidence": ["Session management policy or configuration documentation listing specific termination trigger conditions.", "Web application session configuration showing absolute session timeout values.", "VPN session policy showing maximum duration and termination-on-idle settings.", "System Security Plan section describing session management conditions for CUI systems."]}, {"id": "b", "stmt": "A user session is automatically terminated after any of the defined conditions occur", "plain": "The defined termination conditions must be technically enforced. When the condition occurs, the session must be fully terminated \u2014 not just locked \u2014 requiring complete re-authentication including credential entry from the beginning. A session that can be 'resumed' after timeout has not truly been terminated.", "questions": ["Show me a demonstration of session termination when the defined condition is met.", "Show me that a terminated session requires full re-authentication \u2014 not just a resume or continue action.", "Show me session termination enforcement in web applications handling CUI.", "Show me that server-side session tokens are invalidated upon termination \u2014 not just cleared from the browser."], "evidence": ["Web application session timeout configuration showing server-side session destruction on timeout.", "VPN session log showing forced disconnection after the defined idle or maximum duration limit.", "Evidence that session tokens are invalidated server-side upon timeout \u2014 verified by attempting to resume after expiry.", "Test record showing that after termination, attempting to continue requires full login from scratch."]}]}, {"id": "AC.L2-3.1.12", "domain": "AC", "domainFull": "Access Control", "title": "Control Remote Access", "statement": "Monitor and control remote access sessions.", "aos": [{"id": "a", "stmt": "Remote access sessions are permitted", "plain": "Remote access to CUI systems must be explicitly authorized before it is permitted. There must be a documented approval process that records who may use remote access, through what mechanism, and to which systems. Implicit authorization \u2014 'we allow VPN because we have it' \u2014 is insufficient.", "questions": ["Show me how remote access authorization is documented and approved.", "Show me the list of authorized remote access users and the systems they may access remotely.", "Show me the approval process required before a user is granted remote access.", "Show me when the remote access authorization list was last reviewed and updated."], "evidence": ["Remote access policy with authorization requirements, approval process, and scope.", "Remote access authorization records showing approved users, access type, scope, and approval date.", "VPN or remote access user group membership showing only currently authorized individuals.", "Periodic remote access review records confirming continued need and authorization."]}, {"id": "b", "stmt": "The types of permitted remote access are identified", "plain": "Remote access must be controlled according to defined policy requirements \u2014 not just permitted or denied. Controls include MFA enforcement, endpoint compliance checks, access scoping to only necessary resources, and session limits. These must be technically enforced, not left to user discretion.", "questions": ["Show me the documented security requirements that apply to all remote access sessions.", "Show me how MFA is technically enforced for all remote access connections.", "Show me the endpoint compliance check performed before remote access is granted.", "Show me how remote users are restricted to only the internal resources they need \u2014 not full network access."], "evidence": ["Remote access security requirements policy listing all required controls.", "VPN or remote access gateway configuration showing MFA enforcement.", "MDM or NAC endpoint compliance check configuration run before remote access is granted.", "VPN split-tunnel or firewall configuration limiting remote users to authorized resources only."]}, {"id": "c", "stmt": "Remote access sessions are controlled", "plain": "Remote access sessions must be actively monitored \u2014 connection logs collected, reviewed, and anomalous behavior alerting configured. Monitoring must capture who connected, from where, when, session duration, and data volume. Passive log collection without active review provides no security value.", "questions": ["Show me the logging configuration for your remote access systems.", "Show me what information is captured in remote access logs \u2014 user, source IP, duration, data transferred.", "Show me how you monitor for anomalous remote access \u2014 off-hours connections, unusual source locations, excessive data transfer.", "Show me a recent example of a remote access anomaly alert and how it was investigated."], "evidence": ["VPN connection log sample showing user, source IP, session duration, and bytes transferred.", "SIEM alert rules configured to detect anomalous remote access patterns.", "Remote access monitoring dashboard or report showing active session visibility.", "Alert investigation record for a flagged remote access anomaly event."]}, {"id": "d", "stmt": "Remote access sessions are monitored", "plain": "Unauthorized remote access attempts must be detected and responded to. This goes beyond logging \u2014 it requires active monitoring with alerting, a defined response procedure for detected unauthorized attempts, and the ability to immediately terminate a suspicious remote session.", "questions": ["Show me how unauthorized remote access attempts are detected in your environment.", "Show me the alerting that triggers when a remote access authentication fails beyond the defined threshold.", "Show me how you would immediately terminate all remote access for a specific user suspected of compromise.", "Show me the response procedure when unauthorized remote access is detected."], "evidence": ["SIEM alert rules for remote access authentication failures and anomalous patterns.", "Process documentation for immediately revoking a user's remote access in a security event.", "Recent incident or alert record showing unauthorized remote access was detected and responded to.", "Firewall or VPN administrator documentation showing ability to immediately block a specific user or IP."]}]}, {"id": "AC.L2-3.1.13", "domain": "AC", "domainFull": "Access Control", "title": "Remote Access Confidentiality", "statement": "Employ cryptographic mechanisms to protect the confidentiality of remote access sessions.", "aos": [{"id": "a", "stmt": "Cryptographic mechanisms to protect the confidentiality of remote access sessions are identified", "plain": "All remote access traffic must be encrypted using strong cryptographic mechanisms. No plain-text protocols \u2014 no Telnet, unencrypted RDP, or plain FTP \u2014 are acceptable. VPN protocols must use strong cipher suites, and the encryption must actually protect the session from network interception.", "questions": ["Show me the cryptographic protocols and cipher suites used for your VPN and remote access solutions.", "Show me how you verify your remote access encryption meets current cryptographic standards.", "Show me whether any legacy unencrypted or weakly-encrypted remote access protocols are still in use.", "Show me how you update cryptographic configurations when cipher suites are deprecated."], "evidence": ["VPN configuration documentation showing the protocol, cipher suite, and key length in use.", "SSL/TLS scan results (SSLLabs or equivalent) for remote access portals showing cipher configuration.", "Network capture analysis confirming remote access traffic is encrypted end-to-end.", "Policy prohibiting legacy protocols (Telnet, rsh, unencrypted RDP) on remote access infrastructure."]}, {"id": "b", "stmt": "Cryptographic mechanisms to protect the confidentiality of remote access sessions are implemented", "plain": "For CUI environments under DoD and federal contracts, the encryption used for remote access must use FIPS 140-2 or 140-3 validated cryptographic modules. Using strong algorithms alone is insufficient \u2014 the cryptographic implementation itself must carry FIPS validation.", "questions": ["Show me the FIPS validation status of the cryptographic modules used in your VPN or remote access solution.", "Show me how you confirmed your remote access solution uses FIPS-validated cryptography.", "Show me whether Windows FIPS mode is enabled on remote access servers and concentrators.", "Show me the NIST CMVP certificate number for your remote access cryptographic module."], "evidence": ["FIPS 140-2/3 validation certificate or NIST CMVP entry for the VPN product's cryptographic module.", "Windows FIPS mode configuration screenshot on remote access servers.", "Vendor documentation confirming the FIPS-validated module is active and in use.", "TLS configuration showing only FIPS-approved cipher suites are enabled for remote access."]}]}, {"id": "AC.L2-3.1.14", "domain": "AC", "domainFull": "Access Control", "title": "Remote Access Routing", "statement": "Route remote access via managed access control points.", "aos": [{"id": "a", "stmt": "Managed access control points are identified and implemented", "plain": "Remote access traffic must flow through controlled chokepoints \u2014 VPN concentrators, jump servers, or bastion hosts \u2014 rather than connecting directly to internal CUI systems from the internet. This enables monitoring, filtering, and policy enforcement at a centralized point.", "questions": ["Show me your network architecture for remote access \u2014 where does remote traffic enter your environment?", "Show me that direct inbound internet connections to CUI systems are technically blocked.", "Show me the managed access control points in your environment and how they are secured.", "Show me firewall rules that prevent remote users from bypassing the managed access control points."], "evidence": ["Network architecture diagram showing all remote access traffic routing through VPN concentrator or jump server.", "Firewall rules blocking direct inbound connections from internet to CUI systems.", "VPN concentrator or jump server hardening documentation.", "Network flow logs showing remote access sessions traverse the managed access control point."]}, {"id": "b", "stmt": "Remote access is routed through managed network access control points", "plain": "The number of remote access entry points must be limited and actively monitored. Multiple ingress points increase attack surface. Each entry point must be inventoried, justified, managed, and monitored. Unauthorized or shadow IT remote access pathways must be detected and eliminated.", "questions": ["Show me your inventory of all authorized remote access entry points into your environment.", "Show me how you detect unauthorized remote access pathways that have not been approved.", "Show me how each authorized remote access entry point is monitored.", "Show me the justification for maintaining the number of remote access entry points you currently have."], "evidence": ["Inventory of all authorized remote access entry points with justification for each.", "Firewall or network scan confirming no unauthorized inbound remote access ports are open.", "Monitoring configuration showing all authorized remote access points are actively observed.", "Network scanning results confirming no unexpected remote access services are listening."]}]}, {"id": "AC.L2-3.1.15", "domain": "AC", "domainFull": "Access Control", "title": "Privileged Remote Access", "statement": "Authorize remote execution of privileged commands and remote access to security-relevant information via remote access only for documented operational needs.", "aos": [{"id": "a", "stmt": "Privileged commands authorized to be executed over remote access sessions are identified", "plain": "Administrative commands executed remotely \u2014 modifying system configurations, managing accounts, changing security settings \u2014 must be individually documented and authorized. Not all administrative actions should be routinely executable remotely without explicit authorization.", "questions": ["Show me where remote execution of privileged commands is documented and authorized.", "Show me the approval process for authorizing a specific class of remote privileged command execution.", "Show me the list of currently authorized remote privileged command scenarios.", "Show me how privileged remote command execution is distinguished from routine remote access in your logging."], "evidence": ["Policy document listing authorized privileged remote access scenarios with justification for each.", "Change management records showing privileged remote access was specifically approved before use.", "PAM tool configuration restricting which privileged commands can be executed during remote sessions.", "Audit log showing privileged command execution during remote sessions with user identity."]}, {"id": "b", "stmt": "The execution of privileged commands over remote access sessions is implemented only for documented operational needs", "plain": "Accessing security-sensitive data remotely \u2014 audit logs, access control lists, vulnerability data, security configurations \u2014 requires specific authorization beyond general remote access. The sensitivity of these resources demands higher scrutiny and explicit authorization.", "questions": ["Show me the authorization for remote access to security-relevant systems or information.", "Show me how remote access to audit logs and security configurations is restricted and controlled.", "Show me who is specifically authorized to remotely access security-relevant information.", "Show me monitoring specific to remote access of security-relevant information."], "evidence": ["Access control list for security-relevant systems showing only specifically authorized accounts have remote access.", "Remote access authorization records specifically designating approved access to security function systems.", "SIEM alert for remote access to audit log storage or security configuration systems.", "Audit log showing remote access to security-relevant information with user identity and timestamp."]}, {"id": "c", "stmt": "Security-relevant information authorized to be accessed via remote access sessions is identified", "plain": "Remote privileged execution should be the exception tied to a documented operational need \u2014 not a routine convenience. The operational need must be real, documented, and the remote approach must be the appropriate mechanism. 'It's easier than going to the data center' is not a sufficient justification.", "questions": ["Show me the documented operational need for each authorized remote privileged access scenario.", "Show me how requests for new remote privileged execution are evaluated against genuine operational necessity.", "Show me whether alternatives to remote privileged execution were considered before authorizing each scenario.", "Show me how often remote privileged execution is actually used versus how often it is authorized."], "evidence": ["Operational need justification documentation for each authorized remote privileged access scenario.", "Review records showing remote privileged access authorizations are periodically evaluated for continued necessity.", "Comparison of remote privileged access usage logs versus authorized scenarios to identify unused authorizations.", "Documentation showing alternatives to remote privileged execution were considered before authorizing."]}, {"id": "d", "stmt": "Access to security-relevant information via remote access sessions is implemented only for documented operational needs", "plain": "Remote access to security-relevant information \u2014 audit logs, vulnerability data, access control lists, security configurations \u2014 requires specific authorization beyond general remote access. The sensitivity demands extra scrutiny.", "questions": ["Show me who is specifically authorized to access security-relevant information via remote access.", "Show me how remote access to audit logs and security configurations is controlled separately from general remote access.", "Show me monitoring specific to remote access of security-relevant information.", "Show me the authorization record for a specific individual's remote access to a security-relevant system."], "evidence": ["Authorization records specifically designating approved remote access to security function systems.", "Access control list for security-relevant systems showing only authorized accounts have remote access.", "SIEM alert for remote access to audit log storage or security configuration systems.", "Audit log showing remote access to security-relevant information with user identity and timestamp."]}]}, {"id": "AC.L2-3.1.16", "domain": "AC", "domainFull": "Access Control", "title": "Wireless Access Authorization", "statement": "Authorize wireless access prior to allowing such connections.", "aos": [{"id": "a", "stmt": "Wireless access points are identified", "plain": "Before any wireless connection to a CUI-carrying network is permitted, it must be explicitly authorized. There must be a formal process to approve wireless access for specific users, device types, or network segments. The existence of a wireless access point does not constitute authorization.", "questions": ["Show me the wireless access authorization process \u2014 who approves it and what is documented.", "Show me the list of authorized wireless users and devices for CUI network access.", "Show me how a new request for wireless access to CUI systems is evaluated and approved.", "Show me how unauthorized wireless access attempts are detected and responded to."], "evidence": ["Wireless access authorization records for users and devices permitted on CUI wireless networks.", "Wireless access policy specifying authorization requirements, approval process, and scope.", "Wireless network configuration showing authentication requirements before association.", "Rogue access point detection tool configuration and recent scan or detection results."]}, {"id": "b", "stmt": "Wireless access is authorized prior to allowing such connections", "plain": "Wireless connections to CUI networks must be monitored. This includes logging all authenticated connections, actively monitoring for rogue access points, and detecting anomalous wireless behavior. Wireless monitoring often requires dedicated WIDS tools beyond standard network monitoring.", "questions": ["Show me how wireless connections to CUI networks are logged and monitored.", "Show me how rogue wireless access points are detected in your environment.", "Show me wireless access logs and how they are reviewed for anomalies.", "Show me how you detect unauthorized devices attempting to connect to your CUI wireless networks."], "evidence": ["Wireless connection logs showing authenticated client connections to CUI wireless networks.", "Wireless intrusion detection system (WIDS) configuration and alert documentation.", "Recent rogue AP scan results or evidence of continuous wireless monitoring.", "RADIUS server authentication logs for wireless clients on CUI-carrying network segments."]}]}, {"id": "AC.L2-3.1.17", "domain": "AC", "domainFull": "Access Control", "title": "Wireless Access Protection", "statement": "Protect wireless access using authentication and encryption.", "aos": [{"id": "a", "stmt": "Wireless access to the system is protected using authentication", "plain": "CUI wireless networks must require individual user and/or device authentication \u2014 not just a shared pre-shared key. WPA2-Enterprise with 802.1X is the standard. A shared PSK does not provide individual accountability or support individual access revocation.", "questions": ["Show me the authentication mechanism used for your CUI wireless networks.", "Show me that WPA2-Enterprise or WPA3-Enterprise with 802.1X is used rather than a pre-shared key.", "Show me how individual wireless users are authenticated and how that authentication is logged.", "Show me how wireless access is revoked for a specific individual without affecting other users."], "evidence": ["Wireless network configuration showing WPA2-Enterprise or WPA3-Enterprise authentication type.", "RADIUS server configuration supporting 802.1X authentication for wireless CUI networks.", "Screenshot of the CUI wireless network security settings confirming Enterprise authentication mode.", "Evidence of individual user wireless authentication with audit trail from RADIUS logs."]}, {"id": "b", "stmt": "Wireless access to the system is protected using encryption", "plain": "Wireless traffic on CUI networks must be encrypted to protect data in transit. WPA2-Enterprise with AES/CCMP or WPA3 are acceptable. WEP is completely unacceptable. TKIP is also deprecated and should not be used. Encryption must be verified, not just configured in theory.", "questions": ["Show me the encryption protocol and cipher suite used on your CUI wireless networks.", "Show me that WEP and TKIP are disabled in favor of AES/CCMP or WPA3.", "Show me how you verify wireless encryption is actually functioning as configured.", "Show me the FIPS compliance status of the wireless encryption implementation."], "evidence": ["Wireless AP or controller configuration showing WPA2-AES or WPA3 encryption type.", "Wireless security audit results confirming strong encryption is in use and weak options are disabled.", "Configuration prohibiting WEP, TKIP, and any deprecated cipher suites on CUI wireless networks.", "Network capture confirming wireless traffic payload is encrypted \u2014 not readable in clear text."]}]}, {"id": "AC.L2-3.1.18", "domain": "AC", "domainFull": "Access Control", "title": "Mobile Device Connection", "statement": "Control connection of mobile devices.", "aos": [{"id": "a", "stmt": "A usage restriction for mobile devices is established", "plain": "Your organization must have an inventory of all mobile devices that access, process, store, or transmit CUI. Personal phones, corporate tablets, contractor laptops, and any mobile device connecting to CUI systems must be identified. An undocumented mobile device accessing CUI is an unmanaged risk.", "questions": ["Show me your inventory of mobile devices authorized to access CUI systems.", "Show me how you identify new mobile devices that need to access CUI and how they are enrolled.", "Show me how personal (BYOD) devices are handled \u2014 are they permitted, prohibited, or permitted under conditions?", "Show me how you detect mobile devices accessing CUI that are not in your authorized inventory."], "evidence": ["MDM enrollment records showing authorized device inventory with owner, device ID, and platform.", "Mobile device policy specifying which device types are authorized and under what conditions.", "MDM dashboard showing all enrolled devices with compliance status.", "Configuration blocking unenrolled devices from accessing CUI systems."]}, {"id": "b", "stmt": "A configuration requirement for mobile devices is established", "plain": "Authorized mobile device connections to CUI systems must be actively controlled \u2014 not just permitted. Controls include MDM enrollment requirements, endpoint compliance enforcement, MFA for mobile access, and the ability to remotely wipe or lock a lost or compromised device.", "questions": ["Show me how mobile device connections to CUI systems are technically controlled.", "Show me the MDM compliance policies that must be met before a mobile device can access CUI resources.", "Show me how a lost or stolen device would be detected and remotely wiped.", "Show me how MFA is enforced for mobile device access to CUI systems."], "evidence": ["MDM compliance policy configuration showing security requirements for enrolled devices.", "Conditional Access or NAC policy configuration requiring MDM enrollment before CUI access.", "Remote wipe capability demonstration or documentation with evidence of a test wipe.", "MFA enforcement configuration for mobile access to CUI applications and VPN."]}, {"id": "c", "stmt": "Mobile devices that process, store, or transmit CUI are identified and managed", "plain": "Mobile devices that actually process, store, or transmit CUI \u2014 not just all mobile devices \u2014 must be specifically identified and managed. The inventory drives MDM enrollment requirements and security policy application.", "questions": ["Show me your inventory of mobile devices that process, store, or transmit CUI.", "Show me how you determine whether a given mobile device actually handles CUI.", "Show me how CUI-handling mobile devices are managed differently from non-CUI devices.", "Show me what MDM or management controls apply to your CUI-handling mobile devices."], "evidence": ["MDM enrollment records showing CUI-handling mobile devices with owner, device ID, and compliance status.", "Process documentation for identifying whether a mobile device qualifies as a CUI-handling device.", "MDM compliance policy specifically applied to CUI-handling mobile devices.", "Inventory of CUI-handling mobile devices with applied management controls documented."]}]}, {"id": "AC.L2-3.1.19", "domain": "AC", "domainFull": "Access Control", "title": "Encrypt CUI on Mobile", "statement": "Encrypt CUI on mobile devices and mobile computing platforms.", "aos": [{"id": "a", "stmt": "Mobile devices and mobile computing platforms that process, store, or transmit CUI are identified", "plain": "Your organization must have a documented policy explicitly requiring that CUI stored on mobile devices and platforms be encrypted. The policy must specify acceptable encryption standards, enforcement mechanism, and what to do when a device cannot meet encryption requirements. A generic 'secure devices' policy is insufficient.", "questions": ["Show me your mobile device encryption policy for CUI.", "Show me the encryption standard specified in the policy \u2014 algorithm, key length.", "Show me how the policy applies to different device types \u2014 corporate laptops, phones, and tablets.", "Show me how the policy addresses devices that cannot support the required encryption."], "evidence": ["Mobile device security policy with explicit encryption requirement for all devices handling CUI.", "MDM encryption enforcement policy configuration.", "Approved device list confirming only encryption-capable devices are authorized for CUI access.", "Policy exception process for devices unable to meet encryption requirements with compensating controls."]}, {"id": "b", "stmt": "Encryption is employed to protect CUI on identified mobile devices and mobile computing platforms", "plain": "Encryption must be technically enforced and verified \u2014 not self-attested by users. MDM platforms, BitLocker, and FileVault provide enforcement and compliance reporting. The encryption must cover all storage that could hold CUI and must be confirmed through compliance tools.", "questions": ["Show me that full-device encryption is enabled on all mobile devices that may handle CUI.", "Show me your MDM compliance report showing encryption status across your mobile fleet.", "Show me how you verify encryption is actually enabled versus just configured in policy.", "Show me what happens to a device that reports as not encrypted in your MDM compliance reports."], "evidence": ["MDM compliance report showing encryption-enabled status for all managed mobile devices.", "BitLocker or FileVault configuration and enforcement report for managed laptops.", "Screenshot of device encryption status from a sample managed device.", "MDM non-compliance report showing devices with encryption disabled and their remediation status."]}]}, {"id": "AC.L2-3.1.2", "domain": "AC", "domainFull": "Access Control", "title": "Transaction & Function Control", "statement": "Limit system access to the types of transactions and functions that authorized users are permitted to execute.", "aos": [{"id": "a", "stmt": "The types of transactions and functions that authorized users are permitted to execute are defined", "plain": "For every role in your organization, there must be a documented definition of exactly what that role is allowed to do inside a CUI system. It is not sufficient to say 'users have access' \u2014 you must define whether they can read, write, delete, administer, or approve specific functions.", "questions": ["Show me where the permitted transactions and functions are defined for each user role.", "Show me how a new role's allowed functions are determined and documented before access is provisioned.", "Show me the role definitions for at least three different access levels in your CUI environment.", "Show me how role definitions are reviewed when business processes or systems change."], "evidence": ["Role matrix or RBAC definition document mapping job functions to permitted system actions.", "System access request form showing required fields for specifying needed permissions by role.", "Application or system role configuration export showing defined permission sets per role.", "Role definition review records showing periodic validation that roles still match job functions."]}, {"id": "b", "stmt": "System access is limited to the defined types of transactions and functions for authorized users", "plain": "The defined role permissions must be technically enforced by the system \u2014 not just stated in policy. A read-only analyst must technically be unable to delete records. A helpdesk technician must technically be unable to modify firewall rules regardless of what the policy says.", "questions": ["Demonstrate that a user with a read-only role cannot perform write operations in a CUI system.", "Show me the technical mechanism \u2014 RBAC configuration, ACL, or application permission \u2014 that enforces role boundaries.", "Show me what audit event is generated when a user attempts an action outside their defined role.", "Show me how you verify that role enforcement hasn't drifted from the defined configuration over time."], "evidence": ["Screenshot showing access denied when a limited-privilege account attempts an unauthorized action.", "RBAC or permission group configuration showing enforcement of defined role boundaries.", "Application audit log showing permission-denied events for out-of-scope actions.", "Configuration compliance scan showing role assignments match the defined role matrix."]}]}, {"id": "AC.L2-3.1.20", "domain": "AC", "domainFull": "Access Control", "title": "External Connections", "statement": "Verify and control/limit connections to external systems.", "aos": [{"id": "a", "stmt": "Connections to external systems are identified", "plain": "Every connection between your CUI environment and an external system \u2014 government portals, cloud services, contractor networks, partner APIs \u2014 must be documented. An undocumented external connection is an unknown risk. The inventory must be complete enough to definitively answer 'what external systems touch your environment.'", "questions": ["Show me your inventory of external system connections to and from your CUI environment.", "Show me how new external connections are identified and added to the inventory.", "Show me what information is captured for each identified external connection.", "Show me how the external connection inventory is kept current."], "evidence": ["External system connection inventory listing all external connections with description, direction, and data type.", "Network diagram highlighting all external connection points.", "Interconnection Security Agreement (ISA) register or equivalent documentation.", "Firewall or proxy logs showing inbound and outbound connections to external systems."]}, {"id": "b", "stmt": "The use of external systems is identified", "plain": "Each identified external connection must have formal authorization \u2014 a documented decision by an appropriate authority that this specific connection is permitted. An ISA or formal authorization record serves this purpose. Connections that exist because 'we've always done it' without formal authorization are non-compliant.", "questions": ["Show me the authorization records for your external system connections.", "Show me who has authority to authorize external connections in your organization.", "Show me an example ISA or external connection authorization document.", "Show me a connection that was requested and denied or required modification, and how that was handled."], "evidence": ["Interconnection Security Agreements (ISAs) or MOUs for all external connections with approval signatures.", "External connection authorization log showing approver, date, scope, and expiration.", "Change management records showing external connections were approved before implementation.", "Denied external connection request records with documented rationale."]}, {"id": "c", "stmt": "Connections to external systems are verified", "plain": "External system connections must operate in a manner consistent with your CUI handling policies. Your policies governing CUI flows, access controls, and data protection must extend to how CUI moves across these external connections. External systems cannot become an uncontrolled bypass for your internal controls.", "questions": ["Show me how you ensure external systems connected to yours handle CUI consistently with your policies.", "Show me what your ISAs or external agreements require of the external system operators.", "Show me how you verify that external systems are actually complying with your policy requirements.", "Show me what happens when an external system is found to be non-compliant with requirements."], "evidence": ["ISA or contract clause requiring external system operators to comply with specified security requirements.", "External system security assessment or compliance review records.", "Non-compliance notification and remediation records for an external connection policy issue.", "Supply chain or third-party assessment documentation for high-risk external system operators."]}, {"id": "d", "stmt": "The use of external systems is verified", "plain": "When your personnel access external systems \u2014 including government systems \u2014 the use of portable storage on those external systems must be controlled. This prevents data being moved to or from external systems via USB or removable media in ways that bypass both your controls and the external system's controls.", "questions": ["Show me your policy governing portable storage use when accessing external or government systems.", "Show me how you technically control portable storage use on managed devices when connecting to external systems.", "Show me how users are trained on portable storage restrictions in external system contexts.", "Show me how you monitor for portable storage use during sessions on external systems."], "evidence": ["Policy restricting or prohibiting portable storage use when accessing government or external partner systems.", "Technical controls (GPO or endpoint agent) preventing unauthorized USB use on managed devices regardless of what system they access.", "User training records covering portable storage restrictions in external system contexts.", "USB insertion event logs showing monitoring of portable storage activity on managed devices."]}, {"id": "e", "stmt": "Connections to external systems are controlled/limited", "plain": "Connections to external systems must be technically controlled and limited \u2014 not just authorized on paper. Firewall rules, network ACLs, and application-level controls enforce what traffic is permitted between your CUI environment and external systems.", "questions": ["Show me the technical controls limiting connections to authorized external systems.", "Show me firewall rules controlling traffic to and from external system connections.", "Show me how unauthorized connections to external systems are blocked.", "Show me monitoring that detects unexpected connection attempts to external systems."], "evidence": ["Firewall rules restricting external system connections to authorized flows only.", "Network ACL configuration controlling external system traffic.", "Connection monitoring logs showing authorized vs. blocked external traffic.", "External connection inventory with corresponding technical control documentation."]}, {"id": "f", "stmt": "The use of external systems is controlled/limited", "plain": "The actual use of authorized external systems must be controlled \u2014 meaning access is restricted to what is needed, monitored for policy compliance, and can be revoked. Authorization alone is not the same as ongoing control.", "questions": ["Show me how your organization controls ongoing use of authorized external systems.", "Show me how you monitor compliance with restrictions on external system use.", "Show me how access to an external system is revoked when it is no longer needed.", "Show me controls that prevent an external system from being used beyond its authorized scope."], "evidence": ["External system usage policy with scope restrictions.", "Monitoring records showing external system usage is within authorized parameters.", "External system access revocation records when connections are decommissioned.", "Technical controls limiting scope of access through authorized external connections."]}]}, {"id": "AC.L2-3.1.21", "domain": "AC", "domainFull": "Access Control", "title": "Portable Storage Use", "statement": "Limit use of portable storage devices on external systems.", "aos": [{"id": "a", "stmt": "The use of portable storage devices containing CUI on external systems is identified and documented", "plain": "Your organization must have an inventory of portable storage devices authorized for use on or with external systems. Untracked USB drives carrying CUI are a serious risk. Authorized portable storage must be inventoried, individually identified, and their use documented when deployed.", "questions": ["Show me your portable storage device inventory for devices authorized for CUI use.", "Show me how authorized portable storage devices are individually tracked and identified \u2014 by serial number or certificate.", "Show me how you know if CUI has been copied to a portable storage device.", "Show me what information is recorded when a portable storage device is used on a CUI system."], "evidence": ["Portable storage device inventory listing authorized devices with owner, purpose, device ID, and tracking status.", "Endpoint agent or DLP log showing portable storage insertion events on CUI systems.", "Audit log showing file copy events to removable media on CUI systems.", "Authorized removable media register with device serial numbers or hardware identifiers."]}, {"id": "b", "stmt": "Limits on the use of portable storage devices containing CUI on external systems are defined", "plain": "Authorized portable storage devices must be under active technical control \u2014 not just inventoried. Only authorized devices should be connectable (technically enforced), usage must be logged, and any CUI on portable storage must be encrypted. Unapproved personal devices must be blocked.", "questions": ["Show me how unauthorized portable storage devices are technically blocked from connecting to CUI systems.", "Show me the technical control that enforces portable storage restrictions on CUI systems.", "Show me how CUI on authorized portable storage is protected through encryption.", "Show me a log showing an unauthorized USB device was blocked when someone attempted to connect it."], "evidence": ["Group Policy or endpoint agent configuration blocking unauthorized USB or removable storage devices.", "Screenshot showing an unauthorized removable device was blocked upon insertion attempt.", "BitLocker To Go or equivalent encryption enforcement for authorized portable storage.", "DLP policy restricting CUI file transfers to only approved, encrypted portable storage devices."]}, {"id": "c", "stmt": "The use of portable storage devices containing CUI on external systems is limited as defined", "plain": "When portable storage devices are used on external systems and contain CUI, that use must be controlled. This prevents CUI from being inadvertently left on external systems or moving to unauthorized locations via portable media.", "questions": ["Show me controls governing CUI-containing portable storage use on external systems.", "Show me your policy restricting portable storage containing CUI on external systems.", "Show me how you technically enforce portable storage restrictions when accessing external systems.", "Show me training records covering portable storage use restrictions in external contexts."], "evidence": ["Policy restricting use of portable storage containing CUI on external or government systems.", "Technical control preventing unauthorized portable storage use on managed devices.", "Training records covering portable storage restrictions in external system contexts.", "Audit logs showing portable storage events on managed devices in external contexts."]}]}, {"id": "AC.L2-3.1.22", "domain": "AC", "domainFull": "Access Control", "title": "Control Public Information", "statement": "Control CUI posted or processed on publicly accessible systems.", "aos": [{"id": "a", "stmt": "Individuals authorized to post or process information on publicly accessible systems are identified", "plain": "The ability to post content to public-facing systems must be restricted to a specifically authorized set of individuals. Not every employee should be able to publish to your public website or file servers. Authorization to post publicly must be deliberately granted, documented, and technically enforced.", "questions": ["Show me who is authorized to post content to your public-facing systems.", "Show me how posting authorization is technically enforced \u2014 who has write or publish access.", "Show me the authorization records for individuals with public posting capability.", "Show me how access to post publicly is granted and how it is revoked when no longer needed."], "evidence": ["Access control list for public-facing content management systems showing authorized publishers.", "Authorization records for individuals granted public posting rights with approval documentation.", "Technical configuration showing publish rights are limited to authorized accounts.", "Training records showing authorized publishers have completed required content review training."]}, {"id": "b", "stmt": "Procedures to ensure CUI is not posted or processed on publicly accessible systems are identified", "plain": "There must be a defined and enforced procedure for reviewing and approving content before it is posted to publicly accessible systems. Reviewers must understand CUI identification requirements so they can recognize and prevent inadvertent public posting of controlled information.", "questions": ["Show me the review and approval process before content is posted to your public-facing systems.", "Show me how reviewers are trained to identify CUI that should not be posted publicly.", "Show me examples of content that went through the public posting review process.", "Show me whether the review process applies to all content types \u2014 documents, data files, and web content."], "evidence": ["Public content review and approval workflow documentation with defined roles and steps.", "Evidence of approved public postings with reviewer sign-off confirming CUI review was completed.", "Training records showing public posting reviewers have completed CUI identification training.", "Periodic audit records of public-facing systems checking for inadvertently posted CUI."]}, {"id": "c", "stmt": "A review process is in place prior to posting of any content to publicly accessible systems", "plain": "Regardless of who posts content and what review occurs, the end state must be verified \u2014 CUI must not be present on publicly accessible systems. Ongoing monitoring, periodic audits, and DLP tools that scan outbound content to public systems provide this assurance beyond one-time reviews.", "questions": ["Show me how you monitor publicly accessible systems for inadvertent CUI exposure on an ongoing basis.", "Show me whether DLP tools scan content as it is posted or transferred to public-facing systems.", "Show me the process to quickly identify and remove CUI if it is discovered on a public system.", "Show me the most recent scan or audit of your public-facing systems for CUI exposure."], "evidence": ["DLP configuration showing scanning of outbound content transfers to public-facing systems.", "Automated or manual scan results of public-facing systems for CUI markers or classified content.", "Incident record showing CUI discovered on a public system was removed promptly and the incident investigated.", "Monitoring tool configuration for ongoing web content or file share scanning for CUI identifiers."]}, {"id": "d", "stmt": "Content on publicly accessible systems is reviewed to ensure that it does not include CUI", "plain": "Publicly accessible systems must be actively reviewed to ensure CUI has not been improperly posted. Periodic audits and scanning of public-facing content provide ongoing assurance beyond one-time pre-posting reviews.", "questions": ["Show me how content on publicly accessible systems is reviewed for improper CUI posting.", "Show me your review schedule and recent review records for public-facing content.", "Show me automated or manual scanning of publicly accessible systems for CUI.", "Show me a recent example of content review and its outcome."], "evidence": ["Periodic public content review records with dates and findings.", "Scanning configuration for publicly accessible systems checking for CUI markers.", "Manual content review checklists and completed review records.", "Review schedule documentation showing required audit frequency."]}, {"id": "e", "stmt": "Mechanisms are in place to remove and address improper posting of CUI", "plain": "When CUI is found improperly posted on a publicly accessible system, mechanisms must exist to remove it promptly and address the root cause to prevent recurrence.", "questions": ["Show me your process for removing improperly posted CUI from publicly accessible systems.", "Show me what triggers the removal process \u2014 automated detection or manual discovery.", "Show me a record of an improper posting incident that was discovered and remediated.", "Show me root cause analysis conducted after a public posting incident."], "evidence": ["CUI removal and response procedure for improperly posted public content.", "Incident record showing improperly posted CUI was removed and investigated.", "Root cause analysis records for a public posting incident.", "Control improvements implemented following a public posting incident."]}]}, {"id": "AC.L2-3.1.3", "domain": "AC", "domainFull": "Access Control", "title": "Control CUI Flow", "statement": "Control the flow of CUI in accordance with approved authorizations.", "aos": [{"id": "a", "stmt": "Information flow control policies are defined", "plain": "Before you can technically enforce where CUI can travel, you need documented policies defining allowed and prohibited flow paths. The policy must name which systems, users, networks, and external destinations CUI is permitted to reach \u2014 and which are prohibited. Informal or undocumented flows are a compliance gap.", "questions": ["Show me your documented information flow control policy for CUI.", "Show me how the policy defines permitted CUI destinations versus prohibited ones.", "Show me who approved the policy and when it was last reviewed.", "Show me how your policy addresses CUI flows to cloud services and external partners."], "evidence": ["CUI information flow control policy document with approval signature and effective date.", "Data classification policy distinguishing CUI from other data types with handling requirements.", "System Security Plan section describing CUI information flows within and between systems.", "Policy review records showing periodic update cadence and responsible reviewer."]}, {"id": "b", "stmt": "Methods and enforcement mechanisms for controlling the flow of CUI are defined", "plain": "The policy must be backed by defined technical and administrative enforcement mechanisms. You must document how CUI flow control is actually implemented \u2014 DLP rules, network segmentation, email gateway policies, file share ACLs. Policy alone without enforcement mechanisms is not compliant.", "questions": ["Show me the technical mechanisms defined and deployed to enforce CUI flow control.", "Show me how your DLP tool is configured to detect and block unauthorized CUI flows.", "Show me how email gateway rules enforce CUI transmission restrictions to unauthorized destinations.", "Show me how network segmentation is defined to prevent unauthorized CUI data flows between segments."], "evidence": ["DLP tool configuration documentation showing CUI detection rules and enforcement policies.", "Email gateway policy export restricting CUI transmission to unauthorized external addresses.", "Network segmentation architecture document showing CUI system isolation from other networks.", "Data flow diagram showing defined allowed CUI pathways with enforcement mechanisms annotated."]}, {"id": "c", "stmt": "Designated sources and destinations (e.g., networks, individuals, and devices) for CUI within the system and between interconnected systems are identified", "plain": "You must have a documented inventory of exactly where CUI originates (sources) and where it is permitted to go (destinations). This includes internal systems, external systems, and interconnected partner environments. A data flow diagram that maps CUI sources and destinations satisfies this objective.", "questions": ["Show me where CUI originates in your environment \u2014 which systems create or first receive CUI.", "Show me the approved destinations where CUI may be sent or stored.", "Show me how CUI flows are documented between your system and interconnected external systems.", "Show me how new CUI flow paths are evaluated and approved before being implemented."], "evidence": ["Data flow diagram mapping all CUI sources, processing locations, and approved destinations.", "CUI inventory showing all systems that originate, process, store, and transmit CUI.", "Interconnection Security Agreements listing approved data flows with external systems.", "Authorization records for approved cloud services or external destinations for CUI."]}, {"id": "d", "stmt": "Authorizations for controlling the flow of CUI are defined", "plain": "Each approved CUI flow path must have a corresponding authorization \u2014 a documented decision by an appropriate authority that this particular flow is permitted. Undocumented or informally approved flows are not compliant. Authorization must be explicit, recorded, and traceable.", "questions": ["Show me the authorization records for each defined CUI flow path in your environment.", "Show me who has authority to approve new CUI flow paths and how that authority is documented.", "Show me an example authorization record and what information it contains.", "Show me an example of a CUI flow that was requested but not authorized, and how that was enforced."], "evidence": ["Flow authorization records with approver name, date, and scope for each approved CUI pathway.", "Approval workflow documentation showing the process for authorizing new CUI flow requests.", "Completed authorization records in your GRC or change management system.", "Denied flow request records showing unauthorized flow attempts were rejected."]}, {"id": "e", "stmt": "Approved authorizations for controlling the flow of CUI are enforced", "plain": "Authorized CUI flow paths must be technically enforced \u2014 not just documented. CUI must only be able to travel through the approved channels, and any unapproved flow must be technically blocked or detected with alerting. This is the proof that ties policy to technical reality.", "questions": ["Show me a technical demonstration that CUI cannot be sent to an unauthorized destination.", "Show me how your DLP or network controls technically block unauthorized CUI flows in real time.", "Show me a test or demonstration that emailing CUI to a personal email account is blocked or generates an alert.", "Show me the monitoring or alerting that would detect an unauthorized CUI flow if one occurred."], "evidence": ["DLP block log showing an attempted CUI transfer to an unauthorized destination was prevented.", "Email gateway log showing a CUI-containing email to an unauthorized address was quarantined.", "Network traffic analysis confirming CUI traffic does not cross unauthorized segment boundaries.", "SIEM alert configuration targeting unauthorized CUI flow indicators with recent alert examples."]}]}, {"id": "AC.L2-3.1.4", "domain": "AC", "domainFull": "Access Control", "title": "Separation of Duties", "statement": "Separate the duties of individuals to reduce the risk of malevolent activity without collusion.", "aos": [{"id": "a", "stmt": "The duties of individuals requiring separation are defined", "plain": "Your organization must have documented which roles and functions require separation of duties \u2014 meaning no single individual should hold both. Common examples: approver and executor of the same transaction, developer and production deployer, system administrator and auditor of that same system.", "questions": ["Show me your documented list of duties and roles that require separation.", "Show me how you identified which functions present unacceptable risk if held by one person.", "Show me where separation of duties requirements are documented in your security policies.", "Show me how this list is reviewed when organizational roles or systems change."], "evidence": ["Separation of duties policy identifying specific roles and functions that must be segregated.", "Role incompatibility matrix showing prohibited role combinations.", "System Security Plan section addressing separation of duties implementation.", "Evidence of organizational review that identified current SoD requirements."]}, {"id": "b", "stmt": "Responsibilities for duties that require separation are assigned to separate individuals", "plain": "The documented separation requirements must be technically implemented. An individual must not hold access rights to both the approver and executor roles for a critical function. Workflow systems and access controls must enforce the separation \u2014 policy alone is insufficient.", "questions": ["Show me that the roles requiring separation are assigned to different individuals in your systems.", "Show me the technical enforcement \u2014 role assignment, access controls, or workflow \u2014 that prevents one person from holding conflicting access.", "Show me a change management workflow requiring separate individuals for approval and implementation.", "Show me audit logs demonstrating that approval and execution steps for critical functions were performed by different identities."], "evidence": ["Access control configuration showing conflicting roles are not assigned to the same account.", "Change management system workflow configuration requiring separate approver and implementer identities.", "Sample change ticket showing distinct approver and implementer user identities for a recent change.", "Audit log extract showing separate individuals in approval vs. execution roles for a critical function."]}, {"id": "c", "stmt": "Access privileges that enable individuals to exercise the duties that require separation are granted to separate individuals", "plain": "In some cases \u2014 especially in small organizations \u2014 complete separation is not achievable because there are not enough qualified people. When this occurs, compensating controls must be documented and implemented: enhanced monitoring, mandatory dual review, management oversight, or audit logging with regular review.", "questions": ["Show me where your organization has documented that full separation of duties is not feasible.", "Show me what compensating controls are in place where separation cannot be fully implemented.", "Show me how the compensating controls are monitored and reviewed for effectiveness.", "Show me the risk acceptance documentation for scenarios where full separation is not achieved."], "evidence": ["Documented exceptions to separation of duties with compensating control descriptions and risk acceptance.", "Enhanced monitoring or alerting configuration for roles where separation is not fully achievable.", "Management review records or secondary approval requirements implemented as compensating controls.", "Risk acceptance records signed by appropriate authority for separation of duties limitations."]}]}, {"id": "AC.L2-3.1.5", "domain": "AC", "domainFull": "Access Control", "title": "Least Privilege", "statement": "Employ the principle of least privilege, including for specific security functions and privileged accounts.", "aos": [{"id": "a", "stmt": "Privileged accounts are identified", "plain": "You must have a complete, current inventory of all privileged accounts \u2014 domain admins, local admins, root accounts, service accounts with elevated rights, application admin accounts, security tool admins. If you don't know where all privileged accounts are, you cannot control them.", "questions": ["Show me your privileged account inventory.", "Show me how you discover privileged accounts \u2014 is this automated or manual?", "Show me how the inventory is kept current when new privileged accounts are created.", "Show me how you distinguish privileged from standard user accounts in your directory."], "evidence": ["Privileged account inventory listing all elevated accounts, their function, system, and owner.", "Active Directory privileged group membership exports (Domain Admins, Enterprise Admins, local admins).", "PAM tool discovery report or automated privileged account scan results.", "Evidence of a recent privileged account discovery exercise or audit."]}, {"id": "b", "stmt": "Access to privileged accounts is authorized in accordance with the principle of least privilege", "plain": "Access to privileged accounts must be strictly limited to only those individuals who have a documented business need and have been specifically authorized. Every privileged account needs a current, documented justification \u2014 not just historical precedent.", "questions": ["Show me the authorization records for each privileged account holder.", "Show me how a privileged access request is evaluated and approved.", "Show me what happens when an individual's need for privileged access ends.", "Show me your most recent privilege review and how many accounts were removed as a result."], "evidence": ["Privileged account authorization records showing who approved each account and when.", "Privileged access request and approval workflow documentation.", "Records from the most recent privilege review showing accounts reviewed and actions taken.", "Evidence of privileged account revocation for departed or role-changed individuals."]}, {"id": "c", "stmt": "Security functions are identified", "plain": "Even within privileged accounts, least privilege must apply. A database administrator should not also have domain admin rights. Privileges must be scoped to the minimum necessary for the specific security function, not granted broadly because the account is 'an admin account.'", "questions": ["Show me how privileged accounts are scoped to their specific function rather than given broad access.", "Show me a privileged account and demons
