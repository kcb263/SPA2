trate it cannot perform actions outside its defined scope.", "Show me how you review whether privileged accounts have more access than needed.", "Show me examples where you have reduced over-provisioned privileged access."], "evidence": ["Privileged account configuration showing scoped permissions rather than full broad admin rights.", "Role-based privileged access groups with clearly defined scope per functional area.", "Privilege review records showing reduction of over-provisioned privileged access.", "JIT (Just-in-Time) or JEA (Just Enough Access) implementation documentation if applicable."]}, {"id": "d", "stmt": "Access to security functions is authorized in accordance with the principle of least privilege", "plain": "Functions that configure security policies, manage audit logs, administer identity systems, or manage firewalls must only be accessible by accounts specifically authorized for those security functions. General IT staff must not be able to modify security configurations without explicit security function authorization.", "questions": ["Show me that standard IT administrators cannot modify security tool configurations.", "Show me who has access to your SIEM, firewall management console, and identity platform administration.", "Show me how access to security functions is granted and what specific authorization is required.", "Show me that an attempt by a non-security-role account to access security management consoles is blocked."], "evidence": ["Access control lists for security tools showing only security-role accounts have administrative access.", "Evidence that security configuration changes require accounts with specific security function roles.", "Demonstration that a standard domain admin account cannot modify audit logging or SIEM configuration.", "Authorization records for individuals granted access to security-specific functions."]}]}, {"id": "AC.L2-3.1.6", "domain": "AC", "domainFull": "Access Control", "title": "Non-Privileged Account Use", "statement": "Use non-privileged accounts or roles when accessing non-security functions.", "aos": [{"id": "a", "stmt": "Nonsecurity functions are identified", "plain": "Administrators must have separate accounts for privileged work and daily non-administrative tasks. When an admin reads email or browses the web, they should do so as a standard user \u2014 not as a domain admin. This limits the damage when a daily-use account is compromised.", "questions": ["Show me that your administrators have separate accounts for privileged versus daily non-admin use.", "Show me evidence that admin accounts are not configured with email clients or browser profiles.", "Show me how you technically enforce or verify that admins use standard accounts for routine work.", "Show me audit log evidence that admin accounts are only active during administrative sessions."], "evidence": ["Evidence that admin accounts do not have email mailboxes or appear in email client profiles.", "Admin account audit log showing login activity only during expected administrative time windows.", "Policy documentation requiring dual-account usage for all personnel with privileged access.", "Privileged Access Workstation (PAW) documentation showing admin accounts restricted to PAW devices."]}, {"id": "b", "stmt": "Users are required to use non-privileged accounts or roles when accessing nonsecurity functions", "plain": "The technical or administrative controls must verify that when privileged individuals perform non-security functions, they are actually using their non-privileged account. Monitoring should detect if a privileged account is being used for routine non-administrative activity.", "questions": ["Show me how you monitor to detect if a privileged account is being used for non-administrative tasks.", "Show me a SIEM rule or behavioral alert that would fire if an admin account accessed non-admin systems.", "Show me technical controls on PAWs or admin workstations that restrict privileged account usage.", "Show me a sample activity log for a privileged user demonstrating correct separation of account usage."], "evidence": ["SIEM alert rule configured to detect privileged account access to non-administrative systems.", "User behavior baseline showing admin accounts have limited, admin-focused activity patterns.", "PAW configuration restricting admin account usage to designated privileged access workstations.", "Audit log sample showing a specific admin account used only during change window activities."]}]}, {"id": "AC.L2-3.1.7", "domain": "AC", "domainFull": "Access Control", "title": "Privileged Functions", "statement": "Prevent non-privileged users from executing privileged functions and capture the execution of such functions in audit logs.", "aos": [{"id": "a", "stmt": "Privileged functions are defined", "plain": "Every time a privileged function executes \u2014 an account is created, a configuration changed, a security policy modified \u2014 that event must be written to an audit log capturing who, what, when, and on which system. Undocumented privileged activity creates accountability gaps.", "questions": ["Show me audit logs capturing privileged function execution on your CUI systems.", "Show me what specific information is captured in a privileged function audit log entry.", "Show me how you ensure audit logging of privileged functions cannot be disabled by the privileged user.", "Show me examples of privileged function logs from the past 7 days."], "evidence": ["Sample audit log entries showing privileged function execution with user identity, action, timestamp, and system.", "Audit policy configuration confirming privileged function event categories are enabled for logging.", "SIEM log source configuration showing privileged activity logs are being ingested.", "Evidence that write permissions to audit logs are restricted so privileged users cannot delete their own records."]}, {"id": "b", "stmt": "Non-privileged users are defined", "plain": "Standard user accounts must be technically blocked \u2014 not just told by policy \u2014 from executing administrative or privileged functions. Windows UAC, Linux sudo configuration, application-layer RBAC, and similar controls provide this technical enforcement.", "questions": ["Demonstrate that a standard user account cannot run an administrative command or access an admin interface.", "Show me the technical enforcement mechanism preventing standard users from executing privileged functions.", "Show me what event is logged when a standard user attempts a privileged action.", "Show me the most recent access-denied log entries for attempted privilege escalation."], "evidence": ["Screenshot showing 'Access Denied' when a standard account attempts a privileged operation.", "UAC or application privilege configuration documentation showing enforcement boundaries.", "Audit log showing privilege escalation attempts that were blocked by technical controls.", "RBAC configuration confirming admin functions are restricted to privileged role assignments."]}, {"id": "c", "stmt": "Non-privileged users are prevented from executing privileged functions", "plain": "If a privileged function is somehow executed by an unauthorized account \u2014 through vulnerability exploitation or misconfiguration \u2014 it must be detected. Monitoring and alerting must identify these events and trigger investigation. Detection is the safety net when prevention fails.", "questions": ["Show me the monitoring or alerting configured to detect unauthorized privilege escalation.", "Show me a SIEM rule that would fire if a standard user executed a privileged function.", "Show me the most recent instance where unauthorized privilege use was detected and investigated.", "Show me how your EDR or endpoint tool identifies privilege escalation attempts."], "evidence": ["SIEM alert rule targeting privilege escalation or unauthorized admin function execution.", "EDR behavioral detection configuration showing privilege escalation monitoring rules.", "Incident or alert record showing a detected unauthorized privilege use event and the investigation.", "Windows Event ID monitoring configuration showing 4673/4674 privileged service events are captured."]}, {"id": "d", "stmt": "The execution of privileged functions is captured in audit logs", "plain": "Privileged function execution must be captured in audit logs with enough detail to establish who ran the function, what it was, on which system, and when. Without audit log capture, privileged activity is unaccountable and investigations are impaired.", "questions": ["Show me that privileged function execution is captured in your audit logs.", "Show me a sample audit log entry for a privileged function execution.", "Show me how logs capture both successful and failed privileged function attempts.", "Show me how privileged function logs are protected from deletion by the executing user."], "evidence": ["Audit log entries showing privileged function execution with user, action, and timestamp.", "Audit policy configuration showing privileged function categories are enabled.", "SIEM ingestion of privileged function audit events.", "Log protection configuration preventing privileged users from deleting their own logs."]}]}, {"id": "AC.L2-3.1.8", "domain": "AC", "domainFull": "Access Control", "title": "Unsuccessful Logon Attempts", "statement": "Limit unsuccessful logon attempts.", "aos": [{"id": "a", "stmt": "The means of limiting unsuccessful logon attempts is defined", "plain": "Your organization must have a documented and technically configured lockout threshold \u2014 the number of consecutive failed login attempts that will trigger a lockout or delay. This must be consciously set, not left at OS defaults without review.", "questions": ["Show me your documented account lockout threshold and the reasoning behind the chosen value.", "Show me the Group Policy, IdP, or application configuration where the threshold is technically set.", "Show me that the lockout threshold is consistently applied across all systems that process CUI.", "Show me when the threshold was last reviewed and who approved the current value."], "evidence": ["Account lockout policy document specifying the defined threshold with approval documentation.", "Active Directory Group Policy configuration screenshot showing the lockout threshold setting.", "Application-level authentication configuration showing lockout threshold for CUI-facing applications.", "Policy review record confirming current threshold was evaluated against security requirements."]}, {"id": "b", "stmt": "The defined means of limiting unsuccessful logon attempts is implemented", "plain": "The configured lockout threshold must actually work. After the defined number of failures, the account must lock and access must be denied. This must be verified \u2014 not just assumed \u2014 and must apply consistently across all CUI system access points including web apps and VPN.", "questions": ["Show me a demonstration that an account locks after the defined number of failed attempts.", "Show me that the lockout is consistently enforced across all CUI system access points.", "Show me the account lockout event in your audit logs.", "Show me how the lockout policy is applied to web applications and non-domain-joined systems."], "evidence": ["Active Directory or IdP lockout policy showing enforcement settings with threshold and duration.", "Audit log entry showing account lockout event triggered after the defined failed attempt count.", "Web application authentication configuration showing lockout enforcement for CUI applications.", "Test record or screenshot demonstrating lockout triggers at the defined threshold."]}]}, {"id": "AC.L2-3.1.9", "domain": "AC", "domainFull": "Access Control", "title": "Privacy & Security Notices", "statement": "Provide privacy and security notices consistent with CUI rules.", "aos": [{"id": "a", "stmt": "Privacy and security notices required by CUI-specified rules are identified, consistent, and associated with the specific CUI category", "plain": "Before any user can authenticate to a CUI system, a use notification must appear on screen. This notification must be visible before the login prompt, inform users the system is for authorized use only, and state that activity is monitored. This applies to all CUI system access points.", "questions": ["Show me the system use notification that appears when accessing your CUI systems.", "Demonstrate that the notification appears before authentication \u2014 not after successful login.", "Show me the notification on a representative sample of CUI systems \u2014 workstations, web apps, and VPN portal.", "Show me that the notification cannot be bypassed without being displayed."], "evidence": ["Screenshot of login banner on a CUI workstation or server showing pre-authentication display.", "VPN or web portal login page screenshot showing use notification before the credential entry fields.", "Group Policy configuration enforcing the login banner text on all domain-joined CUI systems.", "Web application configuration showing banner enforcement before the authentication page loads."]}, {"id": "b", "stmt": "Privacy and security notices are displayed", "plain": "The content of the use notification must align with CUI handling requirements \u2014 it must reference authorized use only, monitoring of activity, and absence of privacy expectation. It should also reference applicable laws or contract requirements. A 'Welcome' message does not satisfy this requirement.", "questions": ["Show me the text of your system use notification and explain how it meets CUI requirements.", "Show me who reviewed and approved the notification text and when.", "Show me when the notification was last reviewed for continued accuracy and compliance.", "Show me whether your notification references applicable laws, regulations, or contract requirements."], "evidence": ["Approved system use notification text with legal or compliance team review and sign-off.", "Comparison of notification text against DoD or agency requirements for banner language.", "Notification review records showing periodic content validation against current requirements.", "Policy document specifying required notification content elements for CUI systems."]}]}, {"id": "AT.L2-3.2.1", "domain": "AT", "domainFull": "Awareness & Training", "title": "Literacy Training and Awareness", "statement": "Ensure that managers, system administrators, and users of organizational systems are made aware of the security risks associated with their activities and of the applicable policies, standards, and procedures related to the security of those systems.", "aos": [{"id": "a", "stmt": "Security risks associated with organizational activities involving CUI are identified", "plain": "Everyone with access to CUI systems must receive security awareness training that addresses the specific risks associated with what they actually do. A financial analyst handling CUI in spreadsheets needs different risk context than a remote worker accessing CUI from home. Generic cybersecurity trivia is not sufficient.", "questions": ["Show me the security awareness training curriculum and how it addresses role-specific risks.", "Show me how training content is tailored to the actual daily activities and risks of different user groups.", "Show me training completion records confirming all personnel with CUI system access have completed current training.", "Show me how training content is updated when new threats emerge or the environment changes."], "evidence": ["Security awareness training curriculum showing risk content relevant to specific user activities.", "Training completion report showing all CUI system users have completed the current training version.", "Training content update records showing the program was refreshed after a significant threat or policy change.", "Training acknowledgment forms or electronic completion records with timestamps."]}, {"id": "b", "stmt": "Policies, standards, and procedures related to the security of the system are identified", "plain": "Users must not only know about threats \u2014 they must know the rules. Every person with CUI system access must be aware of the specific policies, standards, and procedures that govern their behavior. Training must explicitly cover these documents and verify comprehension.", "questions": ["Show me how your security policies and procedures are communicated to personnel through training.", "Show me that training explicitly covers the specific policies personnel are required to follow.", "Show me how you verify that personnel have read and understood the applicable policies \u2014 not just clicked through.", "Show me how policy changes are communicated to personnel and acknowledged."], "evidence": ["Training content screenshots or outline showing policy-specific modules that personnel must complete.", "Policy acknowledgment records showing personnel confirmed awareness of current security policies.", "Policy change communication records showing updates were distributed and acknowledgment captured.", "Training quiz or assessment showing comprehension of key policy requirements was tested."]}, {"id": "c", "stmt": "Managers, systems administrators, and users of the system are made aware of the security risks associated with their activities", "plain": "Security awareness training content must be regularly reviewed and updated to remain current with the evolving threat landscape. Training about phishing techniques from 5 years ago may miss the latest social engineering methods. A defined review schedule and update process must exist.", "questions": ["Show me when your security awareness training was last updated and what prompted the update.", "Show me your training content review schedule and who is responsible for keeping it current.", "Show me how newly relevant threats are incorporated into the training curriculum.", "Show me how you compare training content against current threat intelligence to identify gaps."], "evidence": ["Training content version history showing update dates and description of changes made.", "Scheduled training review documentation with cadence, responsible party, and last completed date.", "Training update records triggered by specific events such as policy changes, new threats, or security incidents.", "Comparison of training content against current threat intelligence showing demonstrated currency."]}, {"id": "d", "stmt": "Managers, systems administrators, and users of the system are made aware of the applicable policies, standards, and procedures related to the security of the system", "plain": "Security awareness must be maintained as an ongoing activity throughout personnel tenure \u2014 not just delivered at onboarding. Annual retraining, phishing simulations, and policy acknowledgment updates sustain the awareness established by initial training.", "questions": ["Show me how security awareness is maintained on an ongoing basis beyond initial training.", "Show me your annual or periodic retraining schedule and completion records.", "Show me awareness activities between formal training cycles.", "Show me how you track ongoing awareness compliance across your organization."], "evidence": ["Annual security awareness retraining completion records.", "Ongoing awareness activity documentation \u2014 phishing simulations, security bulletins.", "Security awareness compliance tracking showing current status for all personnel.", "Awareness activity calendar showing recurring activities throughout the year."]}]}, {"id": "AT.L2-3.2.2", "domain": "AT", "domainFull": "Awareness & Training", "title": "Role-Based Security Training", "statement": "Ensure that personnel with assigned information security responsibilities receive appropriate training to carry out those responsibilities.", "aos": [{"id": "a", "stmt": "Information security-related duties, roles, and responsibilities are defined", "plain": "Your organization must identify which individuals have security-specific responsibilities that go beyond general end-user awareness \u2014 system administrators, security analysts, incident responders, network engineers, application owners. These individuals must be identified before specialized training can be assigned.", "questions": ["Show me how personnel with security responsibilities are identified for specialized role-based training.", "Show me the list of roles in your organization that carry specific security responsibilities.", "Show me how new security responsibilities trigger training enrollment.", "Show me how the list of personnel with security responsibilities is maintained and updated."], "evidence": ["Documented list of security responsibility roles with associated required training tracks.", "Job description documentation linking security responsibilities to training requirements.", "Training enrollment records triggered by security role assignment or responsibility change.", "HR or access management records showing security-role personnel identification process."]}, {"id": "b", "stmt": "Information security-related duties, roles, and responsibilities are assigned to designated personnel", "plain": "Individuals with security responsibilities must receive training specifically designed for their function \u2014 not just general security awareness. A firewall administrator needs firewall security training. An incident responder needs hands-on IR procedures. Training must match the actual responsibilities.", "questions": ["Show me the specific training received by your system administrators that is different from what general users receive.", "Show me the training provided to your incident response team and how it prepares them for their specific duties.", "Show me how training requirements are determined for each distinct security role in your organization.", "Show me a security role holder's training transcript and how it maps to their specific responsibilities."], "evidence": ["Role-specific training transcripts for security function personnel showing role-relevant courses completed.", "Training requirements matrix mapping security roles to their required training content and frequency.", "Vendor certification or professional development records for specialized security function personnel.", "Annual training plan showing role-based training tracks for different security positions."]}, {"id": "c", "stmt": "Personnel are adequately trained to carry out their assigned information security\u0002related duties, roles, and responsibilities", "plain": "Role-based security training must be completed before an individual is given access and as role responsibilities evolve over time. Training after access is granted \u2014 even briefly \u2014 creates a window of uninformed access. Refresher training must occur regularly thereafter.", "questions": ["Show me how you ensure training is completed before access is granted, not after.", "Show me the timeline from role assignment to training completion for recently onboarded security personnel.", "Show me the ongoing or refresher training schedule for existing personnel with security responsibilities.", "Show me what happens when existing security personnel take on new responsibilities \u2014 is additional training required?"], "evidence": ["Training completion timestamps compared to access grant dates confirming training preceded access.", "Onboarding checklist showing training as a prerequisite before security system access is provisioned.", "Annual refresher training completion records for existing security function personnel.", "Records showing additional training was assigned when a security role's responsibilities changed."]}]}, {"id": "AT.L2-3.2.3", "domain": "AT", "domainFull": "Awareness & Training", "title": "Insider Threat Awareness", "statement": "Provide security awareness training on recognizing and reporting potential indicators of insider threat.", "aos": [{"id": "a", "stmt": "Potential indicators associated with insider threats are identified", "plain": "Security awareness training must include a dedicated module specifically addressing insider threats \u2014 the risks posed by authorized insiders who misuse their access, whether intentionally or through negligence. General cybersecurity training that doesn't specifically name insider threats does not satisfy this objective.", "questions": ["Show me your insider threat awareness training content and confirm it addresses insider threats specifically.", "Show me that insider threat is covered as a distinct topic from external threats in your training.", "Show me training completion records confirming all personnel completed the insider threat module.", "Show me how insider threat training is integrated into your overall security awareness program."], "evidence": ["Insider threat awareness training curriculum or module content showing specific indicators and scenarios.", "Training completion records showing the insider threat module was completed by all required personnel.", "Training content showing specific behavioral indicators of insider threat \u2014 not just generic fraud awareness.", "Insider threat program documentation and associated training materials showing scope and frequency."]}, {"id": "b", "stmt": "Security awareness training on recognizing and reporting potential indicators of insider threat is provided to managers and employees", "plain": "Personnel must not only recognize insider threat indicators \u2014 they must know exactly how to report concerns. Training must explicitly instruct personnel on who to report to, through what channel, what information to provide, and that good-faith reporting will not result in retaliation.", "questions": ["Show me how training instructs personnel on how to report suspected insider threat activity.", "Show me the reporting mechanism and how it is communicated to all personnel.", "Show me whether anonymous reporting is available and how that is communicated in training.", "Show me records of reports received through the insider threat reporting channel."], "evidence": ["Insider threat reporting procedure included in training materials with specific channel information.", "Reporting mechanism documentation \u2014 hotline, anonymous tip system, or HR process \u2014 accessible to all personnel.", "Training content showing explicit non-retaliation language for good-faith insider threat reports.", "Records showing reports have been received and processed through the insider threat reporting channel."]}]}, {"id": "AU.L2-3.3.1", "domain": "AU", "domainFull": "Audit & Accountability", "title": "Event Logging", "statement": "Create and retain system audit logs and records to the extent needed to enable the monitoring, analysis, investigation, and reporting of unlawful or unauthorized system activity.", "aos": [{"id": "a", "stmt": "Audit logs needed (i.e., event types to be logged) to enable the monitoring, analysis, investigation, and reporting of unlawful or unauthorized system activity are specified", "plain": "Audit logging must be enabled and configured to capture security-relevant events across all CUI systems. Events include logon/logoff, account changes, privilege use, policy changes, and object access. Simply having logging capability installed but not configured produces no useful records.", "questions": ["Show me that audit logging is enabled and configured on your CUI systems.", "Show me the categories of events configured to be logged across your CUI environment.", "Show me how you verify audit logging is actually functioning and not silently failing.", "Show me audit logs from a sample of your most critical CUI systems."], "evidence": ["Audit policy configuration showing logging is enabled with specific event categories on CUI systems.", "Sample audit logs from domain controllers, file servers, VPN concentrators, and CUI applications.", "Monitoring or alerting confirming audit logging is active across required systems.", "Audit event category checklist showing logon, account management, object access, policy change, and privilege use are all enabled."]}, {"id": "b", "stmt": "The content of audit records needed to support monitoring, analysis, investigation, and reporting of unlawful or unauthorized system activity is defined", "plain": "Each audit log entry must contain enough information to reconstruct what happened. A log entry showing 'access denied' without the user identity, resource accessed, and source location is nearly useless for investigation. The 'what' must be specific enough to understand the action taken.", "questions": ["Show me a sample audit log entry and walk me through the information fields captured.", "Show me how the audit log identifies the specific action or transaction that occurred.", "Show me how resource or object identifiers are captured \u2014 file paths, system names, application objects.", "Show me how success vs. failure outcomes are distinguished in your audit records."], "evidence": ["Sample audit log entries with annotated fields showing action, resource, success/failure, and user.", "Audit log format documentation mapping fields to the information they capture.", "Log ingestion configuration in SIEM showing field parsing for the 'what' dimension of events.", "Comparison of audit record detail against investigation requirements showing sufficiency."]}, {"id": "c", "stmt": "Audit records are created (generated)", "plain": "Audit records must capture when events occurred with sufficient precision for investigation and correlation. Timestamps must include date, time, and timezone. Without accurate timestamps, correlating events across systems is impossible and investigation timelines cannot be reconstructed.", "questions": ["Show me how timestamps are captured in your audit log entries \u2014 what format and precision?", "Show me whether timestamps include timezone information and how time is standardized across systems.", "Show me a sample audit log entry and verify the timestamp reflects the actual current system time.", "Show me how you ensure timestamp accuracy across systems with different local time configurations."], "evidence": ["Sample audit log entries showing timestamp format with date, time, and timezone or UTC offset.", "NTP synchronization configuration ensuring all CUI systems have accurate time.", "Log normalization configuration in SIEM converting all timestamps to a consistent format.", "Evidence that timestamps in correlated log entries from different systems are consistent."]}, {"id": "d", "stmt": "Audit records, once created, contain the defined content", "plain": "Audit records must identify where events occurred \u2014 which system, which application, which network location. Without location context, a security event cannot be properly scoped, and an attacker's lateral movement across systems cannot be traced.", "questions": ["Show me how source system or host identity is captured in audit log entries.", "Show me how source network location (IP address) is captured in authentication and access events.", "Show me how you identify which application or service generated a log entry when multiple apps run on the same host.", "Show me how network events capture both source and destination addresses."], "evidence": ["Sample audit log entries showing hostname, IP address, or system identifier for each event.", "Log source configuration in SIEM showing all systems are tagged with their identity.", "Network device logs showing source and destination IP addresses for security-relevant events.", "Asset inventory integration with SIEM enabling IP-to-hostname resolution for log events."]}, {"id": "e", "stmt": "Retention requirements for audit records are defined", "plain": "Logs must be retained long enough to support investigation of incidents that may not be discovered immediately. A compromise discovered two months after the fact requires log records from two months ago. Your retention period must be defined, documented, and technically enforced.", "questions": ["Show me your log retention policy and the defined retention periods for different log types.", "Show me how log retention is technically enforced to prevent premature overwriting.", "Show me how much historical log data is currently available and queryable.", "Show me how logs are archived once they roll off the online retention period."], "evidence": ["Log retention policy document showing defined retention periods by log type and system.", "SIEM or log management platform retention configuration showing current settings.", "Evidence of archived logs older than the online retention period confirming long-term retention.", "Log storage capacity documentation and monitoring to prevent premature log loss."]}, {"id": "f", "stmt": "Audit records are retained as defined", "plain": "Audit records must be retained for a defined period sufficient to support investigation of incidents not discovered immediately. Retention must be technically enforced so logs cannot be prematurely overwritten or deleted.", "questions": ["Show me your audit record retention period and where it is defined in policy.", "Show me that retention is technically enforced and logs cannot be prematurely overwritten.", "Show me how much historical audit data is currently available.", "Show me how archived logs are stored and retrieved for investigations."], "evidence": ["Audit log retention policy specifying minimum retention period.", "SIEM or log management platform retention configuration showing enforced settings.", "Evidence of retained logs spanning the full required retention period.", "Log archive and retrieval process documentation."]}]}, {"id": "AU.L2-3.3.2", "domain": "AU", "domainFull": "Audit & Accountability", "title": "User Accountability", "statement": "Ensure that the actions of individual users can be uniquely traced to those users so they can be held accountable for their actions.", "aos": [{"id": "a", "stmt": "The means of limiting unsuccessful logon attempts is defined", "plain": "Audit records must contain enough information to reconstruct a complete sequence of events for an incident. An investigator must be able to answer: what happened, in what order, on which systems, by whom, and what was the outcome. Gaps in the record prevent complete reconstruction.", "questions": ["Show me how audit records support reconstruction of a complete event sequence during an investigation.", "Show me how you correlate individual log entries into a coherent timeline for investigation.", "Show me how session data links individual events to a continuous user session.", "Show me an example investigation timeline constructed from your audit records."], "evidence": ["SIEM timeline view showing correlated events from a sample security investigation.", "Audit log completeness review showing no significant gaps in event coverage across CUI systems.", "Session tracking configuration linking individual events to authenticated user sessions.", "Sample incident timeline constructed from audit records demonstrating reconstruction capability."]}, {"id": "b", "stmt": "The defined means of limiting unsuccessful logon attempts is implemented", "plain": "Every logged action must be traceable to a specific individual \u2014 not just to an account, workstation, or process. Shared accounts prevent individual traceability. Service account activity must be attributable to the human who owns and is responsible for that account.", "questions": ["Show me that audit records identify the specific individual behind each logged action \u2014 not just the account name.", "Show me how you handle service account activity to ensure it remains attributable to a responsible human.", "Show me that no shared or generic accounts generate events in your audit logs.", "Show me how administrator activity is individually attributed when multiple admins share access to a system."], "evidence": ["Audit log entries showing unique individual user identifiers \u2014 not shared account names.", "Policy and technical controls prohibiting shared accounts on CUI systems.", "Service account to human owner mapping enabling traceability of automated process activity.", "Active Directory report confirming no shared accounts have generated audit events on CUI systems."]}]}, {"id": "AU.L2-3.3.3", "domain": "AU", "domainFull": "Audit & Accountability", "title": "Event Review", "statement": "Review and analyze system audit logs for indications of inappropriate or unusual activity, report findings to appropriate personnel, and take corrective action.", "aos": [{"id": "a", "stmt": "A process for determining when to review logged events is defined", "plain": "Audit records must be reviewed on a scheduled basis or continuously through automated tools. The review must actively look for security anomalies, unauthorized access, and policy violations \u2014 not just verify that logs are present. Passive collection without active review has no security value.", "questions": ["Show me your audit record review process, schedule, and who is responsible.", "Show me examples of recent audit record reviews and what was found.", "Show me how automated alerting supplements or fulfills the review requirement.", "Show me how anomalies discovered during review are documented and tracked."], "evidence": ["Audit record review schedule and records of completed reviews with findings.", "SIEM or log management review dashboard showing active monitoring of CUI systems.", "Alert investigation records showing audit findings are followed up and resolved.", "Log review responsibility assignment in job descriptions or RACI documentation."]}, {"id": "b", "stmt": "Event types being logged are reviewed in accordance with the defined review process", "plain": "Simply reviewing logs is insufficient \u2014 analysis must occur. Analysis means looking for patterns, correlating events across time and systems, and applying knowledge of what unauthorized activity looks like. A SIEM with configured detection rules satisfies the analysis requirement if alerts are actually investigated.", "questions": ["Show me how your log analysis goes beyond simple reading \u2014 what patterns, rules, or correlation is applied?", "Show me how audit records from different systems are correlated for analysis.", "Show me the detection rules or threat intelligence that guides your log analysis.", "Show me an example where analysis identified something not obvious from any single log entry."], "evidence": ["SIEM correlation rules and detection logic used for multi-source event analysis.", "Threat intelligence integration showing detection rules are informed by current attack techniques.", "Example correlated alert identifying unauthorized activity that required multiple log sources to detect.", "Anomaly detection or behavioral analysis configuration in SIEM or UBA tools."]}, {"id": "c", "stmt": "Event types being logged are updated based on the review", "plain": "When audit review and analysis identifies something wrong, it must result in documented corrective action. A finding that is noted but not acted on provides no security value. Response must include investigation, remediation, and documentation of what was done.", "questions": ["Show me how findings from audit review are documented and tracked to resolution.", "Show me the process when audit analysis identifies a potential security incident.", "Show me examples of corrective actions taken in response to audit findings.", "Show me how the effectiveness of corrective actions is verified."], "evidence": ["Incident or finding tracking records showing audit findings were investigated and resolved.", "Corrective action documentation for specific audit findings including remediation steps taken.", "Change management records showing system or configuration changes made in response to audit findings.", "Post-corrective action verification records confirming the issue was resolved."]}]}, {"id": "AU.L2-3.3.4", "domain": "AU", "domainFull": "Audit & Accountability", "title": "Audit Failure Alerting", "statement": "Alert in the event of an audit logging process failure.", "aos": [{"id": "a", "stmt": "Personnel or roles to be alerted in the event of an audit logging process failure are identified", "plain": "Your organization must have a defined process for detecting when audit logging has stopped working. This means monitoring the logging infrastructure itself \u2014 detecting when log sources go silent, when the logging service crashes, or when disk space for logs is exhausted. A process only discovered during an audit is not a real process.", "questions": ["Show me your defined process for detecting audit logging failures.", "Show me how you monitor the health of your audit logging infrastructure.", "Show me what specific conditions constitute an audit logging failure in your definition.", "Show me the response procedure when a logging failure is detected."], "evidence": ["Audit logging health monitoring process documentation with defined failure conditions.", "SIEM or log management health monitoring configuration showing monitored conditions.", "Alert definition for audit logging failures including log source silence, service errors, and disk capacity.", "Log storage capacity monitoring showing alerts for low disk space before logs are lost."]}, {"id": "b", "stmt": "Types of audit logging process failures for which alert will be generated are defined", "plain": "When audit logging fails, the right people must be notified promptly enough to investigate and restore logging before significant gaps occur. Notifications must reach security operations or IT staff who can respond. A failure that goes unnoticed for days represents an undetectable window of activity.", "questions": ["Show me the notification mechanism when an audit logging failure is detected.", "Show me who receives the notification and what the expected response time is.", "Show me a recent example of an audit logging failure notification and the response taken.", "Show me how the notification is generated \u2014 automated alert, manual check, or other mechanism."], "evidence": ["SIEM or monitoring tool alert configuration showing log failure notifications to security team.", "Notification destination configuration showing security or IT operations staff receive logging alerts.", "Evidence of a historical logging failure notification and the response taken.", "Escalation procedure for logging failures with defined SLA for acknowledgment and response."]}, {"id": "c", "stmt": "Identified personnel or roles are alerted in the event of an audit logging process failure", "plain": "When an audit logging failure is detected, designated personnel or roles responsible for security monitoring must be notified promptly to investigate and restore logging. Silent failures discovered days later create unacceptable audit coverage gaps.", "questions": ["Show me how identified personnel are alerted when an audit logging failure occurs.", "Show me the alert routing for audit logging failure notifications.", "Show me the expected response time for audit logging failure alerts.", "Show me a recent example of an audit logging failure notification."], "evidence": ["Alert routing configuration showing security team receives logging failure notifications.", "Monitoring tool alert configuration for logging failures with notification destinations.", "Response SLA documentation for audit logging failure notifications.", "Historical record of an audit logging failure alert and the response taken."]}]}, {"id": "AU.L2-3.3.5", "domain": "AU", "domainFull": "Audit & Accountability", "title": "Audit Correlation", "statement": "Correlate audit record review, analysis, and reporting processes for investigation and response to indications of unlawful, unauthorized, suspicious, or unusual activity.", "aos": [{"id": "a", "stmt": "Audit record review, analysis, and reporting processes for investigation and response to indications of unlawful, unauthorized, suspicious, or unusual activity are defined", "plain": "Your log review, analysis, and reporting activities must function as an integrated workflow rather than disconnected silos. Findings from log review must flow into analysis; analysis results must drive reporting; reporting must reach decision-makers in time to be actionable. Fragmented processes lose critical context.", "questions": ["Show me how your log review process connects to your analysis and reporting activities.", "Show me how findings from one phase of audit processing feed into the next phase.", "Show me how your SIEM integrates collection, review, correlation, alerting, and reporting.", "Show me the workflow from initial alert to final documentation of a reviewed security event."], "evidence": ["SIEM workflow documentation showing integrated review-analysis-reporting-response flow.", "Process flow diagram connecting audit collection, review, analysis, alert, and reporting.", "SIEM dashboard integrating log review, alert management, and reporting in a unified interface.", "Documented escalation workflow from audit finding to security response and closure."]}, {"id": "b", "stmt": "Defined audit record review, analysis, and reporting processes are correlated", "plain": "Audit data from different systems must be brought together and correlated. A failed VPN auth followed by a successful auth from a different country, followed by anomalous file access \u2014 each from a different log source \u2014 only tells a complete story when correlated. Cross-system correlation is required.", "questions": ["Show me how audit data from different systems is correlated in your environment.", "Show me a correlation rule that uses data from multiple different log sources.", "Show me how your SIEM normalizes data from different systems to enable correlation.", "Show me an example of an attack pattern that would require correlation across multiple systems to detect."], "evidence": ["SIEM multi-source log ingestion configuration showing diverse log sources feeding the correlation engine.", "Correlation rule examples referencing two or more log source types.", "Log normalization configuration showing common fields extracted across different log formats.", "Example correlated alert showing events stitched together from multiple systems."]}]}, {"id": "AU.L2-3.3.6", "domain": "AU", "domainFull": "Audit & Accountability", "title": "Reduction & Reporting", "statement": "Provide an audit reduction and report generation capability that does not alter the original content or timing of audit records.", "aos": [{"id": "a", "stmt": "An audit record reduction capability that supports on-demand analysis is provided", "plain": "Given the volume of audit data modern systems produce, you must have the ability to filter and focus on relevant records. SIEM queries, log search interfaces, and filtering tools provide this capability. Audit reduction must never modify original records \u2014 it provides a focused view of the underlying data.", "questions": ["Show me your audit reduction capability \u2014 how do you filter logs to events relevant to a specific investigation?", "Show me how a search or filter in your SIEM returns a focused subset of audit records.", "Show me that the original audit records remain intact when a filtered view is generated.", "Show me how audit reduction is used during an actual investigation."], "evidence": ["SIEM query or search capability demonstration showing log filtering by user, time, event type, or system.", "Audit data analysis tool documentation showing available search and filter functions.", "Evidence that raw logs are preserved separately and are unaffected by filtered view operations.", "Example audit reduction query used during a recent investigation or compliance review."]}, {"id": "b", "stmt": "A report generation capability that supports on-demand reporting is provided", "plain": "You must be able to generate structured, formatted reports from audit data for compliance documentation, management briefings, and incident reporting. Reports must be exportable and presentable. The reporting capability must exist as a real tool \u2014 not just an ability to copy-paste from a log viewer.", "questions": ["Show me your audit report generation capability and the tool used.", "Show me a sample compliance or security report generated from audit data.", "Show me how reports are used for management briefings or compliance purposes.", "Show me the access controls on report generation \u2014 who can create reports?"], "evidence": ["Sample compliance or security report generated from audit data showing format and content.", "SIEM or log management report template documentation.", "Report generation access controls showing authorized users who can create reports.", "Report generation audit trail showing reports were created and by whom."]}]}, {"id": "AU.L2-3.3.7", "domain": "AU", "domainFull": "Audit & Accountability", "title": "Authoritative Time Source", "statement": "Provide a system capability that compares and synchronizes internal system clocks with an authoritative source to generate time stamps for audit records.", "aos": [{"id": "a", "stmt": "Internal system clocks are used to generate time stamps for audit records", "plain": "Audit record timestamps must be generated from the local system clock \u2014 the system where the event occurred. Application-level timestamps generated independently of the system clock, or timestamps from external sources not synchronized to the system, may not accurately reflect when events occurred.", "questions": ["Show me how audit timestamps are generated \u2014 do they use the local system clock?", "Show me that the system clock is the authoritative source for audit record timestamps.", "Show me a sample audit log entry with timestamp and verify it reflects the actual current system time.", "Show me whether any applications generate their own timestamps independently of the OS system clock."], "evidence": ["Sample audit log entries with timestamp field confirmed to be sourced from the system clock.", "Application audit log configuration showing system time is used for event timestamping.", "OS-level audit configuration confirming events are timestamped at the OS layer using system time.", "Evidence that application-layer audit records are consistent with OS-layer timestamps."]}, {"id": "b", "stmt": "An authoritative source with which to compare and synchronize internal system clocks is specified", "plain": "System clocks must be synchronized to an authoritative, trusted time source \u2014 NIST time servers, USNO time services, or GPS-disciplined NTP. Clock drift must be monitored, and systems significantly out of sync must trigger alerts. An NTP configuration pointing to an unreliable source does not satisfy this.", "questions": ["Show me your NTP configuration and the authoritative time source being used.", "Show me that all CUI systems are configured to synchronize to the authoritative time source.", "Show me how clock drift is monitored across your CUI systems.", "Show me how you would detect and alert on a system that has become significantly out of sync."], "evidence": ["NTP configuration documentation showing the authoritative time server address for CUI systems.", "Group Policy or configuration management showing NTP enforcement across the CUI environment.", "NTP synchronization status report showing all systems are synchronized and within acceptable drift.", "Clock drift monitoring configuration with alert thresholds for systems that are out of sync."]}, {"id": "c", "stmt": "Internal system clocks used to generate time stamps for audit records are compared to and synchronized with the specified authoritative time source", "plain": "The final assurance is that synchronized clocks are actually being used when audit records are created. A system could be NTP-synchronized but generate audit records using a different time source. Cross-system timestamp consistency confirms the loop is closed.", "questions": ["Show me that audit record timestamps match the system's NTP-synchronized clock.", "Show me that there are no systems generating audit records with unsynchronized or independently maintained timestamps.", "Show me how you verify that application-generated audit records use system time.", "Show me how timezone handling is standardized across your audit records to enable accurate correlation."], "evidence": ["Correlation of audit log timestamps from multiple systems showing consistent, synchronized timestamps.", "UTC timestamp standardization configuration to eliminate timezone inconsistencies in correlated logs.", "Application audit configuration confirming system time is used \u2014 not a separate application clock.", "Cross-system log comparison showing timestamp alignment within expected NTP sync tolerance."]}]}, {"id": "AU.L2-3.3.8", "domain": "AU", "domainFull": "Audit & Accountability", "title": "Audit Protection", "statement": "Protect audit information and audit tools from unauthorized access, modification, and deletion.", "aos": [{"id": "a", "stmt": "Audit information is protected from unauthorized access", "plain": "Audit logs contain sensitive operational details \u2014 who accessed what, when, from where. Access to audit information must be restricted to authorized security personnel and management. Not everyone should be able to read audit logs, particularly logs about security investigations or sensitive operations.", "questions": ["Show me the access controls on your audit log storage.", "Show me who has read access to audit logs and how that access was authorized.", "Show me how access to audit information is restricted from general users and system owners.", "Show me whether administrators of audited systems can read their own audit logs."], "evidence": ["Audit log storage access control list showing authorized personnel with read access.", "SIEM role-based access controls showing restricted access to audit data by authorized security roles.", "Audit data access authorization records showing individual access approvals.", "Evidence that system administrators cannot access audit logs for the systems they administer."]}, {"id": "b", "stmt": "Audit information is protected from unauthorized modification", "plain": "Even personnel with legitimate read access must not be able to modify audit records. Write access to audit log storage must be restricted to the logging system itself. No human account should have the ability to modify audit records \u2014 this protects the integrity of the audit trail as evidence.", "questions": ["Show me that audit log storage is protected against modification \u2014 even by authorized readers.", "Show me whether any human account has the technical ability to modify audit records.", "Show me the technical mechanism preventing audit record modification.", "Show me how you would detect if an audit record had been tampered with."], "evidence": ["SIEM or log storage configuration showing append-only or write-once access for all users.", "File system permissions on log storage showing no modify permissions for any human account.", "Log integrity verification mechanism showing hash values confirming records are unmodified.", "Evidence that modification attempts on audit records are detected and alerted."]}, {"id": "c", "stmt": "Audit information is protected from unauthorized deletion", "plain": "Deletion of audit records is a primary method attackers use to cover their tracks. Records must be technically protected against deletion by all human accounts \u2014 including system administrators and security staff. Only through a formal, authorized retention disposal process should records ever be removed.", "questions": ["Show me that audit records cannot be deleted by administrators, security staff, or general users.", "Show me the technical protection against audit record deletion.", "Show me the process for legitimate audit record disposal at the end of the defined retention period.", "Show me how deletion attempts on audit records would be detected and alerted."], "evidence": ["Audit log storage access controls showing delete permissions are absent for all user accounts.", "Write-once or WORM storage configuration preventing deletion of audit records.", "Legitimate audit record retention disposal procedure with required authorization.", "Monitoring alert configuration for attempted audit record deletion events."]}, {"id": "d", "stmt": "Audit logging tools are protected from unauthorized access", "plain": "Audit logging tools and infrastructure \u2014 SIEM platforms, log collectors, log management systems \u2014 must be protected from unauthorized access. Unauthorized access to audit tools could enable manipulation of logging configuration.", "questions": ["Show me how audit logging tools are protected from unauthorized access.", "Show me access controls on your SIEM or log management platform.", "Show me the authorization process for accessing audit logging tool administration.", "Show me that general system administrators cannot access audit tool administration."], "evidence": ["SIEM or log management platform access control configuration.", "Authorization records for individuals with access to audit logging tool administration.", "Technical access controls separating audit tool administration from general administration.", "Access review records for audit logging tool administrative access."]}, {"id": "e", "stmt": "Audit logging tools are protected from unauthorized modification", "plain": "Audit logging tool configurations must be protected from unauthorized modification. An adversary who can modify audit tool configuration could disable logging or redirect logs.", "questions": ["Show me how audit logging tool configurations are protected from unauthorized modification.", "Show me change controls for audit logging tool configuration changes.", "Show me that only authorized personnel can modify audit logging tool settings.", "Show me how configuration changes to audit tools are logged and reviewed."], "evidence": ["Change management controls for audit logging tool configuration.", "Access controls showing only authorized personnel can modify audit tool settings.", "Audit logging tool configuration change log.", "Change review process for audit tool configuration modifications."]}, {"id": "f", "stmt": "Audit logging tools are protected from unauthorized deletion", "plain": "Audit logging tools, scripts, and software must be protected from unauthorized deletion. An attacker who deletes audit tools disables detection capability.", "questions": ["Show me how audit logging tools and software are protected from unauthorized deletion.", "Show me file system permissions and access controls on audit tool installations.", "Show me how audit tool software integrity is verified.", "Show me that backup or recovery exists for audit tool configurations."], "evidence": ["File system access controls on audit tool software preventing unauthorized deletion.", "Audit tool installation integrity verification mechanism.", "Backup and recovery documentation for audit tool configurations.", "Change management requirement for audit tool software modifications or removals."]}]}, {"id": "AU.L2-3.3.9", "domain": "AU", "domainFull": "Audit & Accountability", "title": "Audit Management", "statement": "Limit management of audit logging to a subset of privileged users.", "aos": [{"id": "a", "stmt": "A subset of privileged users granted access to manage audit logging functionality is defined", "plain": "The ability to configure, start, stop, or modify the audit logging system must be limited to a small, specifically authorized group \u2014 separate from general system administration. If any administrator can turn off logging, the audit trail cannot be trusted. Audit management is a high-privilege function requiring special authorization.", "questions": ["Show me who has audit management privileges \u2014 the ability to configure or disable logging.", "Show me that the audit management group is distinct from general system administrators.", "Show me how audit management access is specifically authorized.", "Show me the most recent audit logging configuration change and who made it."], "evidence": ["Audit management access control list showing the restricted, named group of authorized managers.", "Separation documentation showing audit management role is separate from system administration.", "Audit management authorization records with specific approvals for each individual.", "Audit configuration change log showing who made the last configuration change and when."]}, {"id": "b", "stmt": "Management of audit logging functionality is limited to the defined subset of privileged users", "plain": "Both the ability to read audit data and the ability to manage audit infrastructure must be individually authorized. Different individuals may have read access for review purposes versus management access for configuration. Both levels require explicit, documented authorization.", "questions": ["Show me how audit log reader access differs from audit management access in your role structure.", "Show me the access control and authorization process for all audit-related access levels.", "Show me that access to audit logs and audit management both require individual authorization.", "Show me the last review of audit-related privileges confirming access is still appropriate."], "evidence": ["Role-based access control configuration for audit systems showing reader vs. manager permission sets.", "Authorization records for all individuals with any audit system access \u2014 reader or manager.", "Periodic audit access review records showing authorized vs. current actual access.", "Activity log showing who accessed audit management functions and what changes were made."]}]}, {"id": "CA.L2-3.12.1", "domain": "CA", "domainFull": "Security Assessment", "title": "Assess Security Controls", "statement": "Periodically assess the security controls in organizational systems to determine if the controls are effective in their application.", "aos": [{"id": "a", "stmt": "The frequency of security control assessments is defined", "plain": "Security controls must be formally assessed on a scheduled basis \u2014 not just assumed to be working because they were implemented. Assessment means actually testing that controls are in place, configured correctly, and producing the intended security outcome. Documentation saying a control exists is not the same as evidence it works.", "questions": ["Show me your security control assessment schedule and when the last assessment was completed.", "Show me the scope of your most recent security control assessment.", "Show me what methodology was used and who conducted the assessment.", "Show me how the assessment covers all CMMC Level 2 practices."], "evidence": ["Security control assessment plan with schedule, scope, and methodology.", "Most recent completed security control assessment report with findings.", "Assessment methodology documentation \u2014 NIST SP 800-171A or equivalent.", "Assessment coverage map showing all CMMC Level 2 practices were evaluated."]}, {"id": "b", "stmt": "Security controls are assessed with the defined frequency to determine if the controls are effective in their application", "plain": "Assessment must verify that controls are implemented correctly \u2014 not just that a policy exists or that someone says they implemented something. Technical testing, configuration review, and artifact examination are needed to confirm correct implementation. Self-attestation without evidence is not assessment.", "questions": ["Show me how your assessment confirms correct implementation \u2014 not just policy existence.", "Show me an example of a control where the assessment found implementation was incorrect.", "Show me the technical testing methods used in your assessment.", "Show me the difference between controls found 'implemented' versus 'partially implemented' in your assessment."], "evidence": ["Assessment methodology showing technical testing and configuration review components.", "Assessment finding showing a control found incorrectly implemented with evidence.", "Technical assessment artifacts \u2014 configuration screenshots, tool outputs, test results.", "Assessment rating criteria distinguishing implemented, partially implemented, and not implemented."]}]}, {"id": "CA.L2-3.12.2", "domain": "CA", "domainFull": "Security Assessment", "title": "Plan of Action", "statement": "Develop and implement plans of action designed to correct deficiencies and reduce or eliminate vulnerabilities in organizational systems.", "aos": [{"id": "a", "stmt": "A plan of action is developed to correct deficiencies identified during the assessment of security controls", "plain": "When security deficiencies are identified \u2014 through assessment, vulnerability scanning, audit, or self-discovery \u2014 they must be documented in a Plan of Action and Milestones (POA&M). The POA&M is the organization's commitment to fix what is broken, with specific timelines and ownership.", "questions": ["Show me your POA&M and confirm it includes findings from recent assessments and scans.", "Show me how deficiencies are added to the POA&M when discovered.", "Show me the current state of your POA&M \u2014 how many open items, what severity?", "Show me the oldest open POA&M item and what the status is."], "evidence": ["Current POA&M with all open deficiencies, discovery sources, and current status.", "POA&M entry creation process showing how findings from assessments and scans are added.", "POA&M summary showing open item count, severity distribution, and age.", "Oldest POA&M item with documentation of why it remains open."]}, {"id": "b", "stmt": "A plan of action is developed to reduce vulnerabilities in organizational systems", "plain": "Each POA&M entry must include not just the finding, but specific milestones \u2014 intermediate steps toward remediation \u2014 and an identified responsible party. A POA&M entry that says 'fix the MFA gap, responsible: IT' without specific milestones and a target date is not a plan.", "questions": ["Show me that POA&M entries include specific milestones and responsible parties.", "Show me a detailed POA&M entry showing the finding, milestones, responsible party, and target dates.", "Show me how target dates are set and how they are adjusted when plans change.", "Show me how responsible parties are held accountable for POA&M milestones."], "evidence": ["POA&M entries showing finding description, remediation milestones, responsible party, and target dates.", "POA&M entry template showing required fields including milestones and ownership.", "POA&M milestone tracking and update records.", "Accountability mechanism for POA&M owners \u2014 escalation process when milestones are missed."]}, {"id": "c", "stmt": "Plans of action are implemented to correct deficiencies and reduce vulnerabilities", "plain": "POA&M items must be actively tracked and driven to resolution \u2014 not entered and forgotten. Regular reviews must assess progress, identify blockers, and escalate items approaching or past their target dates. A POA&M that is never reviewed is not a management tool.", "questions": ["Show me how POA&M items are tracked and driven to closure.", "Show me your POA&M review schedule and records of completed reviews.", "Show me items that were closed in the last quarter with evidence of remediation.", "Show me the escalation process when POA&M items are past their target date."], "evidence": ["POA&M review meeting records or schedule.", "Closed POA&M items with closure dates and evidence of remediation.", "POA&M aging report showing items past their target dates.", "Escalation records for POA&M items that missed target dates."]}]}, {"id": "CA.L2-3.12.3", "domain": "CA", "domainFull": "Security Assessment", "title": "Monitor Security Controls", "statement": "Monitor security controls on an ongoing basis to ensure the continued effectiveness of the controls.", "aos": [{"id": "a", "stmt": "Security controls are monitored on an ongoing basis to ensure the continued effectiveness of the controls", "plain": "Security controls must be monitored continuously or on a frequent ongoing basis \u2014 not just assessed periodically. Continuous monitoring detects control degradation, configuration drift, and new vulnerabilities between formal assessments. Automated tools make continuous monitoring practical at scale.", "questions": ["Show me your continuous monitoring program and what activities it includes.", "Show me the tools used for ongoing security control monitoring.", "Show me monitoring coverage \u2014 which controls and systems are monitored on an ongoing basis?", "Show me recent monitoring results and how they compare to assessment findings."], "evidence": ["Continuous monitoring program documentation with covered controls and monitoring frequency.", "Automated monitoring tool inventory \u2014 SIEM, CSPM, vulnerability scanner, FIM.", "Monitoring coverage map showing which controls have ongoing monitoring.", "Recent monitoring output showing control status between formal assessments."]}]}, {"id": "CA.L2-3.12.4", "domain": "CA", "domainFull": "Security Assessment", "title": "System Security Plan", "statement": "Develop, document, and periodically update system security plans that describe system boundaries, system environments of operation, how security requirements are implemented, and the relationships with or connections to other systems.", "aos": [{"id": "a", "stmt": "A system security plan is developed", "plain": "A System Security Plan (SSP) must be developed for CUI systems. The SSP is the foundational document for CMMC assessment \u2014 assessors use it as the starting point to understand your environment and verify your controls. An incomplete or absent SSP is a significant finding.", "questions": ["Show me your System Security Plan for your CUI environment.", "Show me when the SSP was last updated and who approved it.", "Show me how the SSP addresses all 110 CMMC Level 2 practices.", "Show me how the SSP is used during CMMC assessment preparation."], "evidence": ["Current System Security Plan with version number and approval date.", "SSP coverage map showing all CMMC Level 2 practices are addressed.", "SSP approval records with authorizing official signature.", "SSP utilization records \u2014 how it is used for assessment preparation and ongoing compliance."]}, {"id": "b", "stmt": "The system boundary is described and documented in the system security plan", "plain": "The SSP must describe the system boundary \u2014 which systems, components, and users are in scope \u2014 and the operating environment. Without a clear boundary, it is impossible to determine what needs to be protected or what controls apply. Vague or undocumented boundaries are a common assessment finding.", "questions": ["Show me how the SSP defines your system boundary.", "Show me the system boundary diagram included in or referenced by the SSP.", "Show me how CUI data flows are described relative to the system boundary.", "Show me how interconnected systems outside the boundary are addressed."], "evidence": ["SSP system boundary section with clear scope definition.", "System boundary diagram showing in-scope systems, components, and users.", "CUI data flow diagrams referenced in the SSP.", "External system connection descriptions showing how boundary interactions are addressed."]}, {"id": "c", "stmt": "The system environment of operation is described and documented in the system security plan", "plain": "The SSP must describe how each security requirement is implemented \u2014 not just that it exists. For each CMMC practice, the SSP should explain what specific controls, tools, processes, or policies satisfy that practice in your environment. Generic statements are insufficient.", "questions": ["Show me how the SSP describes implementation of security requirements \u2014 with specific detail.", "Show me the level of detail provided for a sample practice in your SSP.", "Show me how the SSP distinguishes between implemented controls, planned controls, and compensating controls.", "Show me how the SSP is connected to evidence artifacts that support each stated control."], "evidence": ["SSP implementation description section showing practice-by-practice control descriptions.", "Sample practice description with specific tools, processes, and policies named.", "SSP notation for planned vs. implemented controls.", "Evidence artifact cross-reference or appendix linked to SSP control descriptions."]}, {"id": "d", "stmt": "The security requirements identified and approved by the designated authority as non-applicable are identified", "plain": "The SSP must be kept current \u2014 updated when systems change, controls are modified, boundaries expand, or annual reviews identify outdated content. An SSP describing a system that no longer exists, or missing controls that were added in the last year, is not a useful document for compliance or assessment.", "questions": ["Show me when the SSP was last reviewed and updated.", "Show me the process for triggering SSP updates when significant changes occur.", "Show me the change history of the SSP \u2014 what has been updated and when.", "Show me how the SSP review connects to system change management processes."], "evidence": ["SSP review schedule with documented review cadence.", "SSP change history or version log showing update dates and change descriptions.", "System change to SSP update trigger process documentation.", "Most recent SSP review records with reviewer signatures and findings."]}, {"id": "e", "stmt": "The method of security requirement implementation is described and documented in the system security plan", "plain": "The SSP must describe how each security requirement is implemented \u2014 specifically what controls, tools, processes, and configurations satisfy each practice in your environment.", "questions": ["Show me how the SSP describes implementation methods for security requirements.", "Show me the level of implementation detail for a sample of practices in your SSP.", "Show me how the SSP distinguishes fully implemented from planned controls.", "Show me how the SSP maps to evidence artifacts supporting each implementation claim."], "evidence": ["SSP implementation description section with specific controls named for each practice.", "Sample SSP entries showing implementation detail with tools and processes identified.", "SSP notation showing implemented vs. planned implementation status.", "Evidence artifact cross-reference linked to SSP implementation descriptions."]}, {"id": "f", "stmt": "The relationship with or connection to other systems is described and documented in the system security plan", "plain": "The SSP must describe relationships with and connections to other systems \u2014 both internal interconnections and external connections \u2014 to document the full scope of the CUI environment.", "questions": ["Show me how the SSP describes system relationships and external connections.", "Show me the interconnection documentation in your SSP.", "Show me how external system connections are captured in the SSP.", "Show me how the SSP is updated when new system connections are established."], "evidence": ["SSP interconnection section describing system relationships and external connections.", "Network or data flow diagrams referenced in the SSP showing interconnections.", "ISA register linked to SSP external connection documentation.", "SSP update process documentation for new interconnection additions."]}, {"id": "g", "stmt": "The frequency to update the system security plan is defined", "plain": "The SSP must define a frequency for its own review and update. Without a defined update schedule, the SSP may become stale and no longer reflect the actual implemented system.", "questions": ["Show me where the SSP defines its own review and update frequency.", "Show me the defined update schedule for your SSP.", "Show me how the update frequency was determined and approved.", "Show me that the defined frequency meets minimum program requirements."], "evidence": ["SSP section defining review and update frequency.", "Policy or procedure referencing required SSP update cadence.", "Approval records for the defined SSP update frequency.", "SSP review schedule documentation showing required review timing."]}, {"id": "h", "stmt": "System security plan is updated with the defined frequency", "plain": "The SSP must actually be updated at the defined frequency \u2014 not just have a frequency stated without follow-through. Version history and review records demonstrate compliance.", "questions": ["Show me that the SSP is updated at the defined frequency.", "Show me the SSP version history and update dates.", "Show me that the last update occurred within the defined frequency period.", "Show me the review process and who is responsible for executing SSP updates."], "evidence": ["SSP version history showing update dates and change descriptions.", "Most recent SSP review records with completion date and reviewer signatures.", "Comparison of last update date against defined frequency showing compliance.", "SSP update responsibility assignment and review process documentation."]}]}, {"id": "CM.L2-3.4.1", "domain": "CM", "domainFull": "Configuration Management", "title": "Baseline Configurations", "statement": "Establish and maintain baseline configurations and inventories of organizational systems throughout the respective system development life cycles.", "aos": [{"id": "a", "stmt": "A baseline configuration is established", "plain": "You must have a documented, approved baseline for every system type in your CUI environment \u2014 what OS version, what patches applied, what services enabled, what settings configured. This baseline is the 'approved state' against which all changes and deviations are measured.", "questions": ["Show me your baseline configuration documentation for your primary system types.", "Show me what standards or frameworks your baselines are based on \u2014 CIS, DISA STIGs, or custom.", "Show me how baselines are documented and version-controlled.", "Show me who approves baseline configurations and the approval process."], "evidence": ["Baseline configuration documentation for servers, workstations, and network devices handling CUI.", "CIS benchmark or DISA STIG adoption records showing which benchmarks are used as baseline foundations.", "Baseline version control records showing change history and current approved version.", "Baseline approval records with technical authority signature and date."]}, {"id": "b", "stmt": "The baseline configuration includes hardware, software, firmware, and documentation", "plain": "Baselines are not one-time documents \u2014 they must be maintained and updated when systems change through patching, configuration changes, or software updates. An outdated baseline that doesn't reflect authorized changes creates false positives in compliance scanning and undermines the integrity of the baseline process.", "questions": ["Show me the process for updating a baseline when an authorized change is made to the system.", "Show me how patch deployments are reflected in baseline updates.", "Show me the change management linkage between approved changes and baseline updates.", "Show me the current version of your baseline and confirm it reflects recent authorized changes."], "evidence": ["Baseline update records showing approved changes were reflected in baseline documentation.", "Change management records linking approved configuration changes to subsequent baseline updates.",
