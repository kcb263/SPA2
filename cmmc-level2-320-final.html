echnical means to execute them quickly.", "questions": ["Show me your containment procedures for different incident types.", "Show me the technical means available to isolate an affected system from the network.", "Show me who has authority to authorize containment actions that may impact business operations.", "Show me a containment decision tree or procedure from your IR documentation."], "evidence": ["Containment procedure documentation for different incident types.", "Technical capability documentation \u2014 network isolation scripts, EDR quarantine, account lockout.", "Authority matrix showing who can authorize containment actions by incident severity.", "Evidence of containment capability testing \u2014 demonstrated ability to isolate a system."]}, {"id": "e", "stmt": "The operational incident-handling capability includes containment", "plain": "Recovery restores affected systems to normal operation while ensuring the threat has been eliminated. The IR capability must include documented recovery procedures, backup restoration processes, and validation steps to confirm systems are clean before returning to production.", "questions": ["Show me your recovery procedures following an incident.", "Show me how you validate that a recovered system is clean before returning it to production.", "Show me your backup restoration process and how it connects to IR recovery.", "Show me how you prevent re-infection or re-compromise during the recovery phase."], "evidence": ["Recovery procedure documentation for different incident types.", "System restoration validation checklist used to confirm clean state before production return.", "Backup restoration process documentation linked to IR recovery procedures.", "Post-recovery verification records from a real incident or tabletop exercise."]}, {"id": "f", "stmt": "The operational incident-handling capability includes recovery", "plain": "The IR capability must address what users and non-IR staff should do during an incident \u2014 how to report suspicious activity, how to respond to an IR team request, what they should and should not do with affected systems. Users are often first observers and first responders.", "questions": ["Show me how users are trained on their role during a security incident.", "Show me the user-facing guidance for reporting a suspected incident.", "Show me how users are instructed to respond if contacted by the IR team.", "Show me whether users know not to power off systems or delete files during an investigation."], "evidence": ["User security awareness training content covering incident reporting procedures.", "Incident reporting process documentation accessible to all users.", "User guidance on what to do \u2014 and not do \u2014 when a security incident is suspected.", "Communication template or notification used to brief users during an active incident."]}, {"id": "g", "stmt": "The operational incident-handling capability includes user response activities", "plain": "The incident response capability must address user response activities \u2014 what non-IR staff should do when they discover or are affected by an incident.", "questions": ["Show me how the IR capability addresses user activities and responsibilities during an incident.", "Show me user-facing guidance on reporting security incidents.", "Show me training records covering user responsibilities during incident response.", "Show me communication templates used to brief users during an active incident."], "evidence": ["User incident response procedure documentation.", "Security awareness training content covering user incident reporting responsibilities.", "User incident notification templates used during active incidents.", "Training records confirming users are aware of their incident response roles."]}]}, {"id": "IR.L2-3.6.2", "domain": "IR", "domainFull": "Incident Response", "title": "Incident Reporting", "statement": "Track, document, and report incidents to designated officials and/or authorities both internal and external to the organization.", "aos": [{"id": "a", "stmt": "Incidents are tracked", "plain": "Every security incident must be recorded in a tracking system from initial detection through closure. The record must capture timeline, affected systems, actions taken, and outcomes. Incidents that exist only in people's memories \u2014 with no written record \u2014 are not tracked.", "questions": ["Show me your incident tracking system and a sample of recent incident records.", "Show me what information is captured for each incident from detection through closure.", "Show me how incident records are stored and protected from modification.", "Show me how closed incidents are archived and retrievable for future reference."], "evidence": ["Incident ticketing or tracking system with sample incident records showing required fields.", "Incident record template showing required documentation fields.", "Incident records retention and archive policy.", "Sample closed incident record showing complete lifecycle documentation."]}, {"id": "b", "stmt": "Incidents are documented", "plain": "Incidents must be reported to designated internal officials \u2014 management, legal, privacy officers, or other stakeholders \u2014 based on defined criteria. The report must reach decision-makers in time to take appropriate action. Informal hallway updates are not the same as formal reporting.", "questions": ["Show me your internal incident reporting requirements \u2014 who must be notified for different incident types?", "Show me the reporting timelines for notifying internal officials.", "Show me an example of an internal incident notification.", "Show me how you ensure reporting timelines are met under the pressure of an active incident."], "evidence": ["Internal incident reporting matrix showing notification requirements by incident type and severity.", "Internal notification procedure with defined timelines and responsible parties.", "Sample internal incident notification record from a real or exercised incident.", "Escalation tracking records showing internal notifications were made within required timelines."]}, {"id": "c", "stmt": "Authorities to whom incidents are to be reported are identified", "plain": "Many defense contractors are required to report incidents to external authorities \u2014 the DIBNet portal for DoD contractors, CISA for critical infrastructure, or contracting officers per contract terms. These reporting obligations have defined timelines \u2014 often 72 hours \u2014 that must be met.", "questions": ["Show me your external incident reporting requirements \u2014 which authorities must be notified?", "Show me the reporting timelines specified in your contracts or regulatory requirements.", "Show me an example of a submitted external incident report.", "Show me how you track reporting deadlines to ensure they are met during an active incident."], "evidence": ["External incident reporting requirements documentation from contracts or regulations.", "External incident report template or submission records.", "Reporting deadline tracking process documentation.", "Sample submitted external report (redacted if necessary) showing compliance with reporting requirements."]}, {"id": "d", "stmt": "Organizational officials to whom incidents are to be reported are identified", "plain": "The specific organizational officials who must be notified of incidents must be pre-identified with current contact information so notification can happen quickly without delay during an active incident.", "questions": ["Show me that organizational officials to be notified of incidents are pre-identified.", "Show me the incident notification roster with named roles and contact information.", "Show me how the roster is maintained current.", "Show me how the roster addresses different incident types or severity levels."], "evidence": ["Incident notification roster with named officials, roles, and current contact information.", "Notification roster maintenance procedure and last update date.", "Escalation matrix showing officials for different incident types or severities.", "Contact information verification records confirming roster is current."]}, {"id": "e", "stmt": "Identified authorities are notified of incidents", "plain": "Identified external authorities must be notified of incidents within defined timeframes. For DoD contractors this typically means DIBNet reporting within 72 hours of discovering a cyber incident.", "questions": ["Show me that identified external authorities are notified of incidents as required.", "Show me the external reporting requirements that apply to your organization.", "Show me records of external incident reports submitted.", "Show me how reporting deadlines are tracked during an active incident."], "evidence": ["External incident reporting requirement documentation from contracts or regulations.", "External authority contact information and reporting portal documentation.", "External incident report submission records from recent incidents.", "Reporting deadline tracking mechanism used during active incidents."]}, {"id": "f", "stmt": "Identified organizational officials are notified of incidents", "plain": "Internal organizational officials must be formally notified of incidents through a defined process with defined timelines \u2014 not just informal verbal communication with no record.", "questions": ["Show me that internal organizational officials are formally notified of incidents.", "Show me the internal notification process and required timelines.", "Show me records of internal notifications from recent incidents.", "Show me how formal notification is distinguished from informal communication."], "evidence": ["Internal incident notification procedure with timelines and required recipients.", "Internal notification records from recent incidents showing formal documented notification.", "Notification acknowledgment records from internal officials.", "Escalation process documentation for different incident severity levels."]}]}, {"id": "IR.L2-3.6.3", "domain": "IR", "domainFull": "Incident Response", "title": "Incident Response Testing", "statement": "Test the organizational incident response capability.", "aos": [{"id": "a", "stmt": "The incident response capability is tested", "plain": "The incident response plan and capability must be tested \u2014 not just written. Tests can be tabletop exercises, simulations, or full live drills. Testing reveals gaps in the plan, tool familiarity, role clarity, and communication effectiveness that only become apparent under simulated pressure.", "questions": ["Show me your incident response testing records \u2014 when was the last test, what type, and who participated?", "Show me the scenario used in the most recent IR test.", "Show me the after-action report from the most recent IR test.", "Show me how IR testing results have been used to update the IR plan."], "evidence": ["IR test records with date, test type, scenario description, and participant list.", "After-action report from the most recent IR test with findings and recommendations.", "IR test schedule showing regular testing cadence.", "IR plan update records triggered by test findings."]}]}, {"id": "MA.L2-3.7.1", "domain": "MA", "domainFull": "Maintenance", "title": "Perform Maintenance", "statement": "Perform maintenance on organizational systems.", "aos": [{"id": "a", "stmt": "System maintenance is performed", "plain": "CUI systems require regular maintenance \u2014 patching, hardware servicing, configuration updates, and preventive care. Evidence of maintenance being performed must exist. Systems left without maintenance for extended periods accumulate risk from hardware degradation and unpatched vulnerabilities.", "questions": ["Show me evidence that maintenance is actually performed on your CUI systems.", "Show me recent maintenance records for a sample of CUI systems.", "Show me how preventive maintenance is distinguished from reactive break-fix maintenance.", "Show me that maintenance coverage includes hardware, software, and firmware."], "evidence": ["Maintenance records (work orders or tickets) for CUI systems showing maintenance was performed.", "Patch management records showing scheduled software and firmware maintenance applied.", "Hardware maintenance schedule and completion records.", "Preventive maintenance program documentation distinguishing proactive from reactive maintenance."]}]}, {"id": "MA.L2-3.7.2", "domain": "MA", "domainFull": "Maintenance", "title": "System Maintenance Control", "statement": "Provide controls on the tools, techniques, mechanisms, and personnel that perform maintenance on organizational systems.", "aos": [{"id": "a", "stmt": "Tools used to conduct system maintenance are controlled", "plain": "All personnel \u2014 internal staff and external vendors \u2014 who perform maintenance on CUI systems must be authorized before being granted access. Authorization means there is a documented record that this person is permitted to work on this system, not just an informal understanding.", "questions": ["Show me the authorization process for maintenance personnel before they access CUI systems.", "Show me authorization records for the last several maintenance activities.", "Show me how authorization differs for internal staff versus external vendors.", "Show me what happens when maintenance is needed but the authorized technician is unavailable."], "evidence": ["Maintenance personnel pre-authorization records linked to specific maintenance activities.", "Internal maintenance access authorization linked to change management approval.", "Vendor technician authorization records with approval signatures.", "Contingency procedure when authorized technician is unavailable."]}, {"id": "b", "stmt": "Techniques used to conduct system maintenance are controlled", "plain": "Tools and equipment used for maintenance \u2014 USB drives with diagnostic software, laptops connected to CUI systems, test equipment \u2014 must be controlled and inspected. Maintenance tools are a potential vector for introducing malware or exfiltrating data.", "questions": ["Show me how maintenance tools are controlled and tracked.", "Show me the inspection process for maintenance tools before they are used on CUI systems.", "Show me how you prevent unauthorized tools from being connected to CUI systems during maintenance.", "Show me maintenance tool inspection records from recent maintenance activities."], "evidence": ["Maintenance tool inventory and tracking documentation.", "Tool inspection process documentation with malware scanning requirements.", "Maintenance tool inspection records from recent maintenance activities.", "Authorization process for approving maintenance tools before use on CUI systems."]}, {"id": "c", "stmt": "Mechanisms used to conduct system maintenance are controlled", "plain": "Maintenance activities must be monitored \u2014 either by an authorized escort observing the work, through session recording for remote maintenance, or through activity logging. Unmonitored maintenance creates an opportunity for unauthorized actions without accountability.", "questions": ["Show me how maintenance activities are monitored \u2014 escort, session recording, or logging.", "Show me monitoring records for recent maintenance activities.", "Show me whether different monitoring approaches apply to different maintenance types.", "Show me how monitoring detects and records if a technician accesses systems beyond their maintenance scope."], "evidence": ["Maintenance monitoring policy specifying required oversight for different maintenance types.", "Escort or observation records for recent on-site maintenance activities.", "Session recording or logging configuration for remote maintenance sessions.", "Maintenance activity logs showing what was accessed and changed during maintenance."]}, {"id": "d", "stmt": "Personnel used to conduct system maintenance are controlled", "plain": "Any media used during maintenance that contains diagnostic programs or tools must be checked for malicious code before being connected to or used on CUI systems. A compromised diagnostic tool is a well-documented attack vector \u2014 maintenance media is a common malware delivery mechanism.", "questions": ["Show me how media used during maintenance is scanned for malicious code before use.", "Show me the scanning process and the tool used.", "Show me maintenance media scan records from recent maintenance activities.", "Show me how you handle vendor-provided maintenance media that comes pre-loaded with tools."], "evidence": ["Maintenance media scanning policy requiring malware checks before use on CUI systems.", "AV scanning tool and procedure documentation for maintenance media.", "Maintenance media scan records with dates and results.", "Vendor media handling procedure requiring scanning of pre-loaded vendor tools."]}]}, {"id": "MA.L2-3.7.3", "domain": "MA", "domainFull": "Maintenance", "title": "Equipment Sanitization", "statement": "Ensure equipment removed for maintenance is sanitized with respect to any CUI in accordance with applicable federal standards and organizational policies.", "aos": [{"id": "a", "stmt": "Equipment to be removed from organizational spaces for off-site maintenance is sanitized of any CUI", "plain": "Before any CUI system or component is removed from the controlled facility for off-site maintenance, it must be sanitized of CUI. Sanitization means the equipment no longer contains CUI \u2014 through media removal, data wiping, or encryption key destruction. Shipping a drive containing CUI to an external vendor is a serious breach.", "questions": ["Show me your process for sanitizing equipment before it leaves the facility for maintenance.", "Show me the sanitization steps required before a system or component leaves the facility.", "Show me how you verify sanitization was successful before the equipment is released.", "Show me recent records of equipment sanitized before off-site maintenance."], "evidence": ["Equipment sanitization procedure documentation for pre-departure sanitization.", "Sanitization method documentation appropriate to the media type (overwrite, cryptographic erase, physical removal).", "Pre-departure verification checklist confirming sanitization was completed.", "Sanitization records for equipment sent off-site in the past year."]}]}, {"id": "MA.L2-3.7.4", "domain": "MA", "domainFull": "Maintenance", "title": "Media Inspection", "statement": "Check media containing diagnostic and test programs for malicious code before the media are used in organizational systems.", "aos": [{"id": "a", "stmt": "Media containing diagnostic and test programs are checked for malicious code before being used in organizational systems that process, store, or transmit CUI", "plain": "Any media brought into the facility for use during maintenance \u2014 USB drives with diagnostic software, CDs with firmware updates, laptops with maintenance tools \u2014 must be scanned for malicious code before being connected to or used on any system containing CUI.", "questions": ["Show me the process for scanning maintenance media before use on CUI systems.", "Show me the scanning tool used and how it is kept current.", "Show me maintenance media scan records from recent maintenance activities.", "Show me how you handle media that cannot be scanned due to format limitations."], "evidence": ["Maintenance media scanning procedure documentation requiring pre-use malware scan.", "AV scanning tool documentation confirming it is used for maintenance media inspection.", "Media scan records from recent maintenance activities showing scan results.", "Alternative handling procedure for media types that cannot be conventionally scanned."]}]}, {"id": "MA.L2-3.7.5", "domain": "MA", "domainFull": "Maintenance", "title": "Nonlocal Maintenance", "statement": "Require MFA to establish nonlocal maintenance sessions via external network connections and terminate such connections when nonlocal maintenance is complete.", "aos": [{"id": "a", "stmt": "Cryptographic mechanisms to protect the confidentiality of remote access sessions are identified", "plain": "When maintenance is performed remotely \u2014 a vendor connecting via VPN, a support technician using remote desktop \u2014 MFA must be required before the session is established. A password-only remote maintenance session to a CUI system is not acceptable.", "questions": ["Show me that MFA is required for all remote maintenance sessions to CUI systems.", "Show me how MFA is enforced for vendor remote maintenance \u2014 not just internal staff.", "Show me the MFA requirement in your remote maintenance policy.", "Show me MFA authentication logs from recent remote maintenance sessions."], "evidence": ["Remote maintenance MFA enforcement configuration for VPN or remote access gateway.", "Vendor remote access agreement requiring MFA compliance.", "MFA authentication event logs from recent remote maintenance sessions.", "Remote maintenance policy requiring MFA before session establishment."]}, {"id": "b", "stmt": "Cryptographic mechanisms to protect the confidentiality of remote access sessions are implemented", "plain": "Nonlocal maintenance sessions must be recorded and documented. Records must capture who connected, when, duration, what systems were accessed, and what actions were taken. Session recording provides an independent audit trail that cannot be altered by the maintenance personnel.", "questions": ["Show me how nonlocal maintenance sessions are documented and recorded.", "Show me what level of detail is captured \u2014 just connection metadata, or full session recording?", "Show me remote maintenance session records from recent activities.", "Show me how session recordings or logs are protected from modification by the remote user."], "evidence": ["Session recording or logging configuration for remote maintenance sessions.", "Remote maintenance session records showing connection details and duration.", "Session recording storage and access controls preventing modification by maintenance personnel.", "Sample remote maintenance session record showing required detail level."]}]}, {"id": "MA.L2-3.7.6", "domain": "MA", "domainFull": "Maintenance", "title": "Maintenance Personnel", "statement": "Supervise the maintenance activities of maintenance personnel without required access authorization.", "aos": [{"id": "a", "stmt": "Maintenance personnel without required access authorization are supervised during maintenance activities", "plain": "Before granting access to CUI systems for maintenance, maintenance personnel must be screened and authorized. For internal staff this typically means background investigations appropriate to the access level. For external vendors it means verifying credentials and ensuring contract security requirements are met.", "questions": ["Show me the screening and authorization process for maintenance personnel.", "Show me screening records for internal maintenance staff.", "Show me how external vendor technicians are screened before being authorized.", "Show me what happens when a vendor sends a different technician than previously authorized."], "evidence": ["Maintenance personnel screening policy specifying requirements by access level.", "Background investigation records for internal maintenance staff with CUI access.", "Vendor contract security requirements for personnel screening.", "Procedure for verifying and re-authorizing unexpected or replacement vendor personnel."]}]}, {"id": "MP.L2-3.8.1", "domain": "MP", "domainFull": "Media Protection", "title": "Media Protection", "statement": "Protect system media containing CUI, both paper and digital.", "aos": [{"id": "a", "stmt": "Paper media containing CUI is protected", "plain": "Paper documents, printouts, notes, and other physical media containing CUI must be physically protected from unauthorized access. This means secure storage when not in active use \u2014 locked cabinets, secure rooms, or clean desk policies. A CUI document left on an unattended desk violates this requirement.", "questions": ["Show me how paper CUI is protected when not in active use.", "Show me your clean desk policy and how it is enforced.", "Show me physical storage controls \u2014 locked cabinets or secure rooms \u2014 for paper CUI.", "Show me how visitors are prevented from accessing paper CUI left in work areas."], "evidence": ["Clean desk policy documentation and enforcement records.", "Locked cabinet or secure storage documentation for paper CUI.", "Physical security inspection records confirming clean desk compliance.", "Visitor control procedures preventing access to paper CUI in work areas."]}, {"id": "b", "stmt": "Digital media containing CUI is protected", "plain": "Digital media \u2014 hard drives, USB drives, backup tapes, optical media, mobile devices \u2014 containing CUI must be protected from unauthorized access. Access controls, encryption, and physical security of media storage areas all contribute to digital media protection.", "questions": ["Show me how digital media containing CUI is protected.", "Show me physical security controls for areas where digital media is stored.", "Show me logical access controls for digital media storage systems.", "Show me how encryption protects digital media if physical security is breached."], "evidence": ["Physical access controls for media storage areas \u2014 badge readers, locked cages, secure rooms.", "Encryption configuration for digital media containing CUI.", "Media storage access control documentation.", "Digital media inventory showing protection measures applied to each category."]}, {"id": "c", "stmt": "The use of removable media on system components is limited", "plain": "The protection measures applied to media must match the sensitivity of the CUI it contains. More sensitive CUI categories may require additional physical safeguards, more restrictive access controls, or stronger encryption. A one-size-fits-all approach may underprotect the most sensitive information.", "questions": ["Show me how media protection controls are calibrated to the sensitivity of the CUI they contain.", "Show me how you identify what CUI sensitivity level is on a given piece of media.", "Show me whether different CUI categories receive different levels of media protection.", "Show me the highest-sensitivity CUI in your environment and how its media is protected."], "evidence": ["Media protection policy showing tiered protection based on CUI sensitivity.", "CUI category identification process for media classification.", "Protection measures documentation for different CUI sensitivity categories.", "High-sensitivity CUI media protection documentation showing enhanced controls."]}, {"id": "d", "stmt": "The use of mobile computing devices in public areas is protected", "plain": "Use of external systems involving CUI media must be verified as appropriate before connection \u2014 confirming the external system is authorized and meets security requirements.", "questions": ["Show me how external system use involving CUI media is verified.", "Show me the verification process for external systems that will interact with CUI.", "Show me authorization records showing external systems were verified.", "Show me how you handle situations where an external system cannot be verified."], "evidence": ["External system verification procedure and required security checks.", "External system authorization records showing verification was completed.", "ISA or security assessment records for verified external systems.", "Process for handling unverifiable external systems."]}]}, {"id": "MP.L2-3.8.2", "domain": "MP", "domainFull": "Media Protection", "title": "Media Access", "statement": "Limit access to CUI on system media to authorized users.", "aos": [{"id": "a", "stmt": "Access to CUI on system media is limited to authorized users", "plain": "Only individuals who have been authorized specifically to access CUI media should be permitted to handle it. This applies to both physical media in storage and digital media on systems. Unauthorized individuals \u2014 including otherwise authorized CUI system users \u2014 should not have access to media beyond their authorized scope.", "questions": ["Show me the access control list for personnel authorized to access CUI media.", "Show me how the authorized access list is maintained and reviewed.", "Show me physical access controls preventing unauthorized individuals from accessing CUI media storage.", "Show me how access to digital CUI media is controlled at the file or storage system level."], "evidence": ["Authorized CUI media access list with approval records.", "Physical access controls for CUI media storage areas.", "Digital media access controls \u2014 file permissions, encryption keys, or storage system ACLs.", "Periodic media access review records confirming authorizations remain appropriate."]}]}, {"id": "MP.L2-3.8.3", "domain": "MP", "domainFull": "Media Protection", "title": "Sanitize or Destroy Media", "statement": "Sanitize or destroy system media before disposal or reuse.", "aos": [{"id": "a", "stmt": "System media containing CUI is sanitized or destroyed before disposal", "plain": "Before any storage media is disposed of or reused, it must be sanitized \u2014 not just have files deleted or formatted. Standard deletion and reformatting leave data recoverable. Sanitization must use methods appropriate to the media type and CUI sensitivity: overwriting, cryptographic erase, or physical destruction.", "questions": ["Show me your media sanitization process before disposal or reuse.", "Show me what sanitization methods are used for different media types.", "Show me sanitization records from the last several disposal or reuse events.", "Show me how you handle media that cannot be reliably sanitized through software methods."], "evidence": ["Media sanitization procedure documentation specifying methods by media type.", "Sanitization tool logs (DBAN, Blancco, manufacturer secure erase) from recent sanitization activities.", "Certificate of destruction from third-party vendor for physically destroyed media.", "Media disposal records showing equipment removed from inventory after sanitization."]}, {"id": "b", "stmt": "System media containing CUI is sanitized before it is released for reuse", "plain": "Sanitization methods must be appropriate to both the type of media and the sensitivity of the CUI it contained. NIST SP 800-88 provides guidance: clear (overwrite) for lower sensitivity, purge (degauss or cryptographic erase) for higher sensitivity, and destruction for the highest sensitivity or media that cannot be reliably sanitized.", "questions": ["Show me how your sanitization method selection is based on media type and CUI sensitivity.", "Show me that your sanitization methods align with NIST SP 800-88 or equivalent standards.", "Show me how SSDs and flash storage are sanitized given their wear-leveling characteristics.", "Show me the rationale for the sanitization methods selected for your most sensitive CUI."], "evidence": ["Sanitization standard documentation referencing NIST SP 800-88 or equivalent.", "Method selection matrix showing sanitization approach by media type and CUI sensitivity level.", "SSD and flash media sanitization approach \u2014 manufacturer secure erase or physical destruction.", "Rationale documentation for sanitization method selection for high-sensitivity CUI media."]}]}, {"id": "MP.L2-3.8.4", "domain": "MP", "domainFull": "Media Protection", "title": "Media Markings", "statement": "Mark media with necessary CUI markings and distribution limitations.", "aos": [{"id": "a", "stmt": "Media containing CUI is marked with applicable CUI markings", "plain": "Any physical media \u2014 drives, tapes, CDs, printed documents \u2014 that contains CUI must be visibly labeled with the appropriate CUI designation. Labels inform anyone who handles the media of its sensitivity and required handling. Unmarked media containing CUI will be mishandled because handlers don't know what they have.", "questions": ["Show me how physical media containing CUI is marked with CUI designations.", "Show me the marking applied to different types of physical media in your environment.", "Show me the process for applying CUI markings when media is created or first used for CUI.", "Show me a physical example of marked media in your environment."], "evidence": ["CUI marking policy and procedure specifying required markings for physical media.", "Physical examples of CUI-marked media (drives with labels, documents with headers/footers).", "Media marking application procedure \u2014 when and how markings are applied.", "Training records confirming personnel understand media marking requirements."]}, {"id": "b", "stmt": "Media containing CUI is marked with distribution limitations", "plain": "Markings must include not just the CUI designation but also any applicable distribution limitations \u2014 who can receive this information, geographic or organizational restrictions, or special handling instructions. A CUI label alone without distribution limits may not provide sufficient guidance.", "questions": ["Show me that media markings include applicable distribution limitations.", "Show me what distribution limitation markings are used in your environment.", "Show me how distribution limitations are determined for different CUI categories.", "Show me how distribution limitations are communicated through markings on physical media."], "evidence": ["Distribution limitation marking examples showing limitations included with CUI designations.", "CUI registry or category reference showing distribution limitations for applicable CUI types.", "Marking standard documentation specifying required distribution limitation language.", "Training records covering distribution limitation marking requirements."]}]}, {"id": "MP.L2-3.8.5", "domain": "MP", "domainFull": "Media Protection", "title": "Media Accountability", "statement": "Control access to media containing CUI and maintain accountability for media during transport until the media is destroyed or sanitized.", "aos": [{"id": "a", "stmt": "Access to media containing CUI is controlled", "plain": "Your organization must maintain a current inventory of all CUI media \u2014 knowing what media exists, what CUI it contains, where it is located, and who has custody. An untracked piece of media containing CUI that goes missing cannot be properly investigated or reported.", "questions": ["Show me your CUI media inventory.", "Show me how the inventory is maintained and kept current.", "Show me how new CUI media is added to the inventory when created.", "Show me how the inventory is audited to confirm all media is accounted for."], "evidence": ["CUI media inventory listing all physical and digital media with location and custodian.", "Media inventory update process for newly created CUI media.", "Media inventory audit records confirming all media was located and verified.", "Media accountability tracking system or log documentation."]}, {"id": "b", "stmt": "Accountability for media containing CUI is maintained during transport outside of controlled areas", "plain": "When CUI media is transported \u2014 moved between buildings, shipped to another location, or carried by an employee \u2014 accountability must be maintained throughout the transit. The media must not be left unattended, and its location must be known at all times during transport.", "questions": ["Show me how CUI media accountability is maintained during transport.", "Show me the controls that apply when an employee carries CUI media off-site.", "Show me how you ensure CUI media in transit is not left unattended.", "Show me the accountability process for media shipped between locations."], "evidence": ["Media transport accountability procedure specifying control requirements during transit.", "Employee media transport acknowledgment or checkout records.", "Shipping or courier service documentation for media transported between locations.", "Media transport monitoring records showing accountability was maintained."]}]}, {"id": "MP.L2-3.8.6", "domain": "MP", "domainFull": "Media Protection", "title": "Portable Storage Encryption", "statement": "Implement cryptographic mechanisms to protect the confidentiality of CUI during transport unless otherwise protected by alternative physical safeguards.", "aos": [{"id": "a", "stmt": "The confidentiality of CUI stored on digital media is protected during transport using cryptographic mechanisms or alternative physical safeguards", "plain": "CUI stored on portable storage devices must be encrypted during transport. If a USB drive, external hard drive, or laptop containing CUI is lost or stolen in transit, encryption prevents the CUI from being accessed by unauthorized parties. Hardware encryption or software encryption (BitLocker To Go) satisfies this.", "questions": ["Show me that CUI on portable storage devices is encrypted during transport.", "Show me the encryption solution used for portable storage containing CUI.", "Show me how you verify that a portable storage device is encrypted before it leaves the facility.", "Show me what happens when a portable storage device containing CUI is lost during transport."], "evidence": ["Portable storage encryption requirement in policy documentation.", "Encryption solution documentation for portable storage \u2014 hardware encryption specs or BitLocker To Go.", "Pre-departure verification procedure confirming encryption is enabled before transport.", "Lost media incident procedure and example response record."]}]}, {"id": "MP.L2-3.8.7", "domain": "MP", "domainFull": "Media Protection", "title": "Removable Media", "statement": "Control the use of removable media on system components.", "aos": [{"id": "a", "stmt": "The use of removable media on system components is controlled", "plain": "The use of removable media \u2014 USB drives, external hard drives, SD cards, optical media \u2014 on CUI systems must be controlled. An unmanaged USB port represents a data exfiltration and malware introduction risk. Control means defining what types of media are permitted, by whom, and under what conditions.", "questions": ["Show me your policy and controls governing removable media use on CUI systems.", "Show me what types of removable media are permitted and under what conditions.", "Show me the technical control that enforces removable media restrictions.", "Show me how users request authorization to use removable media when needed."], "evidence": ["Removable media policy defining permitted media types, conditions, and authorization requirements.", "Technical control configuration (GPO, endpoint agent) restricting removable media use.", "Removable media authorization request and approval process documentation.", "Authorized removable media list with device identifiers for systems that require it."]}]}, {"id": "MP.L2-3.8.8", "domain": "MP", "domainFull": "Media Protection", "title": "Shared Media", "statement": "Prohibit the use of portable storage devices when such devices have no identifiable owner.", "aos": [{"id": "a", "stmt": "The use of portable storage devices without identifiable owners is prohibited", "plain": "Portable storage devices of unknown origin \u2014 found USB drives, drives without owner labels, media left by departing employees without documentation \u2014 must never be connected to CUI systems. The 'found USB in the parking lot' attack is real, documented, and effective. Policy and training must explicitly address this.", "questions": ["Show me your policy explicitly prohibiting use of portable storage devices with no identifiable owner.", "Show me how personnel are trained to handle found or unidentified removable media.", "Show me the procedure when an employee finds an unidentified USB drive or storage device.", "Show me technical controls that prevent unregistered devices from connecting even if policies are ignored."], "evidence": ["Policy documentation explicitly prohibiting use of unidentified portable storage devices.", "Training content showing the risks of found media and the required response.", "Procedure for reporting and handling found or unidentified portable storage devices.", "Technical control configuration blocking devices not on an authorized device list."]}]}, {"id": "MP.L2-3.8.9", "domain": "MP", "domainFull": "Media Protection", "title": "Protect Backups", "statement": "Protect the confidentiality of backup CUI at storage locations.", "aos": [{"id": "a", "stmt": "The confidentiality of backup CUI is protected at storage locations", "plain": "Backup copies of CUI must receive the same level of protection as primary CUI systems. A backup tape or cloud backup containing CUI that is stored without encryption or access controls represents the same breach risk as an unprotected primary system \u2014 often with less visibility and monitoring.", "questions": ["Show me how backup CUI is protected at rest at storage locations.", "Show me the encryption applied to backup CUI data.", "Show me physical security controls for on-site backup storage.", "Show me how off-site backup storage protects CUI from unauthorized access."], "evidence": ["Backup encryption configuration documentation.", "Physical security documentation for on-site backup storage areas.", "Off-site backup storage security documentation \u2014 vendor contracts or facility security requirements.", "Backup restoration authentication requirement documentation."]}]}, {"id": "PE.L2-3.10.1", "domain": "PE", "domainFull": "Physical Protection", "title": "Limit Physical Access", "statement": "Limit physical access to organizational systems to authorized individuals.", "aos": [{"id": "a", "stmt": "Authorized individuals allowed physical access are identified", "plain": "Physical access to CUI systems \u2014 servers, workstations, network equipment, and the facilities that house them \u2014 must be restricted to individuals who are authorized to be there. Unauthorized individuals must not be able to walk into areas where CUI systems are located.", "questions": ["Show me how physical access to CUI system locations is restricted to authorized individuals.", "Show me the list of individuals authorized for physical access to your CUI processing areas.", "Show me how unauthorized individuals are physically prevented from accessing these areas.", "Show me physical access logs confirming only authorized individuals have entered."], "evidence": ["Physical access authorization list for CUI processing areas with approval records.", "Physical access control system configuration \u2014 badge readers, biometrics, key codes.", "Physical access logs showing entry and exit records for CUI areas.", "Physical security walk-through or inspection records confirming access controls are functioning."]}, {"id": "b", "stmt": "Physical access to organizational systems is limited to authorized individuals", "plain": "Physical access control devices \u2014 badge readers, electronic locks, biometric scanners, cipher locks \u2014 must be deployed at entry points to areas housing CUI systems. Physical keys alone, without audit logging, are a weak control. Electronic systems provide both enforcement and audit trail.", "questions": ["Show me the physical access control devices deployed at CUI facility entry points.", "Show me that access control devices cover all entry points \u2014 not just the main entrance.", "Show me how access control devices are maintained and tested for proper operation.", "Show me the audit logging capability of your physical access control devices."], "evidence": ["Physical access control device inventory showing all deployed devices and locations.", "Access control device testing and maintenance records.", "Physical access audit logging configuration and sample log entries.", "Physical security assessment showing all access points are controlled."]}, {"id": "c", "stmt": "Physical access to equipment is limited to authorized individuals", "plain": "Physical access controls must apply at all entry points to CUI areas \u2014 not just the main entrance. Loading docks, emergency exits, windows, ceiling tiles, and other alternative entry points must also be controlled or monitored. An unsecured back door defeats a secured front door.", "questions": ["Show me how all entry points to CUI areas are controlled \u2014 including secondary and emergency exits.", "Show me how you assess and address alternative entry points like loading docks or windows.", "Show me physical security documentation covering all perimeter entry points.", "Show me how emergency exit security is managed without compromising life safety."], "evidence": ["Physical security assessment documenting all entry points and their controls.", "Perimeter security documentation covering primary, secondary, and emergency access points.", "Emergency exit security configuration \u2014 door alarms, delayed egress, or monitoring.", "Physical security inspection records confirming all perimeter points were evaluated."]}, {"id": "d", "stmt": "Physical access to operating environments is limited to authorized individuals", "plain": "Physical access authorizations must be periodically reviewed \u2014 not just granted and forgotten. Personnel leave, change roles, or no longer need physical access. Stale physical access authorizations create risk just as stale logical access authorizations do.", "questions": ["Show me how physical access authorizations are reviewed periodically.", "Show me the last physical access review \u2014 when was it, who participated, and what was the outcome?", "Show me how physical access is removed when no longer needed.", "Show me how physical access review integrates with HR processes for departures and transfers."], "evidence": ["Physical access authorization review schedule and records.", "Most recent physical access review report showing access evaluated and unnecessary access removed.", "Physical access revocation records for departing or transferring personnel.", "HR-physical security integration process for access lifecycle management."]}]}, {"id": "PE.L2-3.10.2", "domain": "PE", "domainFull": "Physical Protection", "title": "Monitor Facility", "statement": "Protect and monitor the physical facility and support infrastructure for organizational systems.", "aos": [{"id": "a", "stmt": "The physical facility where organizational systems reside is protected", "plain": "The physical facility housing CUI systems must be hardened against unauthorized entry. This means adequate exterior security \u2014 secured perimeter, controlled access, adequate lighting, and design features that make unauthorized access difficult. Physical facility protection is the first layer of defense.", "questions": ["Show me how the physical facility housing CUI systems is protected.", "Show me exterior security measures \u2014 perimeter controls, lighting, and physical hardening.", "Show me how the facility design supports security objectives.", "Show me recent physical security assessments of the facility."], "evidence": ["Physical facility security documentation covering perimeter and exterior controls.", "Physical security assessment report with findings and remediation status.", "Facility hardening documentation \u2014 reinforced doors, secure windows, controlled perimeter.", "Lighting and visibility documentation for exterior security."]}, {"id": "b", "stmt": "The support infrastructure for organizational systems is protected", "plain": "Physical monitoring must be implemented \u2014 security cameras, alarm systems, guards, or motion detection that can detect unauthorized access attempts and generate alerts or records. Monitoring provides detection when physical controls fail or are bypassed.", "questions": ["Show me the physical monitoring systems deployed in and around your CUI facilities.", "Show me camera coverage and confirm it covers critical areas \u2014 server rooms, access points, and work areas.", "Show me whether monitoring is reviewed in real time or only after an incident.", "Show me alarm system configuration and testing records."], "evidence": ["Security camera location map showing coverage of critical physical areas.", "Camera monitoring configuration \u2014 real-time vs. recorded \u2014 and review procedure.", "Alarm system configuration and recent testing or maintenance records.", "Physical monitoring review schedule and records."]}, {"id": "c", "stmt": "The physical facility where organizational systems reside is monitored", "plain": "Support infrastructure \u2014 power systems, cooling, network cabling, communications \u2014 must be protected from physical damage or tampering. Disruption to support infrastructure can disable CUI systems as effectively as a logical attack. Power distribution, cooling units, and network demarcation points need physical protection.", "questions": ["Show me how support infrastructure is protected from unauthorized physical access.", "Show me protection for power distribution, cooling, and network infrastructure.", "Show me environmental monitoring for temperature, humidity, and power conditions.", "Show me how support infrastructure is protected from both intentional tampering and accidental damage."], "evidence": ["Support infrastructure physical protection documentation.", "Environmental monitoring configuration and alerting thresholds.", "UPS, generator, and power protection documentation.", "Network infrastructure physical security \u2014 cabling in conduit, locked distribution areas."]}, {"id": "d", "stmt": "The support infrastructure for organizational systems is monitored", "plain": "Support infrastructure \u2014 power systems, cooling, communications, and network cabling \u2014 must be actively monitored so that conditions affecting CUI systems can be detected and responded to promptly.", "questions": ["Show me how support infrastructure is actively monitored.", "Show me environmental monitoring for temperature, humidity, and power.", "Show me alerting for support infrastructure conditions that could affect CUI systems.", "Show me monitoring coverage for power, cooling, and network infrastructure."], "evidence": ["Environmental monitoring configuration showing sensors and alert thresholds.", "Power monitoring including UPS status and generator monitoring.", "Cooling system monitoring and alert configuration.", "Infrastructure monitoring alert records and response documentation."]}]}, {"id": "PE.L2-3.10.3", "domain": "PE", "domainFull": "Physical Protection", "title": "Escort Visitors", "statement": "Escort visitors and monitor visitor activity.", "aos": [{"id": "a", "stmt": "Visitors are escorted", "plain": "Any individual who does not have unescorted access authorization \u2014 including vendors, visitors, delivery personnel, and contractors without appropriate clearances \u2014 must be accompanied by an authorized employee at all times in areas where CUI systems are located. Unescorted visitor access is never acceptable in CUI areas.", "questions": ["Show me your visitor escort policy for areas where CUI systems are located.", "Show me how visitors are distinguished from employees in CUI areas.", "Show me how escorts are assigned and what their responsibilities include.", "Show me visitor log records confirming visitors were escorted."], "evidence": ["Visitor escort policy requiring escort for all non-authorized personnel in CUI areas.", "Visitor identification procedure \u2014 visitor badges, sign-in process.", "Escort responsibility documentation for authorized employees accompanying visitors.", "Visitor logs showing escort identity for all visitor entries to CUI areas."]}, {"id": "b", "stmt": "Visitor activity is monitored", "plain": "Visitor activity in CUI areas must be monitored \u2014 not just escorted. The escort is responsible for actively observing what the visitor does and preventing unauthorized access to CUI systems or information. Escorting means accompanying and watching, not just walking alongside.", "questions": ["Show me how visitor activity is actively monitored during their presence in CUI areas.", "Show me the escort responsibilities regarding active monitoring of visitor activities.", "Show me how camera coverage supports monitoring of visitor activity.", "Show me whether visitor activities are documented beyond just their entry and exit."], "evidence": ["Escort responsibility documentation specifying active monitoring requirements.", "Camera coverage of areas where visitors are present in CUI zones.", "Visitor activity documentation requirements during escorted visits.", "Training records for escorts covering their monitoring responsibilities."]}]}, {"id": "PE.L2-3.10.4", "domain": "PE", "domainFull": "Physical Protection", "title": "Physical Access Logs", "statement": "Maintain audit logs of physical access.", "aos": [{"id": "a", "stmt": "Audit logs of physical access are maintained", "plain": "Electronic audit logs of physical access \u2014 who entered which area, when, and when they exited \u2014 must be maintained by the physical access control system. These logs are essential for investigating physical security incidents and demonstrating that access controls are functioning.", "questions": ["Show me the physical access audit logs maintained by your access control system.", "Show me what information is captured for each physical access event.", "Show me how long physical access logs are retained.", "Show me how physical access logs are protected from modification."], "evidence": ["Physical access control system logs showing entry and exit events with timestamps and identities.", "Log retention policy for physical access records.", "Physical access log protection controls \u2014 access restrictions, read-only storage.", "Sample physical access log entries showing required information."]}]}, {"id": "PE.L2-3.10.5", "domain": "PE", "domainFull": "Physical Protection", "title": "Manage Physical Access", "statement": "Control and manage physical access devices.", "aos": [{"id": "a", "stmt": "Physical access devices are identified", "plain": "Physical access credentials \u2014 badge cards, key fobs, smart cards, PINs \u2014 must be tracked in an inventory that captures who has each credential, what areas it grants access to, when it was issued, and its current status. An untracked credential that goes missing cannot be effectively managed.", "questions": ["Show me your physical access credential inventory.", "Show me what information is tracked for each credential in the inventory.", "Show me how the inventory is kept current as credentials are issued and revoked.", "Show me how the inventory is audited to verify accuracy."], "evidence": ["Physical access credential inventory with credential ID, holder, access level, issue date, and status.", "Credential inventory update procedure for new issuances and revocations.", "Periodic credential inventory audit records.", "Credential management system documentation."]}, {"id": "b", "stmt": "Physical access devices are controlled", "plain": "Physical access credentials must be issued only to individuals who have been specifically authorized to have them. There must be a documented approval process before a badge or key fob is programmed and issued. Informal credential issuance without authorization documentation creates accountability gaps.", "questions": ["Show me the authorization process required before issuing a physical access credential.", "Show me authorization records for recently issued credentials.", "Show me how access levels programmed into credentials are limited to what the individual needs.", "Show me how credential issuance is documented."], "evidence": ["Physical access credential issuance authorization records with approver signatures.", "Credential issuance process documentation showing required approval steps.", "Access level programming documentation confirming least-privilege access in credentials.", "Credential issuance log showing authorization precedes issuance."]}, {"id": "c", "stmt": "Physical access devices are managed", "plain": "Physical access credentials must be promptly revoked when no longer needed \u2014 upon termination, transfer, role change, or when the credential is no longer justified. A former employee's active badge is a physical security gap equivalent to a live logical account.", "questions": ["Show me how physical access credentials are revoked when no longer needed.", "Show me the revocation SLA \u2014 how quickly are credentials deactivated upon termination?", "Show me how the revocation process integrates with HR notifications.", "Show me recent revocation records confirming timely credential deactivation."], "evidence": ["Physical access revocation SLA documentation.", "Credential revocation records from recent terminations showing deactivation timestamps.", "HR-physical security integration process for credential lifecycle management.", "Physical access control system configuration showing revoked credentials are immediately deactivated."]}]}, {"id": "PE.L2-3.10.6", "domain": "PE", "domainFull": "Physical Protection", "title": "Alternative Work Sites", "statement": "Enforce safeguards to protect CUI at alternate work sites.", "aos": [{"id": "a", "stmt": "Safeguarding measures for CUI are defined for alternate work sites", "plain": "Security safeguards for alternate work sites \u2014 home offices, temporary work locations, hotels \u2014 must be formally defined. Personnel cannot be expected to create their own security controls. The organization must specify what is required for a work location to be acceptable for CUI handling.", "questions": ["Show me where security safeguards for alternate work sites are formally defined.", "Show me the specific requirements your organization sets for home office security.", "Show me how the requirements address physical security, network security, and CUI protection.", "Show me how requirements are communicated to remote workers."], "evidence": ["Telework or remote work security policy specifying safeguards for alternate work sites.", "Alternate work site security requirements checklist.", "Policy communication records confirming remote workers received and acknowledged requirements.", "Remote work security requirements covering physical workspace, network, device, and CUI handling."]}, {"id": "b", "stmt": "Safeguarding measures for CUI are enforced for alternate work sites", "plain": "Defined safeguards must actually be implemented and enforced at alternate work sites \u2014 not just documented. Technical controls (VPN, MFA, encrypted devices) can be verified remotely through MDM and endpoint management. Physical safeguards may require attestation or periodic review.", "questions": ["Show me how alternate work site safeguards are implemented and enforced.", "Show me technical controls that enforce security at remote work locations.", "Show me how you verify that physical safeguards are in place at alternate work sites.", "Show me what happens when an employee's alternate work site does not meet requirements."], "evidence": ["MDM or endpoint management compliance reports showing remote device security posture.", "VPN and MFA enforcement configuration for remote work access.", "Remote work security attestation or self-assessment records from remote workers.", "Non-compliance response procedure for alternate work sites failing to meet requirements."]}]}, {"id": "PS.L2-3.9.1", "domain": "PS", "domainFull": "Personnel Security", "title": "Screen Individuals", "statement": "Screen individuals prior to authorizing access to organizational systems containing CUI.", "aos": [{"id": "a", "stmt": "Individuals are screened prior to authorizing access to organizational systems containing CUI", "plain": "A formal screening process must be established for all individuals who need access to CUI systems. The process must define what screening is required, who is responsible for conducting it, and how results are evaluated. Ad hoc or inconsistent screening is not a defined process.", "questions": ["Show me your formal screening process for individuals requiring CUI system access.", "Show me what elements the screening process includes \u2014 background check, reference check, clearance verification.", "Show me who is responsible for conducting and evaluating screening.", "Show me how the screening process applies to contractors and temporary workers."], "evidence": ["Personnel screening policy defining screening requirements, process, and responsible parties.", "Screening process documentation showing required elements and evaluation criteria.", "Contractor screening requirements in vendor contracts and agreements.", "Screening program documentation showing consistent application across employee categories."]}]}, {"id": "PS.L2-3.9.2", "domain": "PS", "domainFull": "Personnel Security", "title": "Termination & Transfer", "statement": "Ensure that CUI and organizational systems containing CUI are protected during and after personnel actions such as terminations and transfers.", "aos": [{"id": "a", "stmt": "A policy and/or process for terminating system access and any credentials coincident with personnel actions is established", "plain": "When a person leaves the organization \u2014 through resignation, termination, retirement, or any other separation \u2014 their access to CUI systems must be revoked promptly. 'Promptly' means within hours, not days or weeks. Departed employees with active access are a significant insider threat and data breach risk.", "questions": ["Show me how quickly CUI system access is revoked upon personnel separation.", "Show me your offboarding process for access revocation.", "Show me how IT is notified of terminations and what the expected response time is.", "Show me access revocation records from recent terminations."], "evidence": ["Access revocation SLA documentation specifying maximum time from separation to access removal.", "HR-IT notification process documentation for personnel separation events.", "Recent termination records showing access revocation timestamps compared to separation date.", "Offboarding checklist showing access revocation as a required and tracked step."]}, {"id": "b", "stmt": "System access and credentials are terminated consistent with personnel actions such as termination or transfer", "plain": "CUI in the physical or digital possession of departing personnel must be retrieved before or at the time of their separation. This includes physical documents, portable media, mobile devices, and instructions to delete locally stored CUI. Departing employees must not retain CUI.", "questions": ["Show me your process for retrieving CUI from departing personnel.", "Show me the offboarding steps that ensure CUI is returned or deleted.", "Show me how you handle CUI on personal devices used under BYOD arrangements.", "Show me recent offboarding records confirming CUI retrieval."], "evidence": ["Offboarding checklist showing CUI retrieval steps including physical documents, devices, and media.", "Device return records and acknowledgment signatures from departing employees.", "BYOD data removal procedure documentation and attestation records.", "Recent offboarding completion records confirming CUI retrieval was accomplished."]}, {"id": "c", "stmt": "The system is protected during and after personnel transfer actions", "plain": "When personnel transfer to a different role within the organization, their access authorizations must be reviewed and adjusted to reflect the new position. Access appropriate for their previous role may be excessive or inappropriate for the new role \u2014 the principle of least privilege must be reapplied.", "questions": ["Show me how access is reviewed and adjusted when personnel change roles.", "Show me the process for removing access that was appropriate for the previous role but not the new one.", "Show me recent transfer records showing access was reviewed and adjusted.", "Show me how quickly access adjustments are made following a role transfer."], "evidence": ["Personnel transfer access review procedure documentation.", "Transfer records showing previous role access was reviewed and unnecessary access removed.", "Access adjustment timeline from transfer date to access change completion.", "Least privilege application documentation for role transitions."]}]}, {"id": "RA.L2-3.11.1", "domain": "RA", "domainFull": "Risk Assessment", "title": "Risk Assessments", "statement": "Periodically assess the risk to organizational operations, organizational assets, and individuals, resulting from the operation of organizational systems and the associated processing, storage, or transmission of CUI.", "aos": [{"id": "a", "stmt": "The frequency to assess risk to organizational operations, organizational assets, and individuals is defined", "plain": "A formal risk assessment process must be established \u2014 defining how risk is identified, analyzed, and evaluated. The methodology must be documented and consistently applied. An informal 'we know our risks' approach cannot be audited, repeated, or compared over time.", "questions": ["Show me your established risk assessment process and methodology.", "Show me the framework or standard your risk assessment methodology is based on.", "Show me how the process is documented and who is responsible for executing it.", "Show me how your risk assessment process applies to CUI systems specifically."], "evidence": ["Risk assessment methodology documentation referencing NIST RMF, FAIR, or organizational framework.", "Risk assessment process documentation showing steps, participants, and outputs.", "Responsibility assignment for risk assessment execution.", "Risk assessment scope documentation confirming CUI systems are included."]}, {"id": "b", "stmt": "Risk to organizational operations, organizational assets, and individuals resulting from the operation of an organizational system that processes, stores, or transmits CUI is assessed with the defined frequency", "plain": "Risk assessments must be conducted on a defined, regular schedule \u2014 not just when something bad happens. The frequency must reflect the rate of change in your environment and threat landscape. Annual assessment is a common minimum, with more frequent updates after significant changes.", "questions": ["Show me your risk assessment schedule and when the last assessment was conducted.", "Show me the most recent completed risk assessment with its date and scope.", "Show me how you determine the appropriate frequency for risk assessments.", "Show me whether risk assessments are conducted after significant changes to systems or environment."], "evidence": ["Risk assessment schedule documentation showing required frequency.", "Most recent completed risk assessment with scope, date, and methodology.", "Risk assessment trigger documentation for events that require unscheduled assessments.", "Risk assessment history showing consistent periodic execution."]}]}, {"id": "RA.L2-3.11.2", "domain": "RA", "domainFull": "Risk Assessment", "title": "Vulnerability Scan", "statement": "Scan for vulnerabilities in organizational systems and applications periodically and when new vulnerabilities affecting those systems are identified.", "aos": [{"id": "a", "stmt": "The frequency to scan for vulnerabilities in organizational systems and applications is defined", "plain": "Vulnerability scanning must be performed on CUI systems to identify known security weaknesses. Scanning is not the same as risk assessment \u2014 it uses automated tools to check for specific known vulnerabilities. Both authenticated and unauthenticated scans should be conducted to identify the full scope of vulnerabilities.", "questions": ["Show me that vulnerability scanning is performed on your CUI systems.", "Show me the scanning tool used and how it is configured.", "Show me whether scans are authenticated \u2014 does the scanner log in with credentials for deeper analysis?", "Show me recent vulnerability scan results for CUI systems."], "evidence": ["Vulnerability scanning tool configuration and scan schedule documentation.", "Recent vulnerability scan reports for CUI systems with findings.", "Authenticated scan configuration showing the scanner uses credentials for deep analysis.", "Scan coverage documentation confirming all CUI systems are included in scan scope."]}, {"id": "b", "stmt": "Vulnerability scans are performed on organizational systems with the defined frequency", "plain": "Vulnerability scanning must be performed on a defined regular schedule and also when significant new vulnerabilities are announced \u2014 such as a critical CVE affecting software in your environment. Waiting for the scheduled quarterly scan when a critical CVE was just published is inadequate.", "questions": ["Show me your vulnerability scanning schedule.", "Show me evidence of out-of-cycle scanning when critical vulnerabilities were publicly announced.", "Show me how you determine when an announced vulnerability warrants immediate out-of-cycle scanning.", "Show me the process for initiating an emergency scan when a critical CVE is published."], "evidence": ["Vulnerability scanning schedule documentation with required scan frequency.", "Out-of-cycle scan records triggered by critical CVE announcements.", "Vulnerability monitoring process for tracking published CVEs affecting your software inventory.", "Emergency scan initiation procedure and recent examples."]}, {"id": "c", "stmt": "Vulnerability scans are performed on applications with the defined frequency", "plain": "Vulnerability scanning tools must use current vulnerability definitions before each scan. A scanner using outdated signatures will miss newly published vulnerabilities. Definition updates must be verified before each scan \u2014 not just assumed to have occurred.", "questions": ["Show me how scanning tool definitions are updated before each scan.", "Show me the definition update process and how currency is verified.", "Show me evidence that the definitions used in recent scans were current at the time.", "Show me how you handle situations where a scanner cannot reach update servers."], "evidence": ["Scanner update process documentation showing pre-scan update requirements.", "Definition update logs confirming currency before recent scans.", "Scanner update verification procedure and evidence from recent scans.", "Offline update procedure for scanners in air-gapped or restricted network environments."]}, {"id": "d", "stmt": "Vulnerability scans are performed on organizational systems when new vulnerabilities are identified", "plain": "Vulnerability scan results must be reviewed and analyzed, and identified vulnerabilities must be prioritized and remediated. Scans that run and produce reports that are never read provide no security value. The analysis must result in remediation action proportional to the vulnerability severity.", "questions": ["Show me how vulnerability scan results are reviewed and analyzed.", "Show me who is responsible for reviewing scan results and how they are prioritized.", "Show me the linkage between scan findings and remediation tracking.", "Show me trend data showing vulnerability counts are being reduced over time."], "evidence": ["Vulnerability scan result review records showing who reviewed findings and when.", "Vulnerability prioritization process documentation.", "Remediation tracking records linking scan findings to remediation tickets.", "Vulnerability trend data showing reduction in open findings over time."]}, {"id": "e", "stmt": "Vulnerability scans are performed on applications when new vulnerabilities are identified", "plain": "Applications must be scanned for vulnerabilities when new application-layer vulnerabilities affecting those applications are identified \u2014 in addition to scheduled scanning.", "questions": ["Show me that applications are scanned when new application vulnerabilities are identified.", "Show me your application vulnerability scanning coverage.", "Show me how application CVE notifications trigger application scans.", "Show me application vulnerability scan records."], "evidence": ["Application vulnerability scanning tool configuration and coverage.", "Application CVE monitoring subscription and notification records.", "Application scan records triggered by new CVE disclosures.", "Application vulnerability remediation tracking records."]}]}, {"id": "RA.L2-3.11.3", "domain": "RA", "domainFull": "Risk Assessment", "title": "Vulnerability Remediation", "statement": "Remediate vulnerabilities in accordance with risk assessments.", "aos": [{"id": "a", "stmt": "Vulnerabilities in organizational systems are identified", "plain": "Vulnerabilities identified through scanning, assessment, or other means must actually be remediated \u2014 patched, mitigated, or addressed through compensating controls. Finding vulnerabilities and filing them away without action provides no security improvement.", "questions": ["Show me how identified vulnerabilities are addressed and remediated.", "Show me recent examples of vulnerabilities that were remediated following detection.", "Show me how you ensure remediation actually occurs rather than just being planned.", "Show me the verification process confirming vulnerabilities are actually fixed."], "evidence": ["Vulnerability remediation records showing patching or mitigation completion.", "Patch deployment records linked to specific vulnerability findings.", "Post-remediation scan results confirming vulnerability was eliminated.", "Remediation verification procedure and records."]}, {"id": "b", "stmt": "Vulnerabilities in organizational systems are remediated in accordance with risk assessments", "plain": "Not all vulnerabilities can be remediated immediately \u2014 remediation must be prioritized based on risk. Critical vulnerabilities that are exploitable remotely and affect CUI systems require faster remediation than low-severity findings. Risk-based prioritization with defined SLAs demonstrates a mature remediation program.", "questions": ["Show me how vulnerability remediation is prioritized based on risk.", "Show me your defined remediation SLAs by vulnerability severity.", "Show me evidence that high and critical vulnerabilities are remediated within your defined SLAs.", "Show me how you handle vulnerabilities that cannot be patched within the required SLA."], "evidence": ["Vulnerability remediation SLA policy with defined timelines by severity level.", "Remediation tracking showing high and critical vulnerabilities closed within defined SLAs.", "Risk-based prioritization process for vulnerability remediation scheduling.", "Exception process documentation for vulnerabilities that cannot meet the SLA with compensating controls."]}]}, {"id": "SC.L2-3.13.1", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Boundary Protection", "statement": "Monitor, control, and protect organizational communications at the external boundaries and key internal boundaries of organizational systems.", "aos": [{"id": "a", "stmt": "The external system boundary is defined", "plain": "Communications crossing the external boundary of your system \u2014 traffic entering or leaving your network from the internet or external partners \u2014 must be monitored and controlled. Firewalls, IDS/IPS, and proxies at the perimeter provide this control. An unmonitored or uncontrolled network boundary is an open door.", "questions": ["Show me the controls monitoring and controlling communications at your external network boundary.", "Show me your external boundary protection devices and their configuration.", "Show me how traffic crossing the external boundary is monitored for threats.", "Show me that all external traffic passes through your boundary protection devices."], "evidence": ["Network architecture diagram showing external boundary protection device placement.", "Firewall or UTM configuration documentation for external boundary devices.", "IDS/IPS deployment and alert configuration at the external boundary.", "Network flow logs confirming all external traffic traverses boundary controls."]}, {"id": "b", "stmt": "Key internal system boundaries are defined", "plain": "Internal network boundaries \u2014 between CUI systems and general IT networks, between segments of different sensitivity, between development and production \u2014 must also be monitored and controlled. A flat network where everything can communicate with everything provides no internal segmentation defense.", "questions": ["Show me the internal network boundaries in your environment and how they are controlled.", "Show me the segmentation between CUI systems and general-purpose networks.", "Show me firewall or ACL controls at internal network boundaries.", "Show me how traffic between network segments is monitored."], "evidence": ["Network segmentation diagram showing internal boundaries and their controls.", "Internal firewall or ACL rules controlling traffic between network segments.", "Internal network monitoring configuration showing traffic between segments is observed.", "VLAN or physical segmentation documentation for CUI network isolation."]}, {"id": "c", "stmt": "Communications are monitored at the external system boundary", "plain": "Boundary protection devices \u2014 firewalls, routers with ACLs, UTM appliances, IDS/IPS \u2014 must be deployed at network boundaries. The existence of these devices must be documented, and their configuration must be managed and reviewed. Default configurations on boundary devices are frequently insecure.", "questions": ["Show me your boundary protection device inventory.", "Show me how boundary protection devices are configured and hardened.", "Show me how boundary protection device configurations are managed and reviewed.", "Show me firmware and patch management for boundary protection devices."], "evidence": ["Boundary protection device inventory with make, model, and location.", "Boundary device hardening documentation and configuration standards.", "Boundary device configuration review records.", "Boundary device patch management records."]}, {"id": "d", "stmt": "Communications are monitored at key internal boundaries", "plain": "Communications crossing key internal network boundaries \u2014 between your CUI segment and other internal networks \u2014 must be actively monitored, not just controlled. Internal monitoring detects lateral movement and east-west threats that perimeter tools miss.", "questions": ["Show me how communications at key internal boundaries are monitored.", "Show me your internal network monitoring tools and their placement at key boundaries.", "Show me how east-west traffic between your CUI segment and other segments is observed.", "Show me alerting for anomalous traffic crossing internal network boundaries."], "evidence": ["Internal network monitoring tool deployment configuration at key internal boundaries.", "IDS/IPS or SIEM rules capturing internal boundary traffic events.", "Internal boundary traffic logs showing monitored communications.", "Alert configuration for anomalous east-west traffic patterns."]}, {"id": "e", "stmt": "Communications are controlled at the external system boundary", "plain": "Communications at the external system boundary must be technically controlled \u2014 firewalls, IDS/IPS, and proxies enforce which traffic is permitted in and out. Monitoring alone without control is insufficient.", "questions": ["Show me the technical controls at your external system boundary that control communications.", "Show me your external firewall or UTM configuration enforcing boundary traffic control.", "Show me that
