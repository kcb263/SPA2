 "Current baseline document with version history showing recent updates.", "Baseline review schedule confirming baselines are periodically validated for accuracy."]}, {"id": "c", "stmt": "The baseline configuration is maintained (reviewed and updated) throughout the system development life cycle", "plain": "You must maintain a current, accurate inventory of all organizational systems \u2014 not just a list from initial deployment that was never updated. The inventory must reflect additions, retirements, and changes. 'We know roughly what we have' is not the same as a maintained inventory.", "questions": ["Show me your current system inventory and when it was last updated.", "Show me how newly deployed systems are added to the inventory.", "Show me how decommissioned systems are removed from the inventory.", "Show me how the inventory is reconciled against actual deployed systems to find discrepancies."], "evidence": ["System inventory (CMDB or equivalent) showing all CUI systems with last-updated timestamps.", "Process documentation for adding new systems to the inventory before or upon deployment.", "Decommissioned system records showing removal from inventory upon retirement.", "Periodic inventory reconciliation records showing the inventory was compared against actual systems."]}, {"id": "d", "stmt": "A system inventory is established", "plain": "The inventory must be comprehensive \u2014 not just a list of servers. Hardware components, software applications, firmware versions, and supporting documentation must all be captured. An inventory that only lists hostnames but not what software runs on them is incomplete.", "questions": ["Show me whether your inventory captures hardware, software, firmware, and documentation \u2014 not just system names.", "Show me how software installed on CUI systems is tracked in the inventory.", "Show me how firmware versions for network devices and endpoints are captured.", "Show me how third-party components and dependencies are included in the inventory."], "evidence": ["System inventory showing hardware assets, installed software, firmware versions, and system documentation.", "Software asset management report showing applications deployed on CUI systems.", "Network device firmware version inventory showing current versions across all managed devices.", "SBOM or third-party component inventory for critical CUI applications."]}, {"id": "e", "stmt": "The system inventory includes hardware, software, firmware, and documentation", "plain": "When a system deviates from its approved baseline \u2014 whether from unauthorized change, configuration drift, or failed update \u2014 that deviation must be detected and resolved. Undetected deviations mean you don't actually know the security posture of your systems.", "questions": ["Show me how configuration deviations from the approved baseline are detected.", "Show me a recent configuration compliance scan and any deviations found.", "Show me the process for resolving identified deviations from baseline.", "Show me how unauthorized changes are distinguished from authorized changes in deviation detection."], "evidence": ["Configuration compliance scanning tool output showing systems compared against their baselines.", "Recent deviation report showing identified discrepancies and their remediation status.", "Change management records for deviations that were resolved through authorized configuration changes.", "Unauthorized change detection alerting configuration showing how out-of-baseline systems are flagged."]}, {"id": "f", "stmt": "The inventory is maintained (reviewed and updated) throughout the system development life cycle", "plain": "The asset inventory must be actively maintained throughout the system lifecycle \u2014 not created once and forgotten. Additions, changes, and retirements must be reflected promptly, and periodic reconciliation confirms accuracy.", "questions": ["Show me how the inventory is actively maintained as systems change.", "Show me the process for adding new assets to the inventory.", "Show me how retired systems are removed from the inventory.", "Show me your most recent inventory reconciliation and its findings."], "evidence": ["Inventory update process documentation for additions and retirements.", "Recent inventory reconciliation records showing comparison against actual systems.", "Change management integration showing new assets are added to inventory upon deployment.", "Decommissioned system removal records confirming inventory is current."]}]}, {"id": "CM.L2-3.4.2", "domain": "CM", "domainFull": "Configuration Management", "title": "Establish Configuration Settings", "statement": "Establish and enforce security configuration settings for information technology products employed in organizational systems.", "aos": [{"id": "a", "stmt": "Security configuration settings for information technology products employed in the system are established and included in the baseline configuration", "plain": "Security configuration settings must be formally established for every technology product in your CUI environment \u2014 operating systems, applications, network devices, security tools. Default configurations are frequently insecure. Established settings must be documented, not just applied informally.", "questions": ["Show me where your security configuration settings are formally established and documented for each system type.", "Show me the process for establishing configuration settings for a new technology product.", "Show me how your configuration settings compare to a recognized security benchmark.", "Show me who has authority to establish and approve configuration settings."], "evidence": ["Security configuration baselines for each major system type referencing CIS benchmarks or DISA STIGs.", "Configuration standard documentation for operating systems, applications, and network devices.", "Benchmark comparison report showing your settings relative to CIS or STIG recommendations.", "Configuration setting approval records showing technical authority sign-off."]}, {"id": "b", "stmt": "Security configuration settings for information technology products employed in the system are enforced", "plain": "Security configuration settings must be as restrictive as operationally feasible \u2014 security should be the default, with relaxations only when operationally necessary and formally justified. 'We left the default because it works' is not an acceptable approach to security configuration.", "questions": ["Show me how you determine the most restrictive configuration consistent with your operational needs.", "Show me examples of configuration settings that were relaxed from the benchmark default and the justification.", "Show me how you ensure operational exceptions to restrictive settings are documented and justified.", "Show me the review process for configuration exceptions to confirm they are still necessary."], "evidence": ["Configuration settings showing restrictive defaults with documented justification for any relaxations.", "Exception documentation for configuration settings that deviate from maximum restrictiveness.", "Configuration review records confirming exception justifications remain valid.", "Benchmark comparison showing your settings and the rationale for any deviations from recommended values."]}]}, {"id": "CM.L2-3.4.3", "domain": "CM", "domainFull": "Configuration Management", "title": "Unauthorized Change Detection", "statement": "Track, review, approve, and log changes to organizational systems.", "aos": [{"id": "a", "stmt": "Changes to the system are tracked", "plain": "Every change to a CUI system must be tracked from request to implementation. Tracking means there is a record of what was proposed to be changed, who requested it, and what the current status is. Undocumented or verbally-approved changes with no written record are not tracked.", "questions": ["Show me your change tracking system and how changes to CUI systems are recorded.", "Show me a sample change record from initiation to completion.", "Show me how emergency changes are tracked even when normal process is expedited.", "Show me how you would know all changes made to a specific CUI system in the last 90 days."], "evidence": ["Change management ticketing system records showing tracked changes to CUI systems.", "Sample change ticket showing requestor, description, approval, and implementation details.", "Emergency change procedure documentation showing expedited tracking requirements.", "Change report for a specific CUI system showing all tracked changes in a defined period."]}, {"id": "b", "stmt": "Changes to the system are reviewed", "plain": "Changes must be reviewed for technical and security implications before they are implemented. The review process must involve qualified personnel who can assess impact. Rubber-stamp approvals that happen automatically without genuine review do not satisfy this requirement.", "questions": ["Show me how change reviews are conducted \u2014 who reviews, what they examine, and how approval is documented.", "Show me evidence of a substantive review \u2014 a change that was modified or delayed based on review findings.", "Show me how security impact is part of the change review process.", "Show me the minimum approvals required for different categories of changes to CUI systems."], "evidence": ["Change management review workflow documentation showing required reviewers by change type.", "Example of a change ticket that was modified or rejected based on review findings.", "Security review sign-off on change tickets for changes to CUI systems.", "Change approval audit trail showing named approvers and timestamps for completed changes."]}, {"id": "c", "stmt": "Changes to the system are approved or disapproved", "plain": "All changes to CUI systems must be logged \u2014 not just significant changes or changes that were difficult. Every authorized change must generate a record, and that record must include what changed, who made it, and when. This creates the audit trail needed to investigate security events.", "questions": ["Show me change logs for CUI systems and confirm they capture what changed, who changed it, and when.", "Show me how configuration changes made outside the change management process are detected and logged.", "Show me how change logs are protected from modification or deletion.", "Show me how change logs are used during incident investigations."], "evidence": ["Change management system logs showing completed changes with implementer, timestamp, and description.", "System-level change audit logs (e.g., Windows security event log) capturing file and registry changes.", "Change log protection controls confirming records cannot be modified after the fact.", "Example incident investigation that used change logs to identify the source of a problem."]}, {"id": "d", "stmt": "Changes to the system are logged", "plain": "Changes that occur outside the authorized change management process must be detected. Configuration monitoring tools compare current system state against the approved baseline and alert when unauthorized modifications occur \u2014 even if no change ticket was submitted.", "questions": ["Show me how unauthorized changes to CUI systems are detected.", "Show me the tools and processes that monitor for unauthorized configuration changes.", "Show me a recent example of an unauthorized change that was detected and how it was handled.", "Show me how you distinguish unauthorized changes from authorized changes that weren't properly documented."], "evidence": ["Configuration monitoring tool (FIM, CSPM, or similar) deployment evidence and recent alert output.", "Alert configuration showing how out-of-baseline configurations are flagged for review.", "Example of an unauthorized change detection event and the resulting investigation.", "Process documentation for resolving detected unauthorized changes through the change management process."]}]}, {"id": "CM.L2-3.4.4", "domain": "CM", "domainFull": "Configuration Management", "title": "Security Impact Analysis", "statement": "Analyze the security impact of changes prior to implementation.", "aos": [{"id": "a", "stmt": "The security impact of changes to the system is analyzed prior to implementation", "plain": "A formal process must exist for analyzing the security implications of every change before it is implemented. The process must define who performs the analysis, what questions are asked, and how the results are documented. An informal 'someone reviews it' approach is insufficient.", "questions": ["Show me your formal process for analyzing the security impact of changes.", "Show me what questions or criteria are used in the security impact analysis.", "Show me who is qualified and authorized to perform security impact analysis.", "Show me how security impact analysis is documented in change records."], "evidence": ["Security impact analysis process documentation including methodology and required participants.", "Change request template showing security impact analysis fields that must be completed.", "Change management procedure showing security review as a required step before approval.", "Training records or qualifications for personnel authorized to perform security impact analysis."]}]}, {"id": "CM.L2-3.4.5", "domain": "CM", "domainFull": "Configuration Management", "title": "Access Restrictions for Change", "statement": "Define, document, approve, and enforce physical and logical access restrictions associated with changes to organizational systems.", "aos": [{"id": "a", "stmt": "Physical access restrictions associated with changes to the system are defined", "plain": "The boundaries on who can make changes to CUI systems \u2014 both physically and logically \u2014 must be formally defined. This includes defining who can access production systems to implement changes, who can approve changes, and what the separation requirements are between these roles.", "questions": ["Show me where physical and logical access restrictions for changes to CUI systems are formally defined.", "Show me how change implementer access is defined and differentiated from change approver access.", "Show me the documented list of individuals authorized to implement changes to CUI production systems.", "Show me how change access restrictions are communicated to relevant personnel."], "evidence": ["Access restriction policy for change implementation defining authorized implementers by system type.", "Documentation separating change approver and implementer roles with assigned personnel.", "Access control matrix showing who is authorized to implement changes to each CUI system.", "Change management policy showing defined access restrictions for production system modifications."]}, {"id": "b", "stmt": "Physical access restrictions associated with changes to the system are documented", "plain": "Access restrictions for change must be formally documented and approved \u2014 not informally understood. Documentation creates the audit trail needed to verify that only authorized individuals implemented changes and that those individuals were specifically authorized before they made changes.", "questions": ["Show me where access restrictions for change are formally documented.", "Show me the approval process for granting change implementation access.", "Show me how change access authorizations are reviewed periodically.", "Show me how access restrictions are updated when personnel change roles or leave."], "evidence": ["Formal documentation of change access authorizations with approver signatures.", "Access authorization records for individuals permitted to implement production system changes.", "Periodic review records of change implementation access confirming authorizations remain appropriate.", "Revocation records showing change access was removed when personnel changed roles."]}, {"id": "c", "stmt": "Physical access restrictions associated with changes to the system are approved", "plain": "Defined access restrictions must be technically enforced \u2014 not just documented. Only authorized individuals should be technically able to access production systems to make changes. Documentation alone that is not backed by technical controls provides no real protection.", "questions": ["Show me that change implementation access is technically enforced \u2014 not just policy-based.", "Show me that unauthorized individuals cannot access production systems to make changes.", "Show me how change access restrictions are enforced during system updates and maintenance windows.", "Show me how you verify that change implementation access hasn't expanded beyond what is documented."], "evidence": ["Production system access controls showing only authorized change implementers have access.", "Privileged access management configuration enforcing change implementation access restrictions.", "Audit logs showing only authorized accounts made configuration changes to CUI production systems.", "Access review records confirming technical enforcement matches documented authorizations."]}, {"id": "d", "stmt": "Physical access restrictions associated with changes to the system are enforced", "plain": "Physical access restrictions for change implementation must be defined \u2014 specifying who is physically permitted to access hardware and facilities for the purpose of making changes.", "questions": ["Show me your defined physical access restrictions for change implementation.", "Show me how physical access for change implementation is controlled.", "Show me authorization requirements for physical access to production hardware.", "Show me physical access logs during recent change windows."], "evidence": ["Physical access restriction policy for change implementation activities.", "Physical access control documentation for CUI hardware locations.", "Authorization records for physical access during change implementation.", "Physical access logs confirming only authorized individuals accessed hardware during changes."]}, {"id": "e", "stmt": "Logical access restrictions associated with changes to the system are defined", "plain": "Logical access restrictions for change implementation must be defined \u2014 specifying which accounts have the technical capability to make configuration changes to production CUI systems.", "questions": ["Show me your defined logical access restrictions for implementing changes to CUI systems.", "Show me the accounts authorized to make changes to production CUI systems.", "Show me how logical access for change implementation is technically controlled.", "Show me that unauthorized accounts cannot implement changes even with general system access."], "evidence": ["Logical access restriction policy for change implementation accounts.", "Change implementation account inventory with authorization documentation.", "Technical access controls limiting change implementation to authorized accounts.", "Access review records confirming change implementation access remains appropriate."]}, {"id": "f", "stmt": "Logical access restrictions associated with changes to the system are documented", "plain": "Defined logical access restrictions for changes must be formally documented to enable consistent application, auditing, and review.", "questions": ["Show me where logical access restrictions for changes are formally documented.", "Show me that documentation is accessible for audit and compliance verification.", "Show me how documentation is updated when change access restrictions are modified.", "Show me that the documented restrictions match the technically implemented controls."], "evidence": ["Formal documentation of logical access restrictions for change implementation.", "Version-controlled documentation showing change access restrictions.", "Documentation update records when change access restrictions are modified.", "Comparison of documented vs. implemented change access restrictions."]}, {"id": "g", "stmt": "Logical access restrictions associated with changes to the system are approved", "plain": "Logical access restrictions for changes must be approved by an appropriate authority before implementation. Approval creates accountability and ensures restrictions reflect organizational policy.", "questions": ["Show me the approval process for logical access restrictions for changes.", "Show me approval records for your current change access restrictions.", "Show me who has authority to approve change access restrictions.", "Show me how changes to access restrictions require re-approval."], "evidence": ["Approval records for logical access restrictions for change implementation.", "Approving authority designation for change access restriction decisions.", "Change access restriction approval workflow documentation.", "Re-approval records when access restrictions were modified."]}, {"id": "h", "stmt": "Logical access restrictions associated with changes to the system are enforced", "plain": "Approved logical access restrictions for changes must be technically enforced \u2014 preventing unauthorized accounts from implementing changes even if they attempt to do so.", "questions": ["Show me that logical access restrictions for changes are technically enforced.", "Show me that an unauthorized account cannot implement a production change.", "Show me the technical enforcement mechanism for change access restrictions.", "Show me audit evidence that changes were only implemented by authorized accounts."], "evidence": ["Technical access control enforcement for change implementation accounts.", "Demonstration that unauthorized accounts cannot make production changes.", "Change audit logs showing only authorized accounts implemented production changes.", "Access control configuration export confirming change implementation restrictions."]}]}, {"id": "CM.L2-3.4.6", "domain": "CM", "domainFull": "Configuration Management", "title": "Least Functionality", "statement": "Configure the system to provide only essential capabilities.", "aos": [{"id": "a", "stmt": "Essential system capabilities are defined based on the principle of least functionality", "plain": "Every system must be configured to provide only the capabilities required for its purpose. A database server should not be running a web server, print spooler, or Bluetooth service unless those are genuinely required. Every unnecessary service is additional attack surface.", "questions": ["Show me that your CUI systems are configured to provide only essential capabilities.", "Show me how you determine which capabilities are 'essential' for each system type.", "Show me a hardened system configuration demonstrating unnecessary services are disabled.", "Show me the process for evaluating whether a capability is essential before enabling it."], "evidence": ["Hardened system configuration documentation showing disabled unnecessary services and roles.", "Port scan results confirming only required ports are open and listening on CUI systems.", "System baseline showing services enabled vs. total available services with justification.", "Hardening checklist completed for a representative CUI system showing each decision."]}, {"id": "b", "stmt": "The system is configured to provide only the defined essential capabilities", "plain": "You must have a documented, maintained list of prohibited or restricted functions, ports, protocols, and services for your CUI environment. This list is the reference against which system configurations are assessed and non-compliant systems are remediated.", "questions": ["Show me your list of prohibited or restricted functions, ports, protocols, and services.", "Show me how this list was developed and what authority approved it.", "Show me how the list is kept current as new vulnerabilities or threats emerge.", "Show me how the prohibited list is used during system build and compliance scanning."], "evidence": ["Prohibited services, ports, and protocols list with approval documentation.", "Configuration standard referencing prohibited items derived from security benchmarks.", "List review records showing periodic updates to the prohibited items list.", "Compliance scan configuration using the prohibited list to check systems."]}]}, {"id": "CM.L2-3.4.7", "domain": "CM", "domainFull": "Configuration Management", "title": "Nonessential Functionality", "statement": "Restrict, disable, or prevent the use of nonessential programs, functions, ports, protocols, and services.", "aos": [{"id": "a", "stmt": "Essential programs are defined", "plain": "Beyond just system services, unnecessary software programs must be identified and removed or restricted. Development tools on production servers, productivity suites on dedicated security appliances, and unused applications all represent attack surface. A regular software inventory review identifies candidates for removal.", "questions": ["Show me how you identify unnecessary programs on CUI systems.", "Show me your software inventory for a sample CUI system and highlight programs that are unnecessary.", "Show me the process for removing or restricting software identified as unnecessary.", "Show me how recently you reviewed software on CUI systems for unnecessary programs."], "evidence": ["Software inventory for representative CUI systems showing all installed applications.", "Recent software review records showing programs evaluated and unnecessary ones removed.", "Application removal or uninstall records for programs identified as unnecessary.", "Software control policy defining categories of software prohibited on CUI systems."]}, {"id": "b", "stmt": "The use of nonessential programs is defined", "plain": "Unnecessary network functions \u2014 LLMNR, NetBIOS, SMBv1, SNMP v1/v2, Telnet, rsh, and other deprecated or unneeded protocols \u2014 must be identified on each system type. These protocols represent well-known attack vectors that should be eliminated if not operationally required.", "questions": ["Show me how unnecessary functions, ports, and protocols are identified on your CUI systems.", "Show me whether LLMNR, NetBIOS, SMBv1, and other commonly-exploited protocols are disabled.", "Show me the process for identifying newly unnecessary functions as the environment evolves.", "Show me how vendor-provided default configurations are reviewed for unnecessary functions."], "evidence": ["Protocol and function inventory showing enabled protocols on CUI systems with necessity assessments.", "Configuration documentation showing LLMNR, NetBIOS, and SMBv1 disabled status.", "Network scan results confirming legacy and unnecessary protocols are not responding.", "System baseline review records showing functions evaluated for necessity."]}, {"id": "c", "stmt": "The use of nonessential programs is restricted, disabled, or prevented as defined", "plain": "After identification, unnecessary functions, ports, protocols, and services must actually be disabled or restricted. Configuration management tools, GPOs, and host-based firewall rules provide technical enforcement. Periodic compliance scanning verifies the disabled state is maintained.", "questions": ["Show me that unnecessary functions and protocols are actually disabled on CUI systems.", "Show me configuration documentation confirming specific protocols and services are disabled.", "Show me compliance scan results confirming disabled items have not been re-enabled.", "Show me how you detect and respond when a previously disabled function is re-enabled."], "evidence": ["Configuration documentation showing protocols and services in disabled state.", "Group Policy or MDM settings enforcing protocol restrictions across managed CUI systems.", "Configuration compliance scan output confirming restricted items remain disabled.", "Alerting configuration detecting when previously disabled functions are re-enabled."]}, {"id": "d", "stmt": "Essential functions are defined", "plain": "Essential functions of each system type must be formally defined \u2014 identifying the system functions genuinely required for the system to fulfill its mission. Only when essential functions are defined can nonessential functions be identified.", "questions": ["Show me how essential functions are defined for your CUI systems.", "Show me documentation of required functions for each major system type.", "Show me the process for determining whether a function is essential.", "Show me how essential function definitions are reviewed as requirements evolve."], "evidence": ["Essential function definition documentation for CUI system types.", "System design or requirements documentation identifying essential functions.", "Review records for essential function definitions.", "Process documentation for evaluating function necessity."]}, {"id": "e", "stmt": "The use of nonessential functions is defined", "plain": "Once essential functions are defined, the use of all nonessential functions must be explicitly documented \u2014 identifying which functions are not required and should be disabled or restricted.", "questions": ["Show me how nonessential functions are defined and documented.", "Show me the list of functions identified as nonessential for your CUI systems.", "Show me how this list was developed and who approved it.", "Show me how the nonessential function list is maintained."], "evidence": ["Nonessential function list documentation for CUI systems.", "Function inventory showing classification as essential vs. nonessential.", "Approval records for nonessential function designations.", "Review records showing nonessential function list is maintained."]}, {"id": "f", "stmt": "The use of nonessential functions is restricted, disabled, or prevented as defined", "plain": "Nonessential functions must be restricted, disabled, or prevented from operating. Configuration or access controls must technically enforce this restriction.", "questions": ["Show me that nonessential functions are technically disabled or restricted on CUI systems.", "Show me configuration evidence that nonessential functions are disabled.", "Show me compliance scans confirming nonessential functions remain disabled.", "Show me how you detect and respond when a nonessential function is re-enabled."], "evidence": ["Configuration documentation showing nonessential functions in disabled state.", "Compliance scan results confirming nonessential functions are disabled.", "Monitoring alerting for re-enabled nonessential functions.", "Remediation records for systems found with nonessential functions active."]}, {"id": "g", "stmt": "Essential ports are defined", "plain": "Essential ports for each system type must be formally defined \u2014 identifying which network ports are genuinely required for the system to function.", "questions": ["Show me how essential ports are defined for your CUI systems.", "Show me documentation of required ports for each major system type.", "Show me the process used to determine which ports are essential.", "Show me how essential port definitions are reviewed when requirements change."], "evidence": ["Essential port documentation for each CUI system type.", "Firewall rule justification documentation showing ports with defined business need.", "Port review records showing periodic evaluation of port necessity.", "System design documentation identifying required network ports."]}, {"id": "h", "stmt": "The use of nonessential ports is defined", "plain": "Nonessential ports must be documented \u2014 creating a clear list of ports that should not be open on CUI systems.", "questions": ["Show me how nonessential ports are defined and documented.", "Show me your list of prohibited ports on CUI systems.", "Show me how this list was developed and approved.", "Show me how the prohibited port list drives firewall configuration and scanning."], "evidence": ["Prohibited port documentation for CUI systems.", "Firewall standard referencing prohibited ports.", "Port prohibition list approval records.", "Compliance scan configuration using the prohibited port list."]}, {"id": "i", "stmt": "The use of nonessential ports is restricted, disabled, or prevented as defined", "plain": "Nonessential ports must be technically closed or blocked \u2014 port scans and firewall rules provide enforcement evidence.", "questions": ["Show me that nonessential ports are technically restricted or closed on CUI systems.", "Show me port scan results confirming only essential ports are open.", "Show me firewall rules blocking prohibited ports.", "Show me how you detect and respond when a previously closed port is opened."], "evidence": ["Port scan results confirming only essential ports are listening on CUI systems.", "Firewall configuration showing prohibited ports are blocked.", "Monitoring alerting for new port openings on CUI systems.", "Remediation records for systems found with prohibited ports open."]}, {"id": "j", "stmt": "Essential protocols are defined", "plain": "Essential network protocols must be formally defined for each system. This provides the baseline for identifying and disabling all other protocols.", "questions": ["Show me how essential network protocols are defined for your CUI systems.", "Show me the documentation of required protocols for each major system type.", "Show me how protocol necessity is evaluated.", "Show me how essential protocol definitions are reviewed as requirements change."], "evidence": ["Essential protocol documentation for CUI system types.", "Protocol configuration standards showing approved protocols by system role.", "Protocol review records showing periodic evaluation.", "System requirements documentation identifying necessary protocols."]}, {"id": "k", "stmt": "The use of nonessential protocols is defined", "plain": "Nonessential protocols must be identified and documented \u2014 creating a reference list for disabling and compliance scanning.", "questions": ["Show me how nonessential protocols are identified and documented.", "Show me your list of prohibited or nonessential protocols.", "Show me how the list was developed and approved.", "Show me how the prohibited protocol list drives configuration standards."], "evidence": ["Prohibited protocol documentation for CUI systems.", "Protocol prohibition list with approval records.", "Configuration standard referencing prohibited protocols.", "Compliance scan configuration checking for prohibited protocol usage."]}, {"id": "l", "stmt": "The use of nonessential protocols is restricted, disabled, or prevented as defined", "plain": "Nonessential protocols must be technically disabled or blocked \u2014 configuration, firewall rules, and compliance scans provide enforcement evidence.", "questions": ["Show me that nonessential protocols are technically disabled on CUI systems.", "Show me configuration evidence that prohibited protocols are disabled.", "Show me compliance scans confirming prohibited protocols are not active.", "Show me how you detect when a prohibited protocol is re-enabled."], "evidence": ["Configuration showing prohibited protocols are disabled (NetBIOS, LLMNR, SMBv1).", "Compliance scan results confirming prohibited protocols are not running.", "Monitoring alert configuration for re-enabled prohibited protocols.", "Remediation records for systems found using prohibited protocols."]}, {"id": "m", "stmt": "Essential services are defined", "plain": "Essential services running on CUI systems must be formally defined \u2014 identifying which OS services, application services, and daemons are genuinely required.", "questions": ["Show me how essential services are defined for your CUI systems.", "Show me the documentation of required services for each major system type.", "Show me the process for determining which services are essential.", "Show me how essential service definitions are reviewed when requirements change."], "evidence": ["Essential service documentation for CUI system types.", "Hardening baseline documentation identifying required services by system role.", "Service review records showing periodic evaluation of service necessity.", "System design documentation identifying required services."]}, {"id": "n", "stmt": "The use of nonessential services is defined", "plain": "Nonessential services must be explicitly documented \u2014 creating a list of services that should not be running on CUI systems.", "questions": ["Show me how nonessential services are identified and documented.", "Show me your list of prohibited or nonessential services.", "Show me how this list was developed and approved.", "Show me how the prohibited service list is used in hardening and compliance scanning."], "evidence": ["Prohibited service documentation for CUI systems.", "Service prohibition list with approval records.", "Hardening baseline referencing services that must be disabled.", "Compliance scan configuration checking for prohibited service execution."]}, {"id": "o", "stmt": "The use of nonessential services is restricted, disabled, or prevented as defined", "plain": "Nonessential services must be technically disabled or prevented from running \u2014 OS configuration, compliance scans, and monitoring confirm enforcement.", "questions": ["Show me that nonessential services are technically disabled on CUI systems.", "Show me configuration evidence of disabled nonessential services.", "Show me compliance scans confirming prohibited services are not running.", "Show me how you detect when a previously disabled service is re-enabled."], "evidence": ["Configuration showing nonessential services in disabled or stopped state.", "Compliance scan results confirming prohibited services are not running.", "Monitoring alert configuration for re-enabled prohibited services.", "Remediation records for systems found running prohibited services."]}]}, {"id": "CM.L2-3.4.8", "domain": "CM", "domainFull": "Configuration Management", "title": "Application Execution Policy", "statement": "Apply deny-by-default and allow-by-exception policy to prevent the use of unauthorized software.", "aos": [{"id": "a", "stmt": "A policy specifying whether whitelisting or blacklisting is to be implemented is specified", "plain": "A formal policy must establish that software execution follows a deny-by-default model \u2014 unless software is explicitly on an approved list, it cannot run. This inverts the typical model of 'block known-bad' to 'allow only known-good,' dramatically reducing malware risk.", "questions": ["Show me your policy establishing a deny-by-default software execution approach.", "Show me how the policy defines the deny-by-default model and its scope.", "Show me who approved the policy and when it was last reviewed.", "Show me how the policy applies to different execution contexts \u2014 user-run, system processes, scripts."], "evidence": ["Application execution policy document establishing deny-by-default/allow-by-exception approach.", "Policy approval records with technical authority and management sign-off.", "Policy scope documentation confirming coverage of executables, scripts, and browser-based code.", "Policy review records showing periodic validation of the execution control approach."]}, {"id": "b", "stmt": "The software allowed to execute under whitelisting or denied use under blacklisting is specified", "plain": "The deny-by-default execution policy must be technically enforced. Windows Defender Application Control (WDAC), AppLocker, or third-party tools provide this enforcement. Without technical enforcement, a policy saying 'don't run unauthorized software' can be violated by any user.", "questions": ["Show me the technical tool enforcing your software execution policy.", "Show me the configuration of your allowlist and how it is maintained.", "Show me that attempting to run software not on the allowlist is blocked.", "Show me audit logs of blocked execution attempts."], "evidence": ["WDAC, AppLocker, or equivalent tool configuration showing deny-by-default rules.", "Approved application list showing authorized software with review and approval dates.", "Screenshot or log showing an unauthorized application execution was blocked.", "Audit log of blocked execution events showing the policy is being enforced."]}, {"id": "c", "stmt": "Whitelisting to allow the execution of authorized software or blacklisting to prevent the use of unauthorized software is implemented as specified", "plain": "There will be legitimate needs to run software not initially on the approved list. The exception process must be formal, documented, and include security review before anything is added to the allowlist. Exceptions granted without security review undermine the entire control.", "questions": ["Show me the process for requesting and approving an exception to add software to the approved list.", "Show me who has authority to approve exceptions and what security review is required.", "Show me example exception requests that were approved and how the security review is documented.", "Show me how exceptions are reviewed periodically to confirm continued necessity."], "evidence": ["Software exception request and approval workflow documentation.", "Exception approval records showing security review completion and approver identity.", "Approved application additions with security review sign-off.", "Periodic exception review records confirming approved software is still necessary and appropriate."]}]}, {"id": "CM.L2-3.4.9", "domain": "CM", "domainFull": "Configuration Management", "title": "User-Installed Software", "statement": "Control and monitor user-installed software.", "aos": [{"id": "a", "stmt": "A policy for controlling the installation of software by users is established", "plain": "A formal policy must govern user-installed software \u2014 defining what is permitted, what is prohibited, the approval process required, and the consequences of unauthorized installation. Without a clear policy, users cannot be expected to make correct decisions.", "questions": ["Show me your policy governing user-installed software.", "Show me how the policy defines what is permitted vs. prohibited for user installation.", "Show me how the policy communicates the required approval process to users.", "Show me how the policy has been communicated to users and how awareness is confirmed."], "evidence": ["User software installation policy defining permitted categories, prohibited software, and approval process.", "Policy distribution records confirming all users received and acknowledged the software policy.", "Prohibited software list referenced in the policy.", "Training records confirming users understand the software installation policy requirements."]}, {"id": "b", "stmt": "Installation of software by users is controlled based on the established policy", "plain": "Users must be technically prevented from installing unauthorized software \u2014 removing local admin rights is the primary control. Policy alone telling users 'don't install software' is ineffective and does not satisfy this requirement.", "questions": ["Show me that standard users lack the ability to install software without administrator assistance.", "Show me the technical control preventing unauthorized software installation.", "Show me that removing local admin rights is enforced on CUI workstations.", "Show me how you handle situations where a user genuinely needs to install approved software."], "evidence": ["Configuration showing standard user accounts do not have local administrator rights.", "Group Policy or MDM policy enforcing standard user restrictions on CUI endpoints.", "Software installation request and approval process documentation for authorized installations.", "Endpoint management records showing admin rights removal across the CUI workstation fleet."]}, {"id": "c", "stmt": "Installation of software by users is monitored", "plain": "Even with installation restrictions in place, user-installed software must be actively monitored. Users may find ways to run portable applications or browser-based tools that bypass traditional installation controls. Software inventory scanning detects unauthorized software regardless of installation method.", "questions": ["Show me how you monitor for unauthorized software on CUI systems.", "Show me a recent software inventory scan and how unauthorized software is identified.", "Show me how you handle the discovery of unauthorized software \u2014 what is the response process?", "Show me how your monitoring covers portable applications and browser extensions in addition to installed software."], "evidence": ["Automated software inventory scanning tool deployment and recent scan output.", "Policy and monitoring configuration covering portable applications and browser extensions.", "Incident or remediation record showing unauthorized software was discovered and removed.", "SIEM or endpoint management alert configuration for unauthorized software detection."]}]}, {"id": "IA.L2-3.5.1", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Identify System Users", "statement": "Identify information system users, processes acting on behalf of users, and devices.", "aos": [{"id": "a", "stmt": "System users are identified", "plain": "Every human user accessing a CUI system must have a unique identifier \u2014 a username, account, or credential that belongs to them alone. Shared accounts where multiple people log in as the same identity make individual accountability impossible and violate this foundational requirement.", "questions": ["Show me how individual user accounts are uniquely identified in your primary authentication directory.", "Show me a list of active user accounts with a clear one-to-one mapping to individual people.", "Show me how newly onboarded users are assigned unique identifiers before access is granted.", "Show me how departed users are identifiable as no longer active in the system."], "evidence": ["Active Directory or IdP user account list showing unique identifiers mapped to individual users.", "Screenshot of an individual user account properties page showing unique identifier.", "Screenshot showing disabled or terminated user accounts clearly distinguishable from active accounts.", "Account provisioning records showing unique identifiers were assigned at account creation."]}, {"id": "b", "stmt": "Processes acting on behalf of users are identified", "plain": "Automated processes \u2014 batch jobs, scheduled tasks, service accounts, API integrations \u2014 must also have unique identifiers. Process identity must be individually trackable to a specific function and accountable owner. Generic process names like 'system' or 'service' without individual identity are insufficient.", "questions": ["Show me the list of all process and service accounts in your environment with their unique identifiers.", "Show me how each automated process identifier is mapped to a specific function and a human owner.", "Show me how process identifiers are named to make their purpose and ownership clear.", "Show me how you detect when a new automated process creates activity without a documented identifier."], "evidence": ["Service account inventory showing unique identifiers, associated functions, and human owners.", "Naming convention documentation for service and process accounts.", "Configuration confirming each automated process uses its own unique account \u2014 not shared credentials.", "Review records showing service account identifiers were confirmed as current and accurate."]}, {"id": "c", "stmt": "Devices accessing the system are identified", "plain": "Devices connecting to CUI systems must also be individually identified. Each device should have a unique identifier \u2014 hostname, certificate, MAC address, or device ID \u2014 that distinguishes it from all other devices. Unknown devices with no identity should be detectable and blockable.", "questions": ["Show me how devices are individually identified when they connect to CUI systems.", "Show me your device identifier approach \u2014 hostname, certificate, MAC address, or combination.", "Show me how your MDM or NAC system assigns and tracks device identifiers.", "Show me how you detect devices connecting without recognized identifiers."], "evidence": ["Device inventory showing unique identifiers for all authorized CUI system endpoints.", "MDM or NAC configuration showing device identity requirements before access.", "Device certificate or ID provisioning process documentation.", "NAC logs showing device identifiers captured for all network connection events."]}]}, {"id": "IA.L2-3.5.10", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Cryptographically-Protected Passwords", "statement": "Store and transmit only cryptographically-protected passwords.", "aos": [{"id": "a", "stmt": "Passwords are cryptographically protected in storage", "plain": "Passwords must never be stored in plain text. They must be hashed using a modern, computationally expensive algorithm \u2014 bcrypt, Argon2, scrypt, or PBKDF2 with high iteration counts. MD5 and SHA-1 are completely unacceptable for password hashing. The hashing algorithm itself must be documented.", "questions": ["Show me how passwords are stored in your authentication systems \u2014 what hashing algorithm is used?", "Show me that no systems store passwords in plain text or with weak hashing (MD5, SHA-1, unsalted SHA).", "Show me the hashing algorithm and configuration for your primary authentication systems.", "Show me how legacy systems with weak password storage have been identified and remediated."], "evidence": ["Authentication system documentation confirming the password hashing algorithm and configuration.", "Security review or assessment confirming no systems store passwords in plain text.", "Identification and remediation records for systems found using weak password hashing.", "Password storage standard documentation specifying required hashing algorithms."]}, {"id": "b", "stmt": "Passwords are cryptographically protected in transit", "plain": "Passwords must be transmitted over encrypted channels \u2014 TLS 1.2 or higher \u2014 at all times. An authentication page over unencrypted HTTP transmits passwords in clear text and is never acceptable. Certificate validity must be maintained to prevent TLS bypass.", "questions": ["Show me that all authentication interfaces transmit passwords over encrypted channels.", "Show me TLS configuration for authentication endpoints and confirm minimum version requirements.", "Show me that HTTP-only access to authentication pages is not permitted.", "Show me how certificate validity is monitored to prevent expired certificate warnings that users bypass."], "evidence": ["TLS configuration for all CUI authentication endpoints showing minimum TLS 1.2.", "SSL/TLS scan results (SSLLabs or equivalent) for authentication portals.", "HTTP to HTTPS redirect configuration preventing plain-text credential transmission.", "Certificate monitoring and renewal records confirming authentication certificates are current."]}]}, {"id": "IA.L2-3.5.11", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Obscure Feedback", "statement": "Obscure feedback of authentication information.", "aos": [{"id": "a", "stmt": "Authentication information is obscured during the authentication process", "plain": "When a user types their password into any authentication interface, the characters must be masked \u2014 shown as dots or asterisks. This protects against shoulder surfing and screen capture. The masking must apply to all authentication interfaces \u2014 desktop, web, mobile, and CLI.", "questions": ["Show me that password entry is masked in your authentication interfaces.", "Show me masking on desktop login, web portal login, VPN client, and CLI authentication.", "Show me that there is no 'show password' toggle that persists the clear-text display.", "Show me how this requirement is tested during application security reviews."], "evidence": ["Screenshots showing password fields masked on representative authentication interfaces.", "Application security review checklist confirming password masking was verified.", "Mobile application authentication screenshot showing password masking on the mobile login screen.", "CLI authentication documentation confirming password echo is disabled."]}]}, {"id": "IA.L2-3.5.2", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Authenticate System Users", "statement": "Authenticate (or verify) the identities of those users, processes, or devices, as a prerequisite to allowing access to organizational information systems.", "aos": [{"id": "a", "stmt": "The identity of each user is authenticated or verified as a prerequisite to system access", "plain": "Every human user must prove they are who they claim to be before accessing a CUI system. Claiming an identity is identification; proving it is authentication. Authentication must occur before access is granted \u2014 not after, and not only for some access paths.", "questions": ["Show me that user authentication is required before access to CUI systems is granted.", "Demonstrate that a user cannot access a CUI system without providing valid credentials.", "Show me how authentication is enforced at all access paths \u2014 direct login, VPN, and web application.", "Show me that there are no unauthenticated access paths to any CUI system."], "evidence": ["Authentication policy requiring credentials for all CUI system access.", "Technical demonstration that all access points require successful authentication.", "Authentication event audit logs showing authentication was performed for all access.", "Access control configuration showing no anonymous or unauthenticated access is permitted."]}, {"id": "b", "stmt": "The identity of each process acting on behalf of a user is authenticated or verified as a prerequisite to system access", "plain": "Automated processes and service accounts must also authenticate \u2014 not just operate with assumed trust based on their presence on the network. Service accounts must use credentials, certificates, or other authentication mechanisms before they are permitted to access CUI systems.", "questions": ["Show me that automated processes and service accounts authenticate before accessing CUI systems.", "Show me the authentication mechanism used by service accounts \u2014 password, certificate, or token.", "Show me that service accounts cannot access CUI systems without valid credentials.", "Show me how service account credentials are managed \u2014 rotation, storage, expiration."], "evidence": ["Service account configuration showing authentication credentials are required for CUI access.", "Certificate or credential management documentation for automated processes.", "Service account authentication event logs confirming authentication occurs before access.", "Service account credential rotation policy and enforcement records."]}, {"id": "c", "stmt": "The identity of each device accessing or connecting to the system is authenticated or verified as a prerequisite to system access", "plain": "Devices connecting to CUI systems must also authenticate \u2014 not just identify themselves. Device authentication uses certificates, 802.1X EAP methods, or similar mechanisms to verify the device is authorized before it is permitted to connect. Simply knowing a device's MAC address or hostname is identification, not authentication.", "questions": ["Show me how devices authenticate when connecting to CUI networks or systems.", "Show me the device authentication mechanism \u2014 certificate, 802.1X, or other method.", "Show me that devices cannot connect to CUI networks without successful device authentication.", "Show me how device authentication certificates are managed and renewed."], "evidence": ["802.1X or device certificate authentication configuration for CUI network access.", "Device authentication event logs showing successful device authentication before network admission.", "Device certificate management documentation including enrollment and renewal process.", "NAC configuration showing device authentication is required before network access is granted."]}]}, {"id": "IA.L2-3.5.3", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Multifactor Authentication", "statement": "Use multifactor authentication for local and network access to privileged accounts and for network access to non-privileged accounts.", "aos": [{"id": "a", "stmt": "MFA is implemented for local access to privileged accounts", "plain": "Local access to privileged accounts \u2014 where someone is sitting directly at the console of a CUI system with an admin account \u2014 must require MFA, not just a password. A compromised admin password should not be sufficient to gain privileged access even from the local console.", "questions": ["Show me that MFA is required for local access to privileged accounts on CUI systems.", "Show me how MFA is enforced for local console login with administrative credentials.", "Show me whether workstations used for administrative tasks require MFA for local login.", "Show me how this is enforced for both Windows and non-Windows privileged accounts."], "evidence": ["MFA solution configuration showing enforcement for local privileged account logon.", "Windows credential provider or smart card configuration requiring MFA for local admin access.", "PAW (Privileged Access Workstation) configuration documentation including MFA requirements.", "Authentication event logs showing MFA challenges for local privileged account logins."]}, {"id": "b", "stmt": "MFA is implemented for network access to privileged accounts", "plain": "Any network-based access using a privileged account \u2014 RDP, SSH, VPN with admin credentials, management console web login \u2014 must require MFA. Network access with privileged credentials represents elevated risk because remote compromise can affect systems without physical presence.", "questions": ["Show me that MFA is required for network access to privileged accounts.", "Show me MFA enforcement for RDP, SSH, and web-based admin console access.", "Show me that VPN access with privileged credentials requires MFA.", "Show me the MFA logs for recent privileged account network authentication events."], "evidence": ["VPN and remote access MFA configuration showing enforcement for privileged account logon.", "RDP or SSH gateway configuration showing MFA requirement for privileged connections.", "Web-based management console authentication configuration requiring MFA for admin accounts.", "MFA authentication event logs for privileged account network access."]}, {"id": "c", "stmt": "MFA is implemented for network access to non-privileged accounts", "plain": "Standard (non-privileged) user accounts must also use MFA when accessing CUI systems over the network. Password-only authentication for standard users is insufficient for CUI access. This applies to VPN, web application login, and any other network-based access to CUI systems.", "questions": ["Show me that MFA is required for all standard user network access to CUI systems.", "Show me MFA enforcement for non-privileged users connecting via VPN.", "Show me MFA enforcement for standard users accessing CUI web applications.", "Show me the MFA enrollment rate for standard users \u2014 what percentage are enrolled?"], "evidence": ["MFA enrollment report showing all standard users with CUI access are enrolled.", "VPN configuration showing MFA enforcement for all user connections \u2014 not just admins.", "Web application authentication configuration showing MFA required for standard user login.", "MFA exception log confirming no standard users are excluded from MFA for CUI access."]}, {"id": "d", "stmt": "MFA is implemented using at least two authentication factors", "plain": "MFA must use at least two genuinely distinct factors from different categories: something you know (password, PIN), something you have (authenticator app, hardware token, smart card), or something you are (biometric). Two passwords, or a password plus a security question, do not constitute MFA.", "questions": ["Show me the MFA factors in use and confirm they come from at least two different factor categories.", "Show me that your MFA solution cannot be satisfied by two factors from the same category.", "Show me what your users experience during MFA \u2014 what is the second factor?", "Show me whether hardware tokens, authenticator apps, or smart cards are in use."], "evidence": ["MFA solution documentation showing factor types supported and required.", "User MFA enrollment records showing the enrolled second factor type for a sample of users.", "Screenshot of the MFA challenge screen showing the second factor prompt.", "MFA policy documentation specifying acceptable factor combinations."]}]}, {"id": "IA.L2-3.5.4", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Replay-Resistant Authentication", "statement": "Employ replay-resistant authentication mechanisms for network access to privileged and non-privileged accounts.", "aos": [{"id": "a", "stmt": "Replay-resistant authentication mechanisms are implemented for network account access to privileged and non-privileged accounts", "plain": "Authentication mechanisms for privileged network access must be replay-resistant. NTLM pass-the-hash, credential replay, and session token reuse are common attack techniques. Kerberos, certificate-based authentication, and time-based OTP (TOTP) MFA all provide replay resistance.", "questions": ["Show me the authentication protocol used for privileged network access and how it resists replay attacks.", "Show me whether NTLM authentication is still used anywhere for privileged account access.", "Show me that your MFA tokens are time-based or challenge-based \u2014 making captured tokens useless.", "Show me penetration test or assessment results confirming replay resistance of privileged authentication."], "evidence": ["Authentication protocol documentation confirming Kerberos or certificate-based auth for privileged access.", "NTLM disablement configuration or remediation plan showing progress toward eliminating NTLM.", "MFA solution documentation confirming TOTP or challenge-response tokens \u2014 not static codes.", "Security assessment or pen test results confirming resistance to pass-the-hash and replay attacks."]}]}, {"id": "IA.L2-3.5.5", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Identifier Reuse", "statement": "Disable identifiers after a defined inactivity period.", "aos": [{"id": "a", "stmt": "A period within which identifiers cannot be reused is defined", "plain": "Your organization must define a specific inactivity period after which user identifiers are automatically disabled. Common thresholds are 30, 60, or 90 days. The period must be documented in policy and technically configured \u2014 not left to ad hoc review.", "questions": ["Show me your defined inactivity period before an identifier is disabled.", "Show me where this inactivity threshold is documented in policy.", "Show me where it is technically configured in your directory or identity system.", "Show me the rationale for the chosen inactivity threshold."], "evidence": ["Policy document specifying the inactivity threshold for identifier disablement.", "Active Directory or IdP configuration showing the account inactivity threshold setting.", "Process documentation for automated or manual account inactivity review.", "Policy approval records confirming the threshold was reviewed and accepted."]}, {"id": "b", "stmt": "Reuse of identifiers is prevented within the defined period", "plain": "Accounts that have not been used beyond the defined inactivity period must be automatically or promptly manually disabled. The process must be reliable enough that inactive accounts are not left enabled indefinitely due to process failures.", "questions": ["Show me accounts that were disabled in the last review cycle due to inactivity.", "Show me whether the disablement process is automated or requires manual review.", "Show me how service accounts that may not log in frequently are handled.", "Show me the most recent inactivity review report and how many accounts were disabled."], "evidence": ["Recent inactivity review report showing accounts identified and disabled due to exceeding the threshold.", "Automated inactivity detection configuration or manual review process documentation.", "Service account exception process for accounts requiring inactivity threshold exemptions.", "Account disablement logs showing accounts disabled for inactivity with dates."]}]}, {"id": "IA.L2-3.5.6", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Identifier Handling", "statement": "Manage information system identifiers by receiving authorization to assign an identifier before the identifier is assigned, preventing reuse of identifiers for a defined period, and disabling the identifier after a defined inactivity period.", "aos": [{"id": "a", "stmt": "A period of inactivity after which an identifier is disabled is defined", "plain": "Before a new identifier is assigned to a user, process, or device, there must be a documented authorization from an appropriate approving authority. This prevents unauthorized accounts from being created without management knowledge and creates a traceable record of who authorized each identity.", "questions": ["Show me the authorization process that must be completed before a new identifier is assigned.", "Show me an example authorization record for a recently created account.", "Show me who has authority to authorize new identifier assignments.", "Show me how you ensure no accounts are created without going through the authorization process."], "evidence": ["Account provisioning authorization records showing approver, date, and business justification.", "Access request workflow documentation showing authorization is required before provisioning.", "Sample approval record for a recently created user account.", "Identity governance or access management tool configuration enforcing approval workflow."]}, {"id": "b", "stmt": "Identifiers are disabled after the defined period of inactivity", "plain": "Every identifier must be unique \u2014 no two entities should share the same identifier at the same time. Uniqueness enables traceability and accountability. The identity system must technically enforce uniqueness, not just rely on administrators to avoid duplicates.", "questions": ["Show me how your identity system enforces unique identifier assignment.", "Show me that no two current users, processes, or devices share an identifier.", "Show me the naming conventions that support unique identifier assignment.", "Show me a technical demonstration that the system prevents creating duplicate identifiers."], "evidence": ["Directory unique identifier constraint configuration preventing duplicate account creation.", "Identifier naming convention documentation ensuring uniqueness across the user population.", "Audit confirming no duplicate identifiers exist in the current active account base.", "Identity governance system validation showing uniqueness enforcement."]}]}, {"id": "IA.L2-3.5.7", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Password Complexity", "statement": "Enforce a minimum password complexity and change requirements for systems that use password-based authentication.", "aos": [{"id": "a", "stmt": "Password complexity requirements are defined", "plain": "Your organization must have formally defined minimum password complexity requirements \u2014 character types, restrictions, and composition rules. These must be documented in policy, not just implemented in the technical system. Documentation enables consistent application across all systems.", "questions": ["Show me your documented password complexity requirements.", "Show me how complexity requirements are defined for standard users versus privileged users.", "Show me when the complexity requirements were last reviewed against current guidance.", "Show me how complexity requirements apply to all systems \u2014 not just Active Directory."], "evidence": ["Password policy document specifying complexity requirements \u2014 length, character types, restrictions.", "Fine-grained password policy documentation showing different requirements for different account types.", "Policy review records confirming complexity requirements align with current NIST or organizational guidance.", "Complexity requirement application documentation for non-AD systems and applications."]}, {"id": "b", "stmt": "Password change of character requirements are defined", "plain": "Complexity requirements must be technically enforced by the authentication system \u2014 not just stated in policy. If users can set passwords that don't meet the requirements, the requirements are not effectively enforced. Every authentication system must enforce the defined requirements.", "questions": ["Show me that password complexity requirements are technically enforced.", "Show me what happens when a user attempts to set a password that doesn't meet requirements.", "Show me that enforcement applies consistently across Active Directory, applications, and other systems.", "Show me how you verify enforcement hasn't been accidentally disabled or misconfigured."], "evidence": ["Active Directory or IdP password policy configuration confirming complexity enforcement.", "Demonstration that a non-compliant password is rejected with an informative error message.", "Application password validation documentation for CUI applications with independent authentication.", "Password policy compliance report confirming enforcement across all systems."]}, {"id": "c", "stmt": "Minimum password complexity requirements as defined are enforced when new passwords are created", "plain": "Passwords must be checked against known compromised password lists at the time they are set. A password that meets complexity rules but appears in known breach databases should be rejected. NIST SP 800-63B explicitly requires this check. Integrations with HaveIBeenPwned or equivalent services satisfy this.", "questions": ["Show me whether your password system checks new passwords against known compromised password lists.", "Show me the integration or service used for compromised password checking.", "Show me what message users see when they try to set a password that is on the compromised list.", "Show me when this capability was implemented and how it is maintained."], "evidence": ["Compromised password check integration documentation (HaveIBeenPwned API, Azure AD Password Protection).", "Technical configuration showing compromised password checking is enabled.", "User-facing message shown when a compromised password is rejected.", "Maintenance records confirming the compromised password database is kept current."]}, {"id": "d", "stmt": "Minimum password change of character requirements as defined are enforced when new passwords are created", "plain": "A minimum password length must be defined and enforced. NIST SP 800-63B recommends a minimum of 8 characters for memorized secrets, but longer is better. The minimum must be explicitly configured \u2014 not left to system defaults \u2014 and consistently applied.", "questions": ["Show me the minimum password length requirement for your CUI systems.", "Show me that the minimum length is technically enforced.", "Show me how your minimum length compares to current security guidance.", "Show me that the minimum length requirement applies to all systems handling CUI."], "evidence": ["Password policy configuration showing minimum length setting.", "NIST SP 800-63B or organizational guidance showing the basis for the minimum length.", "Technical enforcement verification showing passwords below minimum length are rejected.", "Application password length requirement documentation for CUI applications."]}]}, {"id": "IA.L2-3.5.8", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Password Reuse", "statement": "Prohibit password reuse for a specified number of generations.", "aos": [{"id": "a", "stmt": "The number of generations during which a password cannot be reused is specified", "plain": "Your organization must formally define how many previous passwords a user is prohibited from reusing. A specific number \u2014 such as 12 or 24 generations \u2014 must be documented. 'Recent passwords' is not a defined value and does not satisfy this requirement.", "questions": ["Show me your defined password reuse prohibition period \u2014 how many generations?", "Show me where this is documented in policy.", "Show me how the prohibition number was selected and whether it has been reviewed.", "Show me how the prohibition applies to privileged accounts versus standard accounts."], "evidence": ["Password reuse policy specifying the exact number of generations prohibited.", "Policy review records confirming the defined number is still appropriate.", "Privileged account password reuse policy showing potentially stricter requirements.", "Technical configuration showing the password history count matches the policy definition."]}, {"id": "b", "stmt": "Reuse of passwords is prohibited during the specified number of generations", "plain": "The system must technically remember and reject the defined number of previous passwords when users attempt to change. Password history must be stored securely, and the rejection must occur before the new password is accepted \u2014 not discovered later through a compliance scan.", "questions": ["Show me that the system enforces the defined password reuse prohibition.", "Show me what happens when a user tries to reuse a recent password.", "Show me that enforcement is consistent across all systems and applications handling CUI.", "Show me how you prevent users from gaming the history by rapidly cycling through passwords to get back to a preferred one."], "evidence": ["Active Directory password history configuration showing the enforced history count.", "Demonstration that attempting to reuse a recent password produces a rejection.", "Application password history enforcement for CUI applications with independent authentication.", "Account lockout or rapid-change detection to prevent gaming of password history requirements."]}]}, {"id": "IA.L2-3.5.9", "domain": "IA", "domainFull": "Identification & Authentication", "title": "Temporary Passwords", "statement": "Allow temporary password use for system logons with an immediate change to a permanent password.", "aos": [{"id": "a", "stmt": "An immediate change to a permanent password is required when a temporary password is used for system logon", "plain": "Temporary passwords issued for new accounts, resets, or emergency access must be formally defined as single-use credentials requiring immediate change. This requirement must be explicitly stated in policy and technically enforced \u2014 not left to users to follow voluntarily.", "questions": ["Show me your policy defining temporary passwords as requiring immediate change upon first use.", "Show me how temporary passwords are defined differently from permanent passwords in your policy.", "Show me when temporary passwords expire if not used within a defined period.", "Show me how the immediate change requirement is communicated to users receiving temporary credentials."], "evidence": ["Policy document specifying temporary passwords require immediate change upon first login.", "Help desk password reset procedure documentation confirming temporary credential issuance.", "Temporary password expiration configuration showing unused temporary credentials expire.", "User communication template confirming immediate change requirement is communicated."]}]}, {"id": "IR.L2-3.6.1", "domain": "IR", "domainFull": "Incident Response", "title": "Incident Handling", "statement": "Establish an operational incident-handling capability for organizational systems that includes preparation, detection, analysis, containment, recovery, and user activities.", "aos": [{"id": "a", "stmt": "An operational incident-handling capability is established", "plain": "A formal incident response capability must exist as a real, operational function \u2014 not just a document. This means trained personnel, defined roles, available tools, and tested procedures. 'We would figure it out' is not an incident response capability.", "questions": ["Show me that an operational incident response capability exists \u2014 not just a document.", "Show me the incident response team roster with roles and contact information.", "Show me the tools and resources available to the IR team for investigations.", "Show me evidence the IR capability is actively maintained and not just theoretical."], "evidence": ["Incident Response Plan (IRP) with current version, approval date, and named responsible parties.", "IR team roster with roles, responsibilities, and current contact information.", "IR toolset documentation \u2014 forensic tools, communication platforms, and isolation capabilities.", "Recent IR team activity records \u2014 training, exercises, or actual incident handling."]}, {"id": "b", "stmt": "The operational incident-handling capability includes preparation", "plain": "Preparation is the first phase of incident response and the one most often neglected. Preparation includes training personnel, establishing communication channels, pre-positioning tools, creating response playbooks, and ensuring team members know what to do before an incident occurs.", "questions": ["Show me your incident response preparation activities \u2014 training, playbooks, pre-staged resources.", "Show me your incident response playbooks for common incident types.", "Show me how IR team members are trained and kept current.", "Show me the communication and escalation plan that is ready before an incident occurs."], "evidence": ["IR playbooks or runbooks for common incident scenarios (ransomware, phishing, data exfiltration).", "IR training records showing team members have completed required IR training.", "Pre-staged IR resource inventory \u2014 forensic laptops, network capture tools, isolation scripts.", "Escalation tree and out-of-band communication plan ready for use during an incident."]}, {"id": "c", "stmt": "The operational incident-handling capability includes detection", "plain": "The IR capability must include the ability to detect that an incident has occurred and analyze what happened. Detection means monitoring and alerting. Analysis means triaging alerts, determining severity, identifying affected systems, and understanding the scope of the incident.", "questions": ["Walk me through your detection capability \u2014 how do you know when an incident has occurred?", "Show me your incident triage process from initial alert to declared incident.", "Show me how you determine the scope and severity of a detected incident.", "Show me an example of a recent alert that was analyzed \u2014 what information was gathered?"], "evidence": ["SIEM or monitoring tool configuration showing detection rules and alerting.", "Incident triage procedure documentation with severity classification criteria.", "Incident scope assessment checklist or worksheet used during investigations.", "Example incident analysis record from a real or tabletop exercise showing the investigation process."]}, {"id": "d", "stmt": "The operational incident-handling capability includes analysis", "plain": "Containment stops an active incident from spreading or causing further damage. The IR capability must include defined containment strategies \u2014 network isolation, account disablement, system quarantine \u2014 and the authority and t
