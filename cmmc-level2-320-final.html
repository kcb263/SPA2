all external traffic must pass through and be controlled by your boundary devices.", "Show me how your boundary controls enforce your network communication policy."], "evidence": ["External boundary firewall or UTM configuration documentation showing enforcement.", "Firewall ruleset showing denied-by-default posture with explicit permit rules.", "IDS/IPS blocking configuration at the external boundary.", "Network architecture diagram confirming all external traffic traverses boundary controls."]}, {"id": "f", "stmt": "Communications are controlled at key internal boundaries", "plain": "Key internal network boundaries must also technically control communications \u2014 not just monitor them. Internal firewalls, VLANs with ACLs, and microsegmentation restrict traffic between zones even for traffic originating inside the network.", "questions": ["Show me technical controls at key internal network boundaries controlling traffic between segments.", "Show me internal firewall or ACL configuration restricting traffic between network zones.", "Show me that CUI systems are in a separately controlled segment that enforces access.", "Show me how internal boundary controls prevent unauthorized lateral movement between segments."], "evidence": ["Internal firewall or ACL configuration for internal boundary traffic control.", "Network segmentation documentation showing controlled internal boundaries.", "VLAN configuration with inter-VLAN routing controlled by firewall or ACL.", "Internal boundary control policy documentation."]}, {"id": "g", "stmt": "Communications are protected at the external system boundary", "plain": "The external system boundary must protect communications \u2014 encrypting sensitive traffic, blocking data exfiltration, and hardening boundary devices. Protection goes beyond monitoring and controlling to actively preventing unauthorized disclosure.", "questions": ["Show me how your external boundary protects communications \u2014 not just monitors and controls them.", "Show me encryption enforcement for sensitive traffic crossing the external boundary.", "Show me data loss prevention or exfiltration protection at the external boundary.", "Show me external boundary device hardening documentation."], "evidence": ["External boundary TLS inspection or encryption enforcement configuration.", "DLP or proxy configuration blocking data exfiltration at the external boundary.", "External boundary device hardening checklist and completed documentation.", "External boundary penetration test results showing protection effectiveness."]}, {"id": "h", "stmt": "Communications are protected at key internal boundaries", "plain": "Key internal boundaries must also protect communications \u2014 encrypting sensitive cross-segment traffic and preventing unauthorized data flows between zones. Internal protection limits blast radius when one segment is compromised.", "questions": ["Show me how key internal boundaries protect communications between segments.", "Show me encryption of sensitive traffic crossing internal network boundaries.", "Show me internal data flow controls preventing unauthorized transfers between segments.", "Show me internal boundary device hardening documentation."], "evidence": ["Internal traffic encryption configuration for cross-segment sensitive communications.", "Internal boundary device hardening documentation.", "Internal data flow control configuration preventing unauthorized cross-segment transfers.", "Internal boundary security assessment records."]}]}, {"id": "SC.L2-3.13.10", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Key Management", "statement": "Establish and manage cryptographic keys for cryptography employed in organizational systems.", "aos": [{"id": "a", "stmt": "Cryptographic keys are produced and protected in accordance with applicable key management requirements", "plain": "Cryptographic keys must be generated using approved random number generators and key generation algorithms. Weak key generation produces predictable keys that can be factored or guessed. NIST-approved algorithms and FIPS-validated random number generators ensure key strength.", "questions": ["Show me how cryptographic keys are generated in your environment.", "Show me the key generation algorithm and random number generator used.", "Show me that keys are generated using FIPS-approved methods.", "Show me the key generation process for different key types \u2014 TLS certificates, symmetric keys, signing keys."], "evidence": ["Key generation documentation showing approved algorithms and random number generators.", "FIPS-validated key generation module documentation.", "Certificate generation configuration showing key algorithm and length.", "Key generation process documentation for different cryptographic key types."]}, {"id": "b", "stmt": "Cryptographic keys are distributed in accordance with applicable key management requirements", "plain": "After keys are generated, they must be distributed securely \u2014 not transmitted in clear text, not emailed as plain text, and not shared through insecure channels. Key distribution must protect against interception and ensure keys only reach authorized recipients.", "questions": ["Show me how cryptographic keys are distributed securely.", "Show me the key distribution mechanism \u2014 key wrapping, secure channel, hardware delivery.", "Show me that keys are never transmitted in clear text.", "Show me the process for distributing keys to authorized parties."], "evidence": ["Secure key distribution process documentation.", "Key distribution mechanism documentation \u2014 encrypted key transport or secure channel.", "Key distribution audit records showing authorized recipients.", "Policy prohibiting clear-text key transmission."]}]}, {"id": "SC.L2-3.13.11", "domain": "SC", "domainFull": "System & Comms Protection", "title": "CUI Encryption", "statement": "Employ FIPS-validated cryptography when used to protect the confidentiality of CUI.", "aos": [{"id": "a", "stmt": "FIPS-validated cryptography is employed to protect the confidentiality of CUI", "plain": "When encrypting CUI, the cryptographic module performing the encryption must be FIPS 140-2 or 140-3 validated. This means the specific implementation \u2014 not just the algorithm \u2014 has been tested and validated by NIST. Using AES-256 in a non-FIPS-validated library does not satisfy this for DoD and federal contractors.", "questions": ["Show me that FIPS-validated cryptographic modules are used when encrypting CUI.", "Show me the NIST CMVP certificate or validation evidence for your encryption modules.", "Show me how FIPS validation applies to all CUI encryption \u2014 at rest and in transit.", "Show me how you verify FIPS compliance when selecting new cryptographic tools."], "evidence": ["FIPS 140-2/3 validation certificates or NIST CMVP entries for encryption modules in use.", "Windows FIPS mode configuration for systems encrypting CUI.", "Vendor documentation confirming FIPS-validated cryptographic module is active.", "FIPS compliance verification process for selecting and approving cryptographic tools."]}]}, {"id": "SC.L2-3.13.12", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Collaborative Device Control", "statement": "Prohibit remote activation of collaborative computing devices and provide indication of use to users present at the devices.", "aos": [{"id": "a", "stmt": "Collaborative computing devices are identified", "plain": "Cameras, microphones, and screen-sharing capabilities on collaboration devices must not be remotely activatable without the knowledge of people at the device. In environments where CUI is discussed, secretly activated cameras or microphones create a surveillance risk. Administrative controls and technical configurations must prohibit remote activation.", "questions": ["Show me that remote activation of collaborative computing devices is prohibited.", "Show me the policy and technical controls preventing remote camera and microphone activation.", "Show me how collaboration platforms (Teams, Zoom, Webex) are configured to prevent unauthorized activation.", "Show me how endpoint policies control camera and microphone access."], "evidence": ["Policy prohibiting remote activation of cameras and microphones without user consent.", "Collaboration platform configuration preventing remote activation of audio/video.", "Endpoint management policy controlling camera and microphone access permissions.", "Conference room device configuration documentation preventing unauthorized remote activation."]}, {"id": "b", "stmt": "Collaborative computing devices provide indication to users of devices in use", "plain": "When a collaborative computing device is active \u2014 camera on, microphone recording, screen sharing in progress \u2014 there must be a clear, visible, or audible indication to people present at the device. This ensures people know they are being recorded or observed and can take appropriate action.", "questions": ["Show me what indication is provided to users when collaborative computing devices are active.", "Show me hardware or software indicators on cameras and microphones when active.", "Show me how conference room systems indicate when recording or streaming is in progress.", "Show me testing confirming active device indicators function correctly."], "evidence": ["Hardware LED indicator documentation for cameras showing activity light behavior.", "Software indicator documentation showing on-screen notification when camera or mic is active.", "Conference room system activity indicator configuration.", "Testing records confirming device activity indicators function correctly."]}, {"id": "c", "stmt": "Remote activation of collaborative computing devices is prohibited", "plain": "Collaborative computing devices must have physical or software activity indicators that are not suppressible by the remote party. An LED that lights up when the camera is active, an on-screen notification that appears when mic is recording \u2014 these must be present and function independently of remote control.", "questions": ["Show me the physical and software indicators on collaborative devices in your environment.", "Show me that these indicators cannot be suppressed or disabled by a remote administrator or attacker.", "Show me physical device indicators on cameras, headsets, and conference systems.", "Show me software notification indicators that activate when devices are in use."], "evidence": ["Camera hardware LED documentation confirming indicator is hardware-controlled.", "Software notification configuration for active microphone or camera status.", "Physical device inspection records confirming activity indicators are present and functional.", "Security assessment confirming device indicators cannot be remotely suppressed."]}]}, {"id": "SC.L2-3.13.13", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Mobile Code", "statement": "Control and monitor the use of mobile code.", "aos": [{"id": "a", "stmt": "Use of mobile code is controlled", "plain": "Before allowing mobile code to execute on CUI systems \u2014 JavaScript, ActiveX, Java applets, browser plugins \u2014 acceptable forms must be defined and unacceptable forms identified. Not all mobile code is equally risky. A policy defining what is permitted and prohibited is the foundation for mobile code control.", "questions": ["Show me your mobile code policy defining acceptable and unacceptable forms.", "Show me how acceptable mobile code is defined \u2014 by type, source, or signing requirement.", "Show me what types of mobile code are explicitly prohibited.", "Show me how the policy applies to browser-based code in addition to downloadable applications."], "evidence": ["Mobile code policy defining acceptable types and usage restrictions.", "Acceptable mobile code list with permitted types and conditions.", "Prohibited mobile code list with rationale for each prohibited category.", "Policy scope documentation confirming browser extensions and plugins are addressed."]}, {"id": "b", "stmt": "Use of mobile code is monitored", "plain": "Mobile code execution must be technically controlled \u2014 not just governed by policy. Browser hardening, application allowlisting, and web proxy content filtering are mechanisms that technically enforce mobile code restrictions. Policy without technical enforcement is ineffective.", "questions": ["Show me how mobile code execution is technically controlled on CUI systems.", "Show me browser configuration restricting mobile code execution.", "Show me web proxy or content filtering controls for mobile code.", "Show me how browser extensions and plugins are controlled."], "evidence": ["Browser security configuration policy restricting mobile code execution.", "Web proxy or DNS filtering configuration for mobile code control.", "Browser extension management policy and enforcement documentation.", "Application control coverage of browser-based mobile code."]}]}, {"id": "SC.L2-3.13.14", "domain": "SC", "domainFull": "System & Comms Protection", "title": "VoIP", "statement": "Control and monitor the use of Voice over Internet Protocol (VoIP) technologies.", "aos": [{"id": "a", "stmt": "Use of Voice over Internet Protocol (VoIP) technologies is controlled", "plain": "VoIP usage in environments where CUI is discussed must be governed by documented policies defining what VoIP systems are authorized, what security requirements apply, and what restrictions are placed on VoIP use. Consumer VoIP apps on personal phones are very different from enterprise VoIP systems with security controls.", "questions": ["Show me your VoIP usage policy and what it covers.", "Show me what VoIP systems are authorized for use in CUI environments.", "Show me what restrictions apply to VoIP calls involving CUI discussions.", "Show me how the policy addresses consumer VoIP applications on personal devices."], "evidence": ["VoIP usage policy defining authorized systems and applicable restrictions.", "Authorized VoIP system list with security requirements documentation.", "VoIP restrictions for discussions involving CUI.", "Policy coverage of consumer VoIP applications on personal devices."]}, {"id": "b", "stmt": "Use of Voice over Internet Protocol (VoIP) technologies is monitored", "plain": "VoIP usage must be technically controlled \u2014 authorized systems must be properly configured with encryption and access controls, and unauthorized VoIP applications must be blocked. Uncontrolled VoIP can become an exfiltration channel or eavesdropping vulnerability.", "questions": ["Show me how VoIP usage is technically controlled in your environment.", "Show me VoIP system encryption configuration (SRTP for media, TLS for signaling).", "Show me how unauthorized VoIP applications are blocked.", "Show me VoIP access control \u2014 who can make and receive calls, and how accounts are managed."], "evidence": ["VoIP system encryption configuration \u2014 SRTP and TLS documentation.", "Network or endpoint controls blocking unauthorized VoIP applications.", "VoIP user account management and access control documentation.", "Authorized VoIP system security configuration documentation."]}]}, {"id": "SC.L2-3.13.15", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Communications Authenticity", "statement": "Protect the authenticity of communications sessions.", "aos": [{"id": "a", "stmt": "The authenticity of communications sessions is protected", "plain": "Mechanisms must be implemented to protect the authenticity of communication sessions \u2014 ensuring that sessions cannot be hijacked and that parties in a communication are who they claim to be. TLS with proper certificate validation, mutual authentication, and anti-spoofing controls address session authenticity.", "questions": ["Show me the mechanisms implemented to protect communication session authenticity.", "Show me TLS implementation with proper certificate validation for CUI communications.", "Show me anti-spoofing controls protecting email and other communications.", "Show me session token security for web applications handling CUI."], "evidence": ["TLS configuration documentation with certificate validation requirements.", "Anti-spoofing control documentation \u2014 SPF, DKIM, DMARC for email.", "Web application session token security configuration (HttpOnly, Secure, SameSite flags).", "Mutual TLS documentation for high-value system-to-system communications."]}]}, {"id": "SC.L2-3.13.16", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Data at Rest", "statement": "Protect the confidentiality of CUI at rest.", "aos": [{"id": "a", "stmt": "The confidentiality of CUI at rest is protected", "plain": "CUI stored on any system \u2014 servers, workstations, databases, file shares, backups \u2014 must be protected at rest using cryptographic mechanisms. Full-disk encryption, database encryption (TDE), and encrypted file shares ensure that unauthorized access to storage media does not result in CUI exposure.", "questions": ["Show me how CUI is protected at rest using cryptographic mechanisms.", "Show me full-disk encryption deployment on servers and workstations handling CUI.", "Show me database encryption for databases storing CUI.", "Show me file share encryption or access protection for CUI stored in file systems."], "evidence": ["Full-disk encryption deployment documentation and compliance report.", "Database Transparent Data Encryption (TDE) configuration.", "File share encryption or access control documentation for CUI file storage.", "Encryption coverage documentation confirming all CUI storage locations are protected."]}]}, {"id": "SC.L2-3.13.2", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Security Engineering", "statement": "Employ architectural designs, software development techniques, and systems engineering principles that promote effective information security within organizational systems.", "aos": [{"id": "a", "stmt": "Security requirements are identified", "plain": "Security must be designed into systems from the beginning \u2014 not added as an afterthought. This means security requirements are part of system acquisition specifications, security is reviewed during design, and security architecture decisions are made deliberately rather than by default.", "questions": ["Show me how security is integrated into your system development and acquisition lifecycle.", "Show me where security requirements appear in your procurement or development process.", "Show me how security reviews occur during system design \u2014 not just at deployment.", "Show me a recent system acquisition that incorporated security requirements from the outset."], "evidence": ["SDLC or acquisition lifecycle documentation showing security integration points.", "Security requirements in procurement specifications or RFPs.", "Security architecture review records during system design phase.", "Recent acquisition documentation showing security requirements were specified."]}, {"id": "b", "stmt": "Security requirements are allocated to information system components", "plain": "Architectural designs must actively promote security \u2014 using principles like defense in depth, least privilege, fail-safe defaults, and separation of privilege. A system design that ignores these principles and relies entirely on perimeter security is architecturally insecure.", "questions": ["Show me the secure design principles that guide your architectural decisions.", "Show me how defense in depth is reflected in your system architecture.", "Show me how fail-safe defaults and least privilege are incorporated into system designs.", "Show me a security architecture review that evaluated a system against these principles."], "evidence": ["Secure design principles documentation guiding architectural decisions.", "Architecture documentation showing defense in depth implementation.", "Security architecture review records evaluating designs against secure principles.", "System design documentation showing least privilege and fail-safe defaults incorporated."]}, {"id": "c", "stmt": "Security engineering principles are applied in the specification of the system", "plain": "When new systems are acquired or major enhancements are made, security requirements must be formally specified before the work begins. Retrofitting security into a completed system is expensive and often incomplete. Requirements specified upfront are built in rather than bolted on.", "questions": ["Show me how security requirements are specified for new systems or major enhancements.", "Show me where security requirements appear in project initiation or acquisition documentation.", "Show me who is responsible for defining and reviewing security requirements.", "Show me a recent example of security requirements specified for a new system."], "evidence": ["Security requirements specification process documentation.", "Security requirements section in recent project or acquisition documents.", "Security requirements review records showing qualified personnel reviewed the requirements.", "Post-implementation security review confirming requirements were met."]}, {"id": "d", "stmt": "Security engineering principles are applied in the design of the system", "plain": "Communications at key internal network boundaries must be monitored to detect anomalous or unauthorized traffic \u2014 providing visibility into lateral movement and east-west threats.", "questions": ["Show me how communications at key internal boundaries are monitored.", "Show me your internal network monitoring tools and their placement.", "Show me how east-west traffic between segments is observed.", "Show me alerting for anomalous traffic crossing internal network boundaries."], "evidence": ["Internal network monitoring tool deployment and configuration.", "Internal boundary traffic monitoring and alert configuration.", "SIEM integration with internal network monitoring data.", "Anomaly detection configuration for internal boundary traffic."]}, {"id": "e", "stmt": "Security engineering principles are applied in the development of the system", "plain": "Communications at the external system boundary must be technically controlled \u2014 firewalls, IDS/IPS, and proxies enforce what traffic is permitted entering and leaving the network.", "questions": ["Show me technical controls at your external system boundary.", "Show me firewall or UTM configuration controlling external boundary traffic.", "Show me IDS/IPS deployment at the external boundary.", "Show me that all external traffic is subject to inspection and control."], "evidence": ["External boundary firewall or UTM configuration documentation.", "IDS/IPS deployment and rule configuration at the external boundary.", "External traffic control policy showing permitted and denied traffic.", "External boundary device hardening documentation."]}, {"id": "f", "stmt": "Security engineering principles are applied in the implementation of the system", "plain": "Communications at key internal boundaries must also be technically controlled \u2014 not just monitored. Internal segmentation firewalls and ACLs restrict traffic between network zones.", "questions": ["Show me technical controls at key internal network boundaries.", "Show me internal firewall or ACL configuration controlling traffic between segments.", "Show me that CUI systems are in a separately controlled network segment.", "Show me how internal boundary controls prevent unauthorized lateral movement."], "evidence": ["Internal firewall or ACL configuration for boundary traffic control.", "Network segmentation documentation showing controlled internal boundaries.", "VLAN or microsegmentation configuration controlling internal traffic flows.", "Internal boundary control testing records."]}]}, {"id": "SC.L2-3.13.3", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Role Separation", "statement": "Separate user functionality from system management functionality.", "aos": [{"id": "a", "stmt": "User functionality is identified", "plain": "User-facing functionality must be architecturally separated from system management and administrative functions. End users accessing applications should not be in the same network context, session, or interface as administrators managing those systems. Separation limits the impact of user-side compromises on management infrastructure.", "questions": ["Show me how user functionality is separated from system management functionality in your architecture.", "Show me the network separation between user access paths and administrative access paths.", "Show me that administrative interfaces are not accessible from the general user network.", "Show me how an application user cannot reach the administrative console of that application."], "evidence": ["Network architecture diagram showing user and management network separation.", "Administrative network or VLAN documentation separate from user-accessible networks.", "Application configuration showing admin console is not accessible from the user-facing network.", "Firewall or ACL rules preventing user network access to management interfaces."]}, {"id": "b", "stmt": "System management functionality is identified", "plain": "System management interfaces \u2014 server consoles, network device management, security tool administration \u2014 must be protected from access by general users. Requiring use of a dedicated management network, jump server, or privileged access workstation achieves this protection.", "questions": ["Show me how system management interfaces are protected from general user access.", "Show me the jump server or management network controls protecting management interfaces.", "Show me that a standard user cannot reach management interfaces of CUI systems.", "Show me how management interface access is restricted to authorized administrative accounts."], "evidence": ["Jump server or management network configuration protecting system management interfaces.", "Firewall rules blocking user network access to management ports and interfaces.", "Administrative access control list for system management interfaces.", "Technical demonstration that a standard user account cannot reach system management consoles."]}, {"id": "c", "stmt": "User functionality is separated from system management functionality", "plain": "User functionality and system management functionality must be verified as actually separated in practice \u2014 not just architecturally intended. Technical testing confirms the separation is real and effective.", "questions": ["Show me that user functionality is actually separated from system management in practice.", "Show me a technical demonstration that a user account cannot access management interfaces.", "Show me management network or interface isolation enforcing this separation.", "Show me testing or assessment results confirming the separation is effective."], "evidence": ["Technical demonstration showing user accounts cannot access management interfaces.", "Management network isolation documentation and network diagram.", "Access control configuration restricting management interfaces to admin accounts.", "Security assessment results confirming user/management functional separation."]}]}, {"id": "SC.L2-3.13.4", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Shared Resource Control", "statement": "Prevent unauthorized and unintended information transfer via shared system resources.", "aos": [{"id": "a", "stmt": "Unauthorized and unintended information transfer via shared system resources is prevented", "plain": "When systems share resources \u2014 memory, storage, processing, network buffers \u2014 controls must prevent one user or process from accessing data left behind by another. OS-level process isolation, hypervisor VM separation, and proper session management all contribute to shared resource control.", "questions": ["Show me how shared system resources are controlled to prevent unauthorized information transfer.", "Show me OS-level process and memory isolation controls.", "Show me hypervisor controls isolating VMs in shared infrastructure.", "Show me how shared network resources are controlled to prevent data leakage."], "evidence": ["OS process isolation configuration documentation.", "Hypervisor VM isolation configuration for shared compute infrastructure.", "Shared storage access control documentation preventing cross-tenant data access.", "Network isolation controls preventing shared network resource exploitation."]}]}, {"id": "SC.L2-3.13.5", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Public-Access System Separation", "statement": "Implement subnetworks for publicly accessible system components that are physically or logically separated from internal networks.", "aos": [{"id": "a", "stmt": "Publicly accessible system components are identified", "plain": "Any system component that faces the internet or is publicly accessible must be placed in a separate subnetwork \u2014 a DMZ \u2014 physically or logically isolated from the internal CUI network. If an internet-facing component is compromised, the DMZ isolation prevents the attacker from directly reaching CUI systems.", "questions": ["Show me that publicly accessible system components are placed in separate subnetworks.", "Show me your DMZ architecture and what systems reside in it.", "Show me the separation between your DMZ and internal CUI networks.", "Show me firewall rules controlling traffic between the DMZ and internal networks."], "evidence": ["Network architecture diagram showing DMZ containing public-facing components.", "DMZ component inventory listing all systems placed in the DMZ.", "Firewall configuration between DMZ and internal CUI network.", "Penetration test or network assessment results confirming DMZ isolation."]}, {"id": "b", "stmt": "Subnetworks for publicly accessible system components are physically or logically separated from internal networks", "plain": "The DMZ subnetwork must be physically or logically separated from internal networks \u2014 not just on a different VLAN with permissive routing between them. The separation must create a meaningful security boundary where traffic between the DMZ and internal networks is inspected and controlled.", "questions": ["Show me the physical or logical separation mechanism between your DMZ and internal CUI network.", "Show me that a compromised DMZ host cannot directly reach internal CUI systems.", "Show me the firewall or security device between DMZ and internal network.", "Show me penetration test results validating the DMZ separation is effective."], "evidence": ["Physical or logical separation documentation \u2014 separate switches, VLANs with inter-VLAN firewall.", "Firewall rule set showing traffic between DMZ and internal network is controlled and inspected.", "Penetration test report confirming DMZ compromise does not provide direct CUI access.", "Network diagram showing the security device sitting between DMZ and internal segments."]}]}, {"id": "SC.L2-3.13.6", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Network Communication by Exception", "statement": "Deny network communications traffic by default and allow network communications traffic by exception.", "aos": [{"id": "a", "stmt": "Network communications traffic is denied by default", "plain": "Your network firewall default posture must be to deny all traffic that is not explicitly permitted. This means the last rule in every firewall ruleset should be an explicit 'deny all' \u2014 not an implicit allow or a missing rule. Deny-by-default means unexpected traffic is blocked without requiring a specific block rule.", "questions": ["Show me that your network firewall is configured with a deny-by-default posture.", "Show me the default deny rule at the end of your firewall rulesets.", "Show me how you verify the deny-by-default configuration is maintained over time.", "Show me how traffic that doesn't match any permit rule is handled."], "evidence": ["Firewall configuration showing explicit deny-all rule at the end of each ruleset.", "Firewall management policy confirming deny-by-default approach.", "Periodic firewall rule review records confirming default-deny is maintained.", "Firewall log showing denied traffic for connections that matched the default deny rule."]}, {"id": "b", "stmt": "Network communications traffic is allowed by exception", "plain": "Every permit rule in your firewall must be justified by a documented business need. Permit rules that exist because 'someone asked for it a long time ago' without current justification represent unnecessary attack surface. A formal rule review process removes unjustified permits.", "questions": ["Show me the process for approving new firewall permit rules.", "Show me how existing rules are periodically reviewed and unjustified rules removed.", "Show me documentation justifying existing permit rules.", "Show me a recent example of a permit rule that was removed during a review."], "evidence": ["Firewall rule approval process documentation requiring business justification.", "Recent firewall rule review records showing rules evaluated and unjustified ones removed.", "Firewall rule documentation showing business justification for active permit rules.", "Removed rule records from recent firewall reviews."]}]}, {"id": "SC.L2-3.13.7", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Split Tunneling", "statement": "Prevent remote devices from simultaneously establishing non-remote connections with organizational systems and communicating via some other connection to resources in external networks.", "aos": [{"id": "a", "stmt": "Remote devices are prevented from simultaneously establishing non-remote connections with the system and communicating via some other connection to resources in external networks (i.e., split tunneling)", "plain": "When remote users connect via VPN, all their internet and network traffic must flow through the VPN tunnel to the corporate network \u2014 not directly to the internet from their local connection. Split tunneling, which routes some traffic through VPN and some directly out the local internet, creates a security gap.", "questions": ["Show me that split tunneling is disabled on your VPN for remote users accessing CUI systems.", "Show me your VPN configuration confirming full-tunnel mode is enforced.", "Show me how you technically verify that split tunneling cannot be enabled by end users.", "Show me a network trace or routing table from a connected VPN session confirming all traffic routes through the tunnel."], "evidence": ["VPN configuration documentation showing full-tunnel mode is enforced.", "VPN client configuration showing split tunneling is disabled and not user-configurable.", "Network routing table from a connected VPN session showing default route through VPN.", "VPN management policy documentation requiring full-tunnel configuration."]}]}, {"id": "SC.L2-3.13.8", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Data in Transit", "statement": "Implement cryptographic mechanisms to prevent unauthorized disclosure of CUI during transmission unless otherwise protected by alternative physical safeguards.", "aos": [{"id": "a", "stmt": "Cryptographic mechanisms intended to prevent unauthorized disclosure of CUI are identified", "plain": "CUI must be encrypted whenever it is transmitted \u2014 over internal networks, external connections, wireless, or any other transmission medium. TLS for web applications and APIs, VPN for network connections, SFTP for file transfers, and S/MIME for email are common implementations.", "questions": ["Show me that CUI is encrypted during transmission across your network.", "Show me TLS enforcement for web applications and APIs that transmit CUI.", "Show me that internal CUI transmission is also encrypted \u2014 not just internet-facing traffic.", "Show me encryption for file transfers and email containing CUI."], "evidence": ["TLS configuration for CUI-transmitting web applications and APIs.", "Internal network encryption documentation for CUI system communications.", "File transfer protocol documentation confirming SFTP or FTPS replaces FTP.", "Email encryption documentation for CUI transmission via email."]}, {"id": "b", "stmt": "Alternative physical safeguards intended to prevent unauthorized disclosure of CUI are identified", "plain": "The cryptographic mechanisms protecting CUI in transit must meet applicable standards \u2014 specifically FIPS 140-2 or 140-3 validated implementations for DoD and federal contractors, with TLS 1.2 or higher and approved cipher suites. Deprecated protocols like SSL and TLS 1.0 are not acceptable.", "questions": ["Show me that cryptographic mechanisms for CUI transmission meet applicable standards.", "Show me your TLS configuration confirming minimum version and approved cipher suites.", "Show me FIPS validation status for cryptographic implementations used in transmission.", "Show me how deprecated protocols are prohibited and detected."], "evidence": ["TLS configuration showing minimum TLS 1.2 with FIPS-approved cipher suites.", "FIPS validation documentation for cryptographic modules used in transmission.", "SSL/TLS scan results confirming deprecated protocols are disabled.", "Configuration prohibiting SSL, TLS 1.0, and weak cipher suites."]}, {"id": "c", "stmt": "Either cryptographic mechanisms or alternative physical safeguards are implemented to prevent unauthorized disclosure of CUI during transmission", "plain": "Unencrypted protocols for CUI transmission \u2014 plain HTTP, FTP, Telnet, SNMP v1/v2 for sensitive management \u2014 must be prohibited and technically blocked. Simply having an encryption option doesn't satisfy this requirement if the unencrypted version is also permitted and in use.", "questions": ["Show me that transmission of CUI over unencrypted channels is technically prohibited.", "Show me that HTTP is redirected to HTTPS and plain HTTP to CUI resources is blocked.", "Show me that unencrypted file transfer protocols are not available for CUI transmission.", "Show me network controls that block unencrypted transmission protocols."], "evidence": ["HTTP to HTTPS redirect configuration for all CUI web applications.", "Network firewall or proxy rules blocking unencrypted FTP, Telnet, and HTTP for CUI resources.", "Protocol audit confirming unencrypted protocols are not in use for CUI transmission.", "Configuration standards explicitly prohibiting unencrypted transmission protocols."]}]}, {"id": "SC.L2-3.13.9", "domain": "SC", "domainFull": "System & Comms Protection", "title": "Connections Termination", "statement": "Terminate network connections associated with communications sessions at the end of the sessions or after a defined period of inactivity.", "aos": [{"id": "a", "stmt": "A period of inactivity to terminate network connections associated with communications sessions is defined", "plain": "Network connections to CUI systems must be automatically terminated after a defined period of inactivity. Idle TCP connections, database connections, and API sessions that remain open indefinitely create risk. Idle session termination at the network level provides a safety net beyond application-level timeouts.", "questions": ["Show me how network connections to CUI systems are terminated after defined inactivity.", "Show me the idle timeout configuration on your firewalls and load balancers.", "Show me VPN session idle timeout configuration.", "Show me that idle connection termination is configured at the network device level."], "evidence": ["Firewall connection state timeout configuration.", "Load balancer idle connection timeout settings.", "VPN idle session termination configuration.", "Network device session timeout documentation and testing records."]}, {"id": "b", "stmt": "Network connections associated with communications sessions are terminated at the end of the sessions", "plain": "Network connections must also be terminated at the end of a communication session \u2014 when the work is done. Sessions that persist indefinitely after normal completion are a security risk. Both application-layer session termination and network-layer connection cleanup should occur on session completion.", "questions": ["Show me how network connections are terminated at the end of a session.", "Show me that web application sessions terminate the underlying network connection properly.", "Show me how VPN connections are closed when a user completes their work session.", "Show me network connection lifecycle monitoring confirming sessions close on completion."], "evidence": ["Web application session termination configuration showing server-side session destruction.", "VPN session completion and termination process documentation.", "Network connection lifecycle monitoring showing proper session teardown.", "Testing records confirming network connections terminate on session completion."]}, {"id": "c", "stmt": "Network connections associated with communications sessions are terminated after the defined period of inactivity", "plain": "Network connections associated with communication sessions must be terminated when the session ends \u2014 not persisted indefinitely. TCP connections, authenticated sessions, and stateful connections should have defined lifecycles.", "questions": ["Show me how network connections are terminated at the end of communication sessions.", "Show me session termination enforcement for CUI system communications.", "Show me that completed sessions do not persist as open connections.", "Show me network device configuration for session and connection lifecycle management."], "evidence": ["Network device connection state timeout configuration.", "Application session termination and connection closure documentation.", "Network monitoring showing connection lifecycle is properly managed.", "Testing records confirming connections terminate when sessions end."]}]}, {"id": "SI.L2-3.14.1", "domain": "SI", "domainFull": "System & Info Integrity", "title": "Flaw Remediation", "statement": "Identify, report, and correct information system flaws; test software and firmware updates related to flaw remediation for effectiveness and potential side effects before installation; install security-relevant software updates within a defined time period of the release of the updates.", "aos": [{"id": "a", "stmt": "The time within which to identify system flaws is specified", "plain": "Security vulnerabilities in software, firmware, and systems must be identified through systematic means \u2014 vulnerability scanning, security advisories, vendor notifications, and threat intelligence. Relying only on vendor notifications or waiting until a vulnerability is actively exploited is insufficient.", "questions": ["Show me how system flaws and vulnerabilities are systematically identified.", "Show me your vulnerability identification sources \u2014 scanners, advisories, threat intel.", "Show me how software vulnerabilities are tracked when first identified.", "Show me how you identify vulnerabilities in custom-developed or third-party software."], "evidence": ["Vulnerability identification process documentation showing multiple identification sources.", "Vulnerability scanning configuration for continuous flaw identification.", "Subscription to vendor security advisories and threat intelligence feeds.", "Vulnerability tracking log showing newly identified flaws from various sources."]}, {"id": "b", "stmt": "System flaws are identified within the specified time frame", "plain": "Identified flaws and vulnerabilities must be reported to designated personnel who can assess and act on them. A vulnerability that is identified by a scanner but never brought to anyone's attention provides no value. Reporting ensures the right people know about vulnerabilities in time to address them.", "questions": ["Show me how identified flaws are reported to designated personnel.", "Show me who receives vulnerability reports and what their response responsibilities are.", "Show me how critical vulnerabilities trigger escalated or expedited reporting.", "Show me the vulnerability reporting process from identification to notification."], "evidence": ["Vulnerability reporting process documentation with designated recipient roles.", "Vulnerability notification records showing flaws were reported to responsible parties.", "Escalation process for critical and zero-day vulnerabilities.", "Vulnerability management tool configuration showing automated notification to responsible personnel."]}, {"id": "c", "stmt": "The time within which to report system flaws is specified", "plain": "Security patches and updates must be tested before deployment to production systems. Testing verifies that patches function correctly, do not break existing functionality, and do not introduce new issues. Untested patches applied directly to production can cause outages or introduce new vulnerabilities.", "questions": ["Show me your patch testing process before production deployment.", "Show me the test environment used for patch validation.", "Show me patch test records from recent patch cycles.", "Show me how you handle urgent patches when full testing may not be feasible."], "evidence": ["Patch testing process documentation with test environment specifications.", "Test environment documentation showing it mirrors production for patch validation.", "Patch test records showing testing was completed before production deployment.", "Expedited patch process for urgent vulnerabilities with enhanced post-deployment monitoring."]}, {"id": "d", "stmt": "System flaws are reported within the specified time frame", "plain": "Security-relevant software updates must be installed within defined timeframes based on severity. Critical patches require faster deployment than low-severity updates. Defined SLAs ensure patches are not indefinitely deferred. The SLA must be defined in policy and tracked for compliance.", "questions": ["Show me your defined patch installation timelines by severity.", "Show me evidence that patches are installed within the defined timelines.", "Show me your patch compliance reporting showing adherence to SLAs.", "Show me the escalation process for patches approaching their SLA deadline."], "evidence": ["Patch management SLA policy with defined timelines by severity.", "Patch compliance report showing patches applied within defined timelines.", "Patch deployment records with installation dates compared to SLA requirements.", "SLA breach escalation records and remediation actions for missed patch deadlines."]}, {"id": "e", "stmt": "The time within which to correct system flaws is specified", "plain": "Flaw remediation must be tracked from discovery through verified closure. An identified vulnerability that is assigned to someone without tracking and follow-up may never actually be remediated. A managed tracking process ensures remediation occurs and provides audit evidence.", "questions": ["Show me how flaw remediation is tracked from discovery to verified closure.", "Show me your vulnerability tracking system and current open items.", "Show me the verification process confirming that remediation was actually effective.", "Show me how long the oldest unresolved vulnerability has been open."], "evidence": ["Vulnerability tracking system with open and closed remediation records.", "Post-remediation scan or test records confirming vulnerability was eliminated.", "Vulnerability aging report showing open items by age and severity.", "Remediation closure process requiring verification before items are marked resolved."]}, {"id": "f", "stmt": "System flaws are corrected within the specified time frame", "plain": "System flaws must be corrected within the time frames defined in policy. Tracking remediation to verified closure within SLA timeframes \u2014 not just initiation \u2014 demonstrates compliance.", "questions": ["Show me that system flaws are corrected within the specified time frames.", "Show me your defined remediation time frames by flaw severity.", "Show me evidence that recent flaws were corrected within the required time frame.", "Show me how you handle flaws that cannot be corrected within the defined time frame."], "evidence": ["Flaw remediation SLA policy with defined correction time frames by severity.", "Remediation tracking records showing flaws corrected within required time frames.", "Post-remediation verification records confirming flaw correction.", "Exception process for flaws requiring time frame extension with compensating controls."]}]}, {"id": "SI.L2-3.14.2", "domain": "SI", "domainFull": "System & Info Integrity", "title": "Malicious Code Protection", "statement": "Provide protection from malicious code at appropriate locations within organizational systems.", "aos": [{"id": "a", "stmt": "Multifactor authentication is used to establish nonlocal maintenance sessions via external network connections", "plain": "Malicious code protection mechanisms \u2014 antivirus, EDR, anti-malware \u2014 must be deployed at multiple appropriate locations: endpoints, email gateways, web proxies, and file servers. Defense in depth means catching malicious code at every possible entry point, not just on endpoints.", "questions": ["Show me where malicious code protection mechanisms are deployed in your environment.", "Show me protection at email gateways in addition to endpoints.", "Show me web proxy or DNS filtering for malicious code protection.", "Show me how file servers hosting CUI are protected against malicious code."], "evidence": ["Endpoint protection deployment coverage report showing all managed endpoints.", "Email mes.", "Update deployment records showing recent protection releases were applied promptly.", "Vendor update notification subscription documentation.", "Protection currency monitoring showing compliance with update timelines."]}]}, {"id": "SI.L2-3.14.5", "domain": "SI", "domainFull": "System & Info Integrity", "title": "System & File Scanning", "statement": "Perform periodic scans of organizational systems and real-time scans of files from external sources as files are downloaded, opened, or executed.", "aos": [{"id": "a", "stmt": "The frequency for malicious code scans is defined", "plain": "Full system scans for malicious code must be performed periodically on CUI systems \u2014 not just at the time of initial deployment. Scheduled scans catch malware that was missed by real-time protection, dormant threats, and code that became malicious after whitelisting. Scan frequency must be defined and evidence of completion maintained.", "questions": ["Show me your periodic scanning schedule and recent scan execution records.", "Show me what systems are included in periodic scans.", "Show me that periodic scan results are reviewed.", "Show me how you respond to malware detected during a periodic scan."], "evidence": ["Periodic scan schedule configuration showing frequency and scope.", "Recent periodic scan completion records and results.", "Scan result review process and records.", "Response procedure for malware detected during periodic \u2014 not real-time \u2014 scanning."]}, {"id": "b", "stmt": "Malicious code scans are performed with the defined frequency", "plain": "Files from external sources \u2014 downloaded from the internet, received via email, transferred from external media \u2014 must be scanned in real time as they are accessed, downloaded, or executed. Real-time scanning catches threats at the point of introduction before they can propagate.", "questions": ["Show me your real-time scanning configuration for files from external sources.", "Show me that files are scanned on download from the internet.", "Show me that email attachments are scanned before delivery to users.", "Show me that files from external media are scanned before execution."], "evidence": ["Real-time protection configuration showing on-access scanning for all file operations.", "Email gateway scanning configuration for attachments before delivery.", "Download scanning configuration in web proxy or endpoint protection.", "External media scanning requirement documentation and technical enforcement."]}, {"id": "c", "stmt": "Real-time malicious code scans of files from external sources as files are downloaded, opened, or executed are performed", "plain": "Real-time scanning of files from external sources must occur as files are downloaded, opened, or executed. Files arriving via email, web download, external media, or file transfer must be scanned at the point of access.", "questions": ["Show me real-time scanning of files from external sources as they are accessed.", "Show me scanning occurs at download, email delivery, and upon opening external files.", "Show me that external media files are scanned before execution.", "Show me that real-time scanning applies regardless of the file's external source."], "evidence": ["Real-time protection configuration showing on-access scanning for external file sources.", "Email gateway scanning ensuring attachments are scanned before delivery.", "Web download scanning configuration in endpoint protection or proxy.", "External media file scanning enforcement documentation."]}]}, {"id": "SI.L2-3.14.6", "domain": "SI", "domainFull": "System & Info Integrity", "title": "Monitor Organizational Systems", "statement": "Monitor organizational systems to detect attacks and indicators of potential attacks in accordance with monitoring objectives.", "aos": [{"id": "a", "stmt": "The system is monitored to detect attacks and indicators of potential attacks", "plain": "System monitoring must be implemented with defined objectives \ , "Monitoring objectives review records showing periodic update."]}, {"id": "c", "stmt": "Outbound communications traffic is monitored to detect attacks and indicators of potential attacks", "plain": "Monitoring results must be analyzed and acted upon. Monitoring that generates alerts nobody investigates is security theater. A defined analysis process, alert triage procedures, and documented response workflows ensure monitoring drives security improvement rather than just generating data.", "questions": ["Show me how monitoring results are analyzed and acted upon.", "Show me your alert triage process and who is responsible for investigating alerts.", "Show me examples of monitoring alerts that were investigated and acted upon.", "Show me how monitoring findings feed into your incident response process."], "evidence": ["Alert triage process documentation with severity levels and response procedures.", "Monitoring alert investigation records showing analysis and disposition.", "Examples of monitoring findings that triggered incident response or remediation.", "Monitoring finding to incident response handoff process documentation."]}]}, {"id": "SI.L2-3.14.7", "domain": "SI", "domainFull": "System & Info Integrity", "title": "Identify Unauthorized Use", "statement": "Identify unauthorized use of organizational systems.", "aos": [{"id": "a", "stmt": "Authorized use of the system is defined", "plain": "Your organization must be able to identify when CUI systems are being used in unauthorized ways \u2014 not just detect unauthorized access, but detect authorized users misusing their access. User behavior analytics, baseline profiling, and anomaly detection identify unusual patterns that traditional access controls cannot prevent.", "questions": ["Show me how unauthorized use of CUI systems is identified.", "Show me behavioral monitoring capabilities that detect anomalous usage by authorized users.", "Show me the indicators of unauthorized use that your monitoring looks for const TOTAL=320;
const DC={"AC": "#58a6ff", "AT": "#ff7b72", "AU": "#ffa657", "CA": "#7ee787", "CM": "#e3b341", "IA": "#d2a8ff", "IR": "#79c0ff", "MA": "#56d364", "MP": "#ffa657", "PE": "#a5d6ff", "PS": "#f0883e", "RA": "#ff7b72", "SC": "#56d364", "SI": "#f78166"};
const TOTAL=333;
let dom="ALL",srch="",cc=null,ca=null;
let CF={};
try{CF=JSON.parse(localStorage.getItem("cmmc_cf_v3")||"{}")}catch(e){}
function saveC(){try{localStorage.setItem("cmmc_cf_v3",JSON.stringify(CF))}catch(e){}}
function dc(d){return DC[d]||"#58a6ff"}

// Build tabs
const te=document.getElementById("tabs");
[...new Set(C.map(c=>c.domain))].forEach(d=>{
  const t=document.createElement("div");t.className="tab";t.textContent=d;
  t.onclick=()=>setD(d,t);te.appendChild(t);
});
function setD(d,el){dom=d;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));el.classList.add("on");render();}
function fil(){srch=document.getElementById("srch").value.toLowerCase();render();}

function gf(){return C.filter(c=>{
  const dm=dom==="ALL"||c.domain===dom;
  const s=!srch||c.id.toLowerCase().includes(srch)||c.title.toLowerCase().includes(srch)||
    c.domain.toLowerCase().includes(srch)||c.aos.some(a=>a.stmt.toLowerCase().includes(srch));
  return dm&&s;
});}

function confScore(ctrl){
  const total=ctrl.aos.length;
  const good=ctrl.aos.filter(a=>CF[ctrl.id+"-"+a.id]==="good").length;
  const needs=ctrl.aos.filter(a=>CF[ctrl.id+"-"+a.id]==="needs").length;
  return {total,good,needs};
}

function render(){
  const f=gf();
  document.getElementById("cntBadge").textContent=f.length+" control"+(f.length!==1?"s":"");
  const totalConf=C.reduce((s,c)=>s+c.aos.filter(a=>CF[c.id+"-"+a.id]==="good").length,0);
  const totalRev=C.reduce((s,c)=>s+c.aos.filter(a=>CF[c.id+"-"+a.id]).length,0);
  document.getElementById("prog").textContent=totalConf+"/"+TOTAL+" confident · "+totalRev+" reviewed";
  document.getElementById("lv").innerHTML=f.map(c=>{
    const col=dc(c.domain);
    const {total,good,needs}=confScore(c);
    const pct=Math.round(good/total*100);
    return `<div class="cc" onclick="showC('${c.id}')">
      <div class="ct"><span class="ci" style="color:${col}">${c.id}</span><span class="db" style="color:${col};border-color:${col}">${c.domain}</span></div>
      <div class="ctit">${c.title}</div>
      <div class="pbar"><div class="pbg"><div class="pf" style="width:${pct}%;background:${pct===100?'#3fb950':'#58a6ff'}"></div></div>
      <span class="aoc">${good}/${total} AOs</span>${needs?`<span class="cfp" style="color:var(--rd)">${needs} needs review</span>`:""}</div>
    </div>`;
  }).join("");
}

function showC(id){
  cc=C.find(c=>c.id===id);if(!cc)return;
  const col=dc(cc.domain);
  document.getElementById("cvid").textContent=cc.id;
  document.getElementById("cvtit").textContent=cc.title;
  document.getElementById("cvstmt").textContent=cc.statement;
  document.getElementById("cvbdg").innerHTML=`<span class="db" style="color:${col};border-color:${col}">${cc.domain} · ${cc.domainFull}</span>`;
  document.getElementById("cvcont").innerHTML=
    `<div class="slbl">Assessment Objectives (${cc.aos.length})</div>`+
    cc.aos.map(ao=>{
      const key=cc.id+"-"+ao.id;
      const conf=CF[key]||"none";
      const col2=dc(cc.domain);
      const statLabel={none:"",needs:`<span style="color:var(--rd)"> · Needs Review</span>`,good:`<span style="color:var(--gr)"> · Confident ✓</span>`}[conf];
      return `<div class="aocard" onclick="showA('${ao.id}')">
        <div class="aot">
          <span class="aolbl" style="color:${col2}">${cc.id}[${ao.id}]</span>
          <span class="aostat">${statLabel}</span>
        </div>
        <div class="aost">${ao.stmt}</div>
      </div>`;
    }).join("");
  document.getElementById("listMain").style.display="none";
  document.getElementById("av").classList.remove("on");
  document.getElementById("cv").classList.add("on");
  document.getElementById("cbar").classList.remove("on");
}

function showA(aid){
  if(!cc)return;
  ca=cc.aos.find(a=>a.id===aid);if(!ca)return;
  const key=cc.id+"-"+ca.id;
  const col=dc(cc.domain);
  document.getElementById("avid").textContent=cc.id+"["+ca.id+"] · "+cc.title;
  document.getElementById("avstmt").textContent=ca.stmt;
  document.getElementById("avbdg").innerHTML=`<span class="db" style="color:${col};border-color:${col}">${cc.domain} · ${cc.domainFull}</span>`;
  document.getElementById("avcont").innerHTML=
    `<div class="slbl">Plain Language</div>
     <div class="plain-box">${ca.plain}</div>
     <div class="slbl">Assessor Questions</div>
     <div class="list-box"><ul class="ql">${ca.questions.map(q=>`<li>${q}</li>`).join("")}</ul></div>
     <div class="slbl">Evidence Checklist</div>
     <div class="list-box"><ul class="el">${ca.evidence.map(e=>`<li>${e}</li>`).join("")}</ul></div>`;
  document.getElementById("cv").classList.remove("on");
  document.getElementById("av").classList.add("on");
  document.getElementById("cbar").classList.add("on");
  const conf=CF[key]||"none";
  document.getElementById("btnN").classList.toggle("sel",conf==="needs");
  document.getElementById("btnG").classList.toggle("sel",conf==="good");
  document.getElementById("av").scrollTop=0;
}

function setC(lv){
  if(!cc||!ca)return;
  const key=cc.id+"-"+ca.id;
  if(CF[key]===lv)delete CF[key];else CF[key]=lv;
  saveC();
  const conf=CF[key]||"none";
  document.getElementById("btnN").classList.toggle("sel",conf==="needs");
  document.getElementById("btnG").classList.toggle("sel",conf==="good");
}

function goList(){
  document.getElementById("listMain").style.display="flex";
  document.getElementById("cv").classList.remove("on");
  document.getElementById("av").classList.remove("on");
  document.getElementById("cbar").classList.remove("on");
  cc=null;ca=null;render();
}

function goCtrl(){
  document.getElementById("av").classList.remove("on");
  document.getElementById("cbar").classList.remove("on");
  ca=null;if(cc)showC(cc.id);
}

function rnd(){
  const all=[];C.forEach(c=>c.aos.forEach(a=>all.push({c,a})));
  const p=all[Math.floor(Math.random()*all.length)];
  cc=p.c;showC(p.c.id);setTimeout(()=>showA(p.a.id),50);
}

render();
</script>
</body>
</html>
