   statement:"Identify, report, and correct information system flaws; test software and firmware updates related to flaw remediation for effectiveness and potential side effects before installation; install security-relevant software updates within a defined time period.",
   plain:"Software vulnerabilities (flaws) must be discovered, tracked, and patched within defined timeframes. Critical patches shouldn't sit unapplied for months. Testing patches before deployment is important but shouldn't be used as an excuse for indefinite delay. The organization must define acceptable patching windows by severity and then meet those commitments. Unpatched systems are one of the most common attack entry points.",
   evidence:["Patch management policy with defined remediation timelines by severity","Patch tracking system showing applied patches and outstanding items","Evidence of patch testing process (test environment, rollback plan)","Recent patch compliance reports showing coverage and timeliness","Exception process documentation for patches that cannot be applied immediately"],
   questions:["What are your defined patching timelines for critical, high, medium, and low vulnerabilities?","How do you track patch compliance across your CUI systems — what tool or process?","How are patches tested before deployment to production — is there a test environment?","What is your process when a critical patch cannot be applied immediately — what compensating controls are put in place?"]},

  {id:"SI.L2-3.14.2",domain:"SI",domainFull:"System & Info Integrity",title:"Malicious Code Protection",
   statement:"Provide protection from malicious code at appropriate locations within organizational systems.",
   plain:"Anti-malware protection must be deployed at multiple layers — not just on endpoints but also at email gateways, web proxies, and file storage. Defense in depth means catching malicious code at every possible entry point. A single antivirus on laptops is insufficient. Signatures must be kept current, real-time protection must be enabled, and malware detections must be responded to.",
   evidence:["Endpoint protection platform (EDR/EPP) deployment coverage report","Email gateway anti-malware configuration documentation","Web proxy or DNS filtering for malicious code protection","Malware definition update schedule and compliance reporting","Detection and response records showing how malware incidents are handled"],
   questions:["Where is malicious code protection deployed — endpoints only, or also at email gateways, web proxies, and network chokepoints?","How frequently are malware definitions updated, and how do you verify all endpoints are receiving updates?","What is the response process when malware is detected — who is notified and what actions are taken automatically vs. manually?","How do you handle systems that cannot run traditional AV — legacy systems, OT, embedded devices?"]},

  {id:"SI.L2-3.14.3",domain:"SI",domainFull:"System & Info Integrity",title:"Security Alerts",
   statement:"Monitor organizational systems and information system components to detect attacks and indicators of potential attacks in accordance with monitoring objectives, and identify unauthorized use of organizational systems.",
   plain:"You must actively monitor your systems for signs of attack — intrusion attempts, malware, unauthorized access, anomalous behavior. This requires threat intelligence (knowing what to look for), monitoring tools (SIEM, IDS/IPS, EDR), and people to review and respond to alerts. Monitoring must be intentional and tuned — alert fatigue from thousands of noisy, unreviewed alerts is as bad as no monitoring.",
   evidence:["Security monitoring program documentation defining monitoring objectives","SIEM deployment with alert rules tied to known attack techniques (MITRE ATT&CK)","IDS/IPS signature and alert configuration","Threat intelligence integration evidence","Alert investigation records showing security events are reviewed and responded to"],
   questions:["What monitoring tools are in use and what attack techniques are you monitoring for?","How are security alerts prioritized and triaged — is there a defined process?","How many security alerts does your SIEM generate per day, and what percentage are investigated?","How do you incorporate threat intelligence to ensure you are monitoring for current attack techniques?"]},

  {id:"SI.L2-3.14.4",domain:"SI",domainFull:"System & Info Integrity",title:"Update Malicious Code Protection",
   statement:"Update malicious code protection mechanisms when new releases are available.",
   plain:"Anti-malware tools are only as good as their most recent update. Signature-based detection is useless against new malware if signatures aren't current. Updates must happen automatically and frequently — daily at minimum for signatures, with rapid deployment of engine updates. The update mechanism itself must be monitored to ensure updates are actually reaching all systems, not just theoretically scheduled.",
   evidence:["AV/EDR automatic update configuration showing update frequency","Compliance report showing signature currency across all managed endpoints","Alert or monitoring for systems with out-of-date AV signatures","Patch schedule for AV engine (not just signatures) updates","Evidence that definition updates are tested before deployment if there is a delay"],
   questions:["How frequently are malware protection signatures updated — are updates automatic, and what is the maximum age before an alert is generated?","How do you verify that all endpoints have received the latest signatures — is there a compliance dashboard?","What happens when a system is offline for an extended period and misses signature updates — how is it handled upon reconnection?","Is there a separate process for engine updates versus signature updates?"]},

  {id:"SI.L2-3.14.5",domain:"SI",domainFull:"System & Info Integrity",title:"System & File Scanning",
   statement:"Perform periodic scans of organizational systems and real-time scans of files from external sources as files are downloaded, opened, or executed.",
   plain:"Anti-malware protection must include both scheduled full-system scans and real-time scanning of files as they are accessed or downloaded. A file that slipped through real-time scanning might be caught by a scheduled full scan. Real-time scanning catches threats at the moment of access. Both mechanisms are required. Scan results must be logged and reviewed.",
   evidence:["Real-time scan configuration in endpoint protection tools","Scheduled full-system scan configuration and scan logs","Evidence that downloaded files from external sources are scanned before execution","Scan result logs showing detected and cleaned items","Policy defining scan frequency for scheduled scans"],
   questions:["How is real-time scanning configured — does it scan files on access, on download, or both?","What is the schedule for full system scans, and are results logged and reviewed?","How do you ensure files downloaded from the internet are scanned before execution?","What happens if a file is detected during a scheduled scan that was missed by real-time scanning?"]},

  {id:"SI.L2-3.14.6",domain:"SI",domainFull:"System & Info Integrity",title:"Monitor Organizational Systems",
   statement:"Monitor organizational systems to detect attacks and indicators of potential attacks in accordance with monitoring objectives.",
   plain:"System monitoring goes beyond just malware detection. You must monitor for unauthorized changes to system configurations, unexpected process execution, unusual network connections, privilege escalation attempts, and other indicators of compromise. This requires host-based monitoring, network monitoring, and log analysis working together to provide comprehensive visibility.",
   evidence:["System monitoring architecture documentation showing coverage","Host-based intrusion detection or EDR behavioral monitoring configuration","Network traffic analysis or NDR tool deployment evidence","Log collection scope covering security-relevant system events","Monitoring objectives documentation defining what is monitored and why"],
   questions:["What system-level behaviors are you monitoring for beyond malware — unauthorized process execution, privilege escalation, configuration changes?","How does your EDR or host-based monitoring detect behavioral indicators of compromise beyond signature-based detection?","How is network traffic monitored for anomalous behavior or lateral movement?","What is your process when monitoring detects an indicator of compromise?"]},

  {id:"SI.L2-3.14.7",domain:"SI",domainFull:"System & Info Integrity",title:"Identify Unauthorized Use",
   statement:"Identify unauthorized use of organizational systems.",
   plain:"You must be able to detect when your systems are being used in unauthorized ways — not just unauthorized access, but unauthorized use by authorized users. An authorized user accessing systems at 3 AM from an unusual location, downloading unusually large volumes of data, or accessing systems outside their normal scope represents unauthorized use even if they authenticated correctly. User behavior analytics (UBA) and baseline profiling help identify these anomalies.",
   evidence:["User behavior analytics (UBA) or UEBA tool configuration","Baseline behavior profiles for users and systems","Alerting rules for anomalous usage patterns (off-hours access, unusual data volume, atypical system access)","Investigation records for identified unauthorized use cases","Policy defining what constitutes unauthorized use beyond simple access control violation"],
   questions:["How do you detect unauthorized use by authorized users — what behavioral monitoring is in place?","Do you have user behavior analytics or UEBA tooling that establishes baselines and alerts on deviations?","Can you give me an example of a scenario where an authorized user's activities would trigger an unauthorized use alert?","How are unauthorized use detections investigated and, if confirmed, escalated?"]},
];

// ── State ────────────────────────────────────────────────────────────────
let currentDomain = 'ALL';
let currentSearch  = '';
let currentControlId = null;
let confidenceMap  = {};
try { confidenceMap = JSON.parse(localStorage.getItem('cmmc_confidence') || '{}'); } catch(e){}

function saveConf() {
  try { localStorage.setItem('cmmc_confidence', JSON.stringify(confidenceMap)); } catch(e){}
}

// ── Build Domain Tabs ────────────────────────────────────────────────────
function buildTabs() {
  const domains = [...new Set(CONTROLS.map(c => c.domain))];
  const tabsEl = document.getElementById('domainTabs');
  domains.forEach(d => {
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.domain = d;
    tab.textContent = d;
    tab.onclick = () => filterDomain(d, tab);
    tabsEl.appendChild(tab);
  });
}

function filterDomain(domain, el) {
  currentDomain = domain;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase();
  renderList();
}

function getFiltered() {
  return CONTROLS.filter(c => {
    const dm = currentDomain === 'ALL' || c.domain === currentDomain;
    const sr = !currentSearch ||
      c.id.toLowerCase().includes(currentSearch) ||
      c.title.toLowerCase().includes(currentSearch) ||
      c.plain.toLowerCase().includes(currentSearch) ||
      c.statement.toLowerCase().includes(currentSearch);
    return dm && sr;
  });
}

function renderList() {
  const filtered = getFiltered();
  const listEl = document.getElementById('listView');
  document.getElementById('countBadge').textContent = `${filtered.length} control${filtered.length!==1?'s':''}`;

  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty-state">No controls match.</div>';
    return;
  }

  listEl.innerHTML = filtered.map(c => {
    const conf = confidenceMap[c.id] || 'none';
    const confLabel = {none:'Unreviewed', needs:'Needs Review', good:'Confident'}[conf];
    return `<div class="control-card" onclick="showDetail('${c.id}')">
      <div class="card-top">
        <div class="card-id">${c.id}</div>
        <div class="card-domain-badge domain-${c.domain}">${c.domain}</div>
      </div>
      <div class="card-title">${c.title}</div>
      <div class="card-preview">${c.plain}</div>
      <div class="card-footer">
        <span class="confidence-pill confidence-${conf}">${confLabel}</span>
        <span class="chevron">›</span>
      </div>
    </div>`;
  }).join('');

  updateProgress();
}

function updateProgress() {
  const total     = CONTROLS.length;
  const reviewed  = CONTROLS.filter(c => confidenceMap[c.id]).length;
  const confident = CONTROLS.filter(c => confidenceMap[c.id]==='good').length;
  document.getElementById('progressLabel').textContent =
    `${confident}/${total} confident · ${reviewed} reviewed`;
}

function showDetail(id) {
  const c = CONTROLS.find(x => x.id === id);
  if (!c) return;
  currentControlId = id;

  document.getElementById('dId').textContent = c.id;
  document.getElementById('dTitle').textContent = c.title;
  document.getElementById('dBadges').innerHTML =
    `<span class="card-domain-badge domain-${c.domain}">${c.domain} · ${c.domainFull}</span>`;
  document.getElementById('dStatement').textContent = c.statement;
  document.getElementById('dPlain').textContent = c.plain;
  document.getElementById('dEvidence').innerHTML = c.evidence.map(e=>`<li>${e}</li>`).join('');
  document.getElementById('dQuestions').innerHTML = c.questions.map(q=>`<li>${q}</li>`).join('');

  updateConfButtons();

  document.getElementById('listMain').style.display  = 'none';
  document.getElementById('detailView').classList.add('visible');
  document.getElementById('detailView').scrollTop = 0;
  document.getElementById('confBar').classList.add('visible');
}

function updateConfButtons() {
  const conf = confidenceMap[currentControlId] || 'none';
  document.getElementById('btnNeeds').classList.toggle('selected', conf==='needs');
  document.getElementById('btnGood').classList.toggle('selected',  conf==='good');
}

function setConfidence(level) {
  if (confidenceMap[currentControlId] === level) delete confidenceMap[currentControlId];
  else confidenceMap[currentControlId] = level;
  saveConf();
  updateConfButtons();
}

function goBack() {
  document.getElementById('listMain').style.display = 'flex';
  document.getElementById('detailView').classList.remove('visible');
  document.getElementById('confBar').classList.remove('visible');
  currentControlId = null;
  renderList();
}

function goRandom() {
  const pool = getFiltered();
  if (!pool.length) return;
  showDetail(pool[Math.floor(Math.random()*pool.length)].id);
}

buildTabs();
renderList();
</script>
