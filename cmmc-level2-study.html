   plain:"User accounts that haven't been used in a defined period should be disabled. Dormant accounts are a security risk because they may be forgotten, never receive password resets, and could be compromised and used without anyone noticing unusual activity. Defining an inactivity threshold (commonly 30, 60, or 90 days), automatically disabling dormant accounts, and reviewing them regularly is required.",
   evidence:["Policy defining inactivity threshold for account disablement","Automated account inactivity scanning and disablement process documentation","Report of accounts disabled due to inactivity in the last review cycle","Active Directory configuration showing last logon monitoring","Regular access review records including dormant account identification"],
   questions:["What is your defined inactivity period before an account is disabled?","How is dormant account detection automated — manual review or automated tooling?","Can you show me accounts that were disabled in the last cycle due to inactivity?","How do you handle service accounts that may not log in frequently but are still needed?"]},

  {id:"IA.L2-3.5.6",domain:"IA",domainFull:"Identification & Authentication",title:"Identifier Handling",
   statement:"Manage information system identifiers by receiving authorization before using the identifier, preventing reuse of identifiers for a defined period, and disabling the identifier after a defined period of inactivity.",
   plain:"User IDs must be managed through their full lifecycle: authorized before creation, unique, never reused for a defined period after an account is terminated, and disabled when dormant. Identifier reuse is a risk because a new employee given a former employee's username might inherit permissions, audit trail confusion, or access to archived data associated with that identifier.",
   evidence:["Account provisioning workflow showing authorization before account creation","Policy defining the identifier reuse prevention period (e.g., 2 years)","Evidence that former employee IDs are not immediately reused","Account lifecycle documentation covering creation, modification, and termination","Audit trail showing identifier history and reuse prevention enforcement"],
   questions:["What is your policy for preventing reuse of a deactivated user identifier — how long before an ID can be reused?","How is identifier reuse technically prevented in your Active Directory or IdP?","What authorization is required before a new user account is created?","How do you handle the account lifecycle when an employee leaves — what happens to their identifier?"]},

  {id:"IA.L2-3.5.7",domain:"IA",domainFull:"Identification & Authentication",title:"Password Complexity",
   statement:"Enforce a minimum password complexity and change requirements for systems that use password-based authentication.",
   plain:"Passwords must meet minimum complexity requirements — length, character types, and avoidance of common/compromised passwords. NIST SP 800-63B has updated guidance favoring length over complexity rules, and recommends checking passwords against known breach lists rather than forcing arbitrary rotations. Your policy must balance security with usability — forcing frequent changes with complexity rules often leads to weaker passwords, not stronger ones.",
   evidence:["Password policy documentation defining complexity requirements and change rules","Technical enforcement of password policy in Active Directory or IdP","Evidence of integration with compromised password databases (HaveIBeenPwned or equivalent)","FGPP (Fine-Grained Password Policy) documentation for privileged accounts","Password policy compliance reporting showing enforcement rates"],
   questions:["What are your password complexity requirements, and how are they technically enforced?","Do you check passwords against known breach/compromise lists when users set new passwords?","How do your password requirements differ between standard users and privileged accounts?","How do you handle legacy systems that cannot enforce your current password policy?"]},

  {id:"IA.L2-3.5.8",domain:"IA",domainFull:"Identification & Authentication",title:"Password Reuse",
   statement:"Prohibit password reuse for a specified number of generations.",
   plain:"Users must not be able to cycle back to a previous password. If someone is required to change their password and immediately sets it back to the old one, the change was meaningless. Password history enforcement (remembering the last N passwords) prevents this. The number of password generations to remember should be defined in policy and technically enforced — typically the last 12-24 passwords.",
   evidence:["Password policy showing password history enforcement setting","Active Directory Group Policy or IdP configuration confirming history is enforced","Policy documentation specifying the number of password generations prohibited","Testing evidence showing the system rejects previously used passwords","Fine-grained password policy for privileged accounts with potentially stricter history requirements"],
   questions:["How many previous passwords does your system remember and prevent reuse of?","How is password history enforcement configured — through Active Directory Group Policy, an IdP, or individual application settings?","Is password history consistently enforced across all applications that use password authentication for CUI systems?","How do you handle the case where a user tries to work around the history requirement by rapidly changing their password multiple times?"]},

  {id:"IA.L2-3.5.9",domain:"IA",domainFull:"Identification & Authentication",title:"Temporary Passwords",
   statement:"Allow temporary passwords to be used immediately for system logons with an immediate change to a permanent password.",
   plain:"When a temporary password is issued — for a new account, a password reset, or emergency access — the user must be forced to change it immediately upon first login. A temporary password that can be used indefinitely is nearly as risky as a shared password. The system must technically enforce the immediate change and not allow the temporary credential to be used for normal operations.",
   evidence:["Technical configuration showing 'must change password at next logon' is enforced for temporary credentials","Help desk process documentation for temporary password issuance","Evidence that temporary passwords have limited validity period","Audit logs showing forced password changes upon first use of temporary credentials","Policy requiring immediate change of temporary passwords"],
   questions:["What is the process for issuing temporary passwords, and how is an immediate change enforced technically?","Can a temporary password be used more than once, or does the system force a change on first login?","How long are temporary passwords valid before they expire if not used?","How are temporary passwords communicated to users securely?"]},

  {id:"IA.L2-3.5.10",domain:"IA",domainFull:"Identification & Authentication",title:"Cryptographically-Protected Passwords",
   statement:"Store and transmit only cryptographically-protected passwords.",
   plain:"Passwords must never be stored in plain text or transmitted unencrypted. At rest, passwords must be hashed using modern, slow hashing algorithms (bcrypt, Argon2, PBKDF2 with high iteration counts). MD5 and SHA-1 are no longer acceptable for password hashing. In transit, passwords must be protected by TLS. If an attacker obtains your password database, they should not be able to recover the passwords in a reasonable timeframe.",
   evidence:["Authentication system documentation confirming cryptographic password storage (hashing algorithm used)","Evidence that legacy plain-text or weakly-hashed password stores have been eliminated","TLS enforcement for all authentication endpoints (certificate and protocol version)","Application security testing results confirming proper password hashing","Prohibition of MD5 or SHA-1 password hashing in security standards"],
   questions:["What hashing algorithm is used to store passwords in your authentication systems?","Are there any systems that store passwords in plain text or with weak hashing (MD5, SHA-1)?","How do you verify that all authentication traffic is protected by TLS and not susceptible to interception?","Has a penetration test or application security assessment validated your password storage and transmission security?"]},

  {id:"IA.L2-3.5.11",domain:"IA",domainFull:"Identification & Authentication",title:"Obscure Feedback",
   statement:"Obscure feedback of authentication information during the authentication process to protect the information from possible exploitation/use by unauthorized individuals.",
   plain:"When a user types their password, it should not be displayed on screen. Password masking (showing dots or asterisks instead of characters) is the standard implementation. This protects against shoulder surfing and screen capture. This applies not just to web login pages but to any authentication interface — local login screens, remote access portals, command-line authentication prompts, and application login forms.",
   evidence:["Technical demonstration that password fields are masked in all authentication interfaces","Application security review confirming password masking on web and desktop applications","Evidence that authentication failures do not reveal whether the username or password was wrong (generic error message)","Mobile application security review confirming password masking on mobile login screens","Policy requiring obscured password feedback in application development standards"],
   questions:["How do you ensure that authentication interfaces mask password input — is this reviewed as part of application security testing?","Are there any systems where passwords or authentication tokens are displayed in clear text during entry?","Do authentication failure messages distinguish between invalid username and invalid password — they should not?","How is this requirement incorporated into your application development and vendor assessment processes?"]},

  // ── INCIDENT RESPONSE (IR) ────────────────────────────────────────────────
  {id:"IR.L2-3.6.1",domain:"IR",domainFull:"Incident Response",title:"Incident Response Capability",
   statement:"Establish an operational incident-handling capability for organizational systems that includes preparation, detection, analysis, containment, recovery, and user activities.",
   plain:"When something goes wrong, you can't improvise. You need a documented, tested incident response capability covering the full lifecycle: preparation (planning, tooling, training), detection (monitoring, alerting), analysis (triage, root cause), containment (isolating affected systems), recovery (restoring operations), and post-incident review (learning lessons). A document nobody has read doesn't count as capability.",
   evidence:["Incident Response Plan (IRP) with version history and approval signatures","Incident response roles and responsibilities (RACI matrix)","Records of IR tabletop exercises or simulations with dates and participants","Incident ticket log showing the process was followed on real events","Post-incident review reports (lessons learned documentation)"],
   questions:["Walk me through your incident response process from the moment an alert fires to after the incident is closed.","When was the incident response plan last tested — tabletop, live drill, or simulation — and what were the findings?","Who has authority to declare an incident and initiate containment actions?","How do you determine when a security event becomes a reportable incident under your government contracts?"]},

  {id:"IR.L2-3.6.2",domain:"IR",domainFull:"Incident Response",title:"Incident Reporting",
   statement:"Track, document, and report incidents to designated officials and/or authorities both internal and external to the organization.",
   plain:"Incidents must be documented and reported — internally to management and security leadership, and externally to the appropriate authorities (such as the DIB CS Program for defense contractors, or CISA for critical infrastructure). Reporting timelines are often specified in contracts (e.g., 72 hours for certain incidents). Missing a reporting deadline can have serious contractual and regulatory consequences.",
   evidence:["Incident reporting policy with internal and external reporting requirements and timelines","Incident log or ticketing system showing documented incident records","Evidence of external incident reports submitted (redacted if necessary)","Escalation tree or contact list for internal and external reporting","Training records covering incident reporting obligations"],
   questions:["What are your incident reporting timelines and to whom — both internally and externally?","Can you show me records of incidents that were documented and reported in the last year?","How do you ensure that reporting timelines are met — is there an automated reminder or escalation process?","How do you determine the scope of reporting for incidents that may involve CUI — what thresholds trigger external notification?"]},

  {id:"IR.L2-3.6.3",domain:"IR",domainFull:"Incident Response",title:"Incident Response Testing",
   statement:"Test the organizational incident response capability.",
   plain:"Your incident response plan must be tested, not just written. Tabletop exercises, simulations, and full live drills all count. The goal is to verify that people know their roles, that tools work as expected, and that the plan reflects current reality. Gaps discovered during testing — in communications, decision authority, tool access, or coordination — are better found during a drill than during an actual breach.",
   evidence:["Tabletop exercise records with scenario description, participants, date, and findings","After-action reports from IR tests documenting gaps and remediation actions","Evidence that tabletop findings were tracked to resolution","Annual IR test schedule demonstrating regular testing cadence","Communication test records verifying notification trees function correctly"],
   questions:["When was the last incident response test conducted, what was the scenario, and who participated?","What gaps or deficiencies were identified in the last IR test, and have they been remediated?","How do you test not just the plan but the tools — can your team demonstrate they can use forensic and containment tools under pressure?","How do you include third-party responders or external contacts in your IR testing?"]},

  // ── MAINTENANCE (MA) ──────────────────────────────────────────────────────
  {id:"MA.L2-3.7.1",domain:"MA",domainFull:"Maintenance",title:"Perform Maintenance",
   statement:"Perform maintenance on organizational systems.",
   plain:"Systems require regular maintenance — hardware checks, software updates, firmware patching, and scheduled servicing. This control requires that maintenance is actually performed and documented. Deferred maintenance accumulates technical debt and security risk. Scheduled maintenance windows should be planned, approved, and recorded, and maintenance activities should be logged.",
   evidence:["Maintenance schedule documentation for CUI systems","Maintenance activity records (work orders, tickets, change records)","Patch management records showing scheduled maintenance applied","Hardware maintenance contracts with vendors if applicable","Evidence of preventive maintenance being performed vs. just reactive break/fix"],
   questions:["What is your maintenance schedule for CUI systems, and how is it documented?","How are maintenance activities logged and tracked to completion?","What is the process for scheduling maintenance windows — who approves them?","How do you handle situations where systems cannot be taken offline for maintenance — are there compensating controls?"]},

  {id:"MA.L2-3.7.2",domain:"MA",domainFull:"Maintenance",title:"System Maintenance Controls",
   statement:"Provide controls on the tools, techniques, mechanisms, and personnel that perform maintenance on organizational systems.",
   plain:"Maintenance personnel and tools need oversight and controls. Maintenance access can be just as dangerous as regular administrative access. Maintenance technicians — including vendor representatives — should be authenticated before being granted access, their activities should be monitored, and any maintenance tools brought in should be inspected. Uncontrolled maintenance access is a vector for insider threat and supply chain attacks.",
   evidence:["Maintenance access policy requiring authentication and authorization before access is granted","Escort policy for external maintenance personnel","Maintenance activity logging showing who performed what maintenance and when","Inspection process for maintenance tools and equipment brought onto premises","Vendor maintenance access authorization records"],
   questions:["How are external maintenance personnel authenticated before they are granted access to CUI systems?","Are external maintenance technicians escorted during their activities on-site?","How are maintenance tools and equipment inspected before being connected to or used on CUI systems?","Are maintenance activities by external personnel logged, and does someone monitor what they are doing?"]},

  {id:"MA.L2-3.7.3",domain:"MA",domainFull:"Maintenance",title:"Equipment Sanitization",
   statement:"Ensure equipment removed for maintenance is sanitized with respect to any CUI.",
   plain:"When hardware is removed from a CUI environment for off-site maintenance — sent to a vendor, shipped to a repair depot, or taken off premises — it must first be sanitized of any CUI. This means either removing storage media, wiping data, or ensuring the equipment contains no CUI before it leaves your control. You cannot ship a hard drive containing CUI to a vendor without authorization and proper handling.",
   evidence:["Policy requiring CUI sanitization before equipment leaves controlled space","Sanitization records for equipment removed for maintenance","Evidence of media removal or wiping before off-site maintenance","Vendor maintenance agreement including data handling requirements","Tracking log of equipment sent off-site with sanitization confirmation"],
   questions:["What is the process when a CUI system needs to be sent off-site for maintenance or repair?","How do you ensure that CUI is removed or sanitized from equipment before it leaves your facility?","Do you remove hard drives before sending equipment to a vendor? If so, how are those drives tracked?","What contractual requirements apply to vendors regarding any CUI they may encounter during maintenance?"]},

  {id:"MA.L2-3.7.4",domain:"MA",domainFull:"Maintenance",title:"Media Inspection",
   statement:"Check media containing maintenance programs and diagnostic programs for malicious code before use in systems containing CUI.",
   plain:"Any media — USB drives, CDs, network locations — that brings maintenance software, diagnostic tools, or firmware updates into your CUI environment must be scanned for malware before use. A compromised diagnostic tool is a classic supply chain attack vector. This applies to vendor-provided tools, contractor tools, and even internally generated maintenance media that has been stored off-site.",
   evidence:["Policy requiring malware scanning of maintenance media before use","Scanning process documentation and AV scan logs for maintenance media","Evidence that this applies to vendor-provided media as well as internal media","Air-gapped network procedures for scanning media before transfer","Records of maintenance media inspection for recent maintenance activities"],
   questions:["What is your process for scanning maintenance media — USB drives, downloaded tools, vendor-provided software — before using it on CUI systems?","How do you handle maintenance tools that need to be brought in by external vendors?","How do you scan maintenance media in an air-gapped or OOB environment where the scanner cannot connect to update servers?","Has maintenance media inspection ever identified malicious code? How was it handled?"]},

  {id:"MA.L2-3.7.5",domain:"MA",domainFull:"Maintenance",title:"Nonlocal Maintenance",
   statement:"Require MFA for remote maintenance sessions, maintain records of nonlocal maintenance and diagnostic activities, terminate remote connections when done, and supervise nonlocal maintenance activities.",
   plain:"Remote maintenance — when a vendor or administrator connects remotely to perform maintenance on a CUI system — requires strong authentication (MFA), must be logged in detail, and the session must be terminated when complete. Remote sessions should not be left open indefinitely. Ideally, someone should be supervising or monitoring the session. Jump servers and PAM tools are common implementations for this control.",
   evidence:["MFA enforcement for remote maintenance sessions (VPN + jump server configuration)","Remote maintenance session logs showing user, duration, and activities performed","Session recording evidence for remote maintenance if applicable","Policy requiring session termination after maintenance completion","Evidence that remote maintenance accounts are disabled or inactive when not in use"],
   questions:["How are remote maintenance sessions authenticated — is MFA required?","Are remote maintenance sessions logged and recorded — does that include session recording or just connection metadata?","Who is responsible for supervising a remote maintenance session by a vendor, and how is supervision documented?","How are remote maintenance connections terminated after work is complete — is there a formal process?"]},

  {id:"MA.L2-3.7.6",domain:"MA",domainFull:"Maintenance",title:"Maintenance Personnel",
   statement:"Ensure that maintenance personnel have required access authorization.",
   plain:"People performing maintenance on CUI systems must be authorized to do so — just like regular users. This means vetting maintenance personnel, verifying their clearance or authorization if required, and ensuring they only access what is needed for their maintenance task. Contractors and vendor technicians performing maintenance are subject to the same authorization requirements as employees.",
   evidence:["Maintenance personnel authorization records showing vetting process","Background investigation records for internal maintenance staff","Vendor agreement specifying personnel screening requirements","Escort procedures for personnel without full authorization to CUI areas","Access authorization log for maintenance personnel tied to specific tasks"],
   questions:["How are maintenance personnel — both internal and external — vetted and authorized before accessing CUI systems?","What background investigation requirements apply to contractors or vendors who perform maintenance?","How do you handle a situation where a vendor sends a different technician than expected — what is the verification process?","Are maintenance personnel granted only the access needed for their specific task, or do they receive broad system access?"]},

  // ── MEDIA PROTECTION (MP) ─────────────────────────────────────────────────
  {id:"MP.L1-3.8.1",domain:"MP",domainFull:"Media Protection",title:"Media Protection",
   statement:"Protect system media containing Federal Contract Information, both paper and digital.",
   plain:"Physical and digital media containing CUI must be protected from unauthorized access. Paper documents with CUI should be stored in locked cabinets when not in use. Digital media should be access-controlled. Both types should be handled in a way that prevents unauthorized viewing, copying, or removal. This is about the physical security of the media itself, not just the systems that process the data.",
   evidence:["Media protection policy covering both paper and digital media","Physical storage controls for paper CUI (locked cabinets, secure rooms)","Digital media access controls and storage location documentation","Physical access logs for areas where CUI media is stored","Visitor control procedures preventing unauthorized access to areas with CUI media"],
   questions:["How is paper CUI protected when not in active use — locked storage, clean desk policy?","What physical controls protect digital storage media (drives, backup tapes) containing CUI?","How do you control who can access areas where CUI media is stored?","What is the procedure when CUI media needs to be transported between locations?"]},

  {id:"MP.L1-3.8.2",domain:"MP",domainFull:"Media Protection",title:"Media Access",
   statement:"Limit access to system media containing Federal Contract Information to authorized individuals.",
   plain:"Only authorized individuals should have access to media that contains CUI — whether that's paper files, USB drives, backup tapes, or drives in a server rack. Access should be controlled, tracked, and limited to the minimum necessary. This requires both physical access controls (locked rooms, cabinets) and logical controls (encrypted drives requiring authentication).",
   evidence:["Access control list for personnel authorized to access CUI media","Physical access logs for storage areas","Media checkout/check-in procedures for removable media","Digital media access logs (who accessed which encrypted drive or backup)","Evidence of periodic review of authorized media access list"],
   questions:["Who is authorized to access CUI media, and how is that list maintained and reviewed?","How do you physically control access to media storage areas — badge readers, locked cabinets, other?","Is there a check-out/check-in process for removable media containing CUI?","How would you know if unauthorized media access occurred — what logging or detection is in place?"]},

  {id:"MP.L1-3.8.3",domain:"MP",domainFull:"Media Protection",title:"Sanitize or Destroy Media",
   statement:"Sanitize or destroy information system media before disposal or reuse.",
   plain:"Before any storage media leaves your control — recycled, given to another employee, donated, or discarded — it must be sanitized or destroyed. Deleting files is not sufficient. NIST SP 800-88 defines clearing (overwriting), purging (degaussing or cryptographic erase), and destruction (physical) as the three options depending on media type and sensitivity. SSDs and flash media require special handling because of wear leveling.",
   evidence:["Media sanitization policy referencing NIST SP 800-88 or equivalent","Media disposal/sanitization logs with asset tag, method, date, and responsible party","Certificate of destruction from third-party vendor if applicable","Sanitization tool logs (DBAN, Blancco, or manufacturer secure erase)","Asset inventory reconciliation showing disposed items removed from tracking"],
   questions:["What sanitization standard do you follow, and why was it selected?","What is the step-by-step process when a drive or device is being decommissioned?","How do you handle SSDs and flash storage that are difficult to reliably overwrite?","Can you produce the destruction or sanitization records for the last 10 assets disposed of?"]},

  {id:"MP.L2-3.8.4",domain:"MP",domainFull:"Media Protection",title:"Media Markings",
   statement:"Mark media with necessary CUI markings and distribution limitations.",
   plain:"Physical media — drives, tapes, CDs, USB drives, printed documents — that contains CUI must be visibly marked to indicate its sensitivity and any distribution limitations. Markings help ensure media is handled appropriately throughout its lifecycle, from creation to disposal. Unmarked CUI media is frequently mishandled simply because people don't know what's on it.",
   evidence:["Media marking policy defining required markings for different CUI categories","Physical examples of marked media (drives with CUI labels, printed documents with headers/footers)","Procedure for applying CUI markings at time of creation","Training records covering media marking requirements","Audit of media in storage confirming appropriate markings are present"],
   questions:["How is physical media marked when it contains CUI — labels, stamps, printed markings?","Who is responsible for applying CUI markings, and at what point in the process are markings applied?","How do you ensure that markings are applied consistently and accurately by all personnel?","What happens when media is sanitized and repurposed — how are old markings removed or updated?"]},

  {id:"MP.L2-3.8.5",domain:"MP",domainFull:"Media Protection",title:"Media Accountability",
   statement:"Control access to media containing CUI and maintain accountability for media during transport until the media is destroyed or sanitized.",
   plain:"There must be a chain of custody for media containing CUI from the moment it is created until it is sanitized or destroyed. This means maintaining a media inventory, logging who has custody of each piece of media, and tracking it during transport. If media goes missing, you must be able to determine what was on it, who had it, and where it was last seen.",
   evidence:["Media inventory log with custody tracking for all CUI media","Chain of custody documentation for media in transport","Periodic media inventory audits confirming all media is accounted for","Shipping/transport records for media sent off-site","Missing media incident records if any media has been lost or unaccounted for"],
   questions:["How do you track the location and custody of media containing CUI throughout its lifecycle?","What is the process when media needs to be transported — what documentation accompanies it?","How frequently do you audit your media inventory to confirm all media is accounted for?","What happened the last time media could not be immediately located — what was the response process?"]},

  {id:"MP.L2-3.8.6",domain:"MP",domainFull:"Media Protection",title:"Portable Storage Encryption",
   statement:"Implement cryptographic mechanisms to protect the confidentiality of CUI during transport unless otherwise protected by alternative physical safeguards.",
   plain:"When CUI is transported on portable media — USB drives, external drives, laptops, backup tapes — it must be encrypted. If the media is lost or stolen in transit, encryption prevents the CUI from being accessed. Hardware-encrypted drives or software encryption (BitLocker To Go, VeraCrypt) are common implementations. Pre-shared key solutions where everyone uses the same password are not acceptable.",
   evidence:["Encryption requirement for portable media in policy documentation","Hardware-encrypted drive inventory or software encryption deployment records","Encryption key management documentation for portable media","Evidence that portable media leaving the facility is verified to be encrypted","Training records covering portable media encryption requirements"],
   questions:["What encryption solution is used for portable storage devices carrying CUI?","How do you verify that a drive is encrypted before it leaves the facility?","How is encryption key management handled — what happens if the key is lost?","Are there any exceptions to the portable storage encryption requirement? If so, what alternative safeguards are in place?"]},

  {id:"MP.L2-3.8.7",domain:"MP",domainFull:"Media Protection",title:"Removable Media",
   statement:"Control the use of removable media on system components.",
   plain:"Removable media (USB drives, external hard drives, SD cards, optical media) represents a significant data exfiltration and malware introduction risk. Use of removable media on CUI systems should be restricted to authorized media for authorized purposes. Technical controls — not just policy — should restrict which removable media can be used and by whom.",
   evidence:["Removable media policy defining authorization requirements","Technical controls restricting removable media use (GPO USB restrictions, endpoint agent)","Authorized removable media inventory with device IDs or serial numbers","Audit logs of removable media insertion events on CUI systems","Evidence of scanning removable media before use on CUI systems"],
   questions:["What technical controls restrict use of unauthorized removable media on CUI systems?","Is there a process for authorizing specific removable media devices — by serial number, certificate, or other identifier?","How do you detect unauthorized removable media insertion attempts?","What happens when someone plugs in unauthorized removable media — is it blocked, logged, or both?"]},

  {id:"MP.L2-3.8.8",domain:"MP",domainFull:"Media Protection",title:"Shared Media",
   statement:"Prohibit the use of portable storage devices when such devices have no identifiable owner.",
   plain:"Media of unknown origin — USB drives found in a parking lot, drives left by a departing employee without documentation, or media that cannot be traced to an authorized owner — must not be used on CUI systems. Unidentifiable media is a significant malware vector (the 'lost USB' attack is a real and effective social engineering technique). If you can't verify where it came from, it doesn't get plugged in.",
   evidence:["Policy prohibiting use of media without identifiable owner","Training records covering the risks of unknown media","Media inventory system showing ownership assignment for all authorized media","Incident records if unauthorized media was found or used","Technical controls blocking media without authorized device identifiers"],
   questions:["What is your policy regarding removable media of unknown origin — is it explicitly prohibited?","How are personnel trained to handle found or unidentified removable media?","What is the procedure when an employee finds a USB drive or other media with no clear owner?","How do you technically enforce ownership requirements — are only registered/authorized devices permitted?"]},

  {id:"MP.L2-3.8.9",domain:"MP",domainFull:"Media Protection",title:"Protect Backups",
   statement:"Protect the confidentiality of backup CUI at storage locations.",
   plain:"Backup media and backup data stores are often overlooked in security programs, but they contain the same CUI as your primary systems — sometimes more, because backups may retain historical data that was deleted from production. Backup tapes, cloud backup repositories, and backup server storage must have the same protections (encryption, access controls, physical security) as primary CUI systems.",
   evidence:["Backup encryption configuration and documentation","Physical or logical access controls on backup storage locations","Off-site backup transport and storage security documentation","Backup access control list showing only authorized personnel have access","Evidence that backup restores require authentication and authorization"],
   questions:["How are backups encrypted — at the application level, storage level, or both?","Who has access to backup storage, and how is that access controlled and audited?","How are backup tapes or off-site backup repositories protected during transport and at the storage facility?","When was the last time backup access was reviewed to ensure only currently authorized personnel have access?"]},

  // ── PERSONNEL SECURITY (PS) ───────────────────────────────────────────────
  {id:"PS.L2-3.9.1",domain:"PS",domainFull:"Personnel Security",title:"Screen Individuals",
   statement:"Screen individuals prior to authorizing access to organizational systems containing CUI.",
   plain:"Before granting someone access to CUI systems, you must screen them. For government contractors, this typically means background investigations appropriate to the level of access being granted. Screening must occur before access is granted — not after. This applies to employees, contractors, and any other individuals who will have access to CUI systems.",
   evidence:["Personnel screening policy defining screening requirements by access level","Background investigation records for current personnel with CUI access","Evidence that screening is completed before access is granted (not concurrent)","Contractor and vendor personnel screening requirements in contracts","Periodic rescreening records if applicable for long-tenured personnel"],
   questions:["What screening requirements apply to individuals before they receive access to CUI systems?","How do you ensure that access is not granted until screening is complete?","What are the screening requirements for contractors and temporary workers with CUI access?","How do you handle a situation where screening results in a disqualifying finding — is there an adjudication process?"]},

  {id:"PS.L2-3.9.2",domain:"PS",domainFull:"Personnel Security",title:"Termination & Transfer",
   statement:"Ensure that CUI and CUI systems are protected during and after personnel actions such as terminations and transfers.",
   plain:"When an employee leaves or changes roles, their access must be promptly revoked. This includes all system accounts, physical access credentials, shared secrets they may have known, and any CUI they had in their possession. Offboarding is a critical security control — many insider threat incidents involve employees whose access wasn't properly revoked. Transfer actions also require access to be reviewed and adjusted to the new role.",
   evidence:["Offboarding checklist covering all access revocation steps","Timeliness records showing access was revoked promptly upon termination (within 24 hours ideally)","HR-IT notification process for terminations and transfers","Evidence of CUI and device return process during offboarding","Transfer records showing access was reviewed and adjusted to reflect new role"],
   questions:["What is your offboarding process for access revocation, and how quickly is access terminated when an employee leaves?","How are you notified of terminations — is IT notified before, during, or after the employee's last day?","What happens to CUI in an employee's possession (email, files, physical documents) when they leave?","How do you handle access changes when an employee transfers to a role without CUI access requirements?"]},

  // ── PHYSICAL PROTECTION (PE) ──────────────────────────────────────────────
  {id:"PE.L1-3.10.1",domain:"PE",domainFull:"Physical Protection",title:"Limit Physical Access",
   statement:"Limit physical access to organizational systems to authorized individuals.",
   plain:"CUI systems, data centers, server rooms, and work areas where CUI is processed must be physically secured. Only authorized individuals should be able to physically access these areas. Badge readers, key pads, biometrics, or physical keys all work — the key is that access is controlled, not open to anyone who walks by. The server room must not double as the supply closet.",
   evidence:["Physical access control system configuration (badge reader, key card, biometric)","Authorized access list for CUI processing areas","Physical access logs showing entry/exit records","Physical security audit or walk-through documentation","Evidence of periodic review and update of authorized physical access list"],
   questions:["How is physical access to your CUI processing areas controlled — badge readers, key codes, other?","Who is on the authorized access list for your server rooms and CUI work areas, and when was it last reviewed?","How do you detect unauthorized physical access attempts?","What physical access controls apply outside of business hours when the facility is less occupied?"]},

  {id:"PE.L1-3.10.2",domain:"PE",domainFull:"Physical Protection",title:"Monitor Facility",
   statement:"Protect and monitor the physical facility and support infrastructure for organizational systems.",
   plain:"Physical monitoring — security cameras, alarms, guards, and environmental sensors — must be in place to protect the facility and the infrastructure that supports CUI systems. This includes monitoring for unauthorized entry, physical damage, and environmental conditions (fire, flood, temperature) that could compromise systems. Monitoring must be active and reviewed, not just installed.",
   evidence:["Physical security camera coverage documentation and locations","Alarm system configuration and monitoring records","Environmental monitoring (temperature, humidity, water detection) configuration","Physical security review or inspection records","Guard duty logs or security service contracts if applicable"],
   questions:["What physical monitoring is in place for your data center and CUI processing areas — cameras, alarms, environmental sensors?","Are security cameras monitored in real-time or only reviewed after an incident?","How are environmental conditions (temperature, power, water) monitored, and who is alerted if thresholds are exceeded?","When was the last physical security inspection or audit conducted?"]},

  {id:"PE.L1-3.10.3",domain:"PE",domainFull:"Physical Protection",title:"Escort Visitors",
   statement:"Escort visitors and monitor visitor activity in areas housing CUI systems.",
   plain:"Visitors — including vendors, contractors without full authorization, delivery personnel, and others who do not have a permanent authorized presence — must be escorted by an authorized individual when in areas where CUI is processed. Visitors should not be left unattended in server rooms, secure work areas, or anywhere they could access CUI systems or data.",
   evidence:["Visitor policy requiring escort in CUI areas","Visitor log showing visitor identity, purpose, escort name, and time in/out","Physical access controls preventing unescorted visitor entry","Training records covering escort responsibilities for authorized employees","Evidence of visitor badge system distinguishing visitors from employees"],
   questions:["What is your visitor policy for areas where CUI is processed — is escorting mandatory?","How are visitors identified and distinguished from employees — different badge colors, visitor badges?","How do you ensure that authorized employees understand their escort responsibilities?","What controls physically prevent a visitor from wandering into a CUI area unescorted?"]},

  {id:"PE.L1-3.10.4",domain:"PE",domainFull:"Physical Protection",title:"Physical Access Logs",
   statement:"Maintain audit logs of physical access.",
   plain:"Electronic access control systems must log all entry and exit events for CUI areas — who entered, when, and (for some systems) where they went. These logs support incident investigation (was the right person physically present when a breach occurred?) and compliance auditing. Logs must be retained for a defined period and reviewed periodically.",
   evidence:["Physical access control system log retention configuration","Sample physical access logs showing entry/exit records with timestamp and identity","Defined retention period for physical access logs in policy","Evidence of periodic physical access log review","Anomaly detection or alerting for after-hours or unusual physical access"],
   questions:["What physical access control system is in use, and what information does it log for each access event?","How long are physical access logs retained?","How are physical access logs reviewed — periodically, on demand, or with automated alerting for anomalies?","How do physical access logs integrate with your security monitoring — can you correlate physical and logical access events?"]},

  {id:"PE.L2-3.10.5",domain:"PE",domainFull:"Physical Protection",title:"Manage Physical Access",
   statement:"Control and manage physical access devices.",
   plain:"Physical access credentials — badge cards, key fobs, PIN codes, biometric enrollments — must be actively managed throughout their lifecycle. This means issuing them with authorization, revoking them promptly when no longer needed (terminated employee, lost badge), auditing who has what credentials, and replacing compromised access devices immediately. A lost badge that stays active is a physical security hole.",
   evidence:["Physical access credential inventory and assignment records","Revocation process documentation and evidence of timely revocation upon termination","Lost/stolen badge reporting and revocation procedure","Periodic audit of active physical credentials vs. current authorized personnel","Credential issuance authorization process documentation"],
   questions:["What is the process for issuing physical access credentials — who authorizes them?","How quickly are physical access credentials revoked when an employee is terminated or a badge is reported lost?","How often do you audit your physical access credential inventory to verify it matches current authorized personnel?","What happens when a credential is reported stolen — is it immediately deactivated, and is the incident documented?"]},

  {id:"PE.L2-3.10.6",domain:"PE",domainFull:"Physical Protection",title:"Alternative Work Sites",
   statement:"Enforce safeguards to protect CUI at alternate work sites.",
   plain:"If employees work remotely — from home, hotels, or other locations — and access or handle CUI there, the same security requirements apply. Home offices aren't as secure as corporate facilities, but there must be a baseline: encrypted laptops, VPN, a requirement not to print CUI at home, a clean workspace free from unauthorized individuals, etc. Telework policies must address CUI protection specifically.",
   evidence:["Telework/remote work policy addressing CUI handling requirements","Security requirements for home office environments (VPN, encryption, clean area)","Evidence employees acknowledged remote work security requirements","MDM enrollment and compliance evidence for remote worker devices","Training records covering CUI protection at alternate work sites"],
   questions:["What security requirements apply to employees who work remotely and access CUI?","How do you enforce security requirements at home offices — are they technically enforced or policy-only?","Are remote workers allowed to print CUI at home, and if so, what requirements govern that?","How do you ensure that unauthorized individuals (family members, housemates) cannot access CUI when an employee is working remotely?"]},

  // ── RISK ASSESSMENT (RA) ──────────────────────────────────────────────────
  {id:"RA.L2-3.11.1",domain:"RA",domainFull:"Risk Assessment",title:"Risk Assessments",
   statement:"Periodically assess the risk to organizational operations, organizational assets, and individuals, resulting from the operation of organizational systems and the associated processing, storage, or transmission of CUI.",
   plain:"Risk must be formally assessed on a regular basis — not just assumed or intuited. A risk assessment identifies threats, vulnerabilities, likelihood, and impact, and produces a prioritized view of what needs to be addressed. Risk assessments should feed your security investment decisions, your Plan of Action and Milestones (POA&M), and your System Security Plan. 'We did one three years ago' is not adequate.",
   evidence:["Risk assessment methodology documentation","Completed risk assessments with date and scope","Risk register or risk tracking documentation","Evidence that risk assessment findings feed into remediation planning","Periodic risk assessment schedule showing regular cadence"],
   questions:["When was your last formal risk assessment conducted, who performed it, and what was the scope?","What methodology do you use for risk assessment — NIST RMF, FAIR, or another framework?","How do risk assessment findings drive remediation priorities and resource allocation?","How often do you update your risk assessment — annually, or also after significant changes?"]},

  {id:"RA.L2-3.11.2",domain:"RA",domainFull:"Risk Assessment",title:"Vulnerability Scan",
   statement:"Scan for vulnerabilities in organizational systems and applications periodically and when new vulnerabilities potentially affecting those systems are identified.",
   plain:"You must regularly scan your systems for known vulnerabilities — and scan again when significant new vulnerabilities are announced (like a critical CVE). Vulnerability scanning is not the same as penetration testing — scanners identify known vulnerabilities based on signatures. Both authenticated and unauthenticated scans should be run. Results must be acted on, not just filed away.",
   evidence:["Vulnerability scanning tool configuration and scan schedule documentation","Recent vulnerability scan reports with findings for CUI systems","Evidence of out-of-cycle scanning when critical vulnerabilities are announced","Authenticated scan configuration evidence (scanner has credentials to perform deep scanning)","Scan result trend data showing remediation progress over time"],
   questions:["How frequently do you conduct vulnerability scans of CUI systems, and what tool is used?","Are your scans authenticated — does the scanner log in with credentials to find locally-exploitable vulnerabilities?","How quickly do you scan after a critical vulnerability (like a major CVE) is publicly announced?","How are vulnerability scan findings tracked and remediated — what is the expected remediation timeline by severity?"]},

  {id:"RA.L2-3.11.3",domain:"RA",domainFull:"Risk Assessment",title:"Vulnerability Remediation",
   statement:"Remediate vulnerabilities in accordance with risk assessments.",
   plain:"Finding vulnerabilities is only useful if you fix them. This control requires that vulnerabilities be remediated based on their risk level — critical vulnerabilities faster than low-risk ones. Remediation timelines should be defined in policy (e.g., critical in 15 days, high in 30 days) and tracked against those timelines. Unremediable vulnerabilities need compensating controls and risk acceptance documentation.",
   evidence:["Vulnerability remediation policy with defined timelines by severity","Vulnerability tracking system showing open, in-progress, and closed findings","Evidence of timely remediation meeting defined SLAs","Exception/risk acceptance documentation for vulnerabilities that cannot be immediately remediated","Trend reports showing reduction of open vulnerability count over time"],
   questions:["What are your defined remediation timelines for critical, high, medium, and low vulnerabilities?","How do you track open vulnerabilities to ensure they are remediated within required timeframes?","What happens when a critical vulnerability cannot be patched immediately — what compensating controls are implemented?","Can you show me a vulnerability from a recent scan and walk me through its remediation lifecycle?"]},

  // ── SECURITY ASSESSMENT (CA) ──────────────────────────────────────────────
  {id:"CA.L2-3.12.1",domain:"CA",domainFull:"Security Assessment",title:"Assess Security Controls",
   statement:"Periodically assess the security controls in organizational systems to determine if the controls are effective in their application.",
   plain:"You must regularly test and evaluate whether your security controls are actually working — not just documented. A policy that nobody follows, a firewall rule that's been misconfigured, or an MFA requirement with too many exceptions aren't effective controls even if they exist on paper. Security control assessments find the gap between what you say you do and what actually happens.",
   evidence:["Security control assessment plan and schedule","Assessment reports documenting control effectiveness findings","Evidence that assessments are performed by someone independent of the control owners","Remediation tracking for control deficiencies identified in assessments","History of control assessments showing periodic cadence"],
   questions:["How do you assess whether your documented security controls are actually effective and implemented correctly?","Who performs security control assessments — internal staff, or an independent third party?","When was the last control assessment performed, and what deficiencies were found?","How are control assessment findings tracked to remediation?"]},

  {id:"CA.L2-3.12.2",domain:"CA",domainFull:"Security Assessment",title:"Plan of Action",
   statement:"Develop and implement plans of action designed to correct deficiencies and reduce or eliminate vulnerabilities in organizational systems.",
   plain:"When security weaknesses are found — through assessments, scans, audits, or self-discovery — they must be tracked in a Plan of Action and Milestones (POA&M). A POA&M documents the finding, the planned remediation, the responsible party, and the target completion date. It's a commitment to fix what's broken, not just acknowledge it. POA&Ms must be actively managed and updated.",
   evidence:["POA&M document with all open findings, responsible parties, and target dates","Evidence of regular POA&M review and updates","Closed POA&M items with evidence of remediation","POA&M review meeting records or schedule","Integration of vulnerability scan findings and assessment findings into the POA&M"],
   questions:["Can you show me your current POA&M — how many open items are there, and what are the oldest ones?","Who owns the POA&M process, and how often is it formally reviewed?","How do new findings from vulnerability scans and control assessments get added to the POA&M?","What happens when a POA&M target date is missed — is there an escalation process?"]},

  {id:"CA.L2-3.12.3",domain:"CA",domainFull:"Security Assessment",title:"Monitor Security Controls",
   statement:"Monitor security controls on an ongoing basis to ensure the continued effectiveness of the controls.",
   plain:"Point-in-time assessments aren't enough — security controls must be monitored continuously or on a frequent ongoing basis to catch degradation, drift, or failure. Configuration drift, account creep, expired certificates, and disabled logging are examples of controls that can fail silently without ongoing monitoring. Continuous monitoring programs integrate automated tools, dashboards, and regular human review.",
   evidence:["Continuous monitoring plan or program documentation","Automated monitoring tool deployment evidence (SIEM, vulnerability scanner, configuration compliance)","Regular monitoring reports or dashboards showing control health","Evidence that monitoring covers all key control categories","Monitoring findings log showing issues identified and remediated between formal assessments"],
   questions:["What ongoing monitoring activities occur between formal assessments — automated scanning, log review, configuration compliance?","How do you detect when a security control has failed or degraded since the last formal assessment?","What is your continuous monitoring cadence — daily, weekly, monthly — for different control types?","Can you show me a recent monitoring finding that was identified and remediated between formal assessments?"]},

  {id:"CA.L2-3.12.4",domain:"CA",domainFull:"Security Assessment",title:"System Security Plan",
   statement:"Develop, document, and periodically update system security plans that describe system boundaries, system environments of operation, how security requirements are implemented, and the relationships with or connections to other systems.",
   plain:"Your environment must be documented in a System Security Plan (SSP). The SSP describes what systems you have, where CUI lives, how each security requirement is implemented or planned to be implemented, and how systems interconnect. The SSP is the foundational document for CMMC assessment — assessors use it as the starting point. An outdated or incomplete SSP is a major finding.",
   evidence:["SSP document with current version and approval date","SSP coverage of all 110 CMMC Level 2 practices","System boundary and data flow diagrams referenced in the SSP","Interconnection documentation within the SSP","Evidence of periodic SSP review and update (at least annually or after significant changes)"],
   questions:["Can I review your System Security Plan — when was it last updated and by whom?","Does the SSP cover your entire CUI environment, including all connected systems and third-party services?","How do you ensure the SSP stays current as your environment changes?","How do assessors or authorizing officials use your SSP — is it provided during the assessment process?"]},

  // ── SYSTEM & COMMUNICATIONS PROTECTION (SC) ──────────────────────────────
  {id:"SC.L1-3.13.1",domain:"SC",domainFull:"System & Comms Protection",title:"Boundary Protection",
   statement:"Monitor, control, and protect communications at the external boundary of the system and at key internal boundaries within the system.",
   plain:"Your network must have clearly defined boundaries, with controls at those boundaries — firewalls, intrusion detection systems, proxies — that monitor and control what crosses them. This applies to the external internet boundary and to internal boundaries between network segments. Communications crossing boundaries must be inspected and controlled, not just passed through.",
   evidence:["Network architecture diagram showing external and internal boundary locations","Firewall ruleset documentation (or representative sample) for boundary devices","IDS/IPS configuration and alert logs at network boundaries","Boundary protection device configuration management documentation","Evidence of periodic firewall rule review"],
   questions:["Show me your network architecture — where are your network boundaries, and what controls protect them?","How are firewall rules reviewed and maintained — how often, and by whom?","Is intrusion detection deployed at your network boundaries, and are alerts actively monitored?","How do you handle internal network segmentation — are CUI systems in a separate segment from general IT?"]},

  {id:"SC.L2-3.13.2",domain:"SC",domainFull:"System & Comms Protection",title:"Security Engineering",
   statement:"Employ architectural designs, software development techniques, and systems engineering principles that promote effective information security within organizational systems.",
   plain:"Security must be designed in from the start, not bolted on afterward. This means applying secure design principles when building or acquiring systems: defense in depth, fail-safe defaults, least privilege built into the architecture, security requirements in procurement, and security reviews during development. 'We'll add security later' results in much harder-to-fix problems.",
   evidence:["System design documentation showing security requirements integration","Secure design principles or standards referenced in architecture documentation","Security review gate in the system development lifecycle (SDLC)","Procurement requirements documentation including security requirements for vendors","Evidence of security architecture review for major system changes or acquisitions"],
   questions:["How is security incorporated into your system design and procurement processes — is there a security architecture review?","What secure design principles guide your architecture decisions — defense in depth, zero trust, fail-safe?","How are security requirements specified when procuring new systems or services?","Can you walk me through a recent system acquisition or major change and how security was incorporated from the start?"]},

  {id:"SC.L2-3.13.3",domain:"SC",domainFull:"System & Comms Protection",title:"Role Separation",
   statement:"Separate user functionality from system management functionality.",
   plain:"Users doing their job work should not be in the same session, interface, or network context as system administration functions. Admin interfaces should be on separate management networks or accessible only from designated administrative workstations. User-facing functionality (the production application) should be architecturally separate from administration consoles and management interfaces.",
   evidence:["Network architecture documentation showing management network separation","Administrative interfaces accessible only from designated admin workstations or jump servers","Evidence that user-facing applications do not expose admin functionality to regular users","Role-based access configuration in applications separating user and admin functions","Documented policy requiring separate sessions for user work and administrative tasks"],
   questions:["How is administrative functionality separated from user functionality in your environment — at the network level, application level, or both?","Can a regular user access administrative interfaces or management consoles of CUI systems?","Are administrative management interfaces on a separate network segment inaccessible from the user network?","How do administrators access management interfaces — jump server, dedicated workstation, VPN to a management network?"]},

  {id:"SC.L2-3.13.4",domain:"SC",domainFull:"System & Comms Protection",title:"Shared Resource Control",
   statement:"Prevent unauthorized and unintended information transfer via shared system resources.",
   plain:"When systems share resources — memory, disk, processing, network buffers — one user or process shouldn't be able to read data left behind by another. Shared memory exploitation, cache-based side-channel attacks, and residual data in shared storage are all risks. This requires OS-level controls, proper application isolation, and ensuring data is cleared from shared resources between users or sessions.",
   evidence:["Operating system configuration documentation showing process and memory isolation","Evidence of disk space clearing/zeroing on shared storage","Hypervisor configuration showing VM isolation controls","Application documentation confirming user sessions are isolated from each other","Security testing evidence for shared resource attacks (side channels, residual data)"],
   questions:["How does your environment prevent one user or process from accessing data in shared resources left by another?","What hypervisor controls isolate VMs from each other in shared infrastructure?","How do you ensure that cleared disk space doesn't contain residual CUI accessible to subsequent users?","Have shared resource isolation mechanisms been included in security testing or penetration testing?"]},

  {id:"SC.L2-3.13.5",domain:"SC",domainFull:"System & Comms Protection",title:"Public-Access System Separation",
   statement:"Implement subnetworks for publicly accessible system components that are physically or logically separated from internal networks.",
   plain:"Any system component that faces the internet must live in a DMZ — isolated from your internal CUI network. If an attacker compromises your public-facing web server, they should not have a direct path to your internal CUI systems. The DMZ acts as a buffer zone. Firewall rules between the DMZ and internal network must be strictly limited to only necessary communications.",
   evidence:["Network architecture diagram showing DMZ and internal network segmentation","Firewall rules confirming restricted traffic between DMZ and internal CUI networks","Evidence that public-facing systems do not store or directly process CUI","Penetration test results validating DMZ segmentation effectiveness","VLAN or physical network segmentation configuration documentation"],
   questions:["Show me your network diagram — where are public-facing systems relative to CUI systems?","What firewall rules prevent a compromised DMZ host from reaching internal CUI systems?","Are there any direct connections between your DMZ and CUI networks? If so, justify them.","How do you test and validate that segmentation controls are working?"]},

  {id:"SC.L2-3.13.6",domain:"SC",domainFull:"System & Comms Protection",title:"Network Communication by Exception",
   statement:"Deny network communications traffic by default and allow network communications traffic by exception (i.e., deny all, permit by exception).",
   plain:"Your network firewall default posture should be to deny all traffic, with only explicitly approved communications permitted. 'Permit all, block known-bad' (blacklisting) is far weaker than 'deny all, permit known-good' (allowlisting). This deny-by-default approach ensures that new, unexpected, or unauthorized network flows are blocked automatically rather than requiring an administrator to discover and block them.",
   evidence:["Firewall configuration documentation showing default-deny rule at the end of each ruleset","Evidence of rule review process ensuring all permit rules are justified","Network flow analysis showing denied traffic","Firewall rule management documentation and approval process for new rules","Penetration test results confirming unexpected traffic is blocked"],
   questions:["Is your firewall configured with a default-deny rule — does traffic that doesn't match an explicit permit get dropped?","How is a new firewall permit rule requested and approved?","How do you review existing firewall rules to ensure all permits are still justified and necessary?","How would you detect if an unexpected network flow was occurring between systems that should not communicate?"]},

  {id:"SC.L2-3.13.7",domain:"SC",domainFull:"System & Comms Protection",title:"Split Tunneling",
   statement:"Prevent remote devices from simultaneously establishing non-remote connections with the system and local connections to resources in other domains (i.e., split tunneling).",
   plain:"Split tunneling allows a VPN user to simultaneously route some traffic through the VPN and some directly to the internet via their local connection. This is dangerous because malware or unauthorized access can exploit the local connection to reach your VPN-connected systems. Full tunnel VPN (all traffic goes through the corporate tunnel) prevents this by routing all traffic through the monitored corporate infrastructure.",
   evidence:["VPN configuration documentation showing split tunneling is disabled (full tunnel mode)","Network capture or routing table evidence confirming all traffic routes through VPN","Policy requiring full tunnel VPN for remote access to CUI systems","Remote access security testing confirming split tunneling is not possible","Evidence of how internet browsing is handled for remote users (through corporate proxy via VPN)"],
   questions:["Is split tunneling enabled or disabled on your VPN? Can you demonstrate this technically?","How is internet traffic handled for remote users who are connected to the VPN — does it go through corporate infrastructure or directly out their local internet connection?","What are the security implications of your current VPN routing design?","Have you tested to confirm that a remote user cannot simultaneously access CUI systems via VPN and other networks directly?"]},

  {id:"SC.L2-3.13.8",domain:"SC",domainFull:"System & Comms Protection",title:"Data in Transit",
   statement:"Implement cryptographic mechanisms to prevent unauthorized disclosure of CUI during transmission unless otherwise protected by alternative physical safeguards.",
   plain:"CUI must be encrypted whenever it is transmitted over any network — internal or external, wired or wireless. TLS for web applications, encrypted email (S/MIME or PGP), encrypted VPN tunnels, SFTP instead of FTP — any path that CUI travels over must be protected by cryptography. This includes internal network transmission, not just communication across the internet.",
   evidence:["TLS configuration documentation for all CUI-transmitting applications","Email encryption policy and implementation evidence","File transfer protocol configuration (SFTP, FTPS in place of FTP)","Network capture analysis confirming traffic is encrypted","Certificate management documentation for encryption infrastructure"],
   questions:["How is CUI encrypted when transmitted across your internal network — is TLS enforced for all internal communications?","Are there any unencrypted protocols in use for CUI transmission — FTP, HTTP, Telnet?","How do you manage TLS certificates for CUI applications — how do you ensure they don't expire?","Has a network capture or security assessment confirmed that CUI is not transmitted in clear text anywhere?"]},

  {id:"SC.L2-3.13.9",domain:"SC",domainFull:"System & Comms Protection",title:"Connections Termination",
   statement:"Terminate network connections after a defined period of inactivity or at the end of a communication session.",
   plain:"Network sessions — whether TCP connections, VPN tunnels, or application sessions — should not remain open indefinitely after activity has ceased. Idle sessions are an attack vector: a hijacked idle session can be used by an attacker without the legitimate user noticing. Timeouts should be enforced at the network device level (firewalls, load balancers) as well as at the application level.",
   evidence:["Firewall or load balancer timeout configuration documentation","Application session timeout settings for web applications handling CUI","VPN session idle timeout configuration","Network device configuration showing connection state timeout values","Evidence of testing that idle sessions are terminated within the defined period"],
   questions:["What timeout period is configured for network connections and VPN sessions?","How are session timeouts enforced — at the network device, application, or both levels?","Can you demonstrate that an idle network session to a CUI system terminates after the defined period?","How do timeout settings balance security with user experience — what was the rationale for the configured values?"]},

  {id:"SC.L2-3.13.10",domain:"SC",domainFull:"System & Comms Protection",title:"Key Management",
   statement:"Establish and manage cryptographic keys for required cryptography employed in organizational systems.",
   plain:"Encryption is only as good as key management. Cryptographic keys must be generated securely, stored protectively, rotated regularly, and destroyed properly at end of life. Lost or exposed keys compromise all data encrypted with them. A key management process must cover the full key lifecycle: generation, distribution, storage, use, rotation, and destruction.",
   evidence:["Key management policy covering full key lifecycle","Key management system or HSM (Hardware Security Module) documentation","Key rotation schedule and evidence of rotation occurring","Evidence of secure key storage (HSM, key vault, encrypted key store)","Procedure for key compromise response (what happens if a key is exposed)"],
   questions:["How are cryptographic keys generated, stored, and protected in your environment?","What is your key rotation policy — how often are keys rotated, and how is rotation implemented without service interruption?","If a cryptographic key were compromised, what is the response process — how quickly can keys be revoked and replaced?","Are your keys stored in an HSM or dedicated key management system, or are they stored on the systems that use them?"]},

  {id:"SC.L2-3.13.11",domain:"SC",domainFull:"System & Comms Protection",title:"CUI Encryption",
   statement:"Employ FIPS-validated cryptography when used to protect the confidentiality of CUI.",
   plain:"When encrypting CUI, the cryptographic modules used must be FIPS 140-2 or 140-3 validated. This means using government-approved, tested implementations — not just any encryption library. Windows with FIPS mode enabled, OpenSSL with FIPS module, and hardware HSMs with FIPS validation are common implementations. Using AES-256 isn't enough by itself if the implementation isn't FIPS-validated.",
   evidence:["FIPS mode configuration documentation for Windows systems handling CUI","FIPS-validated cryptographic module certificates for encryption solutions in use","Vendor documentation confirming FIPS validation for encryption products","FIPS compliance verification evidence from security assessments","TLS configuration confirming only FIPS-approved cipher suites are allowed"],
   questions:["What FIPS-validated cryptographic modules or products are used to encrypt CUI?","Is Windows FIPS mode enabled on systems handling CUI, and what impact has that had on application compatibility?","How do you verify that third-party encryption tools used for CUI are FIPS-validated — do you check the NIST CMVP database?","Are there any encryption implementations in use that are not FIPS-validated? If so, what is the remediation plan?"]},

  {id:"SC.L2-3.13.12",domain:"SC",domainFull:"System & Comms Protection",title:"Collaborative Device Control",
   statement:"Prohibit remote activation of collaborative computing devices and provide indication of use to users present at the device.",
   plain:"Collaboration devices — cameras, microphones, screen sharing — must not be remotely activatable without the knowledge of the person at the device. A conference room camera that can be activated remotely without any indication is a surveillance risk. If CUI is discussed in that room, unauthorized parties could listen in. Physical indicators (LEDs, on-screen notifications) must alert users when devices are active.",
   evidence:["Policy prohibiting remote activation of cameras and microphones without user consent","Technical configuration showing cameras and microphones cannot be enabled remotely without user indication","Evidence of hardware privacy indicators (LED lights) on cameras and microphones","Conferencing system configuration documentation","Security review of collaboration platform settings related to remote activation"],
   questions:["Can cameras or microphones in your CUI work areas be remotely activated without a physical indicator alerting the people present?","How are collaborative computing devices (conference room systems, laptops) configured to prevent unauthorized remote activation?","What indication is provided to users when a camera or microphone is active?","How do you manage collaboration platforms (Zoom, Teams, Webex) to ensure they cannot be used for unauthorized surveillance?"]},

  {id:"SC.L2-3.13.13",domain:"SC",domainFull:"System & Comms Protection",title:"Mobile Code",
   statement:"Control and monitor the use of mobile code.",
   plain:"Mobile code — JavaScript, Java applets, ActiveX, Flash, and similar content that downloads and executes in a browser or client — must be controlled. Malicious mobile code is a common malware delivery mechanism. This means controlling which types of mobile code are allowed to execute, from which sources, and monitoring for mobile code execution. Browser hardening policies and web proxies with content inspection help implement this.",
   evidence:["Browser configuration policy restricting unauthorized mobile code execution","Web proxy content filtering configuration blocking malicious mobile code sources","Endpoint protection signatures detecting malicious mobile code","Application allowlisting coverage of browser extensions and plugins","Policy documenting approved mobile code types and sources"],
   questions:["How do you control what mobile code can execute in browsers on CUI systems — are there restrictions on JavaScript sources, browser extensions, or plugin types?","Is there a web proxy or content filter inspecting mobile code before it reaches endpoints?","How do you prevent browser extensions and plugins that are not authorized from running on CUI systems?","What monitoring is in place to detect malicious mobile code execution on endpoints?"]},

  {id:"SC.L2-3.13.14",domain:"SC",domainFull:"System & Comms Protection",title:"VoIP",
   statement:"Control and monitor the use of Voice over Internet Protocol (VoIP) technologies.",
   plain:"VoIP systems can be a path for eavesdropping, unauthorized outbound calls, or data exfiltration if not properly secured. VoIP traffic carrying discussions of CUI must be encrypted, access to VoIP systems must be controlled, and the use of VoIP infrastructure must be monitored. This includes both desk phones and software-based VoIP (Teams, Zoom, WebEx) used in environments where CUI is discussed.",
   evidence:["VoIP encryption configuration (SRTP, TLS-protected SIP signaling)","VoIP access control documentation showing only authorized users can make calls","VoIP call logging and monitoring configuration","Approved VoIP platform list and prohibition of unauthorized VoIP applications","Security assessment of VoIP infrastructure"],
   questions:["Is VoIP traffic encrypted — are you using SRTP for media and TLS for SIP signaling?","How is access to your VoIP system controlled — can unauthorized users make or receive calls?","Are VoIP calls involving CUI discussions monitored or logged?","Are unauthorized VoIP applications (consumer VoIP tools) prohibited on networks where CUI is discussed?"]},

  {id:"SC.L2-3.13.15",domain:"SC",domainFull:"System & Comms Protection",title:"Communications Authenticity",
   statement:"Protect the authenticity of communications sessions.",
   plain:"Communications must be protected against session hijacking and man-in-the-middle attacks. An attacker who can intercept and inject traffic into a communication session can impersonate legitimate parties, modify data in transit, or steal session tokens. TLS with proper certificate validation, mutual TLS for critical system-to-system communications, and anti-spoofing measures protect communication authenticity.",
   evidence:["TLS implementation documentation confirming proper certificate validation","Evidence that certificate pinning or mutual TLS is used for high-value system communications","Anti-spoofing controls documentation (IP spoofing, email spoofing prevention - SPF, DKIM, DMARC)","Session token security documentation (HTTPOnly, Secure flags, token rotation)","Web application security testing results covering session management"],
   questions:["How do you prevent session hijacking in web applications handling CUI — what session security controls are implemented?","Is mutual TLS used for system-to-system API communications involving CUI?","How do you protect against man-in-the-middle attacks — are certificates validated properly, and is HSTS enforced?","What email authentication controls (SPF, DKIM, DMARC) are implemented to prevent email spoofing?"]},

  {id:"SC.L2-3.13.16",domain:"SC",domainFull:"System & Comms Protection",title:"Data at Rest",
   statement:"Protect the confidentiality of CUI at rest.",
   plain:"CUI stored on any system — servers, workstations, databases, backups, file shares — must be encrypted or otherwise protected so that unauthorized access to the storage medium doesn't result in CUI exposure. Full-disk encryption for endpoints, database encryption, and encrypted file shares are common implementations. The encryption must be meaningful — not just a folder set to read-only.",
   evidence:["Full-disk encryption deployment documentation for servers and workstations handling CUI","Database encryption configuration (TDE - Transparent Data Encryption)","File share encryption or access control documentation","Encryption key management for data-at-rest protection","Evidence that CUI is not stored on unencrypted portable or removable media"],
   questions:["How is CUI protected at rest on servers and workstations — full-disk encryption, file-level encryption, database encryption?","Is database encryption (TDE) implemented for databases storing CUI?","How do you ensure that CUI is not stored on unencrypted systems or locations — is there a data inventory?","What encryption standard and key length are used for data-at-rest protection?"]},

  // ── SYSTEM & INFORMATION INTEGRITY (SI) ───────────────────────────────────
  {id:"SI.L1-3.14.1",domain:"SI",domainFull:"System & Info Integrity",title:"Flaw Remediation",
