<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CMMC L2">
<title>CMMC Level 2 Study</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #f78166;
    --muted: #8b949e;
    --text: #e6edf3;
    --text2: #c9d1d9;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --radius: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; font-size: 15px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; padding-top: max(12px, env(safe-area-inset-top, 12px)); }
  .header-title { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: .05em; text-transform: uppercase; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: var(--mono); }
  .random-btn { background: var(--accent); color: #0d1117; border: none; border-radius: var(--radius); padding: 8px 14px; font-family: var(--mono); font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: .03em; transition: opacity .15s; white-space: nowrap; }
  .random-btn:active { opacity: .75; }
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 14px; font-size: 12px; font-family: var(--mono); color: var(--muted); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; flex-shrink: 0; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .list-view { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: calc(12px + var(--safe-bottom)); }
  .control-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s, background .15s; }
  .control-card:active { background: var(--surface2); border-color: var(--accent); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .card-id { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
  .card-domain-badge { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; border: 1px solid; flex-shrink: 0; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 5px; }
  .card-preview { font-size: 12px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .confidence-pill { font-size: 10px; font-family: var(--mono); padding: 2px 8px; border-radius: 20px; border: 1px solid; }
  .confidence-none { color: var(--muted); border-color: var(--border); }
  .confidence-needs { color: var(--warn); border-color: var(--warn); }
  .confidence-good { color: var(--accent2); border-color: var(--accent2); }
  .chevron { color: var(--muted); font-size: 14px; }
  .detail-view { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
  .detail-view.visible { display: flex; }
  .detail-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; flex-shrink: 0; }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--accent); font-family: var(--mono); font-size: 12px; cursor: pointer; margin-bottom: 12px; background: none; border: none; padding: 0; }
  .back-btn:active { opacity: .7; }
  .detail-id { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .detail-title { font-size: 17px; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 8px; }
  .detail-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(80px + var(--safe-bottom)); }
  .section { margin-bottom: 20px; }
  .section-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-body { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; font-size: 14px; line-height: 1.65; color: var(--text2); }
  .section-body.plain { background: var(--surface2); border-color: var(--accent); border-left-width: 3px; }
  .evidence-list, .question-list { list-style: none; padding: 0; }
  .evidence-list li, .question-list li { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); line-height: 1.55; display: flex; gap: 10px; align-items: flex-start; }
  .evidence-list li:last-child, .question-list li:last-child { border-bottom: none; }
  .evidence-list li::before { content: '▸'; color: var(--accent2); flex-shrink: 0; margin-top: 1px; }
  .question-list li::before { content: 'Q'; font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--warn); background: rgba(247,129,102,.15); border-radius: 3px; padding: 1px 5px; flex-shrink: 0; margin-top: 2px; }
  .confidence-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; padding-bottom: calc(12px + var(--safe-bottom)); display: none; gap: 10px; }
  .confidence-bar.visible { display: flex; }
  .conf-btn { flex: 1; padding: 10px; border-radius: var(--radius); border: 1px solid; font-family: var(--mono); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: opacity .15s; background: transparent; }
  .conf-btn:active { opacity: .7; }
  .conf-btn.needs { color: var(--warn); border-color: var(--warn); }
  .conf-btn.needs.selected { background: rgba(247,129,102,.2); }
  .conf-btn.good { color: var(--accent2); border-color: var(--accent2); }
  .conf-btn.good.selected { background: rgba(63,185,80,.2); }
  .domain-AC { color: #58a6ff; border-color: #58a6ff; }
  .domain-AT { color: #ff7b72; border-color: #ff7b72; }
  .domain-AU { color: #ffa657; border-color: #ffa657; }
  .domain-CM { color: #e3b341; border-color: #e3b341; }
  .domain-IA { color: #d2a8ff; border-color: #d2a8ff; }
  .domain-IR { color: #79c0ff; border-color: #79c0ff; }
  .domain-MA { color: #56d364; border-color: #56d364; }
  .domain-MP { color: #ffa657; border-color: #ffa657; }
  .domain-PS { color: #f0883e; border-color: #f0883e; }
  .domain-PE { color: #a5d6ff; border-color: #a5d6ff; }
  .domain-RA { color: #ff7b72; border-color: #ff7b72; }
  .domain-CA { color: #7ee787; border-color: #7ee787; }
  .domain-SC { color: #56d364; border-color: #56d364; }
  .domain-SI { color: #f78166; border-color: #f78166; }
  .filter-bar { padding: 10px 12px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
  .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; color: var(--text); font-family: var(--sans); font-size: 14px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .count-badge { font-family: var(--mono); font-size: 11px; color: var(--muted); align-self: center; white-space: nowrap; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-family: var(--mono); font-size: 13px; }
  @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .detail-view.visible { animation: slideIn .2s ease-out; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">CMMC Level 2</div>
    <div class="header-sub" id="progressLabel">Loading...</div>
  </div>
  <button class="random-btn" onclick="goRandom()">⚡ Random</button>
</div>
<div class="tabs" id="domainTabs">
  <div class="tab active" data-domain="ALL" onclick="filterDomain('ALL',this)">All</div>
</div>
<div class="main" id="listMain">
  <div class="filter-bar">
    <input class="search-input" type="search" placeholder="Search controls..." id="searchInput" oninput="applyFilter()">
    <span class="count-badge" id="countBadge"></span>
  </div>
  <div class="list-view" id="listView"></div>
</div>
<div class="detail-view" id="detailView">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="detail-id" id="dId"></div>
    <div class="detail-title" id="dTitle"></div>
    <div class="detail-badges" id="dBadges"></div>
  </div>
  <div class="detail-content">
    <div class="section"><div class="section-label">Control Statement</div><div class="section-body" id="dStatement"></div></div>
    <div class="section"><div class="section-label">Plain Language</div><div class="section-body plain" id="dPlain"></div></div>
    <div class="section"><div class="section-label">Evidence to Collect</div><div class="section-body" style="padding:0;overflow:hidden;"><ul class="evidence-list" id="dEvidence"></ul></div></div>
    <div class="section"><div class="section-label">Assessor Questions</div><div class="section-body" style="padding:0;overflow:hidden;"><ul class="question-list" id="dQuestions"></ul></div></div>
  </div>
</div>
<div class="confidence-bar" id="confBar">
  <button class="conf-btn needs" id="btnNeeds" onclick="setConfidence('needs')">Needs Review</button>
  <button class="conf-btn good" id="btnGood" onclick="setConfidence('good')">Confident ✓</button>
</div>
<script>
const CONTROLS = [
  // ── ACCESS CONTROL (AC) ──────────────────────────────────────────────────
  {id:"AC.L1-3.1.1",domain:"AC",domainFull:"Access Control",title:"Authorized Access Control",
   statement:"Limit system access to authorized users, processes acting on behalf of authorized users, and devices (including other systems).",
   plain:"Only people and systems that are explicitly authorized should be able to reach your systems. Think of it like a keycard system — if you're not on the approved list, you can't get in. This applies to human users, automated processes, and connected devices alike. Authorization must be documented and enforced technically, not just on paper.",
   evidence:["User account inventory with associated roles and access levels","Access request and approval records showing authorization workflow","Active Directory or IdP group membership exports tied to access decisions","Periodic access review/recertification records (e.g., quarterly)","Technical configuration showing role-based or attribute-based access enforcement"],
   questions:["How does your organization determine who is authorized to access CUI systems, and what is the documented approval process?","Walk me through what happens when a new employee needs access to a controlled system — who approves, what is provisioned, and how is it tracked?","How are service accounts and shared accounts handled, and are generic accounts prohibited?","What controls prevent an unauthorized device from connecting to systems that process CUI?"]},

  {id:"AC.L1-3.1.2",domain:"AC",domainFull:"Access Control",title:"Transaction & Function Control",
   statement:"Limit system access to the types of transactions and functions that authorized users are permitted to execute.",
   plain:"Authorization isn't just about who can log in — it's about what they can do once they're in. A helpdesk technician shouldn't be able to modify firewall rules. A read-only analyst shouldn't be able to delete records. This control requires that permissions be scoped to only the functions each role actually needs. Role-based access control (RBAC) is the most common implementation.",
   evidence:["Role definitions matrix mapping job functions to permitted system actions","RBAC or ABAC configuration exports from systems handling CUI","Demonstration that users cannot perform functions outside their defined role","Privileged access workstation (PAW) or just-in-time access documentation for admin functions","Sample screenshots showing permission boundaries enforced in key systems"],
   questions:["How are user roles defined, and who is responsible for mapping roles to permitted transactions?","Can you demonstrate that a standard user cannot perform administrative functions in your CUI systems?","How often are role definitions reviewed to ensure they still match job functions?","What happens when someone needs temporary elevated access — is there a formal process and is it logged?"]},

  {id:"AC.L2-3.1.3",domain:"AC",domainFull:"Access Control",title:"Control CUI Flow",
   statement:"Control the flow of CUI in accordance with approved authorizations.",
   plain:"Even authorized users shouldn't be able to move CUI wherever they want. This control is about governing how information travels — between systems, networks, and to external destinations. CUI shouldn't flow to personal email, unapproved cloud storage, or unauthorized networks. You need technical controls, not just policy, to enforce these boundaries.",
   evidence:["Data flow diagrams showing approved CUI pathways between systems and networks","DLP (Data Loss Prevention) tool configuration and policy documentation","Email gateway rules restricting CUI transmission to unauthorized destinations","Network segmentation documentation showing CUI system boundaries","Approved cloud/external service list for CUI handling with authorization rationale"],
   questions:["How do you technically prevent CUI from being sent to unauthorized destinations such as personal email or consumer cloud storage?","Is there a documented and approved list of systems and services through which CUI may flow?","What controls prevent a user from copying CUI to a personal USB drive or unauthorized cloud account?","How would you detect if CUI left your environment through an unauthorized channel, and what is the response process?"]},

  {id:"AC.L2-3.1.4",domain:"AC",domainFull:"Access Control",title:"Separation of Duties",
   statement:"Separate the duties of individuals to reduce the risk of malevolent activity without collusion.",
   plain:"No single person should have unchecked control over a critical process. Separation of duties means that the person who approves a transaction shouldn't also be the one who executes it, and the person who writes code shouldn't be the only one who deploys it. This limits the damage any one insider can do and forces collusion for fraud or sabotage.",
   evidence:["Role matrix documenting separation of duties for critical functions","System configuration showing no single account has conflicting privileges","Change management workflow evidence showing distinct approver and implementer roles","Audit log samples demonstrating different identities for approval vs. execution steps","Documentation of compensating controls where true separation isn't technically feasible"],
   questions:["What critical functions in your environment have separation of duties enforced, and how is it technically implemented?","Can a single administrator both approve and execute a change to a CUI system without another person's involvement?","How are conflicts of interest identified when assigning roles and permissions?","Where separation of duties is not fully achievable, what compensating controls are in place?"]},

  {id:"AC.L2-3.1.5",domain:"AC",domainFull:"Access Control",title:"Least Privilege",
   statement:"Employ the principle of least privilege, including for specific security functions and privileged accounts.",
   plain:"Every user, process, and system should have only the minimum access needed to do its job — nothing more. An admin managing a backup system shouldn't also have domain admin rights. A read-only reporting account shouldn't have write access. Least privilege limits blast radius when an account is compromised and reduces insider risk. This is one of the most commonly cited deficiencies in CMMC assessments.",
   evidence:["Privileged account inventory with justification for each elevated privilege granted","Evidence of regular privilege reviews with documented removal of unnecessary access","Configuration screenshots showing standard users do not have local admin rights","Comparison of what users have versus what their job role requires","Just-in-time (JIT) or just-enough-access (JEA) implementation documentation if applicable"],
   questions:["How do you enforce least privilege — is it a manual review process, automated tooling, or both?","Do standard end users have local administrator rights on their workstations? If so, why, and what is the remediation plan?","When was the last privilege review conducted, and how many accounts had access removed as a result?","How are service account privileges managed to ensure they have only what is needed for their function?"]},

  {id:"AC.L2-3.1.6",domain:"AC",domainFull:"Access Control",title:"Non-Privileged Account Use",
   statement:"Use non-privileged accounts or roles when accessing non-security functions.",
   plain:"Administrators should not use their privileged accounts for everyday tasks like browsing the web, reading email, or running standard applications. A separate, standard user account should be used for normal work, with privileged credentials only used when actually performing administrative tasks. This dramatically reduces the attack surface if a phishing email or malware compromises a daily-use account.",
   evidence:["Policy documentation requiring separate accounts for privileged vs. standard activity","Evidence that admin accounts are not used for email, web browsing, or general productivity","Privileged Access Workstation (PAW) or jump server configuration documentation","Audit log samples showing admin accounts used only for administrative sessions","User interviews or attestations confirming dual-account usage practices"],
   questions:["Do your administrators have separate accounts for daily use versus administrative tasks?","Can you show me that your privileged accounts are not configured with email clients or used for general internet browsing?","What technical controls enforce that admins use standard accounts for routine work?","How do you detect when a privileged account is used outside of expected administrative contexts?"]},

  {id:"AC.L2-3.1.7",domain:"AC",domainFull:"Access Control",title:"Privileged Functions",
   statement:"Prevent non-privileged users from executing privileged functions and capture the execution of such functions in audit logs.",
   plain:"Regular users must be blocked — technically, not just by policy — from performing administrative actions. And when privileged functions are executed, they must be logged so there is an audit trail. This means audit logging must capture who ran what privileged command, when, and from where. Simply having a policy that says 'don't do admin things' without technical enforcement doesn't satisfy this control.",
   evidence:["Technical configuration showing standard users cannot execute privileged commands (e.g., UAC settings, sudo restrictions)","Audit log configuration showing privileged function execution is captured","Sample audit logs demonstrating privileged actions are recorded with user identity and timestamp","SIEM or log management system showing privileged activity monitoring","Evidence that log tampering by privileged users is prevented or detected"],
   questions:["What technical controls prevent a standard user from running administrative commands or accessing privileged system functions?","Show me an example audit log entry for a privileged function execution — what information is captured?","How are privileged function logs protected from tampering by the administrators who generated them?","How long are privileged activity audit logs retained, and who reviews them?"]},

  {id:"AC.L2-3.1.8",domain:"AC",domainFull:"Access Control",title:"Unsuccessful Logon Attempts",
   statement:"Limit unsuccessful logon attempts.",
   plain:"After a defined number of failed login attempts, the system should lock the account or introduce a delay to prevent brute-force password attacks. This is a basic but important control. The lockout threshold, duration, and reset process should be documented and consistently enforced across all systems that handle CUI — not just the primary directory.",
   evidence:["Account lockout policy documentation with defined threshold and lockout duration","Active Directory or IdP configuration screenshots showing lockout policy enforcement","Evidence that lockout policy is applied consistently across all CUI systems and applications","Help desk records showing account lockout reset procedures","Audit logs capturing failed logon attempts and subsequent lockout events"],
   questions:["What is your account lockout threshold, and after how many failed attempts does lockout occur?","How long does an account remain locked, and what is the process to unlock it — can users self-unlock, or must an admin intervene?","Is the lockout policy consistently applied across all systems that handle CUI, including legacy applications?","How do you distinguish between a user who forgot their password and a potential brute-force attack in your monitoring?"]},

  {id:"AC.L2-3.1.9",domain:"AC",domainFull:"Access Control",title:"Privacy & Security Notices",
   statement:"Provide privacy and security notices consistent with CUI rules.",
   plain:"Before users log in to a system that processes CUI, they should see a warning banner that informs them the system is for authorized use only, that activity may be monitored, and that there is no expectation of privacy. This banner serves both a legal notice function and a deterrence function. It must appear on all systems handling CUI, not just externally-facing systems.",
   evidence:["System use notification (login banner) text approved by legal or compliance team","Screenshots showing login banners displayed on all CUI systems before authentication","Configuration documentation showing banners are enforced at OS or application layer","Policy referencing DoD or NIST requirements for system use notification content","Evidence banners cannot be bypassed or dismissed without acknowledgment"],
   questions:["Can you show me the login banner that appears when accessing your CUI systems?","Who approved the banner text, and when was it last reviewed for accuracy?","How do you ensure the banner is consistently applied across all systems — including VPN portals, remote desktop, and web applications handling CUI?","Is the banner a hard block requiring acknowledgment before login, or can it be dismissed without reading?"]},

  {id:"AC.L2-3.1.10",domain:"AC",domainFull:"Access Control",title:"Session Lock",
   statement:"Use session lock with pattern-hiding displays after a period of inactivity.",
   plain:"Workstations and terminals must automatically lock after a period of inactivity and hide the screen contents. If someone walks away from their desk without locking their screen, an unauthorized person shouldn't be able to walk up and access CUI. The lock must obscure what was on the screen — a screensaver that just shows the time doesn't satisfy this if the underlying content is still visible.",
   evidence:["Group Policy or MDM configuration screenshots showing screen lock timeout enforcement","Defined inactivity timeout value documented in policy and implemented in configuration","Evidence of pattern-hiding display (screen obscured, not just a clear screensaver)","Consistent enforcement across workstations, laptops, and terminals in CUI areas","Testing evidence showing the lock activates within the required timeframe"],
   questions:["What is your configured screen lock timeout period, and how is it enforced — Group Policy, MDM, or another mechanism?","Can a user override or extend the inactivity timeout, and if so, is that change logged?","Does the screen lock actually hide screen contents, or does it just display a screensaver over the active session?","Is the session lock policy applied consistently to remote sessions and VDI environments as well?"]},

  {id:"AC.L2-3.1.11",domain:"AC",domainFull:"Access Control",title:"Session Termination",
   statement:"Terminate (automatically) a user session after a defined condition.",
   plain:"Beyond screen locking, systems should actually terminate sessions under defined conditions — such as after a maximum session duration, after extended inactivity beyond the lock timeout, or when the user's network location changes unexpectedly. Session termination is stronger than locking because it requires full re-authentication. This is especially important for web applications and remote access sessions handling CUI.",
   evidence:["Session timeout configuration in web applications, VPNs, and remote access systems","Policy defining conditions that trigger automatic session termination","Technical configuration showing sessions are invalidated (not just locked) after defined conditions","Application server logs showing session termination events","Testing documentation showing sessions cannot be resumed after termination without re-authentication"],
   questions:["Under what conditions are user sessions automatically terminated rather than just locked?","How are web application session timeouts configured, and can a session be resumed with a stale token?","What happens to an active VPN session if the user's machine is idle for an extended period?","How do you handle session termination for privileged administrative sessions — are those subject to shorter timeout windows?"]},

  {id:"AC.L2-3.1.12",domain:"AC",domainFull:"Access Control",title:"Control Remote Access",
   statement:"Monitor and control remote access sessions.",
   plain:"Remote access to CUI systems must be both controlled (limited to authorized users via approved mechanisms) and monitored (logged and reviewed). This means VPNs, RDP, SSH, and any other remote access method must be tracked. Who connected, from where, when, and what did they do? Unmonitored remote access is a significant risk vector and a common finding in assessments.",
   evidence:["Remote access policy documentation defining approved methods and authorized users","VPN, RDP, and SSH connection logs with user, source IP, and session duration","SIEM alerting configuration for anomalous remote access patterns","MFA enforcement evidence for all remote access connections","Periodic review records of remote access users and sessions"],
   questions:["What remote access methods are authorized, and how is the list of authorized remote users maintained?","How are remote access sessions logged — what information is captured and for how long is it retained?","Is MFA required for all remote access, including VPN, RDP, and SSH?","How do you detect and respond to unauthorized or anomalous remote access attempts?"]},

  {id:"AC.L2-3.1.13",domain:"AC",domainFull:"Access Control",title:"Remote Access Confidentiality",
   statement:"Employ cryptographic mechanisms to protect the confidentiality of remote access sessions.",
   plain:"All remote access must be encrypted. No plain-text protocols for remote access to CUI systems — no Telnet, no FTP, no unencrypted RDP without NLA and TLS. VPNs must use strong cryptographic algorithms. SSH sessions must use approved cipher suites. This is about ensuring that even if someone intercepts the network traffic, they cannot read the CUI being transmitted.",
   evidence:["VPN configuration documentation showing encryption algorithms and key lengths in use","SSH server configuration files confirming only strong cipher suites are allowed","TLS configuration for remote access web portals (SSLLabs or equivalent scan results)","Network capture or protocol analysis confirming traffic is encrypted","Policy prohibiting use of unencrypted remote access protocols"],
   questions:["What encryption protocols and algorithms protect your VPN and remote access sessions?","Are any legacy unencrypted protocols (Telnet, rsh, FTP) still in use anywhere for remote access to CUI systems?","How do you validate that your TLS and VPN configurations meet current cryptographic standards and have not degraded over time?","What is your process for updating cryptographic configurations when algorithms are deprecated?"]},

  {id:"AC.L2-3.1.14",domain:"AC",domainFull:"Access Control",title:"Remote Access Routing",
   statement:"Route remote access via managed access control points.",
   plain:"Remote access traffic must flow through controlled chokepoints — not directly to internal systems. VPN concentrators, jump servers, and bastion hosts are the managed access control points that sit between remote users and CUI systems. This allows monitoring, filtering, and enforcement of access policies at a central point rather than relying on each individual system to be hardened against direct internet exposure.",
   evidence:["Network architecture diagram showing remote access traffic routing through managed control points","VPN gateway or jump server configuration documentation","Firewall rules confirming direct remote access to CUI systems from the internet is blocked","Network flow logs showing all remote sessions passing through authorized access points","Jump server or bastion host hardening documentation"],
   questions:["Show me your network diagram — where do remote users enter the network, and how does traffic reach CUI systems?","Is it possible for a remote user to access CUI systems directly without traversing your VPN or jump server?","How is the jump server or VPN concentrator itself hardened and monitored?","What controls at your managed access point enforce least privilege for remote sessions?"]},

  {id:"AC.L2-3.1.15",domain:"AC",domainFull:"Access Control",title:"Privileged Remote Access",
   statement:"Authorize remote execution of privileged commands and remote access to security-relevant information via remote access only for documented operational needs.",
   plain:"Remote execution of administrative commands on CUI systems should be the exception, not the norm, and must be explicitly authorized. Admins shouldn't be remotely running privileged commands without a documented and approved reason. This is about ensuring that privileged remote activity doesn't happen casually — it should require authorization, be logged, and be limited to specific operational needs.",
   evidence:["Policy explicitly authorizing specific privileged remote access scenarios with documented justification","Documented list of approved privileged remote access use cases","Audit logs capturing privileged command execution during remote sessions","PAM (Privileged Access Management) tool configuration restricting remote privileged access","Evidence of approval workflow for privileged remote access requests"],
   questions:["What privileged remote access scenarios are explicitly authorized, and where is that authorization documented?","How do you distinguish between routine remote access and privileged remote access in your logging and monitoring?","Is there a PAM tool or session recording in place for remote privileged sessions?","What happens when an administrator needs to perform a privileged action remotely — is there a formal approval process?"]},

  {id:"AC.L2-3.1.16",domain:"AC",domainFull:"Access Control",title:"Wireless Access Authorization",
   statement:"Authorize wireless access prior to allowing such connections.",
   plain:"Before any wireless connection to your network is allowed — especially to networks that carry CUI — it must be explicitly authorized. This means documented approval for wireless access, authenticated connection requirements, and a process to authorize specific devices or users for wireless connectivity. Rogue or unauthorized wireless access points are a significant threat vector.",
   evidence:["Wireless access policy with authorization requirements","Wireless access authorization records for approved users and devices","Network Access Control (NAC) configuration requiring authentication before wireless association","Wireless site survey or audit showing no rogue access points","802.1X or certificate-based wireless authentication configuration documentation"],
   questions:["What is the process for authorizing wireless access — who approves it, and what is documented?","How does your wireless infrastructure prevent unauthorized devices from connecting?","How do you detect and respond to rogue wireless access points on your network?","Is 802.1X or another enterprise authentication method enforced on your wireless networks that carry CUI?"]},

  {id:"AC.L2-3.1.17",domain:"AC",domainFull:"Access Control",title:"Wireless Access Protection",
   statement:"Protect wireless access using authentication and encryption.",
   plain:"Wireless networks carrying CUI must use strong authentication (not just a pre-shared key) and encryption (WPA2-Enterprise or WPA3 at minimum). WEP is completely unacceptable. A shared password for a CUI wireless network is also inadequate — individual authentication is required so access can be traced to a specific user or device and revoked individually if needed.",
   evidence:["Wireless network configuration showing WPA2-Enterprise or WPA3 with 802.1X","RADIUS server configuration documentation supporting wireless authentication","Certificate or credential-based authentication evidence for wireless users","Prohibition of WEP and WPA-Personal (pre-shared key) on CUI networks","Wireless encryption audit results confirming strong cipher suites"],
   questions:["What wireless security protocol is in use on networks that carry CUI — WPA2-Enterprise, WPA3, or something else?","Are any networks carrying CUI using pre-shared key (PSK) authentication? If so, what is the remediation plan?","How are individual wireless users authenticated, and how is that authentication logged?","How do you revoke wireless access for a specific user or device that should no longer have access?"]},

  {id:"AC.L2-3.1.18",domain:"AC",domainFull:"Access Control",title:"Mobile Device Connection",
   statement:"Control connection of mobile devices.",
   plain:"Mobile devices — phones, tablets, laptops connecting via cellular — that access CUI systems must be authorized and controlled. BYOD (Bring Your Own Device) without management controls is a significant risk. This requires either MDM enrollment, prohibition of personal devices from accessing CUI, or other controls that ensure mobile connections don't bypass your security architecture.",
   evidence:["Mobile device policy defining authorized device types and management requirements","MDM (Mobile Device Management) platform enrollment records for authorized devices","Technical configuration blocking unmanaged devices from accessing CUI systems","List of authorized mobile devices with corresponding justification","Compliance reporting from MDM showing device health status"],
   questions:["Are personal (BYOD) mobile devices permitted to access systems that handle CUI? If so, what controls apply?","What MDM solution is in use, and what security configurations are enforced on enrolled devices?","How do you prevent an unmanaged personal device from connecting to CUI systems via your VPN or wireless network?","What happens when an employee's mobile device is lost or stolen — what is the remote wipe process?"]},

  {id:"AC.L2-3.1.19",domain:"AC",domainFull:"Access Control",title:"Encrypt CUI on Mobile",
   statement:"Encrypt CUI on mobile devices and mobile computing platforms.",
   plain:"Any CUI stored on a mobile device — laptop, tablet, phone — must be encrypted. This means full-device encryption must be enabled, not just folder-level encryption. If a laptop is lost or stolen, the encrypted storage should prevent someone from accessing CUI by removing the drive or booting from external media. BitLocker, FileVault, and similar solutions satisfy this when properly configured.",
   evidence:["MDM compliance report showing device encryption enabled on all managed mobile devices","BitLocker or FileVault configuration and enforcement documentation","Encryption key management documentation (how keys are stored and recovered)","Policy requiring encryption on all mobile devices handling CUI","Evidence that encryption is verified, not just self-attested by users"],
   questions:["What encryption solution is used on laptops and mobile devices that may store or access CUI?","How do you verify that encryption is actually enabled — is this enforced through MDM or self-reported by users?","What is the encryption key recovery process if a user forgets their PIN or a device needs forensic examination?","How do you handle devices that cannot support full-disk encryption due to hardware limitations?"]},

  {id:"AC.L2-3.1.20",domain:"AC",domainFull:"Access Control",title:"External System Connections",
   statement:"Verify and control/limit connections to external systems.",
   plain:"When you connect to an external system — a contractor's network, a government portal, a cloud service — or when external systems connect to yours, those connections must be authorized and controlled. You can't just assume external systems are trustworthy. This includes limiting what external systems can access on your network, requiring agreements with external system owners, and ensuring external connections don't bypass your security controls.",
   evidence:["Interconnection Security Agreements (ISAs) or MOUs with external system owners","Authorized external connection inventory with justification and approval documentation","Firewall rules restricting external system access to only required resources","C2C (Cloud-to-Cloud) or API connection authorization records","Periodic review of external connections to confirm they are still necessary and authorized"],
   questions:["What external systems connect to or from your CUI environment, and how are those connections authorized?","Do you have Interconnection Security Agreements (ISAs) with external system owners, and when were they last reviewed?","How do you technically limit what an external system can access once connected to your environment?","What is the process for decommissioning an external connection that is no longer needed?"]},

  {id:"AC.L2-3.1.21",domain:"AC",domainFull:"Access Control",title:"Portable Storage Use",
   statement:"Limit use of portable storage devices on external systems.",
   plain:"When your users access CUI on systems you don't own or control — such as a government computer or a contractor's workstation — they should not be plugging in portable storage devices like USB drives. The risk is two-way: data could be exfiltrated to the USB, or malware could be introduced from it. This control limits that risk by restricting portable storage use in those external system contexts.",
   evidence:["Policy prohibiting or limiting use of portable storage on external or government systems","Technical controls (USB restriction via GPO or endpoint agent) on managed devices","User training acknowledgment covering portable storage restrictions","Evidence portable storage devices are managed and approved before use","Audit log entries showing USB insertion events on monitored systems"],
   questions:["Is the use of portable storage devices (USB drives, external hard drives) restricted or prohibited on systems that handle CUI?","How is the USB restriction technically enforced — Group Policy, endpoint agent, or physical port blocking?","What is the process for authorizing a portable storage device when one is genuinely needed?","How do you handle the situation where a user needs to transfer data — what are the approved alternatives to USB?"]},

  {id:"AC.L2-3.1.22",domain:"AC",domainFull:"Access Control",title:"Control Public Information",
   statement:"Control CUI posted or processed on publicly accessible systems.",
   plain:"If your organization operates any publicly accessible systems — public websites, FTP servers, publicly accessible portals — you must ensure CUI does not end up there. This requires a review and approval process before any information is posted publicly, and ongoing monitoring to ensure sensitive data hasn't accidentally been exposed. A well-intentioned employee posting the wrong document to a public site can be a significant breach.",
   evidence:["Review and approval process documentation for content posted to public-facing systems","Evidence of periodic scans or reviews of publicly accessible systems for inadvertent CUI exposure","DLP controls on systems that feed public-facing content","Training records covering restrictions on posting CUI publicly","Incident records if any inadvertent public disclosure has been discovered and remediated"],
   questions:["What is the review and approval process before information is posted to your public website or any publicly accessible system?","How do you scan or monitor public-facing systems to detect if CUI has been inadvertently exposed?","Who has authority to approve public postings, and how is that authority enforced technically?","Has there ever been an incident where CUI was inadvertently posted publicly? How was it handled?"]},

  // ── AWARENESS & TRAINING (AT) ─────────────────────────────────────────────
  {id:"AT.L2-3.2.1",domain:"AT",domainFull:"Awareness & Training",title:"Literacy Training and Awareness",
   statement:"Ensure that managers, system administrators, and users of organizational systems are made aware of the security risks associated with their activities and of the applicable policies, standards, and procedures related to the security of those systems.",
   plain:"Everyone who touches a CUI system must be trained on the security risks of their role and on the organization's security policies and procedures. This isn't just a checkbox training — the content must be relevant to what people actually do and must be updated as the threat landscape and policies change. Managers, admins, and end users each need awareness appropriate to their responsibilities.",
   evidence:["Security awareness training program curriculum documentation","Training completion records for all personnel with CUI system access","Training content covering current threats (phishing, social engineering, data handling)","Evidence of annual training refresh or updates when policies change","Acknowledgment records signed by employees confirming policy awareness"],
   questions:["What security awareness training is provided to all personnel, and how often is it conducted?","How is training content kept current with evolving threats and policy changes?","Can you demonstrate that all personnel with CUI system access have completed required training?","How do you handle employees who fail to complete required training — are there consequences?"]},

  {id:"AT.L2-3.2.2",domain:"AT",domainFull:"Awareness & Training",title:"Role-Based Security Training",
   statement:"Ensure that personnel with assigned information security responsibilities receive appropriate training to carry out those responsibilities.",
   plain:"General security awareness is not enough for people who have security-specific roles. System administrators, security staff, incident responders, and others with elevated security responsibilities need training specifically relevant to their duties. An admin managing firewalls needs to understand firewall security concepts — not just phishing awareness. This training must be tied to actual job functions.",
   evidence:["Role-specific training curriculum for each security-relevant job function","Training completion records tied to job roles (not just blanket course assignments)","Evidence of specialized training (vendor certifications, SANS courses, internal workshops)","Job descriptions showing security responsibilities that map to required training","Annual training plan identifying role-based training tracks by position"],
   questions:["How do you identify which employees require role-based security training beyond standard awareness training?","What specific training do your system administrators receive that general users do not?","How do you verify that role-based training was completed and comprehended, not just clicked through?","When someone takes on new security responsibilities, how quickly are they required to complete relevant training?"]},

  {id:"AT.L2-3.2.3",domain:"AT",domainFull:"Awareness & Training",title:"Insider Threat Awareness",
   statement:"Provide security awareness training on recognizing and reporting potential indicators of insider threat.",
   plain:"Insider threats — malicious or negligent employees, contractors, and others with authorized access — are one of the most difficult threats to defend against. Personnel must be trained to recognize warning signs: unusual data access patterns, colleagues expressing grievances combined with unusual system activity, unauthorized data transfers, or attempts to access systems beyond their role. They must also know how to report concerns without fear of retaliation.",
   evidence:["Training curriculum with specific insider threat awareness content","Reporting mechanism documentation (hotline, anonymous reporting tool, HR process)","Training records showing insider threat module completion","Policy documentation covering insider threat indicators and reporting obligations","Evidence of post-training awareness exercises or phishing simulations testing insider threat recognition"],
   questions:["What insider threat awareness content is included in your security training program?","How can employees report concerns about potential insider threat activity — is there an anonymous option?","What indicators of insider threat are personnel trained to recognize?","How do you balance insider threat monitoring with employee privacy and legal considerations?"]},

  // ── AUDIT & ACCOUNTABILITY (AU) ───────────────────────────────────────────
  {id:"AU.L2-3.3.1",domain:"AU",domainFull:"Audit & Accountability",title:"Event Logging",
   statement:"Create and retain system audit logs and records to the extent needed to enable the monitoring, analysis, investigation, and reporting of unlawful or unauthorized system activity.",
   plain:"You must log security-relevant events across your CUI systems — logon/logoff, privilege use, account changes, object access, policy changes, and more. And you must retain those logs long enough to support incident investigation. A log that rolls over every 24 hours is useless for investigating a breach that went undetected for weeks. Retention periods must be defined in policy and technically enforced.",
   evidence:["Audit logging policy defining what events are logged and retention periods","SIEM or log management platform configuration showing log sources and retention settings","Sample audit log entries from key systems (domain controllers, file servers, VPN, applications)","Evidence that logs include required fields: who, what, when, where (source IP), outcome","Log storage capacity and retention compliance reporting"],
   questions:["What events are captured in your audit logs, and across which systems?","What is your log retention period, and how is retention technically enforced to prevent logs from being overwritten?","How do you ensure that audit logging is enabled and functioning on all CUI systems — is this monitored?","What information is captured in each log entry — does it include the user identity, source, action, and outcome?"]},

  {id:"AU.L2-3.3.2",domain:"AU",domainFull:"Audit & Accountability",title:"User Accountability",
   statement:"Ensure that the actions of individual users can be uniquely traced to those users so they can be held accountable for their actions.",
   plain:"Every action on a CUI system must be traceable to a specific individual. This means no shared accounts, no generic credentials, no anonymous actions. If a log entry says 'admin' deleted a file, you have no accountability. Each user needs a unique identifier so that if something goes wrong, you can say definitively 'this person did this action at this time.'",
   evidence:["Policy prohibiting shared or generic accounts on CUI systems","User account naming convention documentation showing unique identifier assignment","Audit log samples demonstrating individual user actions are captured with unique identifiers","Evidence that service accounts are individually named and their use is attributable","Periodic review records confirming no shared accounts exist in CUI systems"],
   questions:["Are there any shared or generic accounts (e.g., 'admin', 'helpdesk') on systems that process CUI?","How do you ensure that audit logs can uniquely identify the individual behind every action, not just an account name?","How are service accounts and system accounts handled — can their actions be traced back to a human responsible for them?","If an unauthorized action were detected in audit logs, how confident are you that you could identify the specific individual responsible?"]},

  {id:"AU.L2-3.3.3",domain:"AU",domainFull:"Audit & Accountability",title:"Event Review",
   statement:"Review and analyze system audit logs for indications of inappropriate or unusual activity, report findings to appropriate personnel, and take corrective action.",
   plain:"Collecting logs is only half the job — someone must actually look at them. This control requires regular review and analysis of audit logs to identify anomalies, suspicious patterns, or unauthorized activity. Manual log review at scale is impractical, which is why most organizations use a SIEM with alerting. But automated alerting alone isn't sufficient without defined response procedures and evidence of actual review.",
   evidence:["SIEM alert rules and tuning documentation showing log analysis is occurring","Log review schedule and records of completed reviews","SIEM dashboard screenshots showing active monitoring of CUI systems","Alert investigation records or tickets showing follow-up on flagged events","Reporting documentation showing log findings are escalated to appropriate personnel"],
   questions:["How frequently are audit logs reviewed, and who is responsible for that review?","What tooling is used to analyze logs — is it manual, SIEM-based, or a combination?","Can you show me examples of alerts generated from log analysis and how they were investigated?","How are anomalous findings escalated, and what is the expected response time for different alert severities?"]},

  {id:"AU.L2-3.3.4",domain:"AU",domainFull:"Audit & Accountability",title:"Audit Failure Alerting",
   statement:"Alert in the event of an audit logging process failure.",
   plain:"If your audit logging system fails — disk full, service crash, network connectivity to a log collector lost — you must be alerted immediately. Silent logging failures are dangerous because you lose your visibility and audit trail without knowing it. An attacker who knows your logging is down can operate freely. Monitoring the health of your logging infrastructure is as important as the logs themselves.",
   evidence:["SIEM or log management alerting configuration for logging failures","Evidence of alerts triggered when a log source stops sending events","Monitoring dashboard showing logging infrastructure health","Documented response procedure for logging failures","Test records showing the audit failure alert was verified to work"],
   questions:["What happens if a system stops sending logs to your SIEM — how quickly are you alerted?","Can you demonstrate that an alert is generated when a critical log source goes silent?","What is your response procedure when an audit logging failure is detected?","How is log storage capacity monitored to prevent logs from being lost due to disk full conditions?"]},

  {id:"AU.L2-3.3.5",domain:"AU",domainFull:"Audit & Accountability",title:"Audit Correlation",
   statement:"Correlate audit record review, analysis, and reporting processes for investigation and response to indications of unlawful, unauthorized, suspicious, or unusual activity.",
   plain:"Audit events from different systems need to be correlated to build a complete picture of an incident. A failed VPN login from an unusual country followed by a successful login 10 minutes later on a VPN that doesn't enforce MFA, followed by large data access — each event alone might not trigger an alert, but together they tell a story. SIEM platforms with correlation rules are the primary tool for this control.",
   evidence:["SIEM correlation rules documentation targeting multi-source attack patterns","Evidence of multi-source log ingestion in the SIEM (AD, VPN, endpoints, network, applications)","Sample correlation alert showing events stitched across systems","Incident investigation records demonstrating cross-system correlation was used","SIEM dashboard showing unified timeline view of correlated events"],
   questions:["What SIEM or log correlation tool is in use, and what log sources feed into it?","Can you show me an example correlation rule that ties events across multiple systems?","How are audit records from disparate systems normalized to support timeline correlation?","Has correlation of audit records been used to investigate an actual incident? Can you walk through an example?"]},

  {id:"AU.L2-3.3.6",domain:"AU",domainFull:"Audit & Accountability",title:"Reduction & Reporting",
   statement:"Provide an audit reduction and report generation capability that does not alter the original content or timing of audit records.",
   plain:"You must be able to generate reports and summaries from audit data without modifying the underlying log records. Audit reduction means distilling large volumes of logs into actionable reports. The key requirement is that this reporting process must not alter, filter, or delete original records — the source of truth must remain intact. This is important for forensic validity.",
   evidence:["Report generation tools or SIEM dashboards that produce summaries from raw logs","Documentation confirming raw logs are stored separately and immutably from reports","Sample compliance or activity reports generated from audit data","Audit log integrity verification mechanism (hashing, write-once storage)","Evidence that filtered or summarized reports do not overwrite source records"],
   questions:["How do you generate audit reports and summaries, and what tools are used?","How do you ensure that audit record reduction or reporting doesn't alter the original log data?","Are your raw audit logs stored in a write-protected or immutable format to prevent tampering?","Can you produce an on-demand report of privileged account activity for the last 30 days?"]},

  {id:"AU.L2-3.3.7",domain:"AU",domainFull:"Audit & Accountability",title:"Authoritative Time Source",
   statement:"Provide a system capability that compares and synchronizes internal system clocks with an authoritative source to generate time stamps for audit records.",
   plain:"All systems must have their clocks synchronized to an authoritative time source (like NIST's NTP servers). Log correlation only works if all systems agree on what time it is. A 5-minute clock skew between a firewall and a domain controller can make it impossible to reconstruct an attack timeline accurately. NTP synchronization must be enforced, monitored, and traceable to a reliable source.",
   evidence:["NTP configuration documentation on all CUI systems showing authoritative time source","Group Policy or configuration management showing NTP enforcement","Monitoring evidence showing clock synchronization compliance across systems","Documentation of NTP hierarchy (stratum levels) in the environment","Evidence that audit log timestamps are consistent across correlated log sources"],
   questions:["What time synchronization protocol and authoritative time source are configured across your CUI systems?","How do you enforce NTP configuration — is it managed centrally or configured per-system?","How do you monitor for clock drift or systems that are out of sync with the authoritative time source?","Have you ever encountered a situation where clock skew impeded an incident investigation?"]},

  {id:"AU.L2-3.3.8",domain:"AU",domainFull:"Audit & Accountability",title:"Audit Protection",
   statement:"Protect audit information and audit tools from unauthorized access, modification, and deletion.",
   plain:"Audit logs are only useful if they can be trusted. If an attacker (or a malicious insider) can modify or delete logs, they can cover their tracks. Logs must be protected from unauthorized access and from modification by the users whose actions they record. This typically means centralized log storage with access controls, write-once or append-only storage, and privileged account restrictions on log management.",
   evidence:["Access controls on log storage restricting modification and deletion","Write-once or append-only storage configuration for audit logs (WORM storage, log forwarding to immutable destination)","Evidence that administrators cannot delete their own activity logs","Log integrity verification mechanisms (hashing, checksums)","SIEM platform access controls showing who can access and manage audit data"],
   questions:["Who has access to your audit logs, and can administrators modify or delete logs that contain their own activity?","How are audit logs protected from tampering — is write-once or immutable storage in use?","What would an attacker need to do to successfully cover their tracks by modifying your audit logs?","How do you verify the integrity of audit logs to detect if they have been tampered with?"]},

  {id:"AU.L2-3.3.9",domain:"AU",domainFull:"Audit & Accountability",title:"Audit Management",
   statement:"Limit management of audit logging to a subset of privileged users.",
   plain:"The ability to configure, manage, start, stop, or modify the audit logging system itself must be restricted to a small, specifically authorized group — and should be separate from general system administration. If any admin can turn off logging, the integrity of your audit trail is at risk. Management of the logging infrastructure should require special authorization and be itself logged.",
   evidence:["Documentation of who has audit management privileges and the justification","Access control configuration showing audit management restricted to authorized subset","Separation between audit management role and general system administration","Audit logs of audit management actions (changes to logging configuration)","Policy defining who may manage audit systems and approval requirements"],
   questions:["Who has the ability to modify audit logging configurations or disable logging — how many people, and how is that access controlled?","Is the set of people who can manage audit systems different from general system administrators?","Are actions taken to manage the audit logging system itself logged somewhere tamper-resistant?","What approval is required before someone is granted audit management privileges?"]},

  // ── CONFIGURATION MANAGEMENT (CM) ────────────────────────────────────────
  {id:"CM.L2-3.4.1",domain:"CM",domainFull:"Configuration Management",title:"Baseline Configurations",
   statement:"Establish and maintain baseline configurations and inventories of organizational systems (including hardware, software, firmware, and documentation) throughout the respective system development life cycles.",
   plain:"You need to know what 'normal' looks like for every system you operate. A baseline configuration is the documented, approved state of a system. If something changes from that baseline without authorization, that's a red flag. This also requires maintaining an accurate, up-to-date inventory of all hardware and software assets. You can't secure what you don't know you have.",
   evidence:["System inventory (CMDB or equivalent) covering all hardware and software assets","Baseline configuration documentation (STIGs, CIS benchmarks, or organization-defined baselines)","Automated configuration compliance scanning results","Change management records linking approved changes to baseline updates","Software bill of materials (SBOM) or equivalent for critical systems"],
   questions:["How is your asset inventory maintained — is it automated or manual, and how often is it reconciled?","What tool or process do you use to detect when a system deviates from its approved baseline configuration?","How are baseline configurations updated when a patch or new software is authorized?","Walk me through how you would know if unauthorized software was installed on a CUI system."]},

  {id:"CM.L2-3.4.2",domain:"CM",domainFull:"Configuration Management",title:"Establish Configuration Settings",
   statement:"Establish and enforce security configuration settings for information technology products employed in organizational systems.",
   plain:"Every system, application, and device must be configured securely — not just installed with defaults. Default configurations are often insecure. This means using industry-recognized security benchmarks (CIS, DISA STIGs) and enforcing those settings technically. Configuration settings must be documented, enforced through tools like Group Policy or configuration management systems, and verified regularly.",
   evidence:["Security configuration baselines referencing CIS benchmarks or DISA STIGs","Configuration management tool (SCCM, Ansible, Chef, etc.) deployment evidence","Automated compliance scanning results showing adherence to configuration baselines","Hardening checklists completed for each major system type","Documented exceptions to security baselines with risk acceptance rationale"],
   questions:["What security configuration benchmarks do you follow — CIS, DISA STIG, or a custom baseline?","How are security configuration settings enforced — Group Policy, configuration management tools, or manual hardening?","How do you scan for and detect configuration drift from your established baselines?","What is the process for documenting and approving exceptions to security configuration standards?"]},

  {id:"CM.L2-3.4.3",domain:"CM",domainFull:"Configuration Management",title:"Unauthorized Change Detection",
   statement:"Track, review, approve, and log changes to organizational systems.",
   plain:"All changes to CUI systems must go through a formal change management process — documented, reviewed, approved, and logged. Unauthorized changes are a significant risk because they could introduce vulnerabilities, create backdoors, or destabilize systems. A formal change management process ensures that changes are evaluated for security impact before implementation.",
   evidence:["Change management policy and formal change control procedure documentation","Change management system records (tickets) showing request, review, approval, and implementation","Evidence that emergency changes still follow an expedited approval process","Configuration monitoring tool detecting and alerting on unauthorized changes","Post-implementation review records confirming changes were implemented as approved"],
   questions:["Walk me through your change management process from the time a change is requested to when it's implemented and closed.","How are unauthorized or undocumented changes detected — do you have configuration monitoring tools?","What is the emergency change process, and does it still require some form of approval before implementation?","How do you ensure that changes made by vendors or contractors go through your change management process?"]},

  {id:"CM.L2-3.4.4",domain:"CM",domainFull:"Configuration Management",title:"Security Impact Analysis",
   statement:"Analyze the security impact of changes prior to implementation.",
   plain:"Before any change is made to a CUI system, its potential security impact must be analyzed. This isn't just asking 'will this break something' — it's asking 'will this introduce a vulnerability, weaken a control, or create an unintended access pathway?' Security must be part of the change review process, not an afterthought. Changes that could impact security posture require specific security review and approval.",
   evidence:["Change management form or ticket template including security impact assessment field","Evidence that security review is part of the change approval workflow","Security review signoff on change tickets for CUI system changes","Risk assessment documentation for significant configuration changes","Rejected or modified change requests based on negative security impact analysis"],
   questions:["How is security impact assessed as part of your change management process — who performs the assessment?","Can you show me a change ticket where a security impact analysis was documented?","Has a proposed change ever been rejected or modified due to security impact concerns? Walk me through an example.","How do you handle changes that initially appear routine but reveal security concerns during review?"]},

  {id:"CM.L2-3.4.5",domain:"CM",domainFull:"Configuration Management",title:"Access Restrictions for Change",
   statement:"Define, document, approve, and enforce physical and logical access restrictions associated with changes to organizational systems.",
   plain:"Only authorized individuals should have the ability to make changes to CUI systems, and that access should be tightly controlled. This means separate production and development environments, change management systems with role-based access, and technical controls preventing unauthorized modifications. Who can approve changes, who can implement them, and who can make emergency changes must all be defined and enforced.",
   evidence:["Documented roles and permissions for change implementation in production systems","Production environment access restrictions limiting who can make changes","Evidence of separate development, test, and production environments","Change management system access control configuration","Audit logs showing only authorized individuals implemented approved changes"],
   questions:["Who is authorized to make changes to production CUI systems, and how is that access technically controlled?","How are development and test environments separated from production to prevent unauthorized changes?","What prevents an unauthorized person from directly modifying a production CUI system configuration?","How is access to change implementation tools (e.g., deployment systems, configuration management) restricted?"]},

  {id:"CM.L2-3.4.6",domain:"CM",domainFull:"Configuration Management",title:"Least Functionality",
   statement:"Configure the system to provide only essential capabilities.",
   plain:"Systems should be configured to provide only the services, ports, protocols, and functions that are actually needed for their purpose. Unnecessary services are attack surface. A web server doesn't need a print spooler. A database server doesn't need Bluetooth. Every unneeded service is another potential vulnerability. This principle applies to both operating systems and applications.",
   evidence:["Hardened system configurations showing disabled unnecessary services","Port scan results confirming only required ports are open on CUI systems","Application whitelisting or service allowlist documentation","Evidence that default installation services have been evaluated and unneeded ones disabled","Periodic review records confirming system functions remain appropriately limited"],
   questions:["How do you determine which services and ports are necessary on each system type?","What is the process for disabling unneeded services during system build — is this documented in a baseline?","How do you detect when a new service has been enabled on a CUI system that wasn't authorized?","Who reviews and approves requests to enable new services or protocols on CUI systems?"]},

  {id:"CM.L2-3.4.7",domain:"CM",domainFull:"Configuration Management",title:"Nonessential Functionality",
   statement:"Restrict, disable, or prevent the use of programs, functions, ports, protocols, and services not required.",
   plain:"Similar to least functionality, this control specifically calls out the need to restrict unnecessary programs and features — not just services. Unused Windows features like PowerShell Remoting, LLMNR, or NetBIOS should be disabled if not needed. Unnecessary browser plugins, file sharing protocols, and development tools on production systems should be removed or restricted. Every unnecessary capability is a potential pivot point.",
   evidence:["Configuration documentation showing disabled unnecessary Windows features and roles","Browser extension/plugin management policy and enforcement","Network protocol restriction configuration (e.g., LLMNR/NetBIOS disabled)","Application control policy restricting unauthorized program execution","Evidence of regular review and removal of no-longer-needed functionality"],
   questions:["What process do you use to identify and disable unnecessary features in operating systems and applications?","Are protocols like LLMNR, NetBIOS, and SMBv1 disabled in your environment? How is that enforced?","How do you prevent users from installing or enabling unauthorized programs or browser extensions?","When a business need for a function ends, what is the process to disable or remove it?"]},

  {id:"CM.L2-3.4.8",domain:"CM",domainFull:"Configuration Management",title:"Application Execution Policy",
   statement:"Apply deny-by-default and allow-by-exception policies for software usage and installation.",
   plain:"Instead of allowing anything that hasn't been explicitly blocked, flip the model: block everything and only allow what is explicitly approved. Application whitelisting (or 'allowlisting') means only approved software can run. This is a powerful control against malware — even if a user downloads malicious code, it can't execute because it's not on the approved list. Tools like Windows Defender Application Control (WDAC), AppLocker, or third-party solutions implement this.",
   evidence:["Application whitelisting/allowlisting policy and technical implementation documentation","WDAC, AppLocker, or equivalent tool configuration showing deny-by-default rules","Evidence of approved application list and the process for requesting additions","Test results showing unauthorized applications are blocked from executing","Audit logs of blocked application execution attempts"],
   questions:["Do you implement application allowlisting — where only explicitly approved software can execute?","What tool implements your application execution policy — AppLocker, WDAC, or a third-party solution?","How does a user request a new application to be added to the approved list?","How does your application execution policy handle script-based attacks (PowerShell, VBScript)?"]},

  {id:"CM.L2-3.4.9",domain:"CM",domainFull:"Configuration Management",title:"User-Installed Software",
   statement:"Control and monitor user-installed software.",
   plain:"Users should not be able to install software on CUI systems without authorization. Even well-meaning users installing productivity tools can introduce vulnerabilities, licensing issues, or unauthorized data pathways. This control requires both preventing unauthorized installation and monitoring for software that has been installed outside the approved process. Local admin rights removal is the primary enforcement mechanism.",
   evidence:["Policy prohibiting unauthorized software installation","Technical control evidence showing standard users lack software installation privileges","Software inventory with approved vs. detected software comparison","Monitoring for unauthorized software installation (endpoint management alerts)","Help desk records showing the software installation request and approval process"],
   questions:["Can standard users install software on CUI systems without administrator assistance?","How do you detect if a user has installed unauthorized software — is this monitored automatically?","What is the process for a user to request software they need — who approves it, and how is it vetted?","How frequently do you scan for unauthorized software, and what happens when it is found?"]},

  // ── IDENTIFICATION & AUTHENTICATION (IA) ──────────────────────────────────
  {id:"IA.L1-3.5.1",domain:"IA",domainFull:"Identification & Authentication",title:"Identify System Users",
   statement:"Identify information system users, processes acting on behalf of users, and devices.",
   plain:"Every user, automated process, and device must have a unique identity in the system. You can't manage access or accountability if you don't know who or what is accessing your systems. This means individual user accounts (no sharing), named service accounts for automated processes, and device identification for hardware connecting to CUI systems. Identification is the foundation that all other access controls depend on.",
   evidence:["User account inventory showing unique identifiers for all users","Service account documentation listing automated processes and their associated accounts","Device inventory with unique identifiers for CUI system assets","Active Directory or IdP user directory exports showing distinct accounts","Evidence that shared or anonymous accounts are prohibited and not present"],
   questions:["How is each user uniquely identified in your systems — what is the account naming convention?","How are automated processes or service accounts identified and distinguished from human user accounts?","How are devices identified when they connect to CUI networks?","Is there any system or process in your environment that still uses shared or anonymous credentials?"]},

  {id:"IA.L1-3.5.2",domain:"IA",domainFull:"Identification & Authentication",title:"Authenticate System Users",
   statement:"Authenticate (or verify) the identities of those users, processes, or devices, as a prerequisite to allowing access to organizational information systems.",
   plain:"Identification tells the system who you claim to be; authentication proves it. Users must present credentials (passwords, certificates, tokens) that verify their claimed identity before being granted access. Every access point — login screens, API endpoints, network connections — must require authentication. Unauthenticated access to systems handling CUI is never acceptable.",
   evidence:["Authentication policy requiring credentials for all system access","Technical demonstration that all access points require authentication","Password or credential policy documentation","Evidence of authentication being enforced at network, system, and application levels","Audit logs showing authentication events for all user access"],
   questions:["Are there any systems or access points that allow unauthenticated access in your CUI environment?","How is authentication enforced at each layer — network, operating system, and application?","How do you ensure that authentication mechanisms are consistently applied, including for internal systems?","What is the process when authentication credentials are suspected to be compromised?"]},

  {id:"IA.L2-3.5.3",domain:"IA",domainFull:"Identification & Authentication",title:"Multifactor Authentication",
   statement:"Use multifactor authentication for local and network access to privileged accounts and for network access to non-privileged accounts.",
   plain:"A password alone is not enough for CUI systems. MFA requires at least two factors: something you know (password), something you have (phone, hardware token, smart card), or something you are (biometric). For privileged accounts, MFA is required even for local console access. For standard users, MFA is required for network access. This dramatically reduces the risk of credential-based attacks.",
   evidence:["MFA solution configuration documentation (Duo, Okta, Azure MFA, etc.)","MFA enrollment rate report showing all required users are enrolled","Policy documentation mandating MFA for all specified account types","Exceptions log if any accounts lack MFA, with compensating controls documented","Authentication logs demonstrating MFA challenges on login events"],
   questions:["What MFA solution is in use, and does it apply to all users or only specific groups?","Are there any accounts or systems where MFA is not enforced? If so, why, and what compensating controls exist?","How are privileged accounts handled — is MFA required for local console access in addition to network access?","What happens if a user loses their MFA device — what is the recovery process, and does it bypass MFA?"]},

  {id:"IA.L2-3.5.4",domain:"IA",domainFull:"Identification & Authentication",title:"Replay-Resistant Authentication",
   statement:"Employ replay-resistant authentication mechanisms for network access to privileged and non-privileged accounts.",
   plain:"Replay attacks capture valid authentication credentials and reuse them later. NTLM authentication, for example, is vulnerable to pass-the-hash attacks where captured hashes can be replayed. Replay-resistant mechanisms use time-bound, challenge-response, or one-time tokens that are useless after initial use. Kerberos, PKI certificates, TOTP-based MFA, and TLS mutual authentication all provide replay resistance.",
   evidence:["Authentication protocol documentation confirming Kerberos, TLS, or OTP-based mechanisms","Prohibition of NTLM authentication or remediation plan if still in use","MFA solution documentation confirming time-based or challenge-response tokens","Network analysis or protocol documentation showing replay resistance","Penetration test results validating authentication replay resistance"],
   questions:["What authentication protocols are in use, and how do they protect against replay attacks?","Is NTLM authentication still used anywhere in your environment? If so, what is the plan to eliminate it?","How do your MFA tokens prevent replay — are they time-based (TOTP) or challenge-based?","Has a penetration test confirmed that your authentication systems are resistant to replay and pass-the-hash attacks?"]},

  {id:"IA.L2-3.5.5",domain:"IA",domainFull:"Identification & Authentication",title:"Identifier Reuse",
   statement:"Disable identifiers after a defined inactivity period.",
